# =============================================================================
# i-Finance production web tier (deployment Option C)
#   - serves 'final apps/' as ONE web root (root-absolute /<App>/Jet/ URLs,
#     /shared/, /FL/Portal/ all resolve exactly like dev-proxy.py)
#   - reverse-proxies /ords/ to ADB managed ORDS -> same-origin, no CORS layer
#   - rate-limits the PUBLIC freelancer portal auth + self-registration paths
#
# Installed to /etc/nginx/conf.d/ifinance.conf by provision_webtier.sh, which
# substitutes the placeholders:
#   __SERVER_NAME__  public DNS name (or '_' when addressed by IP only)
#   __ORDS_HOST__    ADB managed-ORDS hostname (from OCI Console, never tnsnames)
#   __RESOLVER__     DNS resolver reachable from the VM (from /etc/resolv.conf)
# =============================================================================

# public FL portal login/OTP/self-registration: 10 req/min per client IP
limit_req_zone $binary_remote_addr zone=fl_public:10m rate=10r/m;

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name __SERVER_NAME__;

    # certbot webroot (real certificate later)
    location /.well-known/acme-challenge/ { root /var/www/acme; }

    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2 default_server;
    listen [::]:443 ssl http2 default_server;
    server_name __SERVER_NAME__;

    ssl_certificate     /etc/nginx/ssl/ifinance.crt;
    ssl_certificate_key /etc/nginx/ssl/ifinance.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # ADB frontend IPs can rotate - resolve per request, never cache at startup
    resolver __RESOLVER__ valid=300s;
    set $ords_host __ORDS_HOST__;

    root  /var/www/ifinance/current;
    index index.html;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    # Enable ONLY after a CA-issued certificate replaces the self-signed one
    # (HSTS + self-signed cert locks browsers out of the cert-warning bypass):
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    gzip on;
    gzip_min_length 1024;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # binary document uploads (per-module MAX_UPLOAD_MB setting, default 10)
    client_max_body_size 50m;

    limit_req_status 429;

    location = / { return 302 /Admin/Jet/index.html; }

    # -- public portal endpoints get the strict limiter ----------------------
    location ^~ /ords/admin/fl/portal/auth/ {
        limit_req zone=fl_public burst=10 nodelay;
        include /etc/nginx/snippets/ifinance-ords.inc;
    }
    location ^~ /ords/admin/fl/reg/public/ {
        limit_req zone=fl_public burst=10 nodelay;
        include /etc/nginx/snippets/ifinance-ords.inc;
    }

    # -- everything else under /ords/ passes straight through ----------------
    location ^~ /ords/ {
        include /etc/nginx/snippets/ifinance-ords.inc;
    }

    # static assets: safe to cache long - every app busts caches via the
    # APP_VERSION query key (requirejs urlArgs + i18n cache key)
    location ~* \.(js|css|png|jpe?g|gif|svg|ico|woff2?|ttf|map|json)$ {
        expires 7d;
        try_files $uri =404;
    }

    # HTML entry points stay no-cache so a redeploy is picked up immediately
    location / {
        expires -1;
        try_files $uri $uri/ =404;
    }
}
