<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>i-Finance V2 — Admin Portal (Oracle JET)</title>
  <link rel="stylesheet" href="https://static.oracle.com/cdn/jet/17.0.0/default/css/redwood/oj-redwood-min.css">
  <link rel="stylesheet" href="css/app.css">
  <link rel="stylesheet" href="css/themes.css">
  <style>
    .login-mode .app-header,
    .login-mode .app-sidebar { display: none !important; }
    .login-mode main { padding: 0; }
    .login-mode .app-content { background: transparent; }
  </style>
</head>
<body>
<div id="globalBody" data-bind="css: { 'login-mode': isLoginPage() }">

  <!-- ── Header ──────────────────────────────────────────────────────── -->
  <header class="app-header" data-bind="visible: !isLoginPage()">
    <div class="header-start">
      <button class="nav-toggle-btn" data-bind="click: toggleNav" title="Toggle navigation">
        <span class="hdr-icon">&#9776;</span>
      </button>
      <div class="app-brand">
        <span class="brand-cube">i</span>
        <div class="brand-text">
          <span class="brand-name">i-Finance</span>
          <span class="brand-sub">Admin Portal</span>
        </div>
        <span class="brand-tech-badge">Oracle JET</span>
      </div>
    </div>

    <div class="header-end">
      <button class="hdr-action-btn" data-bind="click: function(){ navigate('notifications'); }" title="Notifications">
        <span class="hdr-icon">&#128276;</span>
        <span class="notif-dot" data-bind="visible: unreadCount() > 0, text: unreadCount"></span>
      </button>

      <div class="user-menu-wrap" data-bind="click: toggleUserMenu">
        <div class="user-avatar-sm"
             data-bind="style: { background: currentUser() && currentUser().color || '#C74634' },
                        text: userInitials"></div>
        <span class="user-display-name" data-bind="text: currentUser() && currentUser().displayName"></span>
        <span class="chevron-down">&#9660;</span>

        <div class="user-dropdown" data-bind="visible: userMenuOpen" style="display:none">
          <div class="dd-user-info">
            <div class="dd-avatar"
                 data-bind="style: { background: currentUser() && currentUser().color || '#C74634' },
                            text: userInitials"></div>
            <div>
              <div class="dd-name"  data-bind="text: currentUser() && currentUser().displayName"></div>
              <div class="dd-email" data-bind="text: currentUser() && currentUser().email"></div>
            </div>
          </div>
          <div class="dd-divider"></div>
          <button class="dd-item" data-bind="click: function(){ navigate('profile'); userMenuOpen(false); }">
            &#128100; &nbsp;My Profile
          </button>
          <div class="dd-divider"></div>
          <button class="dd-item dd-item--danger" data-bind="click: logout">
            &#10148; &nbsp;Logout
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- ── App body ────────────────────────────────────────────────────── -->
  <div class="app-body">

    <!-- ── Sidebar ────────────────────────────────────────────────────── -->
    <nav class="app-sidebar" data-bind="css: { 'app-sidebar--open': sideNavOpen() }, visible: !isLoginPage()">
      <div class="sidebar-scroll">
        <!-- ko foreach: navGroups() -->

        <!-- Standalone items (no group header) -->
        <!-- ko if: $data.standalone -->
        <!-- ko foreach: $data.items -->
        <a class="nav-item" href="#"
           data-bind="css: { 'nav-item--active': $root.currentNavItem() === $data.id },
                      click: function(){ $root.navigate($data.id); return false; }">
          <span class="nav-icon" data-bind="html: $data.icon"></span>
          <span class="nav-label" data-bind="text: $data.label"></span>
        </a>
        <!-- /ko -->
        <!-- /ko -->

        <!-- Collapsible group -->
        <!-- ko ifnot: $data.standalone -->
        <div class="nav-group-header" data-bind="click: $root.toggleGroup.bind($root, $data)">
          <span class="nav-chevron" data-bind="css: { 'nav-chevron--expanded': !$data.collapsed() }">&#9654;</span>
          <span class="nav-group-label" data-bind="text: $data.label"></span>
        </div>
        <!-- ko ifnot: $data.collapsed() -->
        <!-- ko foreach: $data.items -->
        <a class="nav-item nav-item--child" href="#"
           data-bind="css: { 'nav-item--active': $root.currentNavItem() === $data.id },
                      click: function(d, e){ if ($data.url) { window.location.href = $data.url; } else { $root.navigate($data.id); } return false; }">
          <span class="nav-icon" data-bind="html: $data.icon"></span>
          <span class="nav-label" data-bind="text: $data.label"></span>
          <!-- ko if: $data.url -->
          <span style="font-size:9px;opacity:0.5;margin-left:auto">&#8599;</span>
          <!-- /ko -->
        </a>
        <!-- /ko -->
        <!-- /ko -->
        <!-- /ko -->

        <!-- /ko -->
      </div>
    </nav>

    <!-- ── Main content ─────────────────────────────────────────────── -->
    <main class="app-content" data-bind="click: closeUserMenu">
      <div data-bind="module: moduleConfig" class="app-module-host"></div>
    </main>

  </div><!-- /.app-body -->

</div><!-- /#globalBody -->

<script src="https://static.oracle.com/cdn/jet/17.0.0/3rdparty/require/require.js"
        data-main="js/main"></script>
</body>
</html>
