<div class="page-wrap">
  <div class="page-header-row">
    <div class="page-header">
      <div class="page-title" data-bind="text: $root.t('vw.modules.title')"></div>
      <div class="page-subtitle" data-bind="text: $root.t('vw.modules.subtitle')"></div>
    </div>
  </div>

  <div class="view-toolbar">
    <input class="search-box" type="text" placeholder="&#128269; Search modules&hellip;"
           data-bind="value: searchTerm, valueUpdate: 'input'">
    <select class="form-control" style="width:180px;padding:8px 10px"
            data-bind="value: filterCat">
      <option value="ALL">All Categories</option>
      <!-- ko foreach: categories -->
      <option data-bind="value: id, text: label"></option>
      <!-- /ko -->
    </select>
  </div>

  <!-- Edit dialog -->
  <!-- ko if: showEdit() -->
  <div style="position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:flex;align-items:center;justify-content:center">
    <!-- ko with: editTarget() -->
    <div style="background:#fff;border-radius:12px;padding:28px;max-width:480px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3)">
      <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px">
        <h3 style="margin:0">Edit Module</h3>
        <div class="region-actions">
          <button class="btn btn-secondary btn-sm" data-bind="click: $vm.closeEdit">Cancel</button>
          <button class="btn btn-primary btn-sm" data-bind="click: $vm.saveEdit">&#10003; Save</button>
        </div>
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Name (English)</label>
          <input class="form-control" type="text" data-bind="value: nameEn">
        </div>
        <div class="form-group">
          <label class="form-label">Name (Arabic)</label>
          <input class="form-control" type="text" dir="rtl" data-bind="value: nameAr">
        </div>
        <div class="form-group">
          <label class="form-label">Category</label>
          <select class="form-control" data-bind="value: category">
            <option value="CORE">Core Platform</option>
            <option value="FINANCE">Finance</option>
            <option value="HR">HR &amp; Employee</option>
            <option value="BUDGET">Budget &amp; Planning</option>
            <option value="PAYMENTS">Payments</option>
          </select>
        </div>
        <div class="form-group">
          <label class="form-label">Display Order</label>
          <input class="form-control" type="number" data-bind="value: displayOrder">
        </div>
      </div>
      <div style="margin-top:12px;display:flex;align-items:center;gap:8px">
        <label class="switch"><input type="checkbox" data-bind="checked: isActive"><span class="switch-slider"></span></label>
        <span style="font-size:13px">Active</span>
      </div>
      <audit-info params="data: $vm.auditTarget"></audit-info>
    </div>
    <!-- /ko -->
  </div>
  <!-- /ko -->

  <!-- Module access dialog (db/v2/49): which roles see this app in the switcher -->
  <!-- ko if: showAccess() -->
  <div class="modal-overlay">
    <div class="modal-box" style="max-width:520px">
      <div class="modal-header">
        <h3 style="margin:0">
          <span data-bind="text: $root.t('vw.modules.accessTitle')"></span>
          <!-- ko with: accessTarget() -->
          <span style="font-weight:400">&mdash; <span data-bind="text: nameEn"></span></span>
          <!-- /ko -->
        </h3>
        <div class="region-actions">
          <button class="btn btn-secondary btn-sm" data-bind="click: closeAccess, text: $root.t('common.cancel')"></button>
          <button class="btn btn-primary btn-sm"
                  data-bind="click: saveAccess, disable: accessLoading() || accessSaving()">
            &#10003; <span data-bind="text: $root.t('common.save')"></span>
          </button>
        </div>
      </div>
      <div class="modal-body">
        <div style="font-size:12.5px;color:var(--text-muted,#667);margin-bottom:12px"
             data-bind="text: $root.t('vw.modules.accessHint')"></div>

        <!-- ko if: accessLoading() -->
        <div class="empty-state" style="padding:24px" data-bind="text: $root.t('common.loading')"></div>
        <!-- /ko -->

        <!-- ko ifnot: accessLoading() -->
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <!-- ko if: grantedCount() === 0 -->
          <span class="badge badge--active" data-bind="text: $root.t('vw.modules.accessEveryone')"></span>
          <!-- /ko -->
          <!-- ko if: grantedCount() > 0 -->
          <span class="badge badge--inactive"
                data-bind="text: $root.t('vw.modules.accessRestricted') + ' (' + grantedCount() + ')'"></span>
          <!-- /ko -->
          <button class="btn btn-secondary btn-sm" data-bind="click: clearAccess,
                  visible: grantedCount() > 0, text: $root.t('vw.modules.accessClear')"></button>
        </div>
        <div style="max-height:320px;overflow:auto;border:1px solid var(--border,#e3e8ee);border-radius:8px;padding:6px">
          <!-- ko foreach: accessRoles -->
          <div style="display:flex;align-items:center;gap:10px;padding:7px 10px;border-radius:6px;cursor:pointer"
               data-bind="click: function () { checked(!checked()); }">
            <input type="checkbox" style="pointer-events:none" data-bind="checked: checked">
            <div>
              <div style="font-size:13px;font-weight:600" data-bind="text: $root.lang() === 'ar' && nameAr ? nameAr : nameEn"></div>
              <div style="font-size:11px;color:#98a2b3" data-bind="text: roleCode"></div>
            </div>
          </div>
          <!-- /ko -->
        </div>
        <!-- ko if: accessError() -->
        <div style="color:var(--danger,#c0392b);font-size:12.5px;margin-top:10px"
             data-bind="text: $root.t('vw.modules.accessError')"></div>
        <!-- /ko -->
        <!-- /ko -->
      </div>
    </div>
  </div>
  <!-- /ko -->

  <div class="module-grid">
    <!-- ko foreach: filteredModules() -->
    <div class="module-card" style="text-align:left;padding:16px">
      <!-- ko if: $data.isNew -->
      <div class="module-card__badge">New</div>
      <!-- /ko -->
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">
        <div class="module-card__icon" style="margin:0"
             data-bind="style: { background: $data.bg, color: $data.color }">
          <span>&#128196;</span>
        </div>
        <div>
          <div style="font-weight:600;font-size:13px" data-bind="text: nameEn"></div>
          <div style="font-size:11px;color:#aaa" data-bind="text: moduleCode"></div>
        </div>
      </div>
      <div style="font-size:11px;color:#aaa;margin-bottom:10px">
        App <span data-bind="text: $data.apexAppId || '—'"></span> &bull;
        <span data-bind="text: $data.category || '—'"></span>
      </div>
      <div style="display:flex;align-items:center;gap:6px;justify-content:space-between">
        <!-- ko if: isActive === 'Y' -->
        <span class="badge badge--active" style="font-size:10px">Active</span>
        <!-- /ko -->
        <!-- ko ifnot: isActive === 'Y' -->
        <span class="badge badge--inactive" style="font-size:10px">Inactive</span>
        <!-- /ko -->
        <div style="display:flex;gap:4px">
          <button class="btn btn-secondary btn-sm btn-icon" data-bind="click: $parent.openEdit.bind($parent, $data)" title="Edit">&#9998;</button>
          <button class="btn btn-secondary btn-sm btn-icon" data-bind="click: $parent.openAccess.bind($parent, $data),
                                                                       attr: { title: $root.t('vw.modules.access') }">&#128273;</button>
          <button class="btn btn-secondary btn-sm btn-icon" data-bind="click: $parent.toggleActive.bind($parent, $data)" title="Toggle Active">&#128260;</button>
        </div>
      </div>
    </div>
    <!-- /ko -->
  </div>
</div>
