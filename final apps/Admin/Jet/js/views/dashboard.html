<div class="page-wrap">

  <!-- Greeting + customize toggle (Wave 4) -->
  <div class="page-header-row">
    <div class="page-header">
      <div style="display:flex;align-items:center;gap:14px">
        <div class="avatar avatar--lg"
             data-bind="style: { background: user && user.color || 'var(--brand)' },
                        text: user && (user.initials || user.displayName[0])">
        </div>
        <div>
          <div class="page-title" data-bind="text: greeting() + ', ' + (user && user.displayName || '') + '!'"></div>
          <div class="page-subtitle" data-bind="text: todayDate()"></div>
        </div>
      </div>
    </div>
    <button type="button" class="btn btn-secondary btn-sm"
            data-bind="click: toggleCustomize,
                       css: { 'btn-primary': customizing() },
                       text: (customizing() ? '✓ ' + t('dash.customizeDone') : '⚙ ' + t('dash.customize'))"></button>
  </div>

  <!-- Stats row (GET /stats/) — order + visibility are user preferences -->
  <div class="stats-row">
    <!-- ko foreach: statCards() -->
    <div class="stat-card" data-bind="css: cls + ($vm.customizing() && $vm.isHidden(id) ? ' dash-widget--off' : '')">
      <!-- ko if: $vm.customizing() -->
      <div class="dash-cust">
        <button type="button" title="Move left"  data-bind="click: function(){ $vm.moveStat(id, -1); }">&#9664;</button>
        <button type="button" data-bind="click: function(){ $vm.toggleWidget(id); },
                attr: { title: $vm.isHidden(id) ? 'Show' : 'Hide' },
                html: $vm.isHidden(id) ? '&#128065;' : '&#10005;'"></button>
        <button type="button" title="Move right" data-bind="click: function(){ $vm.moveStat(id, 1); }">&#9654;</button>
      </div>
      <!-- /ko -->
      <div class="stat-value" data-bind="text: $vm.stats()[id]"></div>
      <div class="stat-label" data-bind="text: $vm.t(key)"></div>
    </div>
    <!-- /ko -->
  </div>

  <!-- Charts (Phase 3) — tri-state: skeleton / charts / empty -->
  <div class="charts-row">
    <!-- ko if: customizing() || !isHidden('chartCycle') -->
    <div class="chart-card" data-bind="css: { 'dash-widget--off': customizing() && isHidden('chartCycle') }">
      <!-- ko if: customizing() -->
      <div class="dash-cust">
        <button type="button" data-bind="click: function(){ toggleWidget('chartCycle'); },
                attr: { title: isHidden('chartCycle') ? 'Show' : 'Hide' },
                html: isHidden('chartCycle') ? '&#128065;' : '&#10005;'"></button>
      </div>
      <!-- /ko -->
      <h3 data-bind="text: t('dash.chart1Title')"></h3>
      <div class="chart-cap" data-bind="text: t('dash.chart1Cap')"></div>
      <!-- ko if: statsLoading() --><div class="skeleton sk-block"></div><!-- /ko -->
      <!-- ko ifnot: statsLoading() -->
      <!-- ko if: chartsEmpty() -->
      <div class="empty-state" style="padding:40px 10px">
        <div class="empty-state__icon">&#128202;</div>
        <div class="empty-state__msg" data-bind="text: t('chart.noData')"></div>
      </div>
      <!-- /ko -->
      <!-- ko ifnot: chartsEmpty() -->
      <div class="chart-wrap"><canvas id="admChart1"></canvas></div>
      <!-- /ko -->
      <!-- /ko -->
    </div>
    <!-- /ko -->
    <!-- ko if: customizing() || !isHidden('chartActivity') -->
    <div class="chart-card" data-bind="css: { 'dash-widget--off': customizing() && isHidden('chartActivity') }">
      <!-- ko if: customizing() -->
      <div class="dash-cust">
        <button type="button" data-bind="click: function(){ toggleWidget('chartActivity'); },
                attr: { title: isHidden('chartActivity') ? 'Show' : 'Hide' },
                html: isHidden('chartActivity') ? '&#128065;' : '&#10005;'"></button>
      </div>
      <!-- /ko -->
      <h3 data-bind="text: t('dash.chart2Title')"></h3>
      <div class="chart-cap" data-bind="text: t('dash.chart2Cap')"></div>
      <!-- ko if: statsLoading() --><div class="skeleton sk-block"></div><!-- /ko -->
      <!-- ko ifnot: statsLoading() -->
      <!-- ko if: chartsEmpty() -->
      <div class="empty-state" style="padding:40px 10px">
        <div class="empty-state__icon">&#128200;</div>
        <div class="empty-state__msg" data-bind="text: t('chart.noData')"></div>
      </div>
      <!-- /ko -->
      <!-- ko ifnot: chartsEmpty() -->
      <div class="chart-wrap"><canvas id="admChart2"></canvas></div>
      <!-- /ko -->
      <!-- /ko -->
    </div>
    <!-- /ko -->
  </div>

  <!-- Module categories (hideable as one widget, Wave 4) -->
  <!-- ko if: customizing() -->
  <div class="view-toolbar" style="justify-content:flex-end">
    <button type="button" class="btn btn-secondary btn-sm"
            data-bind="click: function(){ toggleWidget('modules'); },
                       text: (isHidden('modules') ? '👁 ' : '✕ ') + t('dash.modulesTitle')"></button>
  </div>
  <!-- /ko -->
  <!-- ko if: customizing() || !isHidden('modules') -->
  <!-- ko foreach: categoryGroups -->
  <div style="margin-bottom:24px">
    <div class="section-heading">
      <span data-bind="html: icon"></span>&nbsp;
      <span data-bind="text: label"></span>
    </div>
    <div class="module-grid">
      <!-- ko foreach: modules -->
      <div class="module-card"
           data-bind="click: function() { if(window._jetApp) window._jetApp.navigate('modules'); }">
        <!-- ko if: $data.isNew -->
        <div class="module-card__badge">New</div>
        <!-- /ko -->
        <div class="module-card__icon"
             data-bind="style: { background: $data.bg, color: $data.color }">
          <span style="font-size:22px">&#128196;</span>
        </div>
        <div class="module-card__name" data-bind="text: nameEn"></div>
        <div style="font-size:11px;color:var(--text-3);margin-top:4px" class="mono">App <span data-bind="text: apexAppId"></span></div>
      </div>
      <!-- /ko -->
    </div>
  </div>
  <!-- /ko -->
  <!-- /ko -->

</div>
