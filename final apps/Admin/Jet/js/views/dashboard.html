<div class="page-wrap">

  <!-- Greeting -->
  <div class="page-header">
    <div style="display:flex;align-items:center;gap:14px">
      <div class="avatar avatar--lg"
           data-bind="style: { background: user && user.color || 'var(--brand)' },
                      text: user && (user.initials || user.displayName[0])">
      </div>
      <div>
        <div class="page-title" data-bind="text: greeting() + ', ' + (user && user.displayName || '') + '!'"></div>
        <div class="page-subtitle" data-bind="text: todayDate()"></div>
      </div>
    </div>
  </div>

  <!-- Stats row (GET /stats/) -->
  <div class="stats-row">
    <div class="stat-card stat-card--red">
      <div class="stat-value" data-bind="text: stats().activeUsers"></div>
      <div class="stat-label" data-bind="text: t('dash.activeUsers')"></div>
    </div>
    <div class="stat-card stat-card--blue">
      <div class="stat-value" data-bind="text: stats().activeModules"></div>
      <div class="stat-label" data-bind="text: t('dash.activeModules')"></div>
    </div>
    <div class="stat-card stat-card--green">
      <div class="stat-value" data-bind="text: stats().rolesDefined"></div>
      <div class="stat-label" data-bind="text: t('dash.rolesDefined')"></div>
    </div>
    <div class="stat-card stat-card--orange">
      <div class="stat-value" data-bind="text: stats().pendingApprovals"></div>
      <div class="stat-label" data-bind="text: t('dash.pendingApprovals')"></div>
    </div>
    <div class="stat-card stat-card--blue">
      <div class="stat-value" data-bind="text: stats().activeSessions"></div>
      <div class="stat-label" data-bind="text: t('dash.activeSessions')"></div>
    </div>
  </div>

  <!-- Charts (Phase 3) — tri-state: skeleton / charts / empty -->
  <div class="charts-row">
    <div class="chart-card">
      <h3 data-bind="text: t('dash.chart1Title')"></h3>
      <div class="chart-cap" data-bind="text: t('dash.chart1Cap')"></div>
      <!-- ko if: statsLoading() --><div class="skeleton sk-block"></div><!-- /ko -->
      <!-- ko ifnot: statsLoading() -->
      <!-- ko if: chartsEmpty() -->
      <div class="empty-state" style="padding:40px 10px">
        <div class="empty-state__icon">&#128202;</div>
        <div class="empty-state__msg" data-bind="text: t('chart.noData')"></div>
      </div>
      <!-- /ko -->
      <!-- ko ifnot: chartsEmpty() -->
      <div class="chart-wrap"><canvas id="admChart1"></canvas></div>
      <!-- /ko -->
      <!-- /ko -->
    </div>
    <div class="chart-card">
      <h3 data-bind="text: t('dash.chart2Title')"></h3>
      <div class="chart-cap" data-bind="text: t('dash.chart2Cap')"></div>
      <!-- ko if: statsLoading() --><div class="skeleton sk-block"></div><!-- /ko -->
      <!-- ko ifnot: statsLoading() -->
      <!-- ko if: chartsEmpty() -->
      <div class="empty-state" style="padding:40px 10px">
        <div class="empty-state__icon">&#128200;</div>
        <div class="empty-state__msg" data-bind="text: t('chart.noData')"></div>
      </div>
      <!-- /ko -->
      <!-- ko ifnot: chartsEmpty() -->
      <div class="chart-wrap"><canvas id="admChart2"></canvas></div>
      <!-- /ko -->
      <!-- /ko -->
    </div>
  </div>

  <!-- Module categories -->
  <!-- ko foreach: categoryGroups -->
  <div style="margin-bottom:24px">
    <div class="section-heading">
      <span data-bind="html: icon"></span>&nbsp;
      <span data-bind="text: label"></span>
    </div>
    <div class="module-grid">
      <!-- ko foreach: modules -->
      <div class="module-card"
           data-bind="click: function() { if(window._jetApp) window._jetApp.navigate('modules'); }">
        <!-- ko if: $data.isNew -->
        <div class="module-card__badge">New</div>
        <!-- /ko -->
        <div class="module-card__icon"
             data-bind="style: { background: $data.bg, color: $data.color }">
          <span style="font-size:22px">&#128196;</span>
        </div>
        <div class="module-card__name" data-bind="text: nameEn"></div>
        <div style="font-size:11px;color:var(--text-3);margin-top:4px" class="mono">App <span data-bind="text: apexAppId"></span></div>
      </div>
      <!-- /ko -->
    </div>
  </div>
  <!-- /ko -->

</div>
