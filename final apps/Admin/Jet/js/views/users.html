<div class="page-wrap">
  <div class="page-header-row">
    <div class="page-header">
      <div class="page-title" data-bind="text: t('users.title')"></div>
      <div class="page-subtitle">
        <span class="mono" data-bind="text: total()"></span> <span data-bind="text: t('users.totalSuffix')"></span>
      </div>
    </div>
    <button class="btn btn-primary" data-bind="click: addUser, text: '+ ' + t('users.add')"></button>
  </div>

  <!-- Toolbar: debounced server-side search + status filter -->
  <div class="view-toolbar">
    <input class="search-box" type="text"
           data-bind="value: searchTerm, valueUpdate: 'input', attr: { placeholder: t('users.searchPh') }">
    <button class="btn btn-secondary btn-sm" data-bind="click: function(){ setStatus('ALL'); },      css: { 'btn-primary': filterStatus() === 'ALL' },      text: t('common.all')"></button>
    <button class="btn btn-secondary btn-sm" data-bind="click: function(){ setStatus('ACTIVE'); },   css: { 'btn-primary': filterStatus() === 'ACTIVE' },   text: t('status.active')"></button>
    <button class="btn btn-secondary btn-sm" data-bind="click: function(){ setStatus('INACTIVE'); }, css: { 'btn-primary': filterStatus() === 'INACTIVE' }, text: t('status.inactive')"></button>
  </div>

  <!-- Delete confirm -->
  <!-- ko if: showDeleteConfirm() -->
  <div class="modal-overlay">
    <div class="modal-box" style="max-width:380px;padding:28px">
      <h3 style="margin-bottom:10px" data-bind="text: t('users.deleteTitle')"></h3>
      <p style="font-size:13px;color:var(--text-2);margin-bottom:20px">
        <span data-bind="text: t('users.deleteBody1')"></span>
        <strong data-bind="text: deleteTarget() && deleteTarget().displayName"></strong>.
        <span data-bind="text: t('users.deleteBody2')"></span>
      </p>
      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button class="btn btn-secondary" data-bind="click: cancelDelete, text: t('common.cancel')"></button>
        <button class="btn" style="background:var(--red);color:#fff" data-bind="click: doDelete, text: t('common.delete')"></button>
      </div>
    </div>
  </div>
  <!-- /ko -->

  <!-- Tri-state list: skeleton / data / empty / error -->
  <div class="data-table-wrap">
    <!-- ko if: loading() -->
    <list-skeleton params="rows: 8, avatar: true"></list-skeleton>
    <!-- /ko -->

    <!-- ko ifnot: loading() -->
    <!-- ko if: loadError() -->
    <div class="empty-state">
      <div class="empty-state__icon">&#9888;</div>
      <div class="empty-state__msg" data-bind="text: t('empty.loadFailed')"></div>
      <div class="empty-state__sub" data-bind="text: t('empty.loadFailedSub')"></div>
      <button class="btn btn-primary" data-bind="click: reload, text: t('common.retry')"></button>
    </div>
    <!-- /ko -->

    <!-- ko ifnot: loadError() -->
    <table class="data-table">
      <thead>
        <tr>
          <th data-bind="text: t('users.colUser')"></th>
          <th data-bind="text: t('users.colUsername')"></th>
          <th data-bind="text: t('users.colEmail')"></th>
          <th data-bind="text: t('users.colOrg')"></th>
          <th data-bind="text: t('users.colRoles')"></th>
          <th data-bind="text: t('tbl.status')"></th>
          <th style="width:120px" data-bind="text: t('common.actions')"></th>
        </tr>
      </thead>
      <tbody>
        <!-- ko foreach: users() -->
        <tr>
          <td>
            <div style="display:flex;align-items:center;gap:10px">
              <div class="avatar" data-bind="style: { background: $data.color || 'var(--brand)' },
                                            text: $parent.getInitials($data.displayName)"></div>
              <div>
                <div style="font-weight:600;font-size:13px" data-bind="text: displayName"></div>
                <!-- $data.x — fields can be ABSENT (APEX_JSON skips nulls); bare names throw -->
                <div style="font-size:11px;color:var(--text-3)" class="mono" data-bind="text: $data.employeeNumber || ''"></div>
              </div>
            </div>
          </td>
          <td class="mono" style="font-size:12px" data-bind="text: username"></td>
          <td data-bind="text: $data.email || ''"></td>
          <td data-bind="text: $data.orgName || ''"></td>
          <td>
            <!-- ko foreach: roleNames -->
            <span class="badge badge--info" style="margin:1px 2px;font-size:10px" data-bind="text: $data"></span>
            <!-- /ko -->
          </td>
          <td>
            <!-- ko if: isActive === 'Y' -->
            <span class="badge badge--active" data-bind="text: $root.t('status.active')"></span>
            <!-- /ko -->
            <!-- ko ifnot: isActive === 'Y' -->
            <span class="badge badge--inactive" data-bind="text: $root.t('status.inactive')"></span>
            <!-- /ko -->
          </td>
          <td>
            <div class="table-actions">
              <button class="btn btn-secondary btn-sm btn-icon" data-bind="click: $parent.editUser.bind($parent, $data), attr: { title: $root.t('common.edit') }">&#9998;</button>
              <button class="btn btn-danger btn-sm btn-icon" data-bind="click: $parent.confirmDelete.bind($parent, $data), attr: { title: $root.t('common.delete') }">&#128465;</button>
            </div>
          </td>
        </tr>
        <!-- /ko -->
        <!-- ko if: users().length === 0 -->
        <tr>
          <td colspan="7">
            <div class="empty-state">
              <div class="empty-state__icon">&#128100;</div>
              <div class="empty-state__msg" data-bind="text: t('empty.noMatch')"></div>
              <div class="empty-state__sub" data-bind="text: t('empty.noMatchSub')"></div>
            </div>
          </td>
        </tr>
        <!-- /ko -->
      </tbody>
    </table>

    <!-- shared pager -->
    <list-pager params="offset: offset, limit: limit, total: total, onChange: reload"></list-pager>
    <!-- /ko -->
    <!-- /ko -->
  </div>
</div>
