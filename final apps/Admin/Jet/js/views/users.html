<div class="page-wrap">
  <div class="page-header-row">
    <div class="page-header">
      <div class="page-title" data-bind="text: t('users.title')"></div>
      <div class="page-subtitle">
        <span class="mono" data-bind="text: total()"></span> <span data-bind="text: t('users.totalSuffix')"></span>
      </div>
    </div>
    <button class="btn btn-primary" data-bind="click: addUser, text: '+ ' + t('users.add')"></button>
  </div>

  <!-- Toolbar: debounced server-side search + status filter -->
  <div class="view-toolbar">
    <input class="search-box" type="text"
           data-bind="value: searchTerm, valueUpdate: 'input', attr: { placeholder: t('users.searchPh') }">
    <button class="btn btn-secondary btn-sm" data-bind="click: function(){ setStatus('ALL'); },      css: { 'btn-primary': filterStatus() === 'ALL' },      text: t('common.all')"></button>
    <button class="btn btn-secondary btn-sm" data-bind="click: function(){ setStatus('ACTIVE'); },   css: { 'btn-primary': filterStatus() === 'ACTIVE' },   text: t('status.active')"></button>
    <button class="btn btn-secondary btn-sm" data-bind="click: function(){ setStatus('INACTIVE'); }, css: { 'btn-primary': filterStatus() === 'INACTIVE' }, text: t('status.inactive')"></button>
  </div>

  <!-- Deactivate is immediate with an Undo toast (Wave 1) — no confirm modal -->

  <!-- Bulk action bar (Wave 3) — appears once ≥1 row is selected -->
  <!-- ko if: selectedIds().length > 0 -->
  <div class="bulkbar">
    <span class="bulkbar__count" data-bind="text: $root.t('bulk.selected', [selectedIds().length])"></span>
    <button type="button" class="btn btn-secondary btn-sm" data-bind="click: function(){ openBulk('ACTIVATE'); },   text: $root.t('bulk.activate')"></button>
    <button type="button" class="btn btn-secondary btn-sm" data-bind="click: function(){ openBulk('DEACTIVATE'); }, text: $root.t('bulk.deactivate')"></button>
    <button type="button" class="btn btn-secondary btn-sm" data-bind="click: function(){ openBulk('ASSIGN_ROLE'); }, text: $root.t('bulk.assignRole')"></button>
    <button type="button" class="btn btn-secondary btn-sm" data-bind="click: function(){ openBulk('REMOVE_ROLE'); }, text: $root.t('bulk.removeRole')"></button>
    <button type="button" class="btn btn-secondary btn-sm" data-bind="click: function(){ openBulk('ASSIGN_ORG'); }, text: $root.t('bulk.assignOrg')"></button>
    <span style="flex:1"></span>
    <button type="button" class="btn btn-secondary btn-sm" data-bind="click: clearSelection, text: $root.t('bulk.clear')"></button>
  </div>
  <!-- /ko -->

  <!-- Bulk confirm modal -->
  <!-- ko if: bulkAction() -->
  <div class="modal-overlay">
    <div class="modal-box" style="max-width:420px;padding:26px" data-bind="modalTrap: closeBulk">
      <h3 style="margin-bottom:10px" data-bind="text: $root.t('bulk.confirmTitle.' + bulkAction())"></h3>
      <!-- ko if: bulkNeedsRole() -->
      <div class="form-group" style="margin-bottom:12px">
        <label class="form-label" data-bind="text: $root.t('bulk.pickRole')"></label>
        <select class="form-control" data-bind="value: bulkRole,
                 options: roleOptions, optionsValue: 'value', optionsText: 'label',
                 optionsCaption: '…'"></select>
      </div>
      <!-- /ko -->
      <!-- ko if: bulkAction() === 'ASSIGN_ORG' -->
      <div class="form-group" style="margin-bottom:12px">
        <label class="form-label" data-bind="text: $root.t('bulk.pickOrg')"></label>
        <select class="form-control" data-bind="value: bulkOrg,
                 options: orgOptions, optionsValue: 'value', optionsText: 'label',
                 optionsCaption: '…'"></select>
      </div>
      <!-- /ko -->
      <div style="max-height:180px;overflow-y:auto;font-size:12.5px;color:var(--text-2);margin-bottom:18px">
        <!-- ko foreach: selectedUsers() -->
        <div style="padding:3px 0"><span class="mono" data-bind="text: username"></span> — <span data-bind="text: displayName"></span></div>
        <!-- /ko -->
      </div>
      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button type="button" class="btn btn-secondary" data-bind="click: closeBulk, text: $root.t('common.cancel')"></button>
        <button type="button" class="btn btn-primary" data-bind="click: runBulk,
                 enable: !bulkBusy() && (!bulkNeedsRole() || bulkRole()) && (bulkAction() !== 'ASSIGN_ORG' || bulkOrg())">
          <!-- ko if: bulkBusy() --><span data-bind="text: $root.t('common.loading')"></span><!-- /ko -->
          <!-- ko ifnot: bulkBusy() --><span data-bind="text: $root.t('bulk.apply')"></span><!-- /ko -->
        </button>
      </div>
    </div>
  </div>
  <!-- /ko -->

  <!-- Tri-state list: skeleton / data / empty / error -->
  <div class="data-table-wrap">
    <!-- ko if: loading() -->
    <list-skeleton params="rows: 8, avatar: true"></list-skeleton>
    <!-- /ko -->

    <!-- ko ifnot: loading() -->
    <!-- ko if: loadError() -->
    <div class="empty-state">
      <div class="empty-state__icon">&#9888;</div>
      <div class="empty-state__msg" data-bind="text: t('empty.loadFailed')"></div>
      <div class="empty-state__sub" data-bind="text: t('empty.loadFailedSub')"></div>
      <button class="btn btn-primary" data-bind="click: reload, text: t('common.retry')"></button>
    </div>
    <!-- /ko -->

    <!-- ko ifnot: loadError() -->
    <table class="data-table">
      <thead>
        <tr>
          <!-- ko if: $root.featureOn('BULK_USER_ACTIONS', true) -->
          <th style="width:34px">
            <input type="checkbox" aria-label="Select all on page"
                   data-bind="checked: allPageSelected(), click: toggleSelectAll, clickBubble: false">
          </th>
          <!-- /ko -->
          <th data-bind="text: t('users.colUser')"></th>
          <th data-bind="text: t('users.colUsername')"></th>
          <th data-bind="text: t('users.colEmail')"></th>
          <th data-bind="text: t('users.colOrg')"></th>
          <th data-bind="text: t('users.colRoles')"></th>
          <th data-bind="text: t('tbl.status')"></th>
          <th style="width:120px" data-bind="text: t('common.actions')"></th>
        </tr>
      </thead>
      <tbody>
        <!-- ko foreach: users() -->
        <tr data-bind="css: { 'row--selected': $parent.isSelected($data) }">
          <!-- ko if: $root.featureOn('BULK_USER_ACTIONS', true) -->
          <td>
            <input type="checkbox"
                   data-bind="checked: $parent.isSelected($data),
                              click: $parent.toggleSelect.bind($parent, $data), clickBubble: false,
                              attr: { 'aria-label': 'Select ' + displayName }">
          </td>
          <!-- /ko -->
          <td>
            <div style="display:flex;align-items:center;gap:10px">
              <div class="avatar" data-bind="style: { background: $data.color || 'var(--brand)' },
                                            text: $parent.getInitials($data.displayName)"></div>
              <div>
                <div style="font-weight:600;font-size:13px" data-bind="text: displayName"></div>
                <!-- $data.x — fields can be ABSENT (APEX_JSON skips nulls); bare names throw -->
                <div style="font-size:11px;color:var(--text-3)" class="mono" data-bind="text: $data.employeeNumber || ''"></div>
              </div>
            </div>
          </td>
          <td class="mono" style="font-size:12px" data-bind="text: username"></td>
          <td data-bind="text: $data.email || ''"></td>
          <td data-bind="text: $data.orgName || ''"></td>
          <td>
            <!-- ko foreach: roleNames -->
            <span class="badge badge--info" style="margin:1px 2px;font-size:10px" data-bind="text: $data"></span>
            <!-- /ko -->
          </td>
          <td>
            <!-- ko if: isActive === 'Y' -->
            <span class="badge badge--active" data-bind="text: $root.t('status.active')"></span>
            <!-- /ko -->
            <!-- ko ifnot: isActive === 'Y' -->
            <span class="badge badge--inactive" data-bind="text: $root.t('status.inactive')"></span>
            <!-- /ko -->
          </td>
          <td>
            <div class="table-actions">
              <button class="btn btn-secondary btn-sm btn-icon" data-bind="click: $parent.editUser.bind($parent, $data), attr: { title: $root.t('common.edit') }">&#9998;</button>
              <button class="btn btn-danger btn-sm btn-icon" data-bind="click: $parent.confirmDelete.bind($parent, $data), attr: { title: $root.t('common.delete') }">&#128465;</button>
            </div>
          </td>
        </tr>
        <!-- /ko -->
        <!-- ko if: users().length === 0 -->
        <tr>
          <td colspan="8">
            <div class="empty-state">
              <div class="empty-state__icon">&#128100;</div>
              <div class="empty-state__msg" data-bind="text: t('empty.noMatch')"></div>
              <div class="empty-state__sub" data-bind="text: t('empty.noMatchSub')"></div>
              <!-- ko if: searchTerm() || filterStatus() !== 'ALL' -->
              <button class="btn btn-secondary"
                      data-bind="click: function(){ searchTerm(''); setStatus('ALL'); }, text: t('empty.clearFilters')"></button>
              <!-- /ko -->
            </div>
          </td>
        </tr>
        <!-- /ko -->
      </tbody>
    </table>

    <!-- shared pager -->
    <list-pager params="offset: offset, limit: limit, total: total, onChange: reload"></list-pager>
    <!-- /ko -->
    <!-- /ko -->
  </div>
</div>
