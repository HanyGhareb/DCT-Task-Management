<div class="page-wrap">
  <div class="page-header">
    <div class="page-title" data-bind="text: $root.t('vw.approvalTemplates.title')"></div>
    <div class="page-subtitle" data-bind="text: $root.t('vw.approvalTemplates.subtitle')"></div>
  </div>

  <div class="view-toolbar">
    <input class="search-box" type="text" placeholder="&#128269; Search templates&hellip;"
           data-bind="value: searchTerm, valueUpdate: 'input'">
  </div>

  <!-- Step detail modal — read-only for live templates, editable for drafts -->
  <!-- ko if: showDetail() -->
  <!-- ko with: selected() -->
  <div style="position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:flex;align-items:center;justify-content:center">
    <div style="background:var(--surface,#fff);border-radius:12px;padding:28px;max-width:560px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3);max-height:80vh;overflow-y:auto"
         data-bind="modalTrap: $vm.closeDetail">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;gap:12px">
        <h3 data-bind="text: templateName"></h3>
        <div class="region-actions">
          <!-- ko if: $vm.isDraft() -->
          <button type="button" class="btn btn-secondary btn-sm" data-bind="click: $vm.closeDetail, text: $root.t('common.cancel')"></button>
          <button type="button" class="btn btn-primary btn-sm" data-bind="click: $vm.saveSteps, enable: !$vm.stepsSaving()">
            <!-- ko if: $vm.stepsSaving() -->&hellip;<!-- /ko -->
            <!-- ko ifnot: $vm.stepsSaving() --><span data-bind="text: '✓ ' + $root.t('common.save')"></span><!-- /ko -->
          </button>
          <!-- /ko -->
          <!-- ko ifnot: $vm.isDraft() -->
          <button type="button" class="btn btn-secondary btn-sm" title="Close" data-bind="click: $vm.closeDetail">&#10005;</button>
          <!-- /ko -->
        </div>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
        <span class="badge badge--admin" data-bind="text: templateCode"></span>
        <span class="badge badge--info" data-bind="text: 'Module: ' + module"></span>
        <span class="badge badge--active" data-bind="visible: isActive === 'Y'">Active</span>
        <!-- ko if: $vm.isDraft() --><span class="badge badge--pending" data-bind="text: $root.t('tmpl.draft')"></span><!-- /ko -->
      </div>
      <div class="section-heading" style="margin-top:0" data-bind="text: $root.t('tmpl.steps')"></div>

      <!-- read-only steps (live / archived templates) -->
      <!-- ko ifnot: $vm.isDraft() -->
      <!-- ko foreach: steps -->
      <div style="display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--border,#eee);border-radius:8px;margin-bottom:8px">
        <div style="width:28px;height:28px;border-radius:50%;background:var(--brand,#C74634);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0" data-bind="text: seq"></div>
        <div style="flex:1">
          <div style="font-weight:600;font-size:13px" data-bind="text: label"></div>
          <div style="font-size:12px;color:var(--text-3,#aaa)">
            Required Role: <span class="badge badge--admin" style="font-size:10px" data-bind="text: roleCode"></span>
            &bull; SLA: <span data-bind="text: slaHours + 'h'"></span>
          </div>
        </div>
      </div>
      <!-- /ko -->
      <!-- /ko -->

      <!-- editable steps (drafts only): reorder + rename + SLA -->
      <!-- ko if: $vm.isDraft() -->
      <!-- ko foreach: $vm.editSteps() -->
      <div style="display:flex;align-items:center;gap:10px;padding:10px 12px;border:1px solid var(--border,#eee);border-radius:8px;margin-bottom:8px">
        <div style="width:26px;height:26px;border-radius:50%;background:var(--amber,#F0883E);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0" data-bind="text: $index() + 1"></div>
        <div style="flex:1;display:grid;gap:6px">
          <input class="form-control" style="padding:6px 9px;font-size:13px"
                 data-bind="value: label, valueUpdate: 'input', attr: { 'aria-label': 'Step name' }">
          <div style="display:flex;align-items:center;gap:8px;font-size:12px;color:var(--text-3)">
            <span class="badge badge--admin" style="font-size:10px" data-bind="text: roleCode"></span>
            <span>SLA</span>
            <input class="form-control" type="number" min="0" style="width:80px;padding:4px 8px;font-size:12.5px"
                   data-bind="value: slaHours, attr: { 'aria-label': 'SLA hours' }"><span>h</span>
          </div>
        </div>
        <div style="display:grid;gap:4px">
          <button type="button" class="btn btn-secondary btn-sm btn-icon" title="Move up"
                  data-bind="click: function(){ $vm.moveStep($index(), -1); }">&#9650;</button>
          <button type="button" class="btn btn-secondary btn-sm btn-icon" title="Move down"
                  data-bind="click: function(){ $vm.moveStep($index(), 1); }">&#9660;</button>
        </div>
      </div>
      <!-- /ko -->
      <!-- /ko -->

      <audit-info params="data: $data"></audit-info>
    </div>
  </div>
  <!-- /ko -->
  <!-- /ko -->

  <!-- enh-6: version history modal (live + archived versions, step diff, restore) -->
  <!-- ko if: showHistory() -->
  <div style="position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:500;display:flex;align-items:center;justify-content:center">
    <div style="background:var(--surface,#fff);border-radius:12px;padding:28px;max-width:640px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.3);max-height:82vh;overflow-y:auto"
         data-bind="modalTrap: closeHistory">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <h3><span data-bind="text: $root.t('tmpl.history')"></span> — <span class="mono" style="font-size:14px" data-bind="text: historyBase()"></span></h3>
        <button type="button" class="btn btn-secondary btn-sm" data-bind="click: closeHistory, attr: { title: $root.t('common.close') }">&#10005;</button>
      </div>
      <!-- ko if: historyHasDraft() -->
      <div class="alert-banner alert-banner--warning" data-bind="text: $root.t('tmpl.histDraftBlock')"></div>
      <!-- /ko -->
      <!-- ko foreach: historyVersions() -->
      <div style="border:1px solid var(--border,#eee);border-radius:10px;padding:14px 16px;margin-bottom:12px"
           data-bind="style: { 'border-color': isLive ? 'var(--brand)' : '' }">
        <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-bottom:8px">
          <span class="badge badge--admin mono" data-bind="text: code"></span>
          <span class="badge" data-bind="css: isLive ? 'badge--active' : 'badge--idle',
                text: isLive ? $root.t('tmpl.status.ACTIVE') : $root.t('tmpl.status.ARCHIVED')"></span>
          <span style="font-size:12px;color:var(--text-3)" data-bind="text: 'v' + versionNo"></span>
          <!-- ko if: diff -->
          <span style="font-size:11.5px;color:var(--text-2)" data-bind="text: $vm.diffText(diff)"></span>
          <!-- /ko -->
          <span style="flex:1"></span>
          <!-- ko ifnot: isLive -->
          <button type="button" class="btn btn-secondary btn-sm"
                  data-bind="click: $vm.restoreVersion.bind($vm, $data),
                             enable: !$vm.busy() && !$vm.historyHasDraft(),
                             text: $root.t('tmpl.restore')"></button>
          <!-- /ko -->
        </div>
        <!-- ko foreach: steps -->
        <div style="display:flex;align-items:center;gap:8px;font-size:12.5px;padding:3px 0">
          <span style="width:20px;height:20px;border-radius:50%;background:var(--surface-2,#f0f0f0);display:inline-flex;align-items:center;justify-content:center;font-weight:700;font-size:11px" data-bind="text: seq"></span>
          <span data-bind="text: label"></span>
          <span class="badge badge--admin" style="font-size:9.5px" data-bind="text: roleCode"></span>
          <span style="color:var(--text-3);font-size:11px" data-bind="text: slaHours + 'h'"></span>
        </div>
        <!-- /ko -->
      </div>
      <!-- /ko -->
    </div>
  </div>
  <!-- /ko -->

  <div class="data-table-wrap">
    <table class="data-table">
      <thead>
        <tr>
          <th>Template Name</th>
          <th>Code</th>
          <th>Module</th>
          <th>Steps</th>
          <th>Status</th>
          <th style="width:150px">Actions</th>
        </tr>
      </thead>
      <tbody>
        <!-- ko foreach: filtered() -->
        <tr>
          <td style="font-weight:600" data-bind="text: templateName"></td>
          <td style="font-family:monospace;font-size:11px" data-bind="text: templateCode"></td>
          <td><span class="badge badge--info" data-bind="text: module"></span></td>
          <td>
            <span class="badge badge--admin" data-bind="text: stepCount + ' step' + (stepCount === 1 ? '' : 's')"></span>
          </td>
          <td>
            <span class="badge" data-bind="css: $vm.statusBadge($data), text: $root.t('tmpl.status.' + $vm.statusOf($data))"></span>
          </td>
          <td>
            <div class="table-actions">
              <button type="button" class="btn btn-secondary btn-sm btn-icon"
                      data-bind="click: $parent.viewTemplate.bind($parent, $data),
                                 attr: { title: $vm.statusOf($data) === 'DRAFT' ? $root.t('tmpl.editSteps') : 'View Steps' }">
                <!-- ko if: $vm.statusOf($data) === 'DRAFT' -->&#9998;<!-- /ko -->
                <!-- ko ifnot: $vm.statusOf($data) === 'DRAFT' -->&#128065;<!-- /ko -->
              </button>
              <!-- ko if: $vm.statusOf($data) === 'ACTIVE' -->
              <button type="button" class="btn btn-secondary btn-sm btn-icon"
                      data-bind="click: $parent.cloneDraft.bind($parent, $data), enable: !$vm.busy(),
                                 attr: { title: $root.t('tmpl.cloneDraft') }">&#10697;</button>
              <!-- /ko -->
              <!-- ko if: $vm.hasHistory($data) -->
              <button type="button" class="btn btn-secondary btn-sm btn-icon"
                      data-bind="click: $parent.openHistory.bind($parent, $data),
                                 attr: { title: $root.t('tmpl.history') }">&#128336;</button>
              <!-- /ko -->
              <!-- ko if: $vm.statusOf($data) === 'DRAFT' -->
              <button type="button" class="btn btn-primary btn-sm"
                      data-bind="click: $parent.activate.bind($parent, $data), enable: !$vm.busy(),
                                 text: $root.t('tmpl.activate')"></button>
              <!-- /ko -->
              <!-- ko if: $vm.statusOf($data) === 'INACTIVE' -->
              <button type="button" class="btn btn-secondary btn-sm btn-icon" title="Reactivate"
                      data-bind="click: $parent.toggleActive.bind($parent, $data)">&#128260;</button>
              <!-- /ko -->
            </div>
          </td>
        </tr>
        <!-- /ko -->
      </tbody>
    </table>
  </div>
</div>
