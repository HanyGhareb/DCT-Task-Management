<div class="page-wrap">
  <div class="page-header-row">
    <div class="page-header">
      <div class="page-title" data-bind="text: pageTitle()"></div>
      <div class="page-subtitle">Define role details and assign permissions</div>
    </div>
    <button class="btn btn-secondary" data-bind="click: cancel">&#8592; Back to Roles</button>
  </div>

  <!-- ko if: successMsg() -->
  <div class="alert-banner alert-banner--info" style="margin-bottom:16px">&#10003; <span data-bind="text: successMsg()"></span></div>
  <!-- /ko -->

  <div class="card">
    <div class="section-heading">Role Details</div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Role Code <span class="required">*</span></label>
        <input class="form-control" type="text" placeholder="e.g. BUDGET_ANALYST"
               data-bind="value: roleCode, valueUpdate: 'input', css: { 'border-color': hasError('roleCode') ? '#C74634' : '' }">
        <span class="form-hint">Uppercase, underscore-separated. Used in PL/SQL and ORDS.</span>
        <span class="form-hint" style="color:#C74634" data-bind="visible: hasError('roleCode'), text: getError('roleCode')"></span>
      </div>
      <div class="form-group">
        <label class="form-label">Role Name <span class="required">*</span></label>
        <input class="form-control" type="text" placeholder="e.g. Budget Analyst"
               data-bind="value: roleName, valueUpdate: 'input', css: { 'border-color': hasError('roleName') ? '#C74634' : '' }">
        <span class="form-hint" style="color:#C74634" data-bind="visible: hasError('roleName'), text: getError('roleName')"></span>
      </div>
      <div class="form-group form-group--full">
        <label class="form-label">Description</label>
        <textarea class="form-control" rows="2" placeholder="Describe what this role grants access to"
                  data-bind="value: description"></textarea>
      </div>
      <div class="form-group">
        <label class="form-label">Status</label>
        <div style="display:flex;align-items:center;gap:8px;cursor:pointer;padding-top:6px"
             data-bind="click: function() { isActive(!isActive()); }">
          <div class="switch" style="pointer-events:none">
            <input type="checkbox" style="pointer-events:none" data-bind="checked: isActive">
            <span class="switch-slider"></span>
          </div>
          <span style="font-size:13px">Active</span>
        </div>
      </div>
    </div>

    <div class="section-heading" style="margin-top:20px">Permission Assignments</div>
    <p style="font-size:12px;color:#aaa;margin-bottom:12px">Check the permissions this role should grant. Changes take effect immediately on next login.</p>

    <!-- ko foreach: permModules -->
    <div style="margin-bottom:16px">
      <div style="font-size:12px;font-weight:700;color:#6e6e73;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px"
           data-bind="text: module"></div>
      <div class="checkbox-grid">
        <!-- ko foreach: permissions -->
        <div class="checkbox-item" data-bind="click: function() { checked(!checked()); }, css: { 'checkbox-item--on': checked() }">
          <input type="checkbox" style="pointer-events:none" data-bind="checked: checked">
          <div>
            <div style="font-weight:600;font-size:12px" data-bind="text: permName"></div>
            <div style="color:#aaa;font-size:11px" data-bind="text: permCode"></div>
          </div>
        </div>
        <!-- /ko -->
      </div>
    </div>
    <!-- /ko -->

    <div class="form-actions">
      <button class="btn btn-primary" data-bind="click: save, enable: !saving()">
        <!-- ko if: saving() -->Saving&hellip;<!-- /ko -->
        <!-- ko ifnot: saving() -->&#10003; Save Role<!-- /ko -->
      </button>
      <button class="btn btn-secondary" data-bind="click: cancel">Cancel</button>
    </div>
  </div>
</div>
