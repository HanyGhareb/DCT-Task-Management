<div class="rm-page">

  <!-- Page header -->
  <div class="rm-page-head">
    <div>
      <h1 class="rm-title">Access Roles</h1>
      <!-- ko if: loading() -->
      <p class="rm-subtitle">Loading&hellip;</p>
      <!-- /ko -->
      <!-- ko ifnot: loading() -->
      <p class="rm-subtitle" data-bind="text: allRoles().length + ' role' + (allRoles().length === 1 ? '' : 's') + ' in the system'"></p>
      <!-- /ko -->
    </div>
    <button class="rm-btn-add" data-bind="click: addRole">
      <span class="rm-btn-plus">+</span> New Role
    </button>
  </div>

  <!-- Search toolbar -->
  <div class="rm-toolbar">
    <div class="rm-search-wrap">
      <span class="rm-search-icon">&#9906;</span>
      <input class="rm-search" type="text" placeholder="Search by name, code, or description&hellip;"
             data-bind="value: searchTerm, valueUpdate: 'input'">
    </div>
  </div>

  <!-- Skeleton while loading -->
  <!-- ko if: loading() -->
  <div class="rm-skeleton-rows">
    <div class="rm-skeleton-row"></div>
    <div class="rm-skeleton-row"></div>
    <div class="rm-skeleton-row"></div>
    <div class="rm-skeleton-row"></div>
  </div>
  <!-- /ko -->

  <!-- Roles table -->
  <!-- ko ifnot: loading() -->
  <div class="rm-table-panel">
    <table class="rm-table">
      <thead>
        <tr>
          <th>Role Name</th>
          <th>Code</th>
          <th class="rm-col-desc">Description</th>
          <th>Members</th>
          <th>Status</th>
          <th style="width:80px"></th>
        </tr>
      </thead>
      <tbody>
        <!-- ko foreach: filteredRoles() -->
        <tr class="rm-row">
          <td class="rm-cell-name" data-bind="text: roleName"></td>
          <td>
            <code class="rm-code-badge" data-bind="text: roleCode"></code>
          </td>
          <td class="rm-cell-desc" data-bind="text: description || '&mdash;'"></td>
          <td>
            <span class="rm-member-pill">
              <span class="rm-member-dot"></span>
              <span data-bind="text: (memberCount || 0)"></span>
            </span>
          </td>
          <td>
            <!-- ko if: isActive === 'Y' -->
            <span class="rm-status rm-status--on">Active</span>
            <!-- /ko -->
            <!-- ko ifnot: isActive === 'Y' -->
            <span class="rm-status rm-status--off">Inactive</span>
            <!-- /ko -->
          </td>
          <td class="rm-cell-actions">
            <button class="rm-action-btn rm-action-btn--edit"
                    data-bind="click: $parent.editRole.bind($parent, $data)"
                    title="Edit role">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="rm-action-btn rm-action-btn--del"
                    data-bind="click: $parent.confirmDelete.bind($parent, $data)"
                    title="Delete role">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
            </button>
          </td>
        </tr>
        <!-- /ko -->
        <!-- ko if: filteredRoles().length === 0 -->
        <tr>
          <td colspan="6">
            <div class="rm-empty">
              <div class="rm-empty-icon">&#8856;</div>
              <div>No roles match your search</div>
            </div>
          </td>
        </tr>
        <!-- /ko -->
      </tbody>
    </table>
  </div>
  <!-- /ko -->

  <!-- Delete confirm modal -->
  <!-- ko if: showDeleteConfirm() -->
  <div class="rm-modal-backdrop">
    <div class="rm-modal">
      <div class="rm-modal-icon">&#9888;</div>
      <h3 class="rm-modal-title">Delete Role</h3>
      <p class="rm-modal-body">
        Permanently delete <strong data-bind="text: deleteTarget() && deleteTarget().roleName"></strong>?
        Users assigned this role will lose all access it granted.
      </p>
      <div class="rm-modal-actions">
        <button class="rm-modal-cancel" data-bind="click: cancelDelete">Cancel</button>
        <button class="rm-modal-confirm" data-bind="click: doDelete">Delete</button>
      </div>
    </div>
  </div>
  <!-- /ko -->

</div>
