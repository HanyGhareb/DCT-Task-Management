<div class="page-wrap">
  <div class="page-header">
    <div class="page-title" data-bind="text: $root.t('nav.pendingApprovals')"></div>
    <div class="page-subtitle" data-bind="text: $root.t('pa.subtitle', [pending().length])"></div>
  </div>

  <!-- ko if: actionMsg() -->
  <div class="alert-banner alert-banner--info" style="margin-bottom:16px">&#10003; <span data-bind="text: actionMsg()"></span></div>
  <!-- /ko -->

  <!-- ko if: pending().length === 0 -->
  <div class="empty-state" style="padding:80px">
    <div class="empty-state__icon">&#9989;</div>
    <div class="empty-state__msg" data-bind="text: $root.t('pa.caughtUp')"></div>
    <div class="empty-state__sub" data-bind="text: $root.t('pa.caughtUpSub')"></div>
  </div>
  <!-- /ko -->

  <!-- ko foreach: pending() -->
  <div class="card" style="margin-bottom:14px">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px">
      <div style="flex:1">
        <div style="font-size:15px;font-weight:700;margin-bottom:4px" data-bind="text: templateName"></div>
        <div style="font-size:13px;color:#6e6e73">
          <span data-bind="text: $root.t('pa.requestedBy')"></span> <strong data-bind="text: requestedBy"></strong>
          · <span data-bind="text: requestedAt"></span>
          &bull; <span data-bind="text: $root.t('pa.amount')"></span>: <strong class="mono" data-bind="text: amount"></strong>
        </div>

        <!-- Step progress -->
        <div style="margin-top:14px">
          <div style="font-size:11px;color:#aaa;margin-bottom:6px">
            <span data-bind="text: $root.t('pa.progress', [currentStep, totalSteps])"></span>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="step-tracker" style="flex:1;max-width:200px">
              <!-- ko foreach: $root.getStepArray($parent) -->
              <!-- ko if: $index() > 0 -->
              <div class="step-line" data-bind="css: { 'step-line--done': $root.stepState($parent, $data) === 'done' }"></div>
              <!-- /ko -->
              <div class="step-dot"
                data-bind="css: { 'step-dot--done': $root.stepState($parent, $data) === 'done', 'step-dot--current': $root.stepState($parent, $data) === 'current' }">
              </div>
              <!-- /ko -->
            </div>
            <span class="badge badge--pending" data-bind="text: $root.t('pa.awaitingStep', [currentStep])"></span>
          </div>
        </div>
      </div>

      <!-- Actions -->
      <div style="display:flex;flex-direction:column;gap:8px;flex-shrink:0">
        <button class="btn btn-primary" style="background:#2E7D32" data-bind="click: $parent.approve.bind($parent, $data)">
          ✓ <span data-bind="text: $root.t('pa.approve')"></span>
        </button>
        <button class="btn btn-danger" data-bind="click: $parent.reject.bind($parent, $data)">
          ✗ <span data-bind="text: $root.t('pa.reject')"></span>
        </button>
      </div>
    </div>
  </div>
  <!-- /ko -->
</div>
