<div class="page-wrap">
  <div class="page-header">
    <div class="page-title" data-bind="text: $root.t('nav.pendingApprovals')"></div>
    <div class="page-subtitle" data-bind="text: $root.t('pa.subtitle', [pending().length])"></div>
  </div>

  <!-- ko if: actionMsg() -->
  <div class="alert-banner alert-banner--info" style="margin-bottom:16px">&#10003; <span data-bind="text: actionMsg()"></span></div>
  <!-- /ko -->

  <!-- ko if: loading() -->
  <list-skeleton params="rows: 3"></list-skeleton>
  <!-- /ko -->

  <!-- ko if: !loading() && pending().length === 0 -->
  <div class="empty-state" style="padding:80px">
    <div class="empty-state__icon">&#9989;</div>
    <div class="empty-state__msg" data-bind="text: $root.t('pa.caughtUp')"></div>
    <div class="empty-state__sub" data-bind="text: $root.t('pa.caughtUpSub')"></div>
  </div>
  <!-- /ko -->

  <!-- ko foreach: pending() -->
  <div class="card" style="margin-bottom:14px">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:16px">
      <div style="flex:1">
        <div style="font-size:15px;font-weight:700;margin-bottom:4px">
          <span data-bind="text: $data.requestRef || ''"></span>
          <span class="badge badge--info" style="margin-inline-start:8px;font-size:10px" data-bind="text: $data.module || ''"></span>
        </div>
        <div style="font-size:13px;color:#6e6e73">
          <span data-bind="text: $root.t('pa.requestedBy')"></span> <strong data-bind="text: $data.requestedBy || ''"></strong>
          · <span data-bind="text: $data.requestedAt || ''"></span>
          &bull; <span data-bind="text: $root.t('pa.amount')"></span>: <strong class="mono" data-bind="text: ($data.amount || 0).toLocaleString()"></strong>
        </div>
        <div style="font-size:12px;color:#aaa;margin-top:6px" data-bind="text: $data.templateName || ''"></div>

        <!-- Step progress -->
        <div style="margin-top:14px">
          <div style="font-size:11px;color:#aaa;margin-bottom:6px">
            <span data-bind="text: $root.t('pa.progress', [$data.currentStep || 1, $data.totalSteps || 1])"></span>
            · <span data-bind="text: $data.currentStepName || ''"></span>
          </div>
          <div style="display:flex;align-items:center;gap:8px">
            <div class="step-tracker" style="flex:1;max-width:200px">
              <!-- ko foreach: $vm.getStepArray($data) -->
              <!-- ko if: $index() > 0 -->
              <div class="step-line" data-bind="css: { 'step-line--done': $vm.stepState($parent, $data) === 'done' }"></div>
              <!-- /ko -->
              <div class="step-dot"
                data-bind="css: { 'step-dot--done': $vm.stepState($parent, $data) === 'done', 'step-dot--current': $vm.stepState($parent, $data) === 'current' }">
              </div>
              <!-- /ko -->
            </div>
            <span class="badge badge--pending" data-bind="text: $root.t('pa.awaitingStep', [$data.currentStep || 1])"></span>
          </div>
        </div>

        <!-- Inline comment box (required before confirm) -->
        <!-- ko if: actionMode() -->
        <div style="margin-top:14px;padding:12px;border:1px solid var(--border,#e0e0e0);border-radius:8px;background:var(--surface-2,#fafafa)">
          <div style="font-size:12px;font-weight:600;margin-bottom:6px"
               data-bind="text: actionMode() === 'APPROVED' ? $root.t('pa.approveComment') : $root.t('pa.rejectComment')"></div>
          <!-- ko if: actionError() -->
          <div style="color:#C62828;font-size:12px;margin-bottom:6px" data-bind="text: actionError()"></div>
          <!-- /ko -->
          <textarea class="form-control" rows="2" style="width:100%;resize:vertical"
                    data-bind="value: commentText, valueUpdate: 'input'"></textarea>
          <div style="display:flex;gap:8px;margin-top:8px">
            <button class="btn btn-primary btn-sm"
                    data-bind="click: $parent.confirmAction.bind($parent, $data), enable: !busy(),
                               style: { background: actionMode() === 'APPROVED' ? '#2E7D32' : '#C62828' }">
              <!-- ko if: busy() -->&hellip;<!-- /ko -->
              <!-- ko ifnot: busy() --><span data-bind="text: actionMode() === 'APPROVED' ? '✓ ' + $root.t('pa.confirmApprove') : '✗ ' + $root.t('pa.confirmReject')"></span><!-- /ko -->
            </button>
            <button class="btn btn-secondary btn-sm" data-bind="click: $parent.cancelAction.bind($parent, $data)">
              <span data-bind="text: $root.t('common.cancel')"></span>
            </button>
          </div>
        </div>
        <!-- /ko -->
      </div>

      <!-- Actions -->
      <div style="display:flex;flex-direction:column;gap:8px;flex-shrink:0">
        <button class="btn btn-primary" style="background:#2E7D32" data-bind="click: $parent.startApprove.bind($parent, $data)">
          ✓ <span data-bind="text: $root.t('pa.approve')"></span>
        </button>
        <button class="btn btn-danger" data-bind="click: $parent.startReject.bind($parent, $data)">
          ✗ <span data-bind="text: $root.t('pa.reject')"></span>
        </button>
      </div>
    </div>
  </div>
  <!-- /ko -->
</div>
