<div class="page-wrap">
  <div class="page-header">
    <div class="page-title" data-bind="text: t('audit.title')"></div>
    <div class="page-subtitle">
      <span class="mono" data-bind="text: total()"></span> <span data-bind="text: t('audit.subtitle')"></span>
    </div>
  </div>

  <!-- Toolbar: debounced server search + action filter -->
  <div class="view-toolbar">
    <input class="search-box" type="text"
           data-bind="value: searchBy, valueUpdate: 'input', attr: { placeholder: t('audit.searchPh') }">
    <select class="form-control" style="max-width:180px" data-bind="value: actionFilter">
      <option value="" data-bind="text: t('audit.allActions')"></option>
      <option value="LOGIN">LOGIN</option>
      <option value="CREATE">CREATE</option>
      <option value="UPDATE">UPDATE</option>
      <option value="DELETE">DELETE</option>
    </select>
    <span class="toolbar-spacer"></span>
    <button class="btn btn-secondary btn-sm" data-bind="click: reload, text: '↻ ' + t('common.refresh')"></button>
  </div>

  <!-- Tri-state list -->
  <div class="data-table-wrap">
    <!-- ko if: loading() -->
    <list-skeleton params="rows: 10"></list-skeleton>
    <!-- /ko -->

    <!-- ko ifnot: loading() -->
    <!-- ko if: loadError() -->
    <div class="empty-state">
      <div class="empty-state__icon">&#9888;</div>
      <div class="empty-state__msg" data-bind="text: t('empty.loadFailed')"></div>
      <div class="empty-state__sub" data-bind="text: t('empty.loadFailedSub')"></div>
      <button class="btn btn-primary" data-bind="click: reload, text: t('common.retry')"></button>
    </div>
    <!-- /ko -->

    <!-- ko ifnot: loadError() -->
    <table class="data-table">
      <thead>
        <tr>
          <th data-bind="text: t('audit.colWhen')"></th>
          <th data-bind="text: t('audit.colUser')"></th>
          <th data-bind="text: t('audit.colAction')"></th>
          <th data-bind="text: t('audit.colObject')"></th>
          <th data-bind="text: t('audit.colStatus')"></th>
          <th data-bind="text: t('audit.colError')"></th>
        </tr>
      </thead>
      <tbody>
        <!-- ko foreach: entries() -->
        <tr>
          <td class="mono" style="font-size:12px;white-space:nowrap" data-bind="text: $parent.formatDate(loggedAt)"></td>
          <td class="mono" style="font-size:12px" data-bind="text: actionBy"></td>
          <td><span class="badge" data-bind="css: $parent.getActionBadgeClass(actionType), text: actionType"></span></td>
          <td>
            <span data-bind="text: objectType"></span>
            <span style="color:var(--text-3);font-size:11px" class="mono" data-bind="text: objectId ? ' #' + objectId : ''"></span>
          </td>
          <td>
            <!-- ko if: status === 'SUCCESS' -->
            <span class="badge badge--active">SUCCESS</span>
            <!-- /ko -->
            <!-- ko ifnot: status === 'SUCCESS' -->
            <span class="badge badge--inactive" data-bind="text: status"></span>
            <!-- /ko -->
          </td>
          <td style="font-size:11.5px;color:var(--text-3);max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
              data-bind="text: error, attr: { title: error }"></td>
        </tr>
        <!-- /ko -->
        <!-- ko if: entries().length === 0 -->
        <tr>
          <td colspan="6">
            <div class="empty-state">
              <div class="empty-state__icon">&#128218;</div>
              <div class="empty-state__msg" data-bind="text: t('empty.noMatch')"></div>
              <div class="empty-state__sub" data-bind="text: t('empty.noMatchSub')"></div>
            </div>
          </td>
        </tr>
        <!-- /ko -->
      </tbody>
    </table>

    <list-pager params="offset: offset, limit: limit, total: total, onChange: reload"></list-pager>
    <!-- /ko -->
    <!-- /ko -->
  </div>
</div>
