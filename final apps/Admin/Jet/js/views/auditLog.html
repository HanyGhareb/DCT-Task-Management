<div class="page-wrap">
  <div class="page-header">
    <div class="page-title" data-bind="text: t('audit.title')"></div>
    <div class="page-subtitle">
      <span class="mono" data-bind="text: total()"></span> <span data-bind="text: t('audit.subtitle')"></span>
    </div>
  </div>

  <!-- ko if: isSysAdmin -->
  <div class="card" style="margin-bottom:16px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:24px;flex-wrap:wrap">
      <div style="flex:1;min-width:280px">
        <div class="section-heading" style="margin:0 0 12px" data-bind="text:t('audit.stats.title')"></div>
        <!-- ko if: statsLoading() --><list-skeleton params="rows:2"></list-skeleton><!-- /ko -->
        <!-- ko with: stats -->
        <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px">
          <div style="padding:12px;border:1px solid var(--border);border-radius:7px">
            <div class="muted" style="font-size:11px" data-bind="text:$root.t('audit.stats.total')"></div>
            <div style="font-size:22px;font-weight:700;margin-top:3px" data-bind="text:total"></div>
          </div>
          <div style="padding:12px;border:1px solid var(--border);border-radius:7px">
            <div class="muted" style="font-size:11px" data-bind="text:$root.t('audit.stats.recent')"></div>
            <div style="font-size:22px;font-weight:700;margin-top:3px" data-bind="text:last30Days"></div>
          </div>
          <div style="padding:12px;border:1px solid var(--border);border-radius:7px">
            <div class="muted" style="font-size:11px" data-bind="text:$root.t('audit.stats.users')"></div>
            <div style="font-size:22px;font-weight:700;margin-top:3px" data-bind="text:uniqueUsers"></div>
          </div>
          <div style="padding:12px;border:1px solid var(--border);border-radius:7px">
            <div class="muted" style="font-size:11px" data-bind="text:$root.t('audit.stats.failed')"></div>
            <div style="font-size:22px;font-weight:700;margin-top:3px;color:#a23b2d" data-bind="text:failed"></div>
          </div>
        </div>
        <!-- /ko -->
      </div>
      <div style="width:360px;max-width:100%;padding-left:22px;border-left:1px solid var(--border)">
        <div style="font-size:13px;font-weight:700" data-bind="text:t('audit.purge.title')"></div>
        <div class="muted" style="font-size:11.5px;margin:4px 0 12px" data-bind="text:t('audit.purge.help')"></div>
        <div style="display:grid;grid-template-columns:1fr 110px;gap:8px">
          <select class="form-control" data-bind="value:purgeCategory, options:(stats() && stats().categories) || [], optionsText:'category', optionsValue:'category', optionsCaption:t('audit.purge.category')"></select>
          <input class="form-control" type="number" min="30" max="3650" step="1" data-bind="value:purgeDays, attr:{title:t('audit.purge.days')}">
        </div>
        <button class="btn btn-danger" style="width:100%;margin-top:9px" data-bind="click:purge,enable:canPurge,text:purging()?t('audit.purge.running'):t('audit.purge.button')"></button>
        <!-- ko if: purgeMsg() --><div style="font-size:11.5px;margin-top:8px" data-bind="text:purgeMsg"></div><!-- /ko -->
      </div>
    </div>
  </div>
  <!-- /ko -->

  <!-- Toolbar: debounced server search + action filter -->
  <div class="view-toolbar">
    <input class="search-box" type="text"
           data-bind="value: searchBy, valueUpdate: 'input', attr: { placeholder: t('audit.searchPh') }">
    <select class="form-control" style="max-width:180px"
            data-bind="value:categoryFilter,
                       options:(stats() && stats().categories) || [],
                       optionsText:'category',optionsValue:'category',
                       optionsCaption:t('audit.allCategories')"></select>
    <select class="form-control" style="max-width:180px" data-bind="value: actionFilter">
      <option value="" data-bind="text: t('audit.allActions')"></option>
      <option value="LOGIN">LOGIN</option>
      <option value="CREATE">CREATE</option>
      <option value="UPDATE">UPDATE</option>
      <option value="DELETE">DELETE</option>
    </select>
    <input class="form-control" type="date" style="max-width:160px"
           data-bind="value: fromDate, attr: { 'aria-label': t('audit.from'), title: t('audit.from') }">
    <input class="form-control" type="date" style="max-width:160px"
           data-bind="value: toDate, attr: { 'aria-label': t('audit.to'), title: t('audit.to') }">
    <span class="toolbar-spacer"></span>
    <button class="btn btn-secondary btn-sm"
            data-bind="click: exportCsv, enable: !exporting(),
                       text: (exporting() ? '…' : '⬇') + ' ' + t('audit.exportCsv')"></button>
    <button class="btn btn-secondary btn-sm" data-bind="click: reload, text: '↻ ' + t('common.refresh')"></button>
  </div>

  <!-- Tri-state list -->
  <div class="data-table-wrap">
    <!-- ko if: loading() -->
    <list-skeleton params="rows: 10"></list-skeleton>
    <!-- /ko -->

    <!-- ko ifnot: loading() -->
    <!-- ko if: loadError() -->
    <div class="empty-state">
      <div class="empty-state__icon">&#9888;</div>
      <div class="empty-state__msg" data-bind="text: t('empty.loadFailed')"></div>
      <div class="empty-state__sub" data-bind="text: t('empty.loadFailedSub')"></div>
      <button class="btn btn-primary" data-bind="click: reload, text: t('common.retry')"></button>
    </div>
    <!-- /ko -->

    <!-- ko ifnot: loadError() -->
    <table class="data-table">
      <thead>
        <tr>
          <th data-bind="text: t('audit.colWhen')"></th>
          <th data-bind="text: t('audit.colUser')"></th>
          <th data-bind="text: t('audit.colCategory')"></th>
          <th data-bind="text: t('audit.colAction')"></th>
          <th data-bind="text: t('audit.colObject')"></th>
          <th data-bind="text: t('audit.colStatus')"></th>
          <th data-bind="text: t('audit.colError')"></th>
        </tr>
      </thead>
      <tbody>
        <!-- ko foreach: entries() -->
        <tr style="cursor:pointer" data-bind="click: $parent.toggleExpand.bind($parent, $data),
                                              css: { 'row--selected': $parent.expandedId() === auditId }">
          <td class="mono" style="font-size:12px;white-space:nowrap" data-bind="text: $parent.formatDate(loggedAt)"></td>
          <td class="mono" style="font-size:12px" data-bind="text: actionBy"></td>
          <td><span class="badge badge--info mono" data-bind="text: category"></span></td>
          <td><span class="badge" data-bind="css: $parent.getActionBadgeClass(actionType), text: actionType"></span></td>
          <td>
            <span data-bind="text: objectType"></span>
            <span style="color:var(--text-3);font-size:11px" class="mono" data-bind="text: objectId ? ' #' + objectId : ''"></span>
          </td>
          <td>
            <!-- ko if: status === 'SUCCESS' -->
            <span class="badge badge--active">SUCCESS</span>
            <!-- /ko -->
            <!-- ko ifnot: status === 'SUCCESS' -->
            <span class="badge badge--inactive" data-bind="text: status"></span>
            <!-- /ko -->
          </td>
          <td style="font-size:11.5px;color:var(--text-3);max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
              data-bind="text: error, attr: { title: error }"></td>
        </tr>
        <!-- Wave 3: before/after diff (lazy-loaded via GET /audit/:id) -->
        <!-- ko if: $parent.expandedId() === auditId -->
        <tr class="audit-diff-row">
          <td colspan="7">
            <!-- ko if: $parent.diffLoading() -->
            <div class="audit-diff__loading" data-bind="text: $root.t('common.loading')"></div>
            <!-- /ko -->
            <!-- ko if: $parent.diffEmpty() -->
            <div class="audit-diff__loading" data-bind="text: $root.t('audit.noDiff')"></div>
            <!-- /ko -->
            <!-- ko if: $parent.diffRows().length -->
            <table class="audit-diff">
              <thead><tr>
                <th data-bind="text: $root.t('audit.diffField')"></th>
                <th data-bind="text: $root.t('audit.diffBefore')"></th>
                <th data-bind="text: $root.t('audit.diffAfter')"></th>
              </tr></thead>
              <tbody>
                <!-- ko foreach: $parent.diffRows() -->
                <tr data-bind="css: { 'audit-diff--changed': changed }">
                  <td class="mono" data-bind="text: field"></td>
                  <td class="audit-diff__old" data-bind="text: oldVal || '—'"></td>
                  <td class="audit-diff__new" data-bind="text: newVal || '—'"></td>
                </tr>
                <!-- /ko -->
              </tbody>
            </table>
            <!-- /ko -->
          </td>
        </tr>
        <!-- /ko -->
        <!-- /ko -->
        <!-- ko if: entries().length === 0 -->
        <tr>
          <td colspan="7">
            <div class="empty-state">
              <div class="empty-state__icon">&#128218;</div>
              <div class="empty-state__msg" data-bind="text: t('empty.noMatch')"></div>
              <div class="empty-state__sub" data-bind="text: t('empty.noMatchSub')"></div>
            </div>
          </td>
        </tr>
        <!-- /ko -->
      </tbody>
    </table>

    <list-pager params="offset: offset, limit: limit, total: total, onChange: reload"></list-pager>
    <!-- /ko -->
    <!-- /ko -->
  </div>
</div>
