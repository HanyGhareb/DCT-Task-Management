<div class="login-page">
  <div class="login-card">
    <div class="lang-pill" style="position:absolute;top:14px;inset-inline-end:14px">
      <button type="button" data-bind="click: function(){ $root.setLang('en'); }, css: { on: $root.lang() === 'en' }">EN</button>
      <button type="button" data-bind="click: function(){ $root.setLang('ar'); }, css: { on: $root.lang() === 'ar' }">&#1593;</button>
    </div>
    <div class="login-logo">
      <div class="login-cube">i</div>
      <div class="login-title"
           data-bind="text: ($root.lang() === 'ar' ? appNameAr() : appName()) || appName() || 'i-Finance V2'"></div>
      <div class="login-subtitle"
           data-bind="text: ($root.lang() === 'ar' ? taglineAr() : tagline()) || tagline() || $root.t('login.subtitle')"></div>
    </div>

    <!-- Error -->
    <div class="login-error" data-bind="visible: error(), text: error()" style="display:none"></div>

    <!-- Form -->
    <div class="form-group" style="margin-bottom:14px">
      <label class="form-label" data-bind="text: $root.t('login.username')"></label>
      <input class="form-control" type="text" data-bind="attr: { placeholder: $root.t('login.usernamePh') }, value: username, valueUpdate: 'input', event: { keydown: onKeyDown }" autocomplete="username">
    </div>
    <div class="form-group" style="margin-bottom:20px">
      <label class="form-label" data-bind="text: $root.t('login.password')"></label>
      <input class="form-control" type="password" data-bind="attr: { placeholder: $root.t('login.passwordPh') }, value: password, valueUpdate: 'input', event: { keydown: onKeyDown }" autocomplete="current-password">
    </div>

    <button class="btn btn-primary" style="width:100%;justify-content:center;padding:11px"
            data-bind="click: doLogin, enable: !loading()">
      <!-- ko if: loading() --><span data-bind="text: $root.t('login.signingIn')"></span><!-- /ko -->
      <!-- ko ifnot: loading() --><span data-bind="text: $root.t('login.signIn')"></span><!-- /ko -->
    </button>

    <!-- Quick logins (demo) -->
    <div class="login-quick">
      <div class="login-quick-label">⚡ <span data-bind="text: $root.t('login.quick')"></span></div>
      <div class="quick-btns">
        <!-- ko foreach: quickLogins -->
        <button class="quick-btn" data-bind="click: $parent.quickLogin.bind($parent, $data)">
          <strong data-bind="text: label"></strong>
          <span data-bind="text: role"></span>
        </button>
        <!-- /ko -->
      </div>
    </div>

    <!-- Freelancer self-service portal (external, non-DCT users) -->
    <div style="text-align:center;font-size:12.5px;margin-top:20px;padding-top:16px;border-top:1px solid #eee">
      <span style="color:#888" data-bind="text: $root.t('login.freelancerNote')"></span>
      <a href="/FL/Portal/index.html" style="color:var(--brand,#C74634);font-weight:600;text-decoration:none;margin-inline-start:5px;white-space:nowrap"
         data-bind="text: $root.t('login.freelancerLink')"></a>
    </div>

    <p style="text-align:center;font-size:11px;color:#aaa;margin-top:20px">
      Oracle JET 17 &bull; i-Finance V2 &bull; &copy; 2026
    </p>
  </div>
</div>
