<div class="rm-page">

  <!-- Page header -->
  <div class="rm-page-head">
    <div>
      <h1 class="rm-title">Permission Matrix</h1>
      <p class="rm-subtitle">Grant or revoke permissions per role &mdash; changes take effect on next login</p>
    </div>
    <button class="rm-btn-add" data-bind="click: saveAll, disable: loading()">
      <!-- ko if: loading() -->
      <span class="rm-spinner-sm"></span>
      Loading&hellip;
      <!-- /ko -->
      <!-- ko ifnot: loading() -->
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="20 6 9 17 4 12"/></svg>
      Save Matrix
      <!-- /ko -->
    </button>
  </div>

  <!-- Alerts -->
  <!-- ko if: error() -->
  <div class="rm-alert rm-alert--error" data-bind="text: error()"></div>
  <!-- /ko -->
  <!-- ko if: savedMsg() -->
  <div class="rm-alert rm-alert--success" data-bind="text: savedMsg()"></div>
  <!-- /ko -->

  <!-- Loading state -->
  <!-- ko if: loading() -->
  <div class="rm-matrix-loading">
    <div class="rm-spinner"></div>
    <span>Building permission matrix&hellip;</span>
  </div>
  <!-- /ko -->

  <!-- Matrix sections, one per module -->
  <!-- ko ifnot: loading() -->
  <!-- ko foreach: modules() -->
  <div class="rm-matrix-section">
    <div class="rm-matrix-module" data-bind="text: $data"></div>
    <div class="rm-matrix-scroll">
      <table class="rm-matrix">
        <thead>
          <tr>
            <th class="rm-matrix-th-perm">Permission</th>
            <!-- ko foreach: $vm.roles() -->
            <th class="rm-matrix-th-role">
              <div class="rm-role-col-head">
                <span class="rm-role-col-code" data-bind="text: roleCode"></span>
                <span class="rm-role-col-name" data-bind="text: roleName"></span>
              </div>
            </th>
            <!-- /ko -->
          </tr>
        </thead>
        <tbody>
          <!-- ko foreach: $vm.getPermsByModule($data) -->
          <tr class="rm-matrix-row">
            <td class="rm-matrix-perm-cell">
              <div class="rm-perm-name" data-bind="text: permName"></div>
              <code class="rm-perm-code" data-bind="text: permCode"></code>
            </td>
            <!-- ko foreach: $vm.roles() -->
            <td class="rm-matrix-toggle-cell">
              <div class="rm-toggle-wrap" role="switch" tabindex="0" aria-checked="false"
                   data-bind="click: function() { $vm.togglePerm($parent, $data); },
                              css: { 'rm-toggle--on': $vm.hasPerm($parent, $data) },
                              attr: { 'aria-checked': $vm.hasPerm($parent, $data) ? 'true' : 'false',
                                      'aria-label': $parent.permName + ' for ' + ($data.roleName || $data.roleCode) },
                              event: { keydown: function (d, e) {
                                if (e.key === 'Enter' || e.key === ' ') { $vm.togglePerm($parent, $data); return false; }
                                return true; } }">
                <span class="rm-toggle-dot"></span>
              </div>
            </td>
            <!-- /ko -->
          </tr>
          <!-- /ko -->
        </tbody>
      </table>
    </div>
  </div>
  <!-- /ko -->

  <!-- Empty state if no modules loaded -->
  <!-- ko if: modules().length === 0 -->
  <div class="rm-empty">
    <div class="rm-empty-icon">&#8856;</div>
    <div>No permissions found</div>
  </div>
  <!-- /ko -->
  <!-- /ko -->

</div>
