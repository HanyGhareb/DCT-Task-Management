<div class="page-wrap">
  <div class="page-header page-header-row">
    <div>
      <div class="page-title" data-bind="text: $root.t('vw.profile.title')"></div>
      <div class="page-subtitle" data-bind="text: $root.t('vw.profile.subtitle')"></div>
    </div>
    <div class="page-actions">
      <button class="btn btn-primary" data-bind="click: saveProfile, enable: !saving()">
        <!-- ko if: saving() -->Saving&hellip;<!-- /ko -->
        <!-- ko ifnot: saving() -->&#10003; Save Profile<!-- /ko -->
      </button>
    </div>
  </div>

  <!-- ko if: successMsg() -->
  <div class="alert-banner alert-banner--info" style="margin-bottom:16px">&#10003; <span data-bind="text: successMsg()"></span></div>
  <!-- /ko -->

  <!-- Profile card -->
  <div class="card" style="margin-bottom:16px">
    <div class="section-heading-row">
      <div class="section-heading">Profile Information</div>
    </div>
    <div style="display:flex;align-items:center;gap:20px;margin-bottom:20px">
      <div style="text-align:center">
        <!-- ko if: photoSrc() -->
        <img class="avatar avatar--lg" style="object-fit:cover"
             data-bind="attr: { src: photoSrc(), alt: displayName() }">
        <!-- /ko -->
        <!-- ko ifnot: photoSrc() -->
        <div class="avatar avatar--lg"
             data-bind="style: { background: color }, text: initials()"></div>
        <!-- /ko -->
        <input id="profile-photo-input" type="file" accept="image/*" style="display:none"
               data-bind="event: { change: photoSelected }">
        <button class="btn btn-secondary" type="button"
                style="margin-top:8px;font-size:12px;padding:4px 10px;display:block;width:100%"
                data-bind="click: pickPhoto, enable: !uploadingPhoto()">
          <!-- ko if: uploadingPhoto() -->Uploading&hellip;<!-- /ko -->
          <!-- ko ifnot: uploadingPhoto() -->Change Photo<!-- /ko -->
        </button>
      </div>
      <div>
        <div style="font-size:18px;font-weight:700" data-bind="text: displayName()"></div>
        <div style="font-size:13px;color:#aaa" data-bind="text: username"></div>
        <div style="margin-top:6px;display:flex;gap:6px;flex-wrap:wrap">
          <!-- ko foreach: roles -->
          <span class="badge badge--admin" data-bind="text: $data"></span>
          <!-- /ko -->
        </div>
      </div>
    </div>
    <!-- ko if: photoError() -->
    <div class="alert-banner alert-banner--danger" style="margin-bottom:14px">&#9888; <span data-bind="text: photoError()"></span></div>
    <!-- /ko -->
    <!-- ko if: errorMsg() -->
    <div class="alert-banner alert-banner--danger" style="margin-bottom:14px">&#9888; <span data-bind="text: errorMsg()"></span></div>
    <!-- /ko -->

    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Display Name (English)</label>
        <input class="form-control" type="text" data-bind="value: displayName, valueUpdate: 'input'">
      </div>
      <div class="form-group">
        <label class="form-label">Display Name (Arabic)</label>
        <input class="form-control" type="text" dir="rtl" data-bind="value: displayNameAr, valueUpdate: 'input'">
      </div>
      <div class="form-group">
        <label class="form-label">Email</label>
        <input class="form-control" type="email" data-bind="value: email, valueUpdate: 'input'">
      </div>
      <div class="form-group">
        <label class="form-label">Phone</label>
        <input class="form-control" type="text" data-bind="value: phone, valueUpdate: 'input'">
      </div>
      <div class="form-group">
        <label class="form-label">Employee Number</label>
        <input class="form-control" type="text" placeholder="e.g. E9001"
               data-bind="value: employeeNumber, valueUpdate: 'input'">
      </div>
      <div class="form-group">
        <label class="form-label">Organisation</label>
        <input class="form-control" type="text" readonly data-bind="value: orgName">
      </div>
    </div>

    <audit-info params="data: audit"></audit-info>
  </div>

  <!-- Change password -->
  <div class="card" style="margin-bottom:16px">
    <div class="section-heading-row">
      <div class="section-heading">Change Password</div>
      <div class="region-actions">
        <button class="btn btn-primary btn-sm" data-bind="click: changePassword">Change Password</button>
      </div>
    </div>
    <!-- ko if: pwdError() -->
    <div class="alert-banner alert-banner--danger" style="margin-bottom:14px">&#9888; <span data-bind="text: pwdError()"></span></div>
    <!-- /ko -->
    <!-- ko if: pwdSuccess() -->
    <div class="alert-banner alert-banner--info" style="margin-bottom:14px">&#10003; <span data-bind="text: pwdSuccess()"></span></div>
    <!-- /ko -->
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Current Password</label>
        <input class="form-control" type="password" data-bind="value: currentPassword">
      </div>
      <div class="form-group">
        <label class="form-label">New Password</label>
        <input class="form-control" type="password" data-bind="value: newPassword">
      </div>
      <div class="form-group">
        <label class="form-label">Confirm New Password</label>
        <input class="form-control" type="password" data-bind="value: confirmNewPwd">
      </div>
    </div>
  </div>

  <!-- Delegations -->
  <div class="card">
    <div class="section-heading-row">
      <div class="section-heading">My Delegations</div>
      <div class="region-actions">
        <button class="btn btn-secondary btn-sm" data-bind="click: openDelModal">+ New Delegation</button>
      </div>
    </div>
    <!-- ko if: delLoading() --><list-skeleton params="rows: 2"></list-skeleton><!-- /ko -->
    <!-- ko foreach: delegations() -->
    <div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f0f0f0">
      <div>
        <div style="font-size:13px;font-weight:600">
          <!-- ko if: $vm.isMyOutgoing($data) -->
          Delegating to: <span data-bind="text: $data.delegateName"></span>
          <!-- /ko -->
          <!-- ko ifnot: $vm.isMyOutgoing($data) -->
          Acting for: <span data-bind="text: $data.delegatorName"></span>
          <!-- /ko -->
          <span class="badge badge--info" style="margin-inline-start:6px;font-size:10px"
                data-bind="text: $data.scope === 'ALL_ROLES' ? 'All roles'
                                 : ($data.scope === 'MODULE' ? $data.moduleName : $data.roleName)"></span>
        </div>
        <div style="font-size:12px;color:#aaa">
          <span class="mono" data-bind="text: $data.startDate"></span> &mdash;
          <span class="mono" data-bind="text: $data.endDate"></span>
          <!-- ko if: $data.reason --> &bull; <span data-bind="text: $data.reason"></span><!-- /ko -->
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <span data-bind="text: $data.status, css: $vm.delBadge($data.status)"></span>
        <!-- ko if: $data.status === 'ACTIVE' && $vm.isMyOutgoing($data) -->
        <button class="btn btn-secondary btn-sm"
                data-bind="click: $vm.cancelDelegation.bind($vm, $data), enable: !$vm.delBusy()">Cancel</button>
        <!-- /ko -->
      </div>
    </div>
    <!-- /ko -->
    <!-- ko if: !delLoading() && delegations().length === 0 -->
    <div class="empty-state" style="padding:30px">
      <div class="empty-state__msg">No active delegations</div>
    </div>
    <!-- /ko -->
  </div>

  <!-- new delegation modal -->
  <!-- ko if: showDelModal() -->
  <div class="modal-backdrop" style="position:fixed;inset:0;background:rgba(15,22,30,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px">
    <div class="card" style="width:100%;max-width:460px" data-bind="modalTrap: function(){ showDelModal(false); }">
      <div class="section-heading-row" style="margin-top:0">
        <div class="section-heading">New Delegation</div>
        <div class="region-actions">
          <button class="btn btn-secondary btn-sm" data-bind="click: function(){ showDelModal(false); }">Cancel</button>
          <button class="btn btn-primary btn-sm" data-bind="click: createDelegation, enable: !delBusy()">
            <!-- ko if: delBusy() -->Saving&hellip;<!-- /ko -->
            <!-- ko ifnot: delBusy() -->&#10003; Create<!-- /ko -->
          </button>
        </div>
      </div>
      <!-- ko if: delError() -->
      <div class="alert-banner alert-banner--danger" style="margin-bottom:12px">&#9888; <span data-bind="text: delError()"></span></div>
      <!-- /ko -->
      <div class="form-group" style="margin-bottom:12px">
        <label class="form-label">Delegate To *</label>
        <select class="form-control" data-bind="value: delDelegateId,
                 options: delUsers, optionsValue: 'userId',
                 optionsText: 'displayName', optionsCaption: 'Select user…'"></select>
      </div>
      <!-- Wave 4 (4.4): scope — cover everything or only one module -->
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group">
          <label class="form-label">Scope</label>
          <select class="form-control" data-bind="value: delScope">
            <option value="ALL_ROLES">All my roles</option>
            <option value="MODULE">One module only</option>
          </select>
        </div>
        <!-- ko if: delScope() === 'MODULE' -->
        <div class="form-group">
          <label class="form-label">Module *</label>
          <select class="form-control" data-bind="value: delModuleCode,
                   options: delModules, optionsValue: 'moduleCode',
                   optionsText: 'nameEn', optionsCaption: 'Select…'"></select>
        </div>
        <!-- /ko -->
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
        <div class="form-group">
          <label class="form-label">Start Date <span style="font-weight:400;color:var(--text-3)">(future = scheduled)</span></label>
          <input class="form-control" type="date" data-bind="value: delStart">
        </div>
        <div class="form-group">
          <label class="form-label">End Date *</label>
          <input class="form-control" type="date" data-bind="value: delEnd">
        </div>
      </div>
      <div class="form-group" style="margin-bottom:12px">
        <label class="form-label">Reason</label>
        <input class="form-control" data-bind="value: delReason, valueUpdate: 'input'" placeholder="e.g. Annual leave">
      </div>
    </div>
  </div>
  <!-- /ko -->
</div>
