<div class="rm-page">

  <div class="rm-page-head">
    <div>
      <security-info params="module: 'ADMIN', page: 'secProfiles'"></security-info>
      <h1 class="rm-title">Security Profiles</h1>
      <p class="rm-subtitle" data-bind="text: loading() ? 'Loading…' : items().length + ' profile' + (items().length === 1 ? '' : 's') + ' — data security: what rows a user is allowed to see. Click a row to edit.'"></p>
    </div>
    <button class="rm-btn-add" data-bind="click: addProfile">
      <span class="rm-btn-plus">+</span> New Profile
    </button>
  </div>

  <!-- ko if: okMsg --><div class="rm-alert rm-alert--success" data-bind="text: okMsg"></div><!-- /ko -->
  <!-- ko if: errorMsg() && !showEdit() --><div class="rm-alert rm-alert--error" data-bind="text: errorMsg"></div><!-- /ko -->

  <!-- ko if: loading() -->
  <div class="rm-skeleton-rows"><div class="rm-skeleton-row"></div><div class="rm-skeleton-row"></div><div class="rm-skeleton-row"></div></div>
  <!-- /ko -->

  <!-- ko ifnot: loading() -->
  <div class="rm-ir-panel" data-bind="event: { click: gridClick }">
    <interactive-report params="reportCode: 'SEC_PROFILES', section: '',
                                data: irData, isAdmin: false, layoutsApi: null"></interactive-report>
  </div>
  <p class="rm-sc-note" style="margin-top:10px">Values on the same dimension OR together; different dimensions AND together. A dimension with no rows stays unrestricted.</p>
  <!-- /ko -->

  <!-- Editor drawer -->
  <edit-drawer params="open: showEdit, vm: $vm, title: drawerTitle,
                       saveLabel: 'Save', onSave: saveEdit, width: '800px'">
    <!-- ko if: errorMsg --><div class="rm-alert rm-alert--error" data-bind="text: errorMsg"></div><!-- /ko -->
    <div class="rm-form-grid">
      <div class="re-field">
        <label class="re-label">Code <span class="re-req">*</span></label>
        <input class="re-input re-input--mono" data-bind="value: fCode, enable: !editId()" placeholder="SECTOR_TOURISM">
      </div>
      <div class="re-field">
        <label class="re-label">Name <span class="re-req">*</span></label>
        <input class="re-input" data-bind="value: fName" placeholder="Tourism Sector Only">
      </div>
      <div class="re-field">
        <label class="re-label">Name (Arabic)</label>
        <input class="re-input" dir="rtl" data-bind="value: fNameAr">
      </div>
      <div class="re-field">
        <label class="re-label">Description <span class="re-req">*</span></label>
        <input class="re-input" data-bind="value: fDesc"
               placeholder="What data this profile limits a user to">
      </div>

      <div class="re-field rm-fg-span">
        <label class="re-label">Data scope
          (<span data-bind="text: scopes().length"></span> rows)</label>
        <div class="rm-chipbar" style="margin-bottom:10px">
          <!-- ko foreach: scopes -->
          <span class="rm-chip">
            <b data-bind="text: typeName"></b>
            <span data-bind="text: label || objectKey"></span>
            <!-- ko if: includeChildren === 'Y' --><span class="rm-sc-pill">+children</span><!-- /ko -->
            <button class="x" data-bind="click: $parent.removeScope.bind($parent, $data)">&times;</button>
          </span>
          <!-- /ko -->
          <!-- ko if: scopes().length === 0 -->
          <span class="rm-sc-note">No scope rows — this profile restricts nothing yet.</span>
          <!-- /ko -->
        </div>

        <div class="rm-inline-form">
          <div style="flex:0 0 190px">
            <label class="re-label">Dimension</label>
            <select class="re-input" data-bind="options: objectTypes, optionsText: 'nameEn', optionsValue: 'code',
                    optionsCaption: 'Choose…', value: newDim"></select>
          </div>
          <div style="flex:1 1 220px">
            <label class="re-label">Search values</label>
            <input class="re-input" data-bind="value: lovSearch, valueUpdate: 'input', enable: newDim"
                   placeholder="Type to filter…">
          </div>
          <!-- ko if: newDimMeta() && newDimMeta().hierarchy !== 'NONE' -->
          <div style="flex:0 0 150px">
            <label class="re-label">&nbsp;</label>
            <div class="re-toggle-row" data-bind="click: toggleChildren">
              <span class="rm-status" data-bind="text: newChildren() ? 'With children' : 'Value only',
                    css: { 'rm-status--on': newChildren(), 'rm-status--off': !newChildren() }"></span>
            </div>
          </div>
          <!-- /ko -->
        </div>
        <!-- ko if: newDim -->
        <div class="re-perm-grid" style="max-height:220px; overflow-y:auto; margin-top:8px">
          <!-- ko if: lovLoading --><div class="rm-spinner-sm"></div><!-- /ko -->
          <!-- ko foreach: lovItems -->
          <div class="re-perm-item" data-bind="click: $parent.addScope.bind($parent, $data)">
            <div class="re-perm-info">
              <div class="re-perm-name" data-bind="text: label"></div>
              <span class="re-perm-code" data-bind="text: key"></span>
            </div>
          </div>
          <!-- /ko -->
        </div>
        <!-- /ko -->
      </div>
    </div>
    <!-- ko if: editId -->
    <button class="rm-danger-link" style="margin-top:18px" data-bind="click: askDeactivate">
      Deactivate this profile&hellip;
    </button>
    <!-- /ko -->
  </edit-drawer>

  <!-- Delete confirm -->
  <!-- ko if: showDeleteConfirm() -->
  <div class="rm-modal-backdrop">
    <div class="rm-modal">
      <div class="rm-modal-icon">&#9888;</div>
      <h3 class="rm-modal-title">Deactivate Profile</h3>
      <p class="rm-modal-body">
        Deactivate <strong data-bind="text: deleteTarget() && deleteTarget().name"></strong>?
        Users assigned it become unrestricted on its dimensions.
      </p>
      <div class="rm-modal-actions">
        <button class="rm-modal-cancel" data-bind="click: cancelDelete">Cancel</button>
        <button class="rm-modal-confirm" data-bind="click: doDelete">Deactivate</button>
      </div>
    </div>
  </div>
  <!-- /ko -->

</div>
