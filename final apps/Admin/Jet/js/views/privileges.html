<div class="rm-page">

  <div class="rm-page-head">
    <div>
      <security-info params="module: 'ADMIN', page: 'privileges'"></security-info>
      <h1 class="rm-title">Privileges</h1>
      <p class="rm-subtitle" data-bind="text: loading() ? 'Loading…' : total() + ' privilege' + (total() === 1 ? '' : 's') + ' — every secured page, button and action maps to one. Click a row to edit.'"></p>
    </div>
    <button class="rm-btn-add" data-bind="click: addPrivilege">
      <span class="rm-btn-plus">+</span> New Privilege
    </button>
  </div>

  <!-- ko if: okMsg -->
  <div class="rm-alert rm-alert--success" data-bind="text: okMsg"></div>
  <!-- /ko -->
  <!-- ko if: errorMsg() && !showEdit() -->
  <div class="rm-alert rm-alert--error" data-bind="text: errorMsg"></div>
  <!-- /ko -->

  <!-- ko if: loading() -->
  <div class="rm-skeleton-rows">
    <div class="rm-skeleton-row"></div><div class="rm-skeleton-row"></div>
    <div class="rm-skeleton-row"></div><div class="rm-skeleton-row"></div>
  </div>
  <!-- /ko -->

  <!-- ko ifnot: loading() -->
  <div class="rm-ir-panel" data-bind="event: { click: gridClick }">
    <interactive-report params="reportCode: 'SEC_PRIVILEGES', section: '',
                                data: irData, isAdmin: false, layoutsApi: null"></interactive-report>
  </div>
  <!-- /ko -->

  <!-- Editor drawer -->
  <edit-drawer params="open: showEdit, vm: $vm, title: drawerTitle,
                       saveLabel: saving() ? 'Saving…' : 'Save',
                       onSave: saveEdit, width: '640px'">
    <!-- ko if: errorMsg -->
    <div class="rm-alert rm-alert--error" data-bind="text: errorMsg"></div>
    <!-- /ko -->
    <div class="rm-form-grid">
      <div class="re-field">
        <label class="re-label">Code <span class="re-req">*</span></label>
        <input class="re-input re-input--mono" data-bind="value: fCode, enable: !editId()"
               placeholder="GL_VIEW_BUDGET_UTILIZATION">
      </div>
      <div class="re-field">
        <label class="re-label">Module</label>
        <select class="re-input" data-bind="options: modules, optionsCaption: 'Platform-wide', value: fModule"></select>
      </div>
      <div class="re-field">
        <label class="re-label">Name <span class="re-req">*</span></label>
        <input class="re-input" data-bind="value: fName" placeholder="View Budget Utilization">
        <span class="re-hint">Must start with a verb &mdash; View, Edit, Delete, Run, Manage&hellip;</span>
      </div>
      <div class="re-field">
        <label class="re-label">Name (Arabic)</label>
        <input class="re-input" dir="rtl" data-bind="value: fNameAr">
      </div>
      <div class="re-field">
        <label class="re-label">Action type</label>
        <select class="re-input" data-bind="value: fAction">
          <option>VIEW</option><option>CREATE</option><option>EDIT</option><option>DELETE</option>
          <option>APPROVE</option><option>EXPORT</option><option>CONFIGURE</option><option>ADMIN</option>
        </select>
      </div>
      <div class="re-field rm-fg-span">
        <label class="re-label">Description <span class="re-req">*</span></label>
        <textarea class="re-textarea" rows="3" data-bind="value: fDesc"
                  placeholder="What this privilege allows, in words an end user understands"></textarea>
      </div>
    </div>
    <!-- ko if: editId -->
    <button class="rm-danger-link" style="margin-top:18px" data-bind="click: askDeactivate">
      Deactivate this privilege&hellip;
    </button>
    <!-- /ko -->
  </edit-drawer>

  <!-- Delete confirm -->
  <!-- ko if: showDeleteConfirm() -->
  <div class="rm-modal-backdrop">
    <div class="rm-modal">
      <div class="rm-modal-icon">&#9888;</div>
      <h3 class="rm-modal-title">Deactivate Privilege</h3>
      <p class="rm-modal-body">
        Deactivate <strong data-bind="text: deleteTarget() && deleteTarget().name"></strong>?
        It disappears from every role's effective privileges immediately.
      </p>
      <div class="rm-modal-actions">
        <button class="rm-modal-cancel" data-bind="click: cancelDelete">Cancel</button>
        <button class="rm-modal-confirm" data-bind="click: doDelete">Deactivate</button>
      </div>
    </div>
  </div>
  <!-- /ko -->

</div>
