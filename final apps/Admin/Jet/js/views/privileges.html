<div class="rm-page">

  <div class="rm-page-head">
    <div>
      <security-info params="module: 'ADMIN', page: 'privileges'"></security-info>
      <h1 class="rm-title">Privileges</h1>
      <p class="rm-subtitle" data-bind="text: loading() ? 'Loading…' : total() + ' privilege' + (total() === 1 ? '' : 's') + ' — every secured page, button and action maps to one'"></p>
    </div>
    <button class="rm-btn-add" data-bind="click: addPrivilege">
      <span class="rm-btn-plus">+</span> New Privilege
    </button>
  </div>

  <!-- ko if: okMsg -->
  <div class="rm-alert rm-alert--success" data-bind="text: okMsg"></div>
  <!-- /ko -->
  <!-- ko if: errorMsg() && !showEdit() -->
  <div class="rm-alert rm-alert--error" data-bind="text: errorMsg"></div>
  <!-- /ko -->

  <div class="rm-toolbar">
    <div class="rm-search-wrap">
      <span class="rm-search-icon">&#9906;</span>
      <input class="rm-search" type="text" placeholder="Search by code or name&hellip;"
             data-bind="value: searchTerm, valueUpdate: 'input', event: { keyup: function (d, e) { if (e.keyCode === 13) search(); return true; } }">
    </div>
    <select class="re-input" style="max-width:180px"
            data-bind="options: modules, optionsCaption: 'All modules', value: moduleFilter, event: { change: search }"></select>
  </div>

  <!-- ko if: loading() -->
  <div class="rm-skeleton-rows">
    <div class="rm-skeleton-row"></div><div class="rm-skeleton-row"></div>
    <div class="rm-skeleton-row"></div><div class="rm-skeleton-row"></div>
  </div>
  <!-- /ko -->

  <!-- ko ifnot: loading() -->
  <div class="rm-table-panel">
    <table class="rm-table">
      <thead>
        <tr>
          <th>Privilege</th>
          <th>Code</th>
          <th>Module</th>
          <th>Action</th>
          <th>Groups</th>
          <th>Roles</th>
          <th>Status</th>
          <th style="width:80px"></th>
        </tr>
      </thead>
      <tbody>
        <!-- ko foreach: items -->
        <tr class="rm-row">
          <td class="rm-cell-name" data-bind="text: name"></td>
          <td><code class="rm-code-badge" data-bind="text: code"></code></td>
          <td data-bind="text: $data.module || 'Platform'"></td>
          <td><span class="rm-sc-pill" data-bind="text: actionType"></span></td>
          <td data-bind="text: groupCount"></td>
          <td data-bind="text: roleCount"></td>
          <td>
            <!-- ko if: isActive === 'Y' --><span class="rm-status rm-status--on">Active</span><!-- /ko -->
            <!-- ko ifnot: isActive === 'Y' --><span class="rm-status rm-status--off">Inactive</span><!-- /ko -->
          </td>
          <td class="rm-cell-actions">
            <button class="rm-action-btn rm-action-btn--edit" title="Edit privilege"
                    data-bind="click: $parent.editPrivilege.bind($parent, $data)">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            </button>
            <button class="rm-action-btn rm-action-btn--del" title="Deactivate privilege"
                    data-bind="click: $parent.confirmDelete.bind($parent, $data)">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
            </button>
          </td>
        </tr>
        <!-- /ko -->
        <!-- ko if: items().length === 0 -->
        <tr><td colspan="8">
          <div class="rm-empty"><div class="rm-empty-icon">&#8856;</div><div>No privileges match</div></div>
        </td></tr>
        <!-- /ko -->
      </tbody>
    </table>
  </div>
  <div class="rm-toolbar" style="justify-content:flex-end; gap:8px">
    <button class="rm-btn-sm" data-bind="click: prevPage, enable: page() > 0">&#8249; Prev</button>
    <span class="rm-kv" data-bind="text: 'Page ' + (page() + 1) + ' of ' + pageCount()"></span>
    <button class="rm-btn-sm" data-bind="click: nextPage, enable: page() + 1 < pageCount()">Next &#8250;</button>
  </div>
  <!-- /ko -->

  <!-- Editor modal -->
  <!-- ko if: showEdit() -->
  <div class="rm-modal-backdrop">
    <div class="rm-modal" style="max-width:520px; text-align:start">
      <h3 class="rm-modal-title" data-bind="text: editId() ? 'Edit Privilege' : 'New Privilege'"></h3>
      <!-- ko if: errorMsg -->
      <div class="rm-alert rm-alert--error" data-bind="text: errorMsg"></div>
      <!-- /ko -->
      <div class="re-field">
        <label class="re-label">Code <span class="re-req">*</span></label>
        <input class="re-input re-input--mono" data-bind="value: fCode, enable: !editId()"
               placeholder="GL_VIEW_BUDGET_UTILIZATION">
      </div>
      <div class="re-field">
        <label class="re-label">Name <span class="re-req">*</span></label>
        <input class="re-input" data-bind="value: fName" placeholder="View Budget Utilization">
        <span class="re-hint">Must start with a verb &mdash; View, Edit, Delete, Run, Manage&hellip;</span>
      </div>
      <div class="re-field">
        <label class="re-label">Name (Arabic)</label>
        <input class="re-input" dir="rtl" data-bind="value: fNameAr">
      </div>
      <div class="re-field re-field--inline">
        <div style="flex:1">
          <label class="re-label">Module</label>
          <select class="re-input" data-bind="options: modules, optionsCaption: 'Platform-wide', value: fModule"></select>
        </div>
        <div style="flex:1">
          <label class="re-label">Action type</label>
          <select class="re-input" data-bind="value: fAction">
            <option>VIEW</option><option>CREATE</option><option>EDIT</option><option>DELETE</option>
            <option>APPROVE</option><option>EXPORT</option><option>CONFIGURE</option><option>ADMIN</option>
          </select>
        </div>
      </div>
      <div class="re-field">
        <label class="re-label">Description</label>
        <textarea class="re-textarea" rows="2" data-bind="value: fDesc"></textarea>
      </div>
      <div class="rm-modal-actions">
        <button class="rm-modal-cancel" data-bind="click: cancelEdit">Cancel</button>
        <button class="rm-modal-confirm" style="background:var(--vault-amber)"
                data-bind="click: saveEdit, enable: !saving(), text: saving() ? 'Saving…' : 'Save'"></button>
      </div>
    </div>
  </div>
  <!-- /ko -->

  <!-- Delete confirm -->
  <!-- ko if: showDeleteConfirm() -->
  <div class="rm-modal-backdrop">
    <div class="rm-modal">
      <div class="rm-modal-icon">&#9888;</div>
      <h3 class="rm-modal-title">Deactivate Privilege</h3>
      <p class="rm-modal-body">
        Deactivate <strong data-bind="text: deleteTarget() && deleteTarget().name"></strong>?
        It disappears from every role's effective privileges immediately.
      </p>
      <div class="rm-modal-actions">
        <button class="rm-modal-cancel" data-bind="click: cancelDelete">Cancel</button>
        <button class="rm-modal-confirm" data-bind="click: doDelete">Deactivate</button>
      </div>
    </div>
  </div>
  <!-- /ko -->

</div>
