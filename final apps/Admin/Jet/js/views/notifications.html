<div class="page-wrap">
  <div class="page-header-row">
    <div class="page-header">
      <div class="page-title" data-bind="text: $root.t('nav.notifications')"></div>
      <div class="page-subtitle"><span class="mono" data-bind="text: unreadCount()"></span> <span data-bind="text: $root.t('notif.unreadSuffix')"></span></div>
    </div>
    <button class="btn btn-secondary" data-bind="click: markAllRead, enable: unreadCount() > 0">
      ✓ <span data-bind="text: $root.t('notif.markAll')"></span>
    </button>
  </div>

  <div class="view-toolbar">
    <button class="btn btn-secondary btn-sm" data-bind="click: () => filter('ALL'),    css: { 'btn-primary': filter() === 'ALL' }"><span data-bind="text: $root.t('common.all')"></span></button>
    <button class="btn btn-secondary btn-sm" data-bind="click: () => filter('UNREAD'), css: { 'btn-primary': filter() === 'UNREAD' }"><span data-bind="text: $root.t('notif.unread')"></span></button>
  </div>

  <div class="notif-list">
    <!-- ko foreach: filteredNotifications() -->
    <div class="notif-item" data-bind="css: { 'notif-item--unread': isRead === 'N' }, click: $parent.markRead.bind($parent, $data)">
      <!-- ko if: isRead === 'N' -->
      <div class="notif-dot-indicator"></div>
      <!-- /ko -->
      <!-- ko ifnot: isRead === 'N' -->
      <div style="width:8px;flex-shrink:0"></div>
      <!-- /ko -->
      <div style="font-size:18px" data-bind="html: $parent.getTypeIcon(type)"></div>
      <div style="flex:1">
        <div class="notif-title" data-bind="text: $data.title || ''"></div>
        <div class="notif-body"  data-bind="text: $data.body || ''"></div>
        <div class="notif-time"  data-bind="text: $parent.formatTime($data.createdAt)"></div>
      </div>
      <!-- ko if: isRead === 'N' -->
      <span class="badge badge--pending" style="font-size:10px"><span data-bind="text: $root.t('notif.unread')"></span></span>
      <!-- /ko -->
    </div>
    <!-- /ko -->
    <!-- ko if: filteredNotifications().length === 0 -->
    <div class="empty-state">
      <div class="empty-state__icon">&#128276;</div>
      <div class="empty-state__msg" data-bind="text: $root.t('notif.none')"></div>
    </div>
    <!-- /ko -->
  </div>
</div>
