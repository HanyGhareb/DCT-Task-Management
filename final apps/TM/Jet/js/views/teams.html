<div class="page">
  <div class="page-header-row">
    <h1 class="page-title" data-bind="text: t('tm.teams.title')"></h1>
    <div class="page-actions">
      <button class="btn btn-primary" data-bind="click: newTeam, text: '+ ' + t('tm.teams.new')"></button>
    </div>
  </div>

  <!-- search + filters -->
  <div class="view-toolbar">
    <input class="search-box" type="text" data-bind="textInput: fSearch, attr:{placeholder: t('tm.teams.search')}, event:{ keyup: function(d,e){ if(e.keyCode===13) load(); return true; } }">
    <select class="form-control form-control--sm" style="max-width:160px" data-bind="value: fType, event:{change: load}">
      <option value="" data-bind="text: t('tm.teams.allTypes')"></option>
      <!-- ko foreach: types --><option data-bind="value: code, text: nameEn"></option><!-- /ko -->
    </select>
    <select class="form-control form-control--sm" style="max-width:160px" data-bind="value: fClass, event:{change: load}">
      <option value="" data-bind="text: t('tm.teams.allClasses')"></option>
      <!-- ko foreach: classes --><option data-bind="value: code, text: nameEn"></option><!-- /ko -->
    </select>
    <select class="form-control form-control--sm" style="max-width:160px" data-bind="value: fStatus, event:{change: load}">
      <option value="" data-bind="text: t('tm.teams.allStatuses')"></option>
      <!-- ko foreach: statuses --><option data-bind="value: code, text: nameEn"></option><!-- /ko -->
    </select>
    <label class="tm-mine-toggle">
      <input type="checkbox" data-bind="checked: fMine, event:{change: load}"> <span data-bind="text: t('tm.teams.mine')"></span>
    </label>
    <span class="toolbar-spacer"></span>
    <!-- ko ifnot: loading --><span class="tm-result-count" data-bind="text: teams().length + ' ' + t('tm.teams.results')"></span><!-- /ko -->
  </div>

  <!-- ko if: loading -->
  <div class="muted" data-bind="text: t('tm.common.loading')"></div>
  <!-- /ko -->

  <!-- ko ifnot: loading -->
  <!-- ko if: teams().length === 0 -->
  <div class="empty-state" data-bind="text: t('tm.teams.empty')"></div>
  <!-- /ko -->

  <!-- ko if: teams().length > 0 -->
  <div class="data-table-wrap">
    <table class="data-table">
      <thead>
        <tr>
          <th data-bind="text: t('tm.teams.col.code')"></th>
          <th data-bind="text: t('tm.teams.col.name')"></th>
          <th data-bind="text: t('tm.teams.col.typeClass')"></th>
          <th data-bind="text: t('tm.teams.col.members')"></th>
          <th data-bind="text: t('tm.teams.col.tasks')"></th>
          <th data-bind="text: t('tm.teams.col.health')"></th>
          <th data-bind="text: t('tm.teams.col.status')"></th>
          <th style="width:80px;"></th>
        </tr>
      </thead>
      <tbody data-bind="foreach: teams">
        <tr class="tm-team-row" data-bind="click: function(){ $vm.open($data); }">
          <td><span class="tm-team-code" data-bind="text: $data.teamCode || '—'"></span></td>
          <td>
            <div class="tm-team-name" data-bind="text: nameEn"></div>
            <!-- ko if: $data.nameAr --><div class="tm-team-name-ar" dir="rtl" data-bind="text: $data.nameAr"></div><!-- /ko -->
          </td>
          <td><span class="tm-team-tc" data-bind="text: $data.typeClass || '—'"></span></td>
          <td><span class="avatar avatar--sm badge--brand" data-bind="text: $data.memberCount || 0"></span></td>
          <td>
            <span data-bind="text: $data.taskCount || 0"></span>
            <!-- ko if: ($data.taskOverdue || 0) > 0 --> <span class="is-overdue" data-bind="text: '(' + $data.taskOverdue + ' ' + $vm.t('tm.teams.over') + ')'"></span><!-- /ko -->
          </td>
          <td><span data-bind="css: $vm.ragClass(health), text: $data.healthLabel || $data.health || '—'"></span></td>
          <td><span class="badge" data-bind="css: $vm.statusClass($data.status), text: $data.statusName || $data.status || '—'"></span></td>
          <td class="cell-actions" style="text-align:end;" data-bind="click: function(){ return true; }, clickBubble: false">
            <button class="btn btn-xs" data-bind="click: function(){ $vm.editTeam($data); }, text: $vm.t('tm.action.edit')"></button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  <!-- /ko -->
  <!-- /ko -->

  <!-- create / edit team — shared <edit-drawer> slide-in -->
  <edit-drawer params="open: showForm, vm: $vm,
                       title: formTitle,
                       saveLabel: formSaveLabel,
                       cancelLabel: t('tm.action.cancel'),
                       onSave: save, width: '620px'">
    <div class="form-grid">
      <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.nameEn')"></label><input class="form-control" data-bind="textInput: fmName"></div>
      <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.nameAr')"></label><input class="form-control" dir="rtl" data-bind="textInput: fmNameAr"></div>
      <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.type')"></label>
        <select class="form-control" data-bind="value: fmType, options: types, optionsValue:'code', optionsText:'nameEn'"></select></div>
      <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.class')"></label>
        <select class="form-control" data-bind="value: fmClass, options: classes, optionsValue:'code', optionsText:'nameEn'"></select></div>
      <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.category')"></label>
        <select class="form-control" data-bind="value: fmCat, options: cats, optionsValue:'code', optionsText:'nameEn', optionsCaption:'—'"></select></div>
      <!-- ko if: editId -->
      <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.status')"></label>
        <select class="form-control" data-bind="value: fmStatus, options: statuses, optionsValue:'code', optionsText:'nameEn'"></select></div>
      <!-- /ko -->
      <div class="form-group form-group--full"><label class="form-label" data-bind="text: t('tm.field.objective')"></label><textarea class="form-control" rows="2" data-bind="textInput: fmObj"></textarea></div>
    </div>
  </edit-drawer>
</div>
