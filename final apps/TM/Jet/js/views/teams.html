<div class="page">
  <div class="page-header-row">
    <h1 class="page-title" data-bind="text: t('tm.teams.title')"></h1>
    <div class="page-actions">
      <button class="btn btn-primary" data-bind="click: newTeam, text: '+ ' + t('tm.teams.new')"></button>
    </div>
  </div>

  <!-- filters -->
  <div class="filter-bar" style="display:flex; gap:8px; flex-wrap:wrap; margin-bottom:14px;">
    <input class="input" type="text" data-bind="textInput: fSearch, attr:{placeholder: t('tm.teams.search')}, event:{ keyup: function(d,e){ if(e.keyCode===13) load(); return true; } }" style="max-width:220px">
    <select class="input" data-bind="value: fType, event:{change: load}">
      <option value="" data-bind="text: t('tm.teams.allTypes')"></option>
      <!-- ko foreach: types --><option data-bind="value: code, text: nameEn"></option><!-- /ko -->
    </select>
    <select class="input" data-bind="value: fClass, event:{change: load}">
      <option value="" data-bind="text: t('tm.teams.allClasses')"></option>
      <!-- ko foreach: classes --><option data-bind="value: code, text: nameEn"></option><!-- /ko -->
    </select>
    <select class="input" data-bind="value: fStatus, event:{change: load}">
      <option value="" data-bind="text: t('tm.teams.allStatuses')"></option>
      <!-- ko foreach: statuses --><option data-bind="value: code, text: nameEn"></option><!-- /ko -->
    </select>
    <label style="display:flex; align-items:center; gap:6px; font-size:13px;">
      <input type="checkbox" data-bind="checked: fMine, event:{change: load}"> <span data-bind="text: t('tm.teams.mine')"></span>
    </label>
  </div>

  <!-- ko if: loading -->
  <div class="muted" data-bind="text: t('tm.common.loading')"></div>
  <!-- /ko -->

  <!-- ko ifnot: loading -->
  <!-- ko if: teams().length === 0 -->
  <div class="empty-state" data-bind="text: t('tm.teams.empty')"></div>
  <!-- /ko -->

  <div class="team-grid">
    <!-- ko foreach: teams -->
    <div class="team-card" data-bind="click: function(){ $vm.open($data); }">
      <div style="display:flex; justify-content:space-between; align-items:center;">
        <span class="team-card__code" data-bind="text: teamCode"></span>
        <span data-bind="css: $vm.ragClass(health), text: health"></span>
      </div>
      <div class="team-card__name" data-bind="text: nameEn"></div>
      <div style="font-size:12px; color:#6a747e;">
        <span data-bind="text: type"></span> · <span data-bind="text: $data['class']"></span>
        <!-- ko if: category --> · <span data-bind="text: category"></span><!-- /ko -->
      </div>
      <div class="team-card__stats">
        <div class="team-card__stat"><b data-bind="text: memberCount"></b><span data-bind="text: $vm.t('tm.teams.members')"></span></div>
        <div class="team-card__stat"><b data-bind="text: taskCount"></b><span data-bind="text: $vm.t('tm.teams.tasks')"></span></div>
        <div class="team-card__stat"><b data-bind="text: objectiveCount"></b><span data-bind="text: $vm.t('tm.teams.objectives')"></span></div>
        <div class="team-card__stat"><b class="is-overdue" data-bind="text: taskOverdue"></b><span data-bind="text: $vm.t('tm.teams.overdue')"></span></div>
      </div>
    </div>
    <!-- /ko -->
  </div>
  <!-- /ko -->

  <!-- create modal -->
  <!-- ko if: showForm -->
  <div class="modal-overlay" data-bind="click: cancel"></div>
  <div class="modal-box" style="max-width:560px" data-bind="click: function(){ return true; }">
    <div class="modal-header">
      <div class="modal-title" data-bind="text: t('tm.teams.new')"></div>
      <div class="region-actions">
        <button class="btn btn-sm" data-bind="click: cancel, text: t('tm.action.cancel')"></button>
        <button class="btn btn-sm btn-primary" data-bind="click: save, text: t('tm.action.create')"></button>
      </div>
    </div>
    <div class="modal-body">
      <div class="form-grid">
        <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.nameEn')"></label><input class="form-control" data-bind="textInput: fmName"></div>
        <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.nameAr')"></label><input class="form-control" dir="rtl" data-bind="textInput: fmNameAr"></div>
        <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.type')"></label>
          <select class="form-control" data-bind="value: fmType, options: types, optionsValue:'code', optionsText:'nameEn'"></select></div>
        <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.class')"></label>
          <select class="form-control" data-bind="value: fmClass, options: classes, optionsValue:'code', optionsText:'nameEn'"></select></div>
        <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.category')"></label>
          <select class="form-control" data-bind="value: fmCat, options: cats, optionsValue:'code', optionsText:'nameEn', optionsCaption:'—'"></select></div>
        <div class="form-group form-group--full"><label class="form-label" data-bind="text: t('tm.field.objective')"></label><textarea class="form-control" rows="2" data-bind="textInput: fmObj"></textarea></div>
      </div>
    </div>
  </div>
  <!-- /ko -->
</div>
