<div class="page">
  <!-- ── Page header ─────────────────────────────────────────────────────── -->
  <div class="page-header page-header-row">
    <div>
      <a href="#" class="link-muted" data-bind="text: '‹ ' + t('tm.detail.back'), click: function(){ back(); return false; }"></a>
      <h1 class="page-title" style="margin-top:4px;" data-bind="text: team().nameEn || t('tm.detail.title')"></h1>
      <div class="page-subtitle">
        <span data-bind="text: team().teamCode"></span>
        <!-- ko if: team().type --> &middot; <span data-bind="text: team().type"></span><!-- /ko -->
        <!-- ko if: team()['class'] --> &middot; <span data-bind="text: team()['class']"></span><!-- /ko -->
        <span class="tm-rag" data-bind="css: ragClass(team().health), text: team().health" style="margin-inline-start:8px;"></span>
      </div>
    </div>
    <div class="page-actions">
      <button class="btn btn-primary" data-bind="visible: canEditTeam, click: editTeam, text: t('tm.detail.editTeam')"></button>
    </div>
  </div>

  <!-- ── Tabs ────────────────────────────────────────────────────────────── -->
  <div class="tm-tabs">
    <!-- ko foreach: tabs -->
    <div data-bind="css: $vm.tabClass($data.key), click: function(){ $vm.setTab($data.key); }, text: $vm.t($data.label)"></div>
    <!-- /ko -->
  </div>

  <!-- ══ OVERVIEW ══════════════════════════════════════════════════════════ -->
  <!-- ko if: tab() === 'overview' -->
  <div class="kpi-row">
    <div class="kpi"><div class="kpi__n" data-bind="text: team().memberCount || 0"></div><div class="kpi__l" data-bind="text: t('tm.teams.members')"></div></div>
    <div class="kpi"><div class="kpi__n" data-bind="text: team().objectiveCount || 0"></div><div class="kpi__l" data-bind="text: t('tm.teams.objectives')"></div></div>
    <div class="kpi"><div class="kpi__n" data-bind="text: team().taskCount || 0"></div><div class="kpi__l" data-bind="text: t('tm.teams.tasks')"></div></div>
    <div class="kpi"><div class="kpi__n is-overdue" data-bind="text: team().taskOverdue || 0"></div><div class="kpi__l" data-bind="text: t('tm.teams.overdue')"></div></div>
    <div class="kpi"><div class="kpi__n" data-bind="text: team().openRisks || 0"></div><div class="kpi__l" data-bind="text: t('tm.kpi.openRisks')"></div></div>
  </div>

  <div class="card">
    <div class="section-heading-row">
      <div class="section-heading" data-bind="text: t('tm.detail.teamInfo')"></div>
      <div class="region-actions">
        <button class="btn btn-sm btn-primary" data-bind="visible: canEditTeam, click: editTeam, text: t('tm.action.edit')"></button>
      </div>
    </div>
    <dl class="def-grid">
      <div class="def"><dt data-bind="text: t('tm.field.code')"></dt><dd data-bind="text: team().teamCode || '—'"></dd></div>
      <div class="def"><dt data-bind="text: t('tm.field.status')"></dt><dd><span class="badge" data-bind="text: team().status || '—'"></span></dd></div>
      <div class="def"><dt data-bind="text: t('tm.field.nameEn')"></dt><dd data-bind="text: team().nameEn || '—'"></dd></div>
      <div class="def"><dt data-bind="text: t('tm.field.nameAr')"></dt><dd dir="rtl" data-bind="text: team().nameAr || '—'"></dd></div>
      <div class="def"><dt data-bind="text: t('tm.field.type')"></dt><dd data-bind="text: team().type || '—'"></dd></div>
      <div class="def"><dt data-bind="text: t('tm.field.class')"></dt><dd data-bind="text: team()['class'] || '—'"></dd></div>
      <div class="def"><dt data-bind="text: t('tm.field.category')"></dt><dd data-bind="text: team().category || '—'"></dd></div>
      <div class="def"><dt data-bind="text: t('tm.field.health')"></dt><dd><span class="tm-rag" data-bind="css: ragClass(team().health), text: team().health || '—'"></span></dd></div>
      <div class="def"><dt data-bind="text: t('tm.field.leader')"></dt><dd data-bind="text: team().leaderName || '—'"></dd></div>
      <div class="def"><dt data-bind="text: t('tm.field.org')"></dt><dd data-bind="text: team().orgName || '—'"></dd></div>
      <div class="def"><dt data-bind="text: t('tm.field.startDate')"></dt><dd data-bind="text: team().startDate || '—'"></dd></div>
      <div class="def"><dt data-bind="text: t('tm.field.endDate')"></dt><dd data-bind="text: team().endDate || '—'"></dd></div>
      <div class="def def--full"><dt data-bind="text: t('tm.field.objective')"></dt><dd data-bind="text: team().objective || '—'"></dd></div>
      <div class="def def--full"><dt data-bind="text: t('tm.field.purpose')"></dt><dd data-bind="text: team().purpose || '—'"></dd></div>
    </dl>
  </div>
  <!-- /ko -->

  <!-- ══ MEMBERS ═══════════════════════════════════════════════════════════ -->
  <!-- ko if: tab() === 'members' -->
  <div class="section-heading-row">
    <div class="section-heading" data-bind="text: t('tm.tab.members')"></div>
    <div class="region-actions">
      <button class="btn btn-sm btn-primary" data-bind="click: function(){ openAddMember(); }, text: '+ ' + t('tm.detail.addMember')"></button>
    </div>
  </div>

  <!-- add member form -->
  <!-- ko if: addingMember() -->
  <div class="card" style="margin-bottom:14px;">
    <div class="form-grid form-grid--3">
      <div class="form-group">
        <label class="form-label" data-bind="text: t('tm.field.user')"></label>
        <select class="form-control" data-bind="value: mUser, options: assignableUsers, optionsValue:'userId', optionsText:'name', optionsCaption: t('tm.detail.selectUser')"></select>
      </div>
      <div class="form-group">
        <label class="form-label" data-bind="text: t('tm.field.role')"></label>
        <select class="form-control" data-bind="value: mRole, options: teamRoles, optionsValue:'code', optionsText:'nameEn'"></select>
      </div>
      <div class="form-group">
        <label class="form-label" data-bind="text: t('tm.field.title')"></label>
        <input class="form-control" data-bind="textInput: mTitle">
      </div>
    </div>
    <div class="region-actions" style="margin-top:14px;">
      <button class="btn btn-sm" data-bind="click: cancelAddMember, text: t('tm.action.cancel')"></button>
      <button class="btn btn-sm btn-primary" data-bind="click: saveMember, text: t('tm.action.add')"></button>
    </div>
  </div>
  <!-- /ko -->

  <!-- ko if: members().length === 0 --><div class="empty-state" data-bind="text: t('tm.detail.noMembers')"></div><!-- /ko -->
  <!-- ko if: members().length > 0 -->
  <div class="data-table-wrap">
    <table class="data-table">
      <thead><tr>
        <th data-bind="text: t('tm.field.name')"></th><th>Email</th>
        <th data-bind="text: t('tm.field.role')"></th><th data-bind="text: t('tm.field.title')"></th>
        <th style="width:90px;"></th>
      </tr></thead>
      <tbody data-bind="foreach: members">
        <tr>
          <td>
            <div class="tm-person">
              <span class="avatar" data-bind="text: $vm.initials(name)"></span>
              <span data-bind="text: name"></span>
              <!-- ko if: isLeader === 'Y' --><span class="badge badge--brand" data-bind="text: $vm.t('tm.detail.leaderBadge')"></span><!-- /ko -->
            </div>
          </td>
          <td class="muted" data-bind="text: $data.email || '—'"></td>
          <td>
            <select class="form-control form-control--sm" data-bind="value: roleCode, options: $vm.teamRoles, optionsValue:'code', optionsText:'nameEn', event:{ change: function(){ $vm.changeRole($data); } }, enable: $vm.canManageMembers"></select>
          </td>
          <td class="muted" data-bind="text: $data.title || '—'"></td>
          <td style="text-align:end;">
            <button class="btn btn-sm btn-icon-danger" title="Remove" data-bind="visible: $vm.canManageMembers, click: function(){ $vm.removeMember($data); }">&times;</button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  <!-- /ko -->
  <!-- /ko -->

  <!-- ══ OBJECTIVES ════════════════════════════════════════════════════════ -->
  <!-- ko if: tab() === 'objectives' -->
  <div class="section-heading-row">
    <div class="section-heading" data-bind="text: t('tm.tab.objectives')"></div>
    <div class="region-actions"><button class="btn btn-sm btn-primary" data-bind="click: function(){ openAdd('objective'); }, text: '+ ' + t('tm.detail.addObjective')"></button></div>
  </div>
  <!-- ko if: adding() === 'objective' -->
  <div class="card" style="margin-bottom:14px;">
    <div class="form-grid">
      <div class="form-group form-group--full"><label class="form-label" data-bind="text: t('tm.field.title')"></label><input class="form-control" data-bind="textInput: fTitle"></div>
      <div class="form-group form-group--full"><label class="form-label" data-bind="text: t('tm.field.description')"></label><textarea class="form-control" rows="2" data-bind="textInput: fDesc"></textarea></div>
      <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.status')"></label><select class="form-control" data-bind="value: fStatus, options: objStatuses, optionsValue:'code', optionsText:'nameEn'"></select></div>
      <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.dueDate')"></label><input class="form-control" type="date" data-bind="value: fDue"></div>
    </div>
    <div class="region-actions" style="margin-top:14px;">
      <button class="btn btn-sm" data-bind="click: cancelAdd, text: t('tm.action.cancel')"></button>
      <button class="btn btn-sm btn-primary" data-bind="click: saveAdd, text: t('tm.action.save')"></button>
    </div>
  </div>
  <!-- /ko -->
  <!-- ko if: objectives().length === 0 --><div class="empty-state" data-bind="text: t('tm.common.empty')"></div><!-- /ko -->
  <!-- ko if: objectives().length > 0 -->
  <div class="data-table-wrap"><table class="data-table">
    <thead><tr><th data-bind="text: t('tm.field.title')"></th><th data-bind="text: t('tm.field.progress')"></th><th data-bind="text: t('tm.detail.keyResults')"></th><th data-bind="text: t('tm.field.status')"></th><th data-bind="text: t('tm.field.dueDate')"></th><th></th></tr></thead>
    <tbody data-bind="foreach: objectives">
      <tr class="row-link" data-bind="click: function(){ $vm.openObjective($data); }">
        <td><span class="link-strong" data-bind="text: titleEn"></span><span class="muted" data-bind="text: $data.ownerName ? ' · ' + $data.ownerName : ''"></span></td>
        <td><div class="tm-prog"><div class="tm-prog__bar" data-bind="style:{ width: (progress||0)+'%' }"></div></div><span class="tm-prog__n" data-bind="text:(progress||0)+'%'"></span>
          <span class="badge badge--soft" data-bind="text: (progressMode||'AUTO')==='MANUAL' ? $vm.t('tm.detail.manual') : $vm.t('tm.detail.auto')"></span></td>
        <td class="muted"><span data-bind="text: (krCount||0)"></span><!-- ko if: krCount --><span data-bind="text: ' (' + (krAchieved||0) + ' ' + $vm.t('tm.detail.krAchieved') + ')'"></span><!-- /ko --></td>
        <td><span class="badge" data-bind="text: status"></span></td>
        <td class="muted" data-bind="text: $data.targetDate || '—'"></td>
        <td class="cell-actions" data-bind="click: function(){ return true; }, clickBubble: false">
          <button class="btn btn-xs" data-bind="click: function(){ $vm.openObjective($data); }, text: $vm.t('tm.action.manage')"></button>
          <button class="btn btn-xs btn-icon-danger" title="Remove" data-bind="click: function(){ $vm.removeObjective($data); }">&times;</button>
        </td>
      </tr>
    </tbody>
  </table></div>
  <!-- /ko -->
  <!-- /ko -->

  <!-- ══ TASKS (Kanban) ════════════════════════════════════════════════════ -->
  <!-- ko if: tab() === 'tasks' -->
  <div class="section-heading-row">
    <div class="section-heading" data-bind="text: t('tm.tab.tasks')"></div>
    <div class="region-actions"><button class="btn btn-sm btn-primary" data-bind="click: function(){ openAdd('task'); }, text: '+ ' + t('tm.detail.addTask')"></button></div>
  </div>
  <!-- ko if: adding() === 'task' -->
  <div class="card" style="margin-bottom:14px;">
    <div class="form-grid">
      <div class="form-group form-group--full"><label class="form-label" data-bind="text: t('tm.field.title')"></label><input class="form-control" data-bind="textInput: fTitle"></div>
      <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.priority')"></label><select class="form-control" data-bind="value: fPriority, options: priorities, optionsValue:'code', optionsText:'nameEn'"></select></div>
      <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.status')"></label><select class="form-control" data-bind="value: fStatus, options: taskStatuses, optionsValue:'code', optionsText:'nameEn'"></select></div>
      <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.dueDate')"></label><input class="form-control" type="date" data-bind="value: fDue"></div>
    </div>
    <div class="region-actions" style="margin-top:14px;">
      <button class="btn btn-sm" data-bind="click: cancelAdd, text: t('tm.action.cancel')"></button>
      <button class="btn btn-sm btn-primary" data-bind="click: saveAdd, text: t('tm.action.save')"></button>
    </div>
  </div>
  <!-- /ko -->
  <div class="kanban">
    <!-- ko foreach: KANBAN -->
    <div class="kanban-col" data-bind="event:{ dragover: function(d,e){ return $vm.onDragOver($data,e); }, drop: function(d,e){ return $vm.onDrop($data,e); } }">
      <div class="kanban-col__hd">
        <span data-bind="text: $vm.statusLabel($data)"></span>
        <span class="kanban-col__count" data-bind="text: $vm.colTasks($data).length"></span>
      </div>
      <!-- ko foreach: $vm.colTasks($data) -->
      <div class="kanban-card" draggable="true" data-bind="event:{ dragstart: function(d,e){ return $vm.onDragStart($data,e); } }, click: function(){ $vm.openTask($data); }">
        <div class="kanban-card__title" data-bind="text: title"></div>
        <div class="kanban-card__meta">
          <span class="prio" data-bind="css: $vm.prioClass(priority), text: priority"></span>
          <span data-bind="css:{ 'is-overdue': isOverdue==='Y' }, text: $data.dueDate || ''" style="font-size:11px;"></span>
        </div>
        <!-- ko if: assignees --><div class="kanban-card__assignees" data-bind="text: $data.assignees"></div><!-- /ko -->
      </div>
      <!-- /ko -->
    </div>
    <!-- /ko -->
  </div>
  <!-- /ko -->

  <!-- ══ DELIVERABLES ══════════════════════════════════════════════════════ -->
  <!-- ko if: tab() === 'deliverables' -->
  <div class="section-heading-row">
    <div class="section-heading" data-bind="text: t('tm.tab.deliverables')"></div>
    <div class="region-actions"><button class="btn btn-sm btn-primary" data-bind="click: function(){ openAdd('deliverable'); }, text: '+ ' + t('tm.detail.addDeliverable')"></button></div>
  </div>
  <!-- ko if: adding() === 'deliverable' -->
  <div class="card" style="margin-bottom:14px;">
    <div class="form-grid">
      <div class="form-group form-group--full"><label class="form-label" data-bind="text: t('tm.field.title')"></label><input class="form-control" data-bind="textInput: fTitle"></div>
      <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.type')"></label><select class="form-control" data-bind="value: fType, options: delivTypes, optionsValue:'code', optionsText:'nameEn'"></select></div>
      <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.status')"></label><select class="form-control" data-bind="value: fStatus, options: delivStatuses, optionsValue:'code', optionsText:'nameEn'"></select></div>
      <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.dueDate')"></label><input class="form-control" type="date" data-bind="value: fDue"></div>
    </div>
    <div class="region-actions" style="margin-top:14px;">
      <button class="btn btn-sm" data-bind="click: cancelAdd, text: t('tm.action.cancel')"></button>
      <button class="btn btn-sm btn-primary" data-bind="click: saveAdd, text: t('tm.action.save')"></button>
    </div>
  </div>
  <!-- /ko -->
  <!-- ko if: deliverables().length === 0 --><div class="empty-state" data-bind="text: t('tm.common.empty')"></div><!-- /ko -->
  <!-- ko if: deliverables().length > 0 -->
  <div class="data-table-wrap"><table class="data-table">
    <thead><tr><th data-bind="text: t('tm.field.title')"></th><th data-bind="text: t('tm.field.type')"></th><th data-bind="text: t('tm.field.status')"></th><th data-bind="text: t('tm.field.progress')"></th><th data-bind="text: t('tm.field.dueDate')"></th></tr></thead>
    <tbody data-bind="foreach: deliverables">
      <tr><td data-bind="text: titleEn"></td><td class="muted" data-bind="text: $data.type || '—'"></td><td><span class="badge" data-bind="text: status"></span></td><td data-bind="text: (progress||0)+'%'"></td><td data-bind="css:{'is-overdue': isOverdue==='Y'}, text: $data.dueDate || '—'"></td></tr>
    </tbody>
  </table></div>
  <!-- /ko -->
  <!-- /ko -->

  <!-- ══ RAID ══════════════════════════════════════════════════════════════ -->
  <!-- ko if: tab() === 'raid' -->
  <div class="section-heading-row">
    <div class="section-heading" data-bind="text: t('tm.tab.raid')"></div>
    <div class="region-actions"><button class="btn btn-sm btn-primary" data-bind="click: function(){ openAdd('raid'); }, text: '+ ' + t('tm.detail.addRaid')"></button></div>
  </div>
  <!-- ko if: adding() === 'raid' -->
  <div class="card" style="margin-bottom:14px;">
    <div class="form-grid">
      <div class="form-group form-group--full"><label class="form-label" data-bind="text: t('tm.field.title')"></label><input class="form-control" data-bind="textInput: fTitle"></div>
      <div class="form-group form-group--full"><label class="form-label" data-bind="text: t('tm.field.description')"></label><textarea class="form-control" rows="2" data-bind="textInput: fDesc"></textarea></div>
      <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.type')"></label><select class="form-control" data-bind="value: fType, options: logTypes, optionsValue:'code', optionsText:'nameEn'"></select></div>
      <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.severity')"></label><select class="form-control" data-bind="value: fPriority, options: severities, optionsValue:'code', optionsText:'nameEn'"></select></div>
      <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.status')"></label><select class="form-control" data-bind="value: fStatus, options: logStatuses, optionsValue:'code', optionsText:'nameEn'"></select></div>
    </div>
    <div class="region-actions" style="margin-top:14px;">
      <button class="btn btn-sm" data-bind="click: cancelAdd, text: t('tm.action.cancel')"></button>
      <button class="btn btn-sm btn-primary" data-bind="click: saveAdd, text: t('tm.action.save')"></button>
    </div>
  </div>
  <!-- /ko -->
  <!-- ko if: raid().length === 0 --><div class="empty-state" data-bind="text: t('tm.common.empty')"></div><!-- /ko -->
  <!-- ko if: raid().length > 0 -->
  <div class="data-table-wrap"><table class="data-table">
    <thead><tr><th data-bind="text: t('tm.field.type')"></th><th data-bind="text: t('tm.field.title')"></th><th data-bind="text: t('tm.field.severity')"></th><th data-bind="text: t('tm.field.status')"></th><th data-bind="text: t('tm.field.owner')"></th></tr></thead>
    <tbody data-bind="foreach: raid">
      <tr><td><span class="badge" data-bind="text: type"></span></td><td data-bind="text: title"></td><td data-bind="text: $data.severity || '—'"></td><td><span class="badge" data-bind="text: status"></span></td><td class="muted" data-bind="text: $data.ownerName || '—'"></td></tr>
    </tbody>
  </table></div>
  <!-- /ko -->
  <!-- /ko -->

  <!-- ══ MILESTONES ════════════════════════════════════════════════════════ -->
  <!-- ko if: tab() === 'milestones' -->
  <div class="section-heading-row">
    <div class="section-heading" data-bind="text: t('tm.tab.milestones')"></div>
    <div class="region-actions"><button class="btn btn-sm btn-primary" data-bind="click: function(){ openAdd('milestone'); }, text: '+ ' + t('tm.detail.addMilestone')"></button></div>
  </div>
  <!-- ko if: adding() === 'milestone' -->
  <div class="card" style="margin-bottom:14px;">
    <div class="form-grid">
      <div class="form-group form-group--full"><label class="form-label" data-bind="text: t('tm.field.title')"></label><input class="form-control" data-bind="textInput: fTitle"></div>
      <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.dueDate')"></label><input class="form-control" type="date" data-bind="value: fDue"></div>
      <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.status')"></label><select class="form-control" data-bind="value: fStatus, options: msStatuses, optionsValue:'code', optionsText:'nameEn'"></select></div>
    </div>
    <div class="region-actions" style="margin-top:14px;">
      <button class="btn btn-sm" data-bind="click: cancelAdd, text: t('tm.action.cancel')"></button>
      <button class="btn btn-sm btn-primary" data-bind="click: saveAdd, text: t('tm.action.save')"></button>
    </div>
  </div>
  <!-- /ko -->
  <!-- ko if: milestones().length === 0 --><div class="empty-state" data-bind="text: t('tm.common.empty')"></div><!-- /ko -->
  <!-- ko if: milestones().length > 0 -->
  <div class="data-table-wrap"><table class="data-table">
    <thead><tr><th data-bind="text: t('tm.field.title')"></th><th data-bind="text: t('tm.field.status')"></th><th data-bind="text: t('tm.field.dueDate')"></th><th data-bind="text: t('tm.field.achieved')"></th></tr></thead>
    <tbody data-bind="foreach: milestones">
      <tr><td data-bind="text: titleEn"></td><td><span class="badge" data-bind="text: status"></span></td><td class="muted" data-bind="text: $data.dueDate || '—'"></td><td class="muted" data-bind="text: $data.achievedDate || '—'"></td></tr>
    </tbody>
  </table></div>
  <!-- /ko -->
  <!-- /ko -->

  <!-- ══ MEETINGS ══════════════════════════════════════════════════════════ -->
  <!-- ko if: tab() === 'meetings' -->
  <div class="section-heading-row">
    <div class="section-heading" data-bind="text: t('tm.tab.meetings')"></div>
    <div class="region-actions"><button class="btn btn-sm btn-primary" data-bind="click: function(){ openAdd('meeting'); }, text: '+ ' + t('tm.detail.addMeeting')"></button></div>
  </div>
  <!-- ko if: adding() === 'meeting' -->
  <div class="card" style="margin-bottom:14px;">
    <div class="form-grid">
      <div class="form-group form-group--full"><label class="form-label" data-bind="text: t('tm.field.title')"></label><input class="form-control" data-bind="textInput: fTitle"></div>
      <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.date')"></label><input class="form-control" type="date" data-bind="value: fDue"></div>
      <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.location')"></label><input class="form-control" data-bind="textInput: fLocation"></div>
      <div class="form-group form-group--full"><label class="form-label" data-bind="text: t('tm.field.agenda')"></label><textarea class="form-control" rows="2" data-bind="textInput: fDesc"></textarea></div>
    </div>
    <div class="region-actions" style="margin-top:14px;">
      <button class="btn btn-sm" data-bind="click: cancelAdd, text: t('tm.action.cancel')"></button>
      <button class="btn btn-sm btn-primary" data-bind="click: saveAdd, text: t('tm.action.save')"></button>
    </div>
  </div>
  <!-- /ko -->
  <!-- ko if: meetings().length === 0 --><div class="empty-state" data-bind="text: t('tm.common.empty')"></div><!-- /ko -->
  <!-- ko if: meetings().length > 0 -->
  <div class="data-table-wrap"><table class="data-table">
    <thead><tr><th data-bind="text: t('tm.field.title')"></th><th data-bind="text: t('tm.field.date')"></th><th data-bind="text: t('tm.field.status')"></th><th data-bind="text: t('tm.field.location')"></th></tr></thead>
    <tbody data-bind="foreach: meetings">
      <tr><td data-bind="text: title"></td><td class="muted" data-bind="text: $data.meetingDate || '—'"></td><td><span class="badge" data-bind="text: status"></span></td><td class="muted" data-bind="text: $data.location || '—'"></td></tr>
    </tbody>
  </table></div>
  <!-- /ko -->
  <!-- /ko -->

  <!-- ══ DOCUMENTS ═════════════════════════════════════════════════════════ -->
  <!-- ko if: tab() === 'documents' -->
  <div class="section-heading-row">
    <div class="section-heading" data-bind="text: t('tm.tab.documents')"></div>
    <div class="region-actions"><button class="btn btn-sm btn-primary" data-bind="click: function(){ openAddDoc(); }, text: '+ ' + t('tm.detail.addDocument')"></button></div>
  </div>
  <!-- ko if: addingDoc() -->
  <div class="card" style="margin-bottom:14px;">
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label" data-bind="text: t('tm.field.file')"></label>
        <input class="form-control" type="file" data-bind="event:{ change: function(d,e){ return onFilePick(e); } }">
        <div class="form-hint" data-bind="text: t('tm.detail.fileHint')"></div>
      </div>
      <div class="form-group">
        <label class="form-label" data-bind="text: t('tm.field.fileName')"></label>
        <input class="form-control" data-bind="textInput: dFileName">
      </div>
      <div class="form-group">
        <label class="form-label" data-bind="text: t('tm.field.docType')"></label>
        <select class="form-control" data-bind="value: dDocType, options: docTypes, optionsValue:'code', optionsText:'nameEn'"></select>
      </div>
      <div class="form-group form-group--full">
        <label class="form-label" data-bind="text: t('tm.field.notes')"></label>
        <textarea class="form-control" rows="2" data-bind="textInput: dNotes"></textarea>
      </div>
    </div>
    <div class="region-actions" style="margin-top:14px;">
      <button class="btn btn-sm" data-bind="click: cancelAddDoc, text: t('tm.action.cancel')"></button>
      <button class="btn btn-sm btn-primary" data-bind="click: saveDoc, text: t('tm.action.upload')"></button>
    </div>
  </div>
  <!-- /ko -->
  <!-- ko if: documents().length === 0 --><div class="empty-state" data-bind="text: t('tm.detail.noDocs')"></div><!-- /ko -->
  <!-- ko if: documents().length > 0 -->
  <div class="data-table-wrap"><table class="data-table">
    <thead><tr><th data-bind="text: t('tm.field.fileName')"></th><th data-bind="text: t('tm.field.docType')"></th><th data-bind="text: t('tm.field.uploadedBy')"></th><th data-bind="text: t('tm.field.date')"></th></tr></thead>
    <tbody data-bind="foreach: documents">
      <tr><td data-bind="text: fileName"></td><td class="muted" data-bind="text: $data.docTypeName || '—'"></td><td class="muted" data-bind="text: $data.uploadedBy || '—'"></td><td class="muted" data-bind="text: $data.createdAt || '—'"></td></tr>
    </tbody>
  </table></div>
  <!-- /ko -->
  <!-- /ko -->

  <!-- ══ EDIT TEAM DRAWER (shared <edit-drawer>) ══════════════════════════ -->
  <edit-drawer params="open: showEdit, vm: $vm,
                       title: t('tm.detail.editTeam'),
                       saveLabel: t('tm.action.saveChanges'),
                       cancelLabel: t('tm.action.cancel'),
                       onSave: saveTeam, width: '760px'">
      <div class="form-grid">
        <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.nameEn')"></label><input class="form-control" data-bind="textInput: eName"></div>
        <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.nameAr')"></label><input class="form-control" dir="rtl" data-bind="textInput: eNameAr"></div>
        <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.type')"></label><select class="form-control" data-bind="value: eType, options: types, optionsValue:'code', optionsText:'nameEn'"></select></div>
        <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.class')"></label><select class="form-control" data-bind="value: eClass, options: classes, optionsValue:'code', optionsText:'nameEn'"></select></div>
        <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.category')"></label><select class="form-control" data-bind="value: eCat, options: cats, optionsValue:'code', optionsText:'nameEn', optionsCaption:'—'"></select></div>
        <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.status')"></label><select class="form-control" data-bind="value: eStatus, options: statuses, optionsValue:'code', optionsText:'nameEn'"></select></div>
        <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.leader')"></label><select class="form-control" data-bind="value: eLeader, options: assignableUsers, optionsValue:'userId', optionsText:'name'"></select></div>
        <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.startEnd')"></label>
          <div style="display:flex; gap:8px;"><input class="form-control" type="date" data-bind="value: eStart"><input class="form-control" type="date" data-bind="value: eEnd"></div>
        </div>
        <div class="form-group form-group--full"><label class="form-label" data-bind="text: t('tm.field.objective')"></label><textarea class="form-control" rows="2" data-bind="textInput: eObj"></textarea></div>
        <div class="form-group form-group--full"><label class="form-label" data-bind="text: t('tm.field.purpose')"></label><textarea class="form-control" rows="2" data-bind="textInput: ePurpose"></textarea></div>
      </div>
  </edit-drawer>

  <!-- ══ TASK DRAWER (modal) ═══════════════════════════════════════════════ -->
  <!-- ko if: selTask -->
  <div class="modal-overlay" data-bind="click: closeTask"></div>
  <div class="modal-box tm-drawer" data-bind="click: function(){ return true; }">
    <div class="modal-header">
      <div class="modal-title" data-bind="text: selTask().title"></div>
      <div class="region-actions"><button class="btn btn-sm" data-bind="click: closeTask, text: t('tm.action.close')"></button></div>
    </div>
    <div class="modal-body">
      <!-- status / progress -->
      <div class="form-grid">
        <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.status')"></label>
          <select class="form-control" data-bind="value: tStatus, options: taskStatuses, optionsValue:'code', optionsText:'nameEn', event:{ change: saveTaskStatus }"></select></div>
        <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.priority')"></label>
          <input class="form-control" readonly data-bind="value: selTask().priority"></div>
      </div>
      <div class="form-group" style="margin-top:4px;">
        <label class="form-label" data-bind="text: t('tm.field.progress') + ' (' + tProgress() + '%)'"></label>
        <input type="range" min="0" max="100" step="5" data-bind="value: tProgress, event:{ change: saveTaskStatus }">
      </div>

      <!-- assignees -->
      <div class="section-heading" style="margin-top:18px;" data-bind="text: t('tm.detail.assignees')"></div>
      <!-- ko if: taskAssignees().length === 0 --><div class="muted" style="font-size:13px;margin:6px 0;" data-bind="text: t('tm.detail.noAssignees')"></div><!-- /ko -->
      <div class="tm-assignees">
        <!-- ko foreach: taskAssignees -->
        <div class="tm-assignee">
          <span class="avatar avatar--sm" data-bind="text: $vm.initials(name)"></span>
          <span class="tm-assignee__name" data-bind="text: name"></span>
          <!-- ko if: isPrimary === 'Y' --><span class="badge badge--brand" data-bind="text: $vm.t('tm.detail.primary')"></span><!-- /ko -->
          <!-- ko ifnot: isPrimary === 'Y' --><button class="btn btn-xs" title="Make primary" data-bind="click: function(){ $vm.makePrimary($data); }, text: $vm.t('tm.detail.makePrimary')"></button><!-- /ko -->
          <button class="btn btn-xs btn-icon-danger" title="Remove" data-bind="click: function(){ $vm.unassign($data); }">&times;</button>
        </div>
        <!-- /ko -->
      </div>
      <div class="tm-assign-row">
        <select class="form-control form-control--sm" data-bind="value: assignUser, options: members, optionsValue:'userId', optionsText:'name', optionsCaption: t('tm.detail.selectMember')"></select>
        <button class="btn btn-sm btn-primary" data-bind="click: function(){ doAssign(false); }, text: t('tm.action.assign')"></button>
      </div>

      <!-- activity feed -->
      <div class="section-heading" style="margin-top:18px;" data-bind="text: t('tm.detail.activity')"></div>
      <div class="tm-comment-row">
        <input class="form-control" data-bind="textInput: newComment, attr:{ placeholder: t('tm.detail.commentPh') }">
        <button class="btn btn-sm btn-primary" data-bind="click: addComment, text: t('tm.action.post')"></button>
      </div>
      <!-- ko if: taskUpdates().length === 0 --><div class="muted" style="font-size:13px;margin-top:8px;" data-bind="text: t('tm.detail.noActivity')"></div><!-- /ko -->
      <div class="tm-feed">
        <!-- ko foreach: taskUpdates -->
        <div class="tm-feed__item" data-bind="css:{ 'tm-feed__item--sys': type === 'ASSIGN' || type === 'STATUS' }">
          <div class="tm-feed__hd">
            <span class="tm-feed__author" data-bind="text: $data.author || '—'"></span>
            <span class="tm-feed__time muted" data-bind="text: $data.createdAt"></span>
          </div>
          <!-- ko if: type === 'STATUS' --><div class="tm-feed__body" data-bind="text: ($data.oldStatus||'—') + ' → ' + ($data.newStatus||'—')"></div><!-- /ko -->
          <!-- ko ifnot: type === 'STATUS' --><div class="tm-feed__body" data-bind="text: $data.body || ''"></div><!-- /ko -->
        </div>
        <!-- /ko -->
      </div>
    </div>
  </div>
  <!-- /ko -->

  <!-- ══ OBJECTIVE DRAWER (modal) ══════════════════════════════════════════ -->
  <!-- ko if: selObj -->
  <div class="modal-overlay" data-bind="click: closeObjective"></div>
  <div class="modal-box tm-drawer" data-bind="click: function(){ return true; }">
    <div class="modal-header">
      <div class="modal-title" data-bind="text: selObj().titleEn"></div>
      <div class="region-actions">
        <button class="btn btn-sm" data-bind="click: closeObjective, text: t('tm.action.close')"></button>
        <button class="btn btn-sm btn-primary" data-bind="click: saveObjEdits, text: t('tm.action.saveChanges')"></button>
      </div>
    </div>
    <div class="modal-body">
      <!-- objective fields -->
      <div class="form-grid">
        <div class="form-group form-group--full"><label class="form-label" data-bind="text: t('tm.field.title')"></label><input class="form-control" data-bind="textInput: oTitle"></div>
        <div class="form-group form-group--full"><label class="form-label" data-bind="text: t('tm.field.description')"></label><textarea class="form-control" rows="2" data-bind="textInput: oDesc"></textarea></div>
        <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.status')"></label><select class="form-control" data-bind="value: oStatus, options: objStatuses, optionsValue:'code', optionsText:'nameEn'"></select></div>
        <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.dueDate')"></label><input class="form-control" type="date" data-bind="value: oTarget"></div>
        <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.weight')"></label><input class="form-control" type="number" min="0" step="0.5" data-bind="value: oWeight"></div>
        <div class="form-group"><label class="form-label" data-bind="text: t('tm.detail.progressMode')"></label>
          <select class="form-control" data-bind="value: oMode">
            <option value="AUTO" data-bind="text: t('tm.detail.autoFromKr')"></option>
            <option value="MANUAL" data-bind="text: t('tm.detail.manualPct')"></option>
          </select></div>
        <!-- ko if: oMode() === 'MANUAL' -->
        <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.progress') + ' (%)'"></label><input class="form-control" type="number" min="0" max="100" data-bind="value: oProgress"></div>
        <!-- /ko -->
      </div>
      <div class="tm-obj-prog">
        <span class="tm-prog" style="flex:1;"><span class="tm-prog__bar" data-bind="style:{ width: (oProgress()||0)+'%' }"></span></span>
        <span class="tm-prog__n" data-bind="text: (oProgress()||0)+'%'"></span>
      </div>

      <!-- key results -->
      <div class="section-heading-row" style="margin-top:18px;">
        <div class="section-heading" data-bind="text: t('tm.detail.keyResults')"></div>
        <div class="region-actions"><button class="btn btn-sm btn-primary" data-bind="click: openAddKr, text: '+ ' + t('tm.detail.addKeyResult')"></button></div>
      </div>

      <!-- add / edit KR form -->
      <!-- ko if: krFormOpen -->
      <div class="card" style="margin-bottom:14px;">
        <div class="form-grid">
          <div class="form-group form-group--full"><label class="form-label" data-bind="text: t('tm.field.title')"></label><input class="form-control" data-bind="textInput: kTitle"></div>
          <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.direction')"></label><select class="form-control" data-bind="value: kDir, options: krDirections, optionsValue:'code', optionsText:'nameEn'"></select></div>
          <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.unit')"></label>
            <input class="form-control" list="tm-kr-units" data-bind="textInput: kUnit">
            <datalist id="tm-kr-units" data-bind="foreach: krUnits"><option data-bind="value: code, attr:{ label: nameEn }"></option></datalist>
          </div>
          <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.baseline')"></label><input class="form-control" type="number" step="any" data-bind="value: kBase"></div>
          <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.target')"></label><input class="form-control" type="number" step="any" data-bind="value: kTarget"></div>
          <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.current')"></label><input class="form-control" type="number" step="any" data-bind="value: kCurrent"></div>
          <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.weight')"></label><input class="form-control" type="number" min="0" step="0.5" data-bind="value: kWeight"></div>
          <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.dueDate')"></label><input class="form-control" type="date" data-bind="value: kDue"></div>
          <div class="form-group"><label class="form-label" data-bind="text: t('tm.field.status')"></label><select class="form-control" data-bind="value: kStatus, options: objStatuses, optionsValue:'code', optionsText:'nameEn'"></select></div>
        </div>
        <div class="region-actions" style="margin-top:14px;">
          <button class="btn btn-sm" data-bind="click: cancelKr, text: t('tm.action.cancel')"></button>
          <button class="btn btn-sm btn-primary" data-bind="click: saveKr, text: t('tm.action.save')"></button>
        </div>
      </div>
      <!-- /ko -->

      <!-- ko if: keyResults().length === 0 --><div class="muted" style="font-size:13px;margin:6px 0;" data-bind="text: t('tm.detail.noKeyResults')"></div><!-- /ko -->
      <div class="tm-kr-list">
        <!-- ko foreach: keyResults -->
        <div class="tm-kr">
          <div class="tm-kr__hd">
            <span class="tm-kr__title" data-bind="text: titleEn"></span>
            <span class="badge badge--soft" data-bind="text: direction + ($data.unit ? ' · ' + $data.unit : '')"></span>
            <span class="badge" data-bind="text: status"></span>
            <span class="tm-kr__actions">
              <button class="btn btn-xs" data-bind="click: function(){ $vm.editKr($data); }, text: $vm.t('tm.action.edit')"></button>
              <button class="btn btn-xs btn-icon-danger" title="Remove" data-bind="click: function(){ $vm.removeKr($data); }">&times;</button>
            </span>
          </div>
          <div class="tm-kr__gauge">
            <span class="tm-kr__mark" data-bind="text: $vm.t('tm.field.baseline') + ': ' + ($data.baseline != null ? $data.baseline : '—')"></span>
            <span class="tm-prog tm-kr__bar"><span class="tm-prog__bar" data-bind="style:{ width: (progress||0)+'%' }"></span></span>
            <span class="tm-kr__mark" data-bind="text: $vm.t('tm.field.target') + ': ' + ($data.target != null ? $data.target : '—')"></span>
            <span class="tm-prog__n" data-bind="text: (progress||0)+'%'"></span>
          </div>
          <div class="tm-kr__foot">
            <div class="tm-kr__update">
              <label class="form-label" data-bind="text: $vm.t('tm.detail.currentValue')"></label>
              <input class="form-control form-control--sm" type="number" step="any" data-bind="value: $data.current, valueUpdate: 'input'">
              <button class="btn btn-sm btn-primary" data-bind="click: function(){ $vm.recordKr($data); }, text: $vm.t('tm.action.updateValue')"></button>
            </div>
            <!-- ko if: $data.targetDate --><span class="muted" data-bind="text: $vm.t('tm.field.dueDate') + ': ' + $data.targetDate"></span><!-- /ko -->
          </div>
        </div>
        <!-- /ko -->
      </div>
    </div>
  </div>
  <!-- /ko -->
</div>
