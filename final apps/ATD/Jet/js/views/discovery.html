<div class="page">
  <div class="page-header-row">
    <h1 class="page-title" data-bind="text: t('atd.discovery.title')"></h1>
    <div class="page-actions">
      <input class="form-control form-control--sm" style="min-width:280px"
             data-bind="textInput: newSa, attr:{ placeholder: t('atd.discovery.saPlaceholder') }">
      <button class="btn btn-primary" data-bind="click: discoverNew, text: t('atd.discovery.discover')"></button>
      <button class="btn btn-secondary" data-bind="click: newAnalysis, text: '+ ' + t('atd.analysis.new')"></button>
      <button class="btn btn-secondary" data-bind="click: refresh, text: t('atd.discovery.refresh')"></button>
    </div>
  </div>
  <div class="muted" style="margin-bottom:16px" data-bind="text: t('atd.discovery.hint')"></div>

  <!-- ── 1. Discovery requests ───────────────────────────────────────── -->
  <div class="section-heading-row">
    <h2 class="section-heading" data-bind="text: t('atd.discovery.requests')"></h2>
  </div>
  <!-- ko if: reqLoading --><div class="muted" data-bind="text: t('atd.common.loading')"></div><!-- /ko -->
  <!-- ko ifnot: reqLoading -->
  <!-- ko if: requests().length === 0 --><div class="empty-state" data-bind="text: t('atd.discovery.noRequests')"></div><!-- /ko -->
  <!-- ko if: requests().length > 0 -->
  <div class="data-table-wrap" style="margin-bottom:26px">
    <table class="data-table">
      <thead><tr>
        <th data-bind="text: t('atd.discovery.col.subjectArea')"></th>
        <th data-bind="text: t('atd.col.status')"></th>
        <th data-bind="text: t('atd.discovery.col.folders')"></th>
        <th data-bind="text: t('atd.discovery.col.columns')"></th>
        <th data-bind="text: t('atd.discovery.col.requestedBy')"></th>
        <th data-bind="text: t('atd.discovery.col.scraped')"></th>
        <th style="width:110px"></th>
      </tr></thead>
      <tbody data-bind="foreach: requests">
        <tr>
          <td data-bind="text: $data.subjectArea"></td>
          <td><span data-bind="css: $vm.statusClass($data.status), text: $data.status,
                    attr:{ title: $data.message || '' }"></span></td>
          <td data-bind="text: $data.folderCount || 0"></td>
          <td data-bind="text: $data.columnCount || 0"></td>
          <td class="mono" data-bind="text: $data.requestedBy || '—'"></td>
          <td data-bind="text: $data.scrapedAt || '—'"></td>
          <td class="cell-actions" style="text-align:end">
            <button class="btn btn-xs" data-bind="click: function(){ $vm.rediscover($data); },
                    text: $vm.t('atd.discovery.rediscover')"></button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  <!-- /ko -->
  <!-- /ko -->

  <!-- ── 2. Discovery run history ────────────────────────────────────── -->
  <div class="section-heading-row">
    <h2 class="section-heading" data-bind="text: t('atd.discovery.runHistory')"></h2>
  </div>
  <!-- ko if: runLoading --><div class="muted" data-bind="text: t('atd.common.loading')"></div><!-- /ko -->
  <!-- ko ifnot: runLoading -->
  <!-- ko if: runs().length === 0 --><div class="empty-state" data-bind="text: t('atd.discovery.noRuns')"></div><!-- /ko -->
  <!-- ko if: runs().length > 0 -->
  <div class="data-table-wrap">
    <table class="data-table">
      <thead><tr>
        <th data-bind="text: t('atd.col.run')"></th>
        <th data-bind="text: t('atd.discovery.col.subjectArea')"></th>
        <th data-bind="text: t('atd.col.status')"></th>
        <th data-bind="text: t('atd.discovery.col.columns')"></th>
        <th data-bind="text: t('atd.col.started')"></th>
        <th data-bind="text: t('atd.col.duration')"></th>
        <th data-bind="text: t('atd.runs.detail.message')"></th>
      </tr></thead>
      <tbody data-bind="foreach: runs">
        <tr>
          <td data-bind="text: $data.runId"></td>
          <td data-bind="text: $data.subjectArea"></td>
          <td><span data-bind="css: $vm.statusClass($data.status), text: $data.status"></span></td>
          <td data-bind="text: $data.columnCount || 0"></td>
          <td data-bind="text: $data.started || '—'"></td>
          <td class="mono" data-bind="text: ($data.durationSec != null ? $vm.fmtDuration($data.durationSec) : '—')"></td>
          <td class="truncate-cell" data-bind="text: $data.message || '—', attr:{ title: $data.message || '' }"></td>
        </tr>
      </tbody>
    </table>
  </div>
  <list-pager params="offset: runOffset, limit: runLimit, total: runTotal, onChange: loadRuns"></list-pager>
  <!-- /ko -->
  <!-- /ko -->

  <!-- ── 3. Analysis build requests ──────────────────────────────────── -->
  <div class="section-heading-row" style="margin-top:26px">
    <h2 class="section-heading" data-bind="text: t('atd.discovery.builds')"></h2>
  </div>
  <!-- ko if: buildLoading --><div class="muted" data-bind="text: t('atd.common.loading')"></div><!-- /ko -->
  <!-- ko ifnot: buildLoading -->
  <!-- ko if: builds().length === 0 --><div class="empty-state" data-bind="text: t('atd.discovery.noBuilds')"></div><!-- /ko -->
  <!-- ko if: builds().length > 0 -->
  <div class="data-table-wrap">
    <table class="data-table">
      <thead><tr>
        <th data-bind="text: t('atd.discovery.col.analysis')"></th>
        <th data-bind="text: t('atd.discovery.col.saveFolder')"></th>
        <th data-bind="text: t('atd.col.status')"></th>
        <th data-bind="text: t('atd.col.job')"></th>
        <th data-bind="text: t('atd.discovery.col.requestedBy')"></th>
        <th data-bind="text: t('atd.discovery.col.created')"></th>
        <th data-bind="text: t('atd.runs.detail.message')"></th>
      </tr></thead>
      <tbody data-bind="foreach: builds">
        <tr>
          <td data-bind="text: $data.analysisName || '—'"></td>
          <td class="mono truncate-cell" data-bind="text: $data.saveFolder || '—', attr:{ title: $data.saveFolder || '' }"></td>
          <td><span data-bind="css: $vm.statusClass($data.status), text: $data.status"></span></td>
          <td class="mono" data-bind="text: $data.jobName || '—'"></td>
          <td class="mono" data-bind="text: $data.requestedBy || '—'"></td>
          <td data-bind="text: $data.created || '—'"></td>
          <td class="truncate-cell" data-bind="text: $data.message || '—', attr:{ title: $data.message || '' }"></td>
        </tr>
      </tbody>
    </table>
  </div>
  <!-- /ko -->
  <!-- /ko -->

  <!-- Add New OTBI Analysis — builds the analysis in OTBI via create_analysis.py -->
  <edit-drawer params="open: showAnalysisForm, vm: $vm,
                       title: t('atd.analysis.title'), saveLabel: t('atd.analysis.build'),
                       cancelLabel: t('atd.action.cancel'), onSave: saveAnalysis, width: '760px'">
    <div class="form-grid">
      <div class="form-group form-group--full"><label class="form-label" data-bind="text: t('atd.analysis.subjectArea')"></label>
        <div style="display:flex; gap:8px; align-items:flex-start">
          <input class="form-control" style="flex:1" data-bind="textInput: anSubjectArea, attr:{ placeholder: t('atd.analysis.subjectArea.ph') }">
          <button type="button" class="btn btn-secondary btn-sm" style="white-space:nowrap" data-bind="click: discoverColumns, text: t('atd.analysis.discover')"></button>
        </div></div>

      <!-- pick from a previously-discovered subject area (reuses the page's requests list) -->
      <div class="form-group form-group--full" data-bind="visible: requests().length">
        <label class="form-label" data-bind="text: t('atd.analysis.discovered')"></label>
        <select class="form-control" data-bind="value: anPickSa">
          <option value="" data-bind="text: t('atd.analysis.pickSa')"></option>
          <!-- ko foreach: requests -->
          <option data-bind="value: subjectArea,
                  text: subjectArea + ' — ' + status + (columnCount ? ' (' + columnCount + ')' : '')"></option>
          <!-- /ko -->
        </select>
      </div>

      <!-- AI suggester: describe the data you need; Claude ticks the matching columns -->
      <div class="form-group form-group--full">
        <label class="form-label" data-bind="text: t('atd.analysis.suggest')"></label>
        <div style="display:flex; gap:8px; align-items:flex-start">
          <textarea class="form-control" rows="2" style="flex:1"
                    data-bind="textInput: anSuggestText, attr:{ placeholder: t('atd.analysis.suggestPlaceholder') }"></textarea>
          <button type="button" class="btn btn-secondary btn-sm" style="white-space:nowrap"
                  data-bind="click: suggestColumns, disable: anSuggestBusy,
                             text: anSuggestBusy() ? t('atd.common.loading') : ('✨ ' + t('atd.analysis.suggestBtn'))"></button>
        </div>
        <p class="muted" style="margin:4px 0 0; font-size:.8em" data-bind="text: t('atd.analysis.suggestHint')"></p>
      </div>

      <!-- folder/column picker (tick to add) -->
      <div class="form-group form-group--full" data-bind="visible: anCatalog().length || anPickerBusy() || anPickerMsg()">
        <label class="form-label" data-bind="text: t('atd.analysis.pick')"></label>
        <div class="an-pick" data-bind="visible: anCatalog().length,
             template: { name: 'anPickNodeTpl', foreach: anCatalog }"></div>
        <p class="muted" style="margin:6px 0 0; font-size:.8em" data-bind="visible: anPickerBusy(), text: t('atd.common.loading')"></p>
        <p class="muted" style="margin:6px 0 0; font-size:.8em" data-bind="visible: !anPickerBusy() && anPickerMsg(), text: anPickerMsg"></p>
        <p class="muted" style="margin:6px 0 0; font-size:.8em" data-bind="visible: anCatalog().length, text: t('atd.analysis.pickHint')"></p>
      </div>

      <div class="form-group"><label class="form-label" data-bind="text: t('atd.analysis.name')"></label>
        <input class="form-control" data-bind="textInput: anName, attr:{ placeholder: t('atd.analysis.name.ph') }"></div>
      <div class="form-group"><label class="form-label" data-bind="text: t('atd.field.loadMode')"></label>
        <select class="form-control" data-bind="value: anLoadMode, options: loadModes"></select></div>
      <div class="form-group form-group--full"><label class="form-label" data-bind="text: t('atd.analysis.saveFolder')"></label>
        <input class="form-control mono" data-bind="textInput: anSaveFolder, attr:{ placeholder: t('atd.analysis.saveFolder.ph') }"></div>

      <div class="form-group form-group--full">
        <label class="form-label" data-bind="text: t('atd.analysis.columns')"></label>
        <div class="data-table-wrap">
          <table class="data-table">
            <thead><tr>
              <th data-bind="text: t('atd.analysis.col.folder')"></th>
              <th data-bind="text: t('atd.analysis.col.column')"></th>
              <th data-bind="text: t('atd.analysis.col.heading')"></th>
              <th style="width:40px"></th>
            </tr></thead>
            <tbody data-bind="foreach: anColumns">
              <tr>
                <td><input class="form-control form-control--sm" data-bind="textInput: folder"></td>
                <td><input class="form-control form-control--sm" data-bind="textInput: column"></td>
                <td><input class="form-control form-control--sm" data-bind="textInput: heading"></td>
                <td style="text-align:center">
                  <button class="btn btn-xs btn-icon btn-danger" data-bind="click: function(){ $vm.removeAnColumn($data); },
                          attr:{ 'aria-label': $vm.t('atd.action.delete') }">×</button></td>
              </tr>
            </tbody>
          </table>
        </div>
        <button type="button" class="btn btn-xs" style="margin-top:8px" data-bind="click: addAnColumn, text: '+ ' + t('atd.analysis.addColumn')"></button>
        <p class="muted" style="margin:6px 0 0; font-size:.8em" data-bind="text: t('atd.analysis.hint')"></p>
      </div>

      <div class="form-group form-group--full"><label class="form-label" data-bind="text: t('atd.field.params')"></label>
        <textarea class="form-control mono" rows="2" data-bind="textInput: anParams" placeholder='[{"folder":"...","column":"...","operator":"is prompted"}]'></textarea>
        <p class="muted" style="margin:4px 0 0; font-size:.8em" data-bind="text: t('atd.analysis.queueHint')"></p></div>
    </div>
  </edit-drawer>

  <!-- recursive picker node: folder header (collapsible) + leaf columns + nested folders.
       Inline handlers only (no $vm) so the template self-references cleanly. -->
  <script type="text/html" id="anPickNodeTpl">
    <div class="an-pick-folder">
      <div class="an-pick-fhead" data-bind="click: function(){ open(!open()); return true; }">
        <span data-bind="text: (open() ? '▾ ' : '▸ ') + folder + ' (' + count + ')'"></span>
      </div>
      <!-- ko if: open -->
      <div class="an-pick-cols" data-bind="visible: columns.length, foreach: columns">
        <div class="an-pick-col" data-bind="css: { 'an-pick-col--on': picked },
             click: function(){ picked(!picked()); return true; }">
          <input type="checkbox" data-bind="checked: picked" style="pointer-events:none">
          <span data-bind="text: name"></span>
        </div>
      </div>
      <div class="an-pick-sub" data-bind="template: { name: 'anPickNodeTpl', foreach: folders }"></div>
      <!-- /ko -->
    </div>
  </script>
</div>
