<div class="page">
  <div class="page-header-row">
    <h1 class="page-title" data-bind="text: t('atd.queue.title')"></h1>
    <div class="page-actions">
      <input class="form-control form-control--sm" type="number" style="max-width:130px"
             data-bind="value: lease, attr:{ title: t('atd.queue.lease.hint'), placeholder: t('atd.queue.lease') }">
      <button class="btn btn-secondary"
              data-bind="click: reap, text: t('atd.queue.reap'), attr:{ title: t('atd.queue.reap.hint') }"></button>
      <button class="btn btn-primary" data-bind="click: enqueueAll, text: t('atd.queue.enqueueAll')"></button>
    </div>
  </div>

  <div class="muted" style="margin-bottom:12px" data-bind="text: t('atd.queue.hint')"></div>

  <div class="view-toolbar">
    <input class="search-box" type="text" data-bind="textInput: fSearch, attr:{placeholder: t('atd.jobs.search')}, event:{ keyup: function(d,e){ if(e.keyCode===13){ search(); } return true; } }">
    <select class="form-control form-control--sm" style="max-width:160px" data-bind="value: fStatus">
      <option value="" data-bind="text: t('atd.jobs.allStatuses')"></option>
      <!-- ko foreach: statuses --><option data-bind="value: $data, text: $data"></option><!-- /ko -->
    </select>
    <select class="form-control form-control--sm" style="max-width:170px" data-bind="value: fCategory">
      <option value="" data-bind="text: t('atd.cat.all')"></option>
      <!-- ko foreach: topCategories --><option data-bind="value: code, text: $vm.catLabel($data)"></option><!-- /ko -->
    </select>
    <!-- ko if: subCategories().length > 0 -->
    <select class="form-control form-control--sm" style="max-width:170px" data-bind="value: fSubCategory">
      <option value="" data-bind="text: t('atd.cat.allSub')"></option>
      <!-- ko foreach: subCategories --><option data-bind="value: code, text: $vm.catLabel($data)"></option><!-- /ko -->
    </select>
    <!-- /ko -->
    <button class="btn btn-sm btn-primary" data-bind="click: search, text: t('atd.filter.search')"></button>
    <button class="btn btn-sm btn-secondary" data-bind="click: clearFilters, text: t('atd.filter.clear')"></button>
    <span class="toolbar-spacer"></span>
    <!-- ko ifnot: loading --><span class="muted" data-bind="text: total() + ' ' + t('atd.common.results')"></span><!-- /ko -->
  </div>

  <!-- ko if: loading --><div class="muted" data-bind="text: t('atd.common.loading')"></div><!-- /ko -->

  <!-- ko ifnot: loading -->
  <!-- ko if: jobs().length === 0 --><div class="empty-state" data-bind="text: t('atd.queue.empty')"></div><!-- /ko -->
  <!-- ko if: jobs().length > 0 -->
  <div class="data-table-wrap">
    <table class="data-table">
      <thead><tr>
        <th data-bind="text: t('atd.col.job')"></th>
        <th data-bind="text: t('atd.queue.col.order')"></th>
        <th data-bind="text: t('atd.col.status')"></th>
        <th data-bind="text: t('atd.queue.col.worker')"></th>
        <th data-bind="text: t('atd.queue.col.claimedAt')"></th>
        <th data-bind="text: t('atd.jobs.col.enabled')"></th>
        <th style="width:120px;"></th>
      </tr></thead>
      <tbody data-bind="foreach: jobs">
        <tr>
          <td class="mono" data-bind="text: $data.jobName"></td>
          <td data-bind="text: $data.priority + '·' + $data.runOrder"></td>
          <td><span data-bind="css: $vm.statusClass($data.runStatus), text: $data.runStatus"></span></td>
          <td class="mono" data-bind="text: $data.claimedBy || '—'"></td>
          <td data-bind="text: $data.claimedAt || '—'"></td>
          <td><span class="badge" data-bind="text: $data.enabled, css: { 'badge--active': $data.enabled==='Y', 'badge--idle': $data.enabled!=='Y' }"></span></td>
          <td class="cell-actions" style="text-align:end;">
            <button class="btn btn-xs" data-bind="click: function(){ $vm.enqueueOne($data); }, text: $vm.t('atd.action.enqueue')"></button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  <list-pager params="offset: offset, limit: limit, total: total, onChange: reload"></list-pager>
  <!-- /ko -->
  <!-- /ko -->
</div>
