<div class="page">
  <div class="page-header-row">
    <h1 class="page-title" data-bind="text: t('atd.set.title')"></h1>
    <div class="page-actions">
      <button class="btn btn-primary" data-bind="click: newSet, text: '+ ' + t('atd.set.new')"></button>
    </div>
  </div>

  <p class="muted" style="margin:0 0 12px; max-width:900px" data-bind="text: t('atd.set.intro')"></p>

  <!-- ko if: loading -->
  <div class="muted" data-bind="text: t('atd.common.loading')"></div>
  <!-- /ko -->

  <!-- ko ifnot: loading -->
  <!-- ko if: sets().length === 0 -->
  <div class="empty-state" data-bind="text: t('atd.set.empty')"></div>
  <!-- /ko -->

  <!-- ko if: sets().length > 0 -->
  <div class="data-table-wrap">
    <table class="data-table">
      <thead><tr>
        <th data-bind="text: t('atd.set.col.set')"></th>
        <th data-bind="text: t('atd.set.col.interval')"></th>
        <th data-bind="text: t('atd.set.col.window')"></th>
        <th data-bind="text: t('atd.set.col.members')"></th>
        <th data-bind="text: t('atd.set.col.state')"></th>
        <th data-bind="text: t('atd.set.col.notify')"></th>
        <th style="width:180px;"></th>
      </tr></thead>
      <tbody data-bind="foreach: sets">
        <tr style="cursor:pointer" data-bind="click: function(){ $vm.open($data); }">
          <td>
            <span class="mono" data-bind="text: $data.setCode"></span>
            <div class="muted" style="font-size:.86em" data-bind="text: $data.nameEn"></div>
          </td>
          <td data-bind="text: $vm.intervalText($data)"></td>
          <td class="mono muted" style="font-size:.85em">
            <!-- ko if: $data.startAtDisp || $data.endAtDisp -->
            <span data-bind="text: ($data.startAtDisp || '—') + '  →  ' + ($data.endAtDisp || '—')"></span>
            <!-- /ko -->
            <!-- ko ifnot: $data.startAtDisp || $data.endAtDisp --><span>—</span><!-- /ko -->
          </td>
          <td><span data-bind="text: $data.enabledMembers + ' / ' + $data.members"></span></td>
          <td>
            <!-- ko if: $data.paused === 'Y' -->
            <span class="badge badge--idle" data-bind="text: t('atd.set.state.paused')"></span>
            <!-- /ko -->
            <!-- ko ifnot: $data.paused === 'Y' -->
            <span class="badge" data-bind="text: ($data.active==='Y' ? t('atd.set.state.active') : t('atd.set.state.off')),
                   css: { 'badge--active': $data.active==='Y', 'badge--idle': $data.active!=='Y' }"></span>
            <!-- /ko -->
          </td>
          <td>
            <span class="badge" data-bind="text: ($data.notifyOnFailure==='Y' ? t('atd.common.yes') : t('atd.common.no')),
                  css: { 'badge--active': $data.notifyOnFailure==='Y', 'badge--idle': $data.notifyOnFailure!=='Y' }"></span>
          </td>
          <td class="cell-actions" style="text-align:end;" data-bind="click: function(){ return true; }, clickBubble: false">
            <button class="btn btn-xs btn-icon" data-bind="click: function(){ $vm.runSet($data); },
                    attr:{ title: $vm.t('atd.set.run.hint'), 'aria-label': $vm.t('atd.set.run') }">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
            </button>
            <button class="btn btn-xs btn-icon" data-bind="click: function(){ $vm.togglePause($data); },
                    attr:{ title: ($data.paused==='Y' ? $vm.t('atd.set.resume') : $vm.t('atd.set.pause')),
                           'aria-label': ($data.paused==='Y' ? $vm.t('atd.set.resume') : $vm.t('atd.set.pause')) }">
              <!-- ko if: $data.paused === 'Y' -->
              <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
              <!-- /ko -->
              <!-- ko ifnot: $data.paused === 'Y' -->
              <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
              <!-- /ko -->
            </button>
            <button class="btn btn-xs btn-icon" data-bind="click: function(){ $vm.editSet($data); },
                    attr:{ title: $vm.t('atd.action.edit.hint'), 'aria-label': $vm.t('atd.action.edit') }">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
            </button>
            <button class="btn btn-xs btn-icon btn-danger" data-bind="click: function(){ $vm.del($data); },
                    attr:{ title: $vm.t('atd.action.delete.hint'), 'aria-label': $vm.t('atd.action.delete') }">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 6h18"/><path d="M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  <!-- /ko -->
  <!-- /ko -->

  <!-- create / edit set — shared <edit-drawer> slide-in -->
  <edit-drawer params="open: showForm, vm: $vm,
                       title: formTitle, saveLabel: formSaveLabel,
                       cancelLabel: t('atd.action.cancel'), onSave: save, width: '640px'">
    <div class="form-grid">
      <!-- ko if: !editCode() -->
      <div class="form-group"><label class="form-label" data-bind="text: t('atd.set.code')"></label>
        <input class="form-control mono" data-bind="textInput: fmSetCode, attr:{ placeholder: 'NIGHTLY_AP' }"></div>
      <!-- /ko -->
      <div class="form-group"><label class="form-label" data-bind="text: t('atd.set.nameEn')"></label>
        <input class="form-control" data-bind="textInput: fmNameEn"></div>
      <div class="form-group"><label class="form-label" data-bind="text: t('atd.set.nameAr')"></label>
        <input class="form-control" dir="rtl" data-bind="textInput: fmNameAr"></div>
      <div class="form-group form-group--full"><label class="form-label" data-bind="text: t('atd.set.comments')"></label>
        <textarea class="form-control" rows="2" data-bind="textInput: fmComments"></textarea></div>

      <div class="form-group"><label class="form-label" data-bind="text: t('atd.set.interval')"></label>
        <select class="form-control" data-bind="value: fmPreset">
          <!-- ko foreach: presets --><option data-bind="value: code, text: $vm.presetLabel(code)"></option><!-- /ko -->
        </select></div>
      <!-- ko if: isCustom -->
      <div class="form-group"><label class="form-label" data-bind="text: t('atd.set.freqMin')"></label>
        <input class="form-control" type="number" min="1" data-bind="value: fmFreq"></div>
      <!-- /ko -->

      <div class="form-group"><label class="form-label" data-bind="text: t('atd.set.startAt')"></label>
        <input class="form-control" type="datetime-local" data-bind="value: fmStartAt"></div>
      <div class="form-group"><label class="form-label" data-bind="text: t('atd.set.endAt')"></label>
        <input class="form-control" type="datetime-local" data-bind="value: fmEndAt"></div>

      <div class="form-group"><label class="form-label" data-bind="text: t('atd.set.dailyStart')"></label>
        <input class="form-control" type="time" data-bind="value: fmDailyStart"></div>
      <div class="form-group"><label class="form-label" data-bind="text: t('atd.set.dailyEnd')"></label>
        <input class="form-control" type="time" data-bind="value: fmDailyEnd"></div>

      <div class="form-group form-group--full">
        <label class="form-label" data-bind="text: t('atd.set.days')"></label>
        <div class="cat-picker">
          <!-- ko foreach: days -->
          <span class="badge cat-chip cat-chip--toggle"
                data-bind="css:{ 'cat-chip--off': !$vm.isDay($data) },
                           style: ($vm.isDay($data) ? { background: 'var(--brand)', color: '#fff' } : {}),
                           click: function(){ $vm.toggleDay($data); return true; },
                           text: $vm.dayLabel($data)"></span>
          <!-- /ko -->
        </div>
        <p class="muted" style="margin:4px 0 0; font-size:.8em" data-bind="text: t('atd.set.days.hint')"></p>
      </div>

      <div class="form-group"><label class="form-label" data-bind="text: t('atd.set.active')"></label>
        <div><input type="checkbox" data-bind="checked: fmActive"></div></div>
      <div class="form-group"><label class="form-label" data-bind="text: t('atd.set.notify')"></label>
        <div><input type="checkbox" data-bind="checked: fmNotify"></div>
        <p class="muted" style="margin:4px 0 0; font-size:.8em" data-bind="text: t('atd.set.notify.hint')"></p></div>

      <div class="form-group form-group--full">
        <p class="muted" style="margin:0; font-size:.8em" data-bind="text: t('atd.set.window.hint')"></p>
      </div>
    </div>
  </edit-drawer>
</div>
