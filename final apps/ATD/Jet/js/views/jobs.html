<div class="page">
  <div class="page-header-row">
    <h1 class="page-title" data-bind="text: t('atd.jobs.title')"></h1>
    <div class="page-actions">
      <button class="btn btn-secondary" data-bind="click: newAnalysis, text: '+ ' + t('atd.analysis.new')"></button>
      <button class="btn btn-primary" data-bind="click: newJob, text: '+ ' + t('atd.jobs.new')"></button>
    </div>
  </div>

  <div class="view-toolbar">
    <input class="search-box" type="text" data-bind="textInput: fSearch, attr:{placeholder: t('atd.jobs.search')}, event:{ keyup: function(d,e){ if(e.keyCode===13) load(); return true; } }">
    <select class="form-control form-control--sm" style="max-width:180px" data-bind="value: fStatus">
      <option value="" data-bind="text: t('atd.jobs.allStatuses')"></option>
      <!-- ko foreach: statuses --><option data-bind="value: $data, text: $data"></option><!-- /ko -->
    </select>
    <span class="toolbar-spacer"></span>
    <!-- ko ifnot: loading --><span class="muted" data-bind="text: jobs().length + ' ' + t('atd.common.results')"></span><!-- /ko -->
  </div>

  <!-- ko if: loading -->
  <div class="muted" data-bind="text: t('atd.common.loading')"></div>
  <!-- /ko -->

  <!-- ko ifnot: loading -->
  <!-- ko if: jobs().length === 0 -->
  <div class="empty-state" data-bind="text: t('atd.jobs.empty')"></div>
  <!-- /ko -->

  <!-- ko if: jobs().length > 0 -->
  <div class="data-table-wrap">
    <table class="data-table">
      <thead><tr>
        <th data-bind="text: t('atd.col.job')"></th>
        <th data-bind="text: t('atd.jobs.col.source')"></th>
        <th data-bind="text: t('atd.jobs.col.target')"></th>
        <th data-bind="text: t('atd.jobs.col.order')"></th>
        <th data-bind="text: t('atd.col.status')"></th>
        <th data-bind="text: t('atd.jobs.col.lastRun')"></th>
        <th data-bind="text: t('atd.col.duration')"></th>
        <th data-bind="text: t('atd.jobs.col.enabled')"></th>
        <th style="width:220px;"></th>
      </tr></thead>
      <tbody data-bind="foreach: jobs">
        <tr style="cursor:pointer" data-bind="click: function(){ $vm.open($data); }">
          <td><span class="mono" data-bind="text: $data.jobName"></span></td>
          <td class="truncate-cell mono" data-bind="text: $data.sourceRef, attr:{ title: $data.sourceRef }"></td>
          <td class="mono">
            <span data-bind="text: $data.stageTable"></span>
            <!-- ko if: $data.prepared === 'N' -->
            <span class="badge badge--idle" style="margin-inline-start:6px" data-bind="text: $vm.t('atd.jobs.notPrepared')"></span>
            <!-- /ko -->
          </td>
          <td data-bind="text: $data.priority + '·' + $data.runOrder"></td>
          <td><span data-bind="css: $vm.statusClass($data.runStatus), text: $data.runStatus"></span></td>
          <td>
            <!-- ko if: $data.lastRunStatus -->
            <span data-bind="css: $vm.statusClass($data.lastRunStatus), text: $data.lastRunStatus"></span>
            <span class="muted" style="margin-inline-start:6px" data-bind="text: $data.lastFinished || ''"></span>
            <!-- /ko -->
            <!-- ko ifnot: $data.lastRunStatus --><span class="muted">—</span><!-- /ko -->
          </td>
          <td class="mono">
            <!-- ko if: $data.lastDurationSec != null --><span data-bind="text: $vm.fmtDuration($data.lastDurationSec)"></span><!-- /ko -->
            <!-- ko ifnot: $data.lastDurationSec != null --><span class="muted">—</span><!-- /ko -->
          </td>
          <td><span class="badge" data-bind="text: $data.enabled, css: { 'badge--active': $data.enabled==='Y', 'badge--idle': $data.enabled!=='Y' }"></span></td>
          <td class="cell-actions" style="text-align:end;" data-bind="click: function(){ return true; }, clickBubble: false">
            <button class="btn btn-xs btn-icon" data-bind="click: function(){ $vm.runNow($data); },
                    attr:{ title: $vm.t('atd.action.run.hint'), 'aria-label': $vm.t('atd.action.run') }">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8 5v14l11-7z"/></svg>
            </button>
            <button class="btn btn-xs btn-icon" data-bind="click: function(){ $vm.editJob($data); },
                    attr:{ title: $vm.t('atd.action.edit.hint'), 'aria-label': $vm.t('atd.action.edit') }">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>
            </button>
            <button class="btn btn-xs btn-icon btn-danger" data-bind="click: function(){ $vm.del($data); },
                    attr:{ title: $vm.t('atd.action.delete.hint'), 'aria-label': $vm.t('atd.action.delete') }">
              <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M3 6h18"/><path d="M8 6V4a1 1 0 0 1 1-1h6a1 1 0 0 1 1 1v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
            </button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  <!-- /ko -->
  <!-- /ko -->

  <!-- create / edit job — shared <edit-drawer> slide-in -->
  <edit-drawer params="open: showForm, vm: $vm,
                       title: formTitle, saveLabel: formSaveLabel,
                       cancelLabel: t('atd.action.cancel'), onSave: save, width: '640px'">
    <div class="form-grid">
      <!-- the only required input: the analysis path -->
      <div class="form-group form-group--full"><label class="form-label" data-bind="text: t('atd.field.sourceRef')"></label>
        <input class="form-control mono" data-bind="textInput: fmSource, attr:{ placeholder: t('atd.field.sourceRef.ph') }"></div>
      <!-- optional target table (defaults to PROD.ATD_<name>, created on first run) -->
      <div class="form-group form-group--full"><label class="form-label" data-bind="text: t('atd.field.targetTable')"></label>
        <input class="form-control mono" data-bind="textInput: fmStage, attr:{ placeholder: t('atd.field.targetTable.ph') }"></div>

      <!-- ko if: !editName() -->
      <div class="form-group form-group--full">
        <p class="muted" style="margin:0 0 8px; font-size:.85em" data-bind="text: t('atd.jobs.minimalHint')"></p>
        <button type="button" class="btn btn-xs" data-bind="click: toggleAdvanced,
                text: (showAdvanced() ? '▾ ' : '▸ ') + t('atd.jobs.advanced')"></button>
      </div>
      <!-- /ko -->

      <!-- ko if: showAdvanced -->
      <!-- ko if: !editName() -->
      <div class="form-group"><label class="form-label" data-bind="text: t('atd.field.jobName')"></label>
        <input class="form-control mono" data-bind="textInput: fmJobName, attr:{ placeholder: t('atd.field.jobName.ph') }"></div>
      <!-- /ko -->
      <div class="form-group"><label class="form-label" data-bind="text: t('atd.field.env')"></label>
        <select class="form-control" data-bind="value: fmEnv, options: envs, optionsCaption: t('atd.field.auto')"></select></div>
      <div class="form-group"><label class="form-label" data-bind="text: t('atd.field.target')"></label>
        <select class="form-control" data-bind="value: fmTarget, options: targets, optionsCaption: t('atd.field.auto')"></select></div>
      <div class="form-group"><label class="form-label" data-bind="text: t('atd.field.loadMode')"></label>
        <select class="form-control" data-bind="value: fmLoadMode, options: loadModes"></select></div>
      <!-- ko if: fmLoadMode() === 'MERGE' -->
      <div class="form-group"><label class="form-label" data-bind="text: t('atd.field.finalTable')"></label>
        <input class="form-control mono" data-bind="textInput: fmFinal"></div>
      <div class="form-group"><label class="form-label" data-bind="text: t('atd.field.keyColumns')"></label>
        <input class="form-control mono" data-bind="textInput: fmKeyCols"></div>
      <!-- /ko -->
      <div class="form-group"><label class="form-label" data-bind="text: t('atd.field.priority')"></label>
        <input class="form-control" type="number" data-bind="value: fmPriority"></div>
      <div class="form-group"><label class="form-label" data-bind="text: t('atd.field.runOrder')"></label>
        <input class="form-control" type="number" data-bind="value: fmRunOrder"></div>
      <div class="form-group form-group--full"><label class="form-label" data-bind="text: t('atd.field.columnMap')"></label>
        <textarea class="form-control mono" rows="3" data-bind="textInput: fmColMap" placeholder='{"CSV Header":"TARGET_COL"}'></textarea>
        <p class="muted" style="margin:4px 0 0; font-size:.8em" data-bind="text: t('atd.field.columnMap.hint')"></p></div>
      <div class="form-group form-group--full"><label class="form-label" data-bind="text: t('atd.field.params')"></label>
        <textarea class="form-control mono" rows="2" data-bind="textInput: fmParams"></textarea></div>
      <div class="form-group">
        <label class="form-label" data-bind="text: t('atd.field.enabled')"></label>
        <div><input type="checkbox" data-bind="checked: fmEnabled"></div>
      </div>
      <!-- /ko -->
    </div>
  </edit-drawer>

  <!-- Add New OTBI Analysis — builds the analysis in OTBI via create_analysis.py -->
  <edit-drawer params="open: showAnalysisForm, vm: $vm,
                       title: t('atd.analysis.title'), saveLabel: t('atd.analysis.build'),
                       cancelLabel: t('atd.action.cancel'), onSave: saveAnalysis, width: '760px'">
    <div class="form-grid">
      <div class="form-group form-group--full"><label class="form-label" data-bind="text: t('atd.analysis.subjectArea')"></label>
        <input class="form-control" data-bind="textInput: anSubjectArea, attr:{ placeholder: t('atd.analysis.subjectArea.ph') }"></div>
      <div class="form-group"><label class="form-label" data-bind="text: t('atd.analysis.name')"></label>
        <input class="form-control" data-bind="textInput: anName, attr:{ placeholder: t('atd.analysis.name.ph') }"></div>
      <div class="form-group"><label class="form-label" data-bind="text: t('atd.field.loadMode')"></label>
        <select class="form-control" data-bind="value: anLoadMode, options: loadModes"></select></div>
      <div class="form-group form-group--full"><label class="form-label" data-bind="text: t('atd.analysis.saveFolder')"></label>
        <input class="form-control mono" data-bind="textInput: anSaveFolder, attr:{ placeholder: t('atd.analysis.saveFolder.ph') }"></div>

      <div class="form-group form-group--full">
        <label class="form-label" data-bind="text: t('atd.analysis.columns')"></label>
        <div class="data-table-wrap">
          <table class="data-table">
            <thead><tr>
              <th data-bind="text: t('atd.analysis.col.folder')"></th>
              <th data-bind="text: t('atd.analysis.col.column')"></th>
              <th data-bind="text: t('atd.analysis.col.heading')"></th>
              <th style="width:40px"></th>
            </tr></thead>
            <tbody data-bind="foreach: anColumns">
              <tr>
                <td><input class="form-control form-control--sm" data-bind="textInput: folder"></td>
                <td><input class="form-control form-control--sm" data-bind="textInput: column"></td>
                <td><input class="form-control form-control--sm" data-bind="textInput: heading"></td>
                <td style="text-align:center">
                  <button class="btn btn-xs btn-icon btn-danger" data-bind="click: function(){ $vm.removeAnColumn($data); },
                          attr:{ 'aria-label': $vm.t('atd.action.delete') }">×</button></td>
              </tr>
            </tbody>
          </table>
        </div>
        <button type="button" class="btn btn-xs" style="margin-top:8px" data-bind="click: addAnColumn, text: '+ ' + t('atd.analysis.addColumn')"></button>
        <p class="muted" style="margin:6px 0 0; font-size:.8em" data-bind="text: t('atd.analysis.hint')"></p>
      </div>

      <div class="form-group form-group--full"><label class="form-label" data-bind="text: t('atd.field.params')"></label>
        <textarea class="form-control mono" rows="2" data-bind="textInput: anParams" placeholder='[{"folder":"...","column":"...","operator":"is prompted"}]'></textarea>
        <p class="muted" style="margin:4px 0 0; font-size:.8em" data-bind="text: t('atd.analysis.queueHint')"></p></div>
    </div>
  </edit-drawer>
</div>
