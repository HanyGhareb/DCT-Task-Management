<div class="page">
  <div class="page-header-row">
    <h1 class="page-title" data-bind="text: t('atd.dash.title')"></h1>
    <div class="page-actions">
      <button class="btn btn-primary btn-sm" type="button"
              data-bind="click: refreshActuals, disable: refreshingActuals,
                         attr:{ title: t('atd.dash.refreshActualsHint') }">
        <span data-bind="text: refreshingActuals() ? t('atd.dash.refreshingActuals') : t('atd.dash.refreshActuals')"></span>
      </button>
    </div>
  </div>

  <!-- Break window banner: a paused fleet should read as intentional, not broken -->
  <!-- ko if: breakInfo() && breakInfo().enabled === 'Y' -->
  <div class="card" data-bind="style:{ borderInlineStartWidth:'4px', borderInlineStartStyle:'solid',
       borderInlineStartColor: (breakInfo().active==='Y' ? '#B5651A' : '#2A7D3A') }"
       style="margin-bottom:12px; padding:10px 14px;">
    <span style="font-weight:600" data-bind="text: (breakInfo().active==='Y' ? '⏸ ' : '▶ ') + t('atd.dash.break')"></span>
    <span class="mono" style="margin-inline-start:8px" data-bind="text: breakText()"></span>
    <span class="badge" style="margin-inline-start:8px"
          data-bind="text: (breakInfo().active==='Y' ? t('atd.dash.break.active') : t('atd.dash.break.inactive')),
                     css:{ 'badge--idle': breakInfo().active==='Y', 'badge--active': breakInfo().active!=='Y' }"></span>
  </div>
  <!-- /ko -->

  <!-- ko if: loading -->
  <div class="muted" data-bind="text: t('atd.common.loading')"></div>
  <!-- /ko -->

  <!-- ko ifnot: loading -->
  <div class="kpi-row">
    <div class="kpi" style="cursor:pointer" data-bind="click: function(){ go('jobs'); }">
      <div class="kpi__n" data-bind="text: k().jobs || 0"></div>
      <div class="kpi__l" data-bind="text: t('atd.dash.jobs')"></div>
    </div>
    <div class="kpi">
      <div class="kpi__n" data-bind="text: k().enabledJobs || 0"></div>
      <div class="kpi__l" data-bind="text: t('atd.dash.enabled')"></div>
    </div>
    <div class="kpi">
      <div class="kpi__n" data-bind="text: (k().successRate === null || k().successRate === undefined) ? '—' : (k().successRate + '%')"></div>
      <div class="kpi__l" data-bind="text: t('atd.dash.successRate')"></div>
    </div>
    <div class="kpi" style="cursor:pointer" data-bind="click: function(){ go('runs'); }">
      <div class="kpi__n" data-bind="text: k().runs24h || 0"></div>
      <div class="kpi__l" data-bind="text: t('atd.dash.runs24')"></div>
    </div>
    <div class="kpi">
      <div class="kpi__n" style="font-size:18px" data-bind="text: k().lastFinished || '—'"></div>
      <div class="kpi__l" data-bind="text: t('atd.dash.lastFinished')"></div>
    </div>
    <!-- ko if: actions -->
    <div class="kpi" style="cursor:pointer" data-bind="click: function(){ go('actions'); }">
      <div class="kpi__n" data-bind="text: (actions().ready||0) + (actions().claimed||0)"></div>
      <div class="kpi__l" data-bind="text: t('atd.dash.actionsQueued')"></div>
    </div>
    <!-- ko if: actions().failed > 0 -->
    <div class="kpi" style="cursor:pointer" data-bind="click: function(){ go('actions'); }">
      <div class="kpi__n" style="color:#C13A30" data-bind="text: actions().failed"></div>
      <div class="kpi__l" data-bind="text: t('atd.dash.actionsFailed')"></div>
    </div>
    <!-- /ko -->
    <!-- /ko -->
  </div>

  <div style="display:grid; grid-template-columns:340px 1fr; gap:16px; margin-top:16px;">
    <div class="card">
      <div class="section-heading" data-bind="text: t('atd.dash.queueState')"></div>
      <div style="height:240px"><canvas id="atdQueueChart"></canvas></div>
    </div>
    <div class="card">
      <div class="section-heading" data-bind="text: t('atd.dash.recent')"></div>
      <div class="data-table-wrap">
        <table class="data-table">
          <thead><tr>
            <th data-bind="text: t('atd.col.job')"></th>
            <th data-bind="text: t('atd.col.status')"></th>
            <th data-bind="text: t('atd.col.rows')"></th>
            <th data-bind="text: t('atd.col.host')"></th>
            <th data-bind="text: t('atd.col.finished')"></th>
          </tr></thead>
          <tbody data-bind="foreach: recent">
            <tr>
              <td class="mono" data-bind="text: $data.jobName"></td>
              <td><span data-bind="css: $vm.statusClass($data.status), text: $data.status"></span></td>
              <td data-bind="text: $data.rowCount"></td>
              <td class="mono" data-bind="text: $data.host || '—'"></td>
              <td data-bind="text: $data.finished || $data.started || '—'"></td>
            </tr>
          </tbody>
        </table>
      </div>
      <!-- ko if: recent().length === 0 -->
      <div class="empty-state" data-bind="text: t('atd.detail.noHistory')"></div>
      <!-- /ko -->
    </div>
  </div>

  <div class="card" style="margin-top:16px;">
    <div class="section-heading" data-bind="text: t('atd.dash.workers')"></div>
    <!-- ko if: workers().length === 0 -->
    <div class="empty-state" data-bind="text: t('atd.dash.noWorkers')"></div>
    <!-- /ko -->
    <!-- ko if: workers().length > 0 -->
    <div class="data-table-wrap">
      <table class="data-table">
        <thead><tr>
          <th data-bind="text: t('atd.workers.vm')"></th>
          <th data-bind="text: t('atd.col.status')"></th>
          <th data-bind="text: t('atd.workers.currentJob')"></th>
          <th data-bind="text: t('atd.workers.lastSeen')"></th>
          <th data-bind="text: t('atd.workers.sessionAge')"></th>
          <th data-bind="text: t('atd.workers.runs24')"></th>
          <th data-bind="text: t('atd.workers.refresh')"></th>
        </tr></thead>
        <tbody data-bind="foreach: workers">
          <tr>
            <td class="mono">
              <span data-bind="style:{ color: $vm.workerDot($data) }">&#9679;</span>
              <span data-bind="text: $data.workerId"></span>
            </td>
            <td><span data-bind="css: $vm.statusClass($data.status), text: $data.status"></span></td>
            <td class="mono" data-bind="text: $data.currentJob || '—'"></td>
            <td data-bind="text: $vm.workerAge($data) + ' ' + $root.t('atd.workers.ago')"></td>
            <td data-bind="text: $vm.sessionAge($data), style:{ color: ($vm.sessionAged($data) ? '#B5651A' : ''), fontWeight: ($vm.sessionAged($data) ? '600' : '') }"></td>
            <td data-bind="text: $data.runs24h"></td>
            <td>
              <button class="btn btn-xs btn-secondary"
                      data-bind="click: function(){ $vm.refreshWorker($data); },
                                 attr:{ title: $root.t('atd.workers.refresh.hint') }">
                <span data-bind="text: $root.t('atd.workers.refresh')"></span>
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
    <!-- /ko -->
  </div>

  <div class="card" style="margin-top:16px;">
    <div class="section-heading" data-bind="text: t('atd.dash.jobHealth')"></div>
    <!-- ko if: jobHealth().length === 0 -->
    <div class="empty-state" data-bind="text: t('atd.dash.noEnabledJobs')"></div>
    <!-- /ko -->
    <!-- ko if: jobHealth().length > 0 -->
    <div class="data-table-wrap">
      <table class="data-table">
        <thead><tr>
          <th data-bind="text: t('atd.col.job')"></th>
          <th data-bind="text: t('atd.jobHealth.lastSuccess')"></th>
          <th data-bind="text: t('atd.jobHealth.since')"></th>
          <th data-bind="text: t('atd.jobHealth.fails')"></th>
          <th data-bind="text: t('atd.jobHealth.stuck')"></th>
          <th data-bind="text: t('atd.field.frequency')"></th>
        </tr></thead>
        <tbody data-bind="foreach: jobHealth">
          <tr data-bind="style:{ background: ($vm.jobStale($data) ? 'rgba(193,58,48,.06)' : '') }">
            <td class="mono" data-bind="text: $data.jobName"></td>
            <td data-bind="text: $data.lastSuccess || '—'"></td>
            <td data-bind="text: $vm.sinceText($data)"></td>
            <td>
              <!-- ko if: Number($data.consecutiveFails) > 0 -->
              <span class="badge badge--idle" style="color:#C13A30" data-bind="text: $data.consecutiveFails"></span>
              <!-- /ko -->
              <!-- ko ifnot: Number($data.consecutiveFails) > 0 --><span class="muted">0</span><!-- /ko -->
            </td>
            <td>
              <!-- ko if: $data.stuckRunning === 'Y' --><span class="badge badge--idle" style="color:#C13A30" data-bind="text: $root.t('atd.jobHealth.stuckYes')"></span><!-- /ko -->
              <!-- ko ifnot: $data.stuckRunning === 'Y' --><span class="muted">—</span><!-- /ko -->
            </td>
            <td class="mono" data-bind="text: ($data.frequencyMin === '' || $data.frequencyMin == null) ? $root.t('atd.field.auto') : ($data.frequencyMin + 'm')"></td>
          </tr>
        </tbody>
      </table>
    </div>
    <!-- /ko -->
  </div>

  <div class="card" style="margin-top:16px;">
    <div class="section-heading" data-bind="text: t('atd.dash.alerts')"></div>
    <!-- ko if: alerts().length === 0 -->
    <div class="empty-state" data-bind="text: t('atd.dash.noAlerts')"></div>
    <!-- /ko -->
    <!-- ko if: alerts().length > 0 -->
    <div class="data-table-wrap">
      <table class="data-table">
        <thead><tr>
          <th data-bind="text: t('atd.col.job')"></th>
          <th data-bind="text: t('atd.col.status')"></th>
          <th data-bind="text: t('atd.col.host')"></th>
          <th data-bind="text: t('atd.runs.detail.message')"></th>
          <th data-bind="text: t('atd.col.started')"></th>
        </tr></thead>
        <tbody data-bind="foreach: alerts">
          <tr>
            <td class="mono" data-bind="text: $data.jobName"></td>
            <td><span data-bind="css: $vm.statusClass($data.kind || $data.status), text: $data.kind || $data.status"></span></td>
            <td class="mono" data-bind="text: $data.host || '—'"></td>
            <td class="truncate-cell" data-bind="text: $data.message, attr:{ title: $data.message }"></td>
            <td data-bind="text: $data.started || '—'"></td>
          </tr>
        </tbody>
      </table>
    </div>
    <!-- /ko -->
  </div>
  <!-- /ko -->
</div>
