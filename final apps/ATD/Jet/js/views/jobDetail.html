<div class="page">
  <div class="page-header-row">
    <h1 class="page-title">
      <span data-bind="text: t('atd.detail.title') + ' · '"></span>
      <span class="mono" data-bind="text: job().jobName || ''"></span>
    </h1>
    <div class="page-actions">
      <button class="btn btn-secondary" data-bind="click: back, text: t('atd.action.back')"></button>
      <button class="btn btn-secondary" data-bind="click: function(){ reprepare(false); }, text: t('atd.action.remap'),
              attr:{ title: t('atd.action.remap.hint') }"></button>
      <button class="btn btn-secondary btn-danger" data-bind="click: function(){ reprepare(true); }, text: t('atd.action.rebuild'),
              attr:{ title: t('atd.action.rebuild.hint') }"></button>
      <button class="btn btn-primary" data-bind="click: enqueue, text: t('atd.action.enqueue')"></button>
    </div>
  </div>

  <!-- ko if: loading -->
  <div class="muted" data-bind="text: t('atd.common.loading')"></div>
  <!-- /ko -->

  <!-- ko ifnot: loading -->
  <div class="card">
    <div class="section-heading" data-bind="text: t('atd.detail.config')"></div>
    <div class="form-grid" style="padding:8px 0;">
      <div class="form-group"><label class="form-label" data-bind="text: t('atd.field.env')"></label><div class="mono" data-bind="text: job().envName"></div></div>
      <div class="form-group"><label class="form-label" data-bind="text: t('atd.field.target')"></label><div class="mono" data-bind="text: job().targetName"></div></div>
      <div class="form-group form-group--full"><label class="form-label" data-bind="text: t('atd.field.sourceRef')"></label><div class="mono" data-bind="text: job().sourceRef"></div></div>
      <div class="form-group"><label class="form-label" data-bind="text: t('atd.field.stageTable')"></label><div class="mono" data-bind="text: job().stageTable"></div></div>
      <div class="form-group"><label class="form-label" data-bind="text: t('atd.field.loadMode')"></label><div data-bind="text: job().loadMode"></div></div>
      <div class="form-group"><label class="form-label" data-bind="text: t('atd.field.priority')"></label><div data-bind="text: (job().priority || 0) + ' · ' + (job().runOrder || 0)"></div></div>
      <div class="form-group"><label class="form-label" data-bind="text: t('atd.field.frequency')"></label><div data-bind="text: (job().frequencyMinutes === '' || job().frequencyMinutes == null) ? t('atd.field.auto') : (job().frequencyMinutes + 'm')"></div></div>
      <div class="form-group"><label class="form-label" data-bind="text: t('atd.col.status')"></label><div><span data-bind="css: statusClass(job().runStatus), text: job().runStatus"></span></div></div>
      <!-- ko if: job().finalTable -->
      <div class="form-group"><label class="form-label" data-bind="text: t('atd.field.finalTable')"></label><div class="mono" data-bind="text: job().finalTable"></div></div>
      <div class="form-group"><label class="form-label" data-bind="text: t('atd.field.keyColumns')"></label><div class="mono" data-bind="text: job().keyColumns"></div></div>
      <!-- /ko -->
      <!-- ko if: job().columnMapJson -->
      <div class="form-group form-group--full"><label class="form-label" data-bind="text: t('atd.field.columnMap')"></label><pre class="mono" style="white-space:pre-wrap;margin:0" data-bind="text: job().columnMapJson"></pre></div>
      <!-- /ko -->
    </div>
  </div>

  <!-- Schema review / editor: edit the staging table's column names + data types
       and the table name; nothing applies until Apply (drop + recreate, reloads next run) -->
  <div class="card" style="margin-top:16px;">
    <div class="section-heading-row">
      <div class="section-heading" data-bind="text: t('atd.schema.title')"></div>
      <div class="region-actions">
        <button class="btn btn-sm btn-secondary" data-bind="click: toggleSchema,
                text: (schemaOpen() ? '▾ ' : '▸ ') + t('atd.schema.toggle')"></button>
        <!-- ko if: schemaOpen -->
        <button class="btn btn-sm btn-secondary" data-bind="click: loadSchema, text: t('atd.schema.reload')"></button>
        <button class="btn btn-sm btn-primary" data-bind="click: applySchema, text: t('atd.schema.apply')"></button>
        <!-- /ko -->
      </div>
    </div>

    <!-- ko if: schemaOpen -->
    <p class="muted" style="margin:6px 0 10px; font-size:.85em" data-bind="text: t('atd.schema.hint')"></p>
    <!-- ko if: schemaLoading --><div class="muted" data-bind="text: t('atd.common.loading')"></div><!-- /ko -->
    <!-- ko ifnot: schemaLoading -->
    <div class="form-group" style="max-width:440px;">
      <label class="form-label" data-bind="text: t('atd.schema.tableName')"></label>
      <input class="form-control mono" data-bind="textInput: schemaTable">
    </div>
    <!-- ko if: schemaCols().length === 0 -->
    <div class="empty-state" data-bind="text: t('atd.schema.noTable')"></div>
    <!-- /ko -->
    <!-- ko if: schemaCols().length > 0 -->
    <div class="data-table-wrap" style="margin-top:10px;">
      <table class="data-table">
        <thead><tr>
          <th data-bind="text: t('atd.schema.col.header')"></th>
          <th data-bind="text: t('atd.schema.col.name')"></th>
          <th data-bind="text: t('atd.schema.col.type')"></th>
          <th data-bind="text: t('atd.schema.col.sample')"></th>
        </tr></thead>
        <tbody data-bind="foreach: schemaCols">
          <tr>
            <td class="mono muted" data-bind="text: $data.header || '—'"></td>
            <td><input class="form-control form-control--sm mono" data-bind="textInput: $data.name"></td>
            <td><select class="form-control form-control--sm mono" data-bind="value: $data.type, options: $vm.typeOptions"></select></td>
            <td class="mono muted truncate-cell" data-bind="text: $data.sample, attr:{ title: $data.sample }"></td>
          </tr>
        </tbody>
      </table>
    </div>
    <!-- /ko -->
    <!-- /ko -->
    <!-- /ko -->
  </div>

  <div class="card" style="margin-top:16px;">
    <div class="section-heading" data-bind="text: t('atd.detail.history')"></div>
    <!-- ko if: history().length === 0 -->
    <div class="empty-state" data-bind="text: t('atd.detail.noHistory')"></div>
    <!-- /ko -->
    <!-- ko if: history().length > 0 -->
    <div class="data-table-wrap">
      <table class="data-table">
        <thead><tr>
          <th data-bind="text: t('atd.col.run')"></th>
          <th data-bind="text: t('atd.col.status')"></th>
          <th data-bind="text: t('atd.col.rows')"></th>
          <th data-bind="text: t('atd.col.started')"></th>
          <th data-bind="text: t('atd.col.duration')"></th>
          <th data-bind="text: t('atd.col.host')"></th>
          <th data-bind="text: t('atd.col.message')"></th>
        </tr></thead>
        <tbody data-bind="foreach: historyPage">
          <tr>
            <td data-bind="text: $data.runId"></td>
            <td>
              <span data-bind="css: $vm.statusClass($data.status), text: $data.status"></span>
              <!-- ko if: $data.warn === 'Y' -->
              <span class="rstat rstat--WARNING" style="margin-inline-start:6px"
                    data-bind="text: $vm.t('atd.runs.warn')"></span>
              <!-- /ko -->
            </td>
            <td data-bind="text: $data.rowCount"></td>
            <td data-bind="text: $data.started || '—'"></td>
            <td class="mono" data-bind="text: ($data.durationSec != null ? $vm.fmtDuration($data.durationSec) : '—')"></td>
            <td class="mono muted" data-bind="text: $data.host || '—'"></td>
            <td class="truncate-cell" style="max-width:520px"
                data-bind="css: { 'rstat--FAILED-text': $data.status === 'FAILED' },
                           text: $data.message || '', attr:{ title: $data.message }"></td>
          </tr>
        </tbody>
      </table>
    </div>
    <list-pager params="offset: offset, limit: limit, total: total, onChange: noop"></list-pager>
    <!-- /ko -->
  </div>
  <!-- /ko -->
</div>
