<div class="page">
  <div class="page-header-row">
    <h1 class="page-title" data-bind="text: t('atd.rs.title')"></h1>
    <div class="page-actions">
      <button class="btn btn-primary" data-bind="click: save, disable: saving, text: t('atd.rs.save')"></button>
    </div>
  </div>

  <div class="muted" style="margin-bottom:14px" data-bind="text: t('atd.rs.intro')"></div>

  <!-- ko if: loading --><div class="muted" data-bind="text: t('atd.common.loading')"></div><!-- /ko -->

  <!-- ko ifnot: loading -->
  <div class="card">
    <div class="data-table-wrap">
      <table class="data-table">
        <thead><tr>
          <th style="width:230px" data-bind="text: t('atd.col.status')"></th>
          <th data-bind="text: t('atd.field.description')"></th>
          <th style="width:300px"></th>
          <th style="width:130px" data-bind="text: t('atd.rs.updated')"></th>
        </tr></thead>
        <tbody data-bind="foreach: items">
          <tr>
            <td><span class="mono" data-bind="text: $data.key"></span></td>
            <td class="muted" data-bind="text: $data.description"></td>
            <td>
              <!-- ko if: $data.isSecret === 'Y' -->
              <span class="badge" data-bind="text: $data.secretSet === 'Y' ? $vm.t('atd.rs.secretSet') : $vm.t('atd.rs.notSet'),
                                              css: { 'badge--active': $data.secretSet === 'Y', 'badge--idle': $data.secretSet !== 'Y' }"></span>
              <!-- /ko -->
              <!-- ko if: $data.isSecret !== 'Y' && $data.valueType === 'ENUM' -->
              <select class="form-control form-control--sm" data-bind="value: $data.val, options: $data.enumList"></select>
              <!-- /ko -->
              <!-- ko if: $data.isSecret !== 'Y' && $data.valueType === 'NUMBER' -->
              <input class="form-control form-control--sm" type="number" data-bind="value: $data.val">
              <!-- /ko -->
              <!-- ko if: $data.isSecret !== 'Y' && $data.valueType !== 'ENUM' && $data.valueType !== 'NUMBER' -->
              <input class="form-control form-control--sm mono" type="text" data-bind="value: $data.val">
              <!-- /ko -->
            </td>
            <td class="muted" data-bind="text: $data.updatedAt || '—'"></td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
  <!-- /ko -->
</div>
