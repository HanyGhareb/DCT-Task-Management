<div class="page">
  <div class="page-header-row">
    <h1 class="page-title" data-bind="text: t('atd.targets.title')"></h1>
    <div class="page-actions">
      <button class="btn btn-primary" data-bind="click: newTarget, text: '+ ' + t('atd.targets.new')"></button>
    </div>
  </div>

  <!-- ko if: loading --><div class="muted" data-bind="text: t('atd.common.loading')"></div><!-- /ko -->

  <!-- ko ifnot: loading -->
  <!-- ko if: targets().length === 0 --><div class="empty-state" data-bind="text: t('atd.targets.empty')"></div><!-- /ko -->
  <!-- ko if: targets().length > 0 -->
  <div class="data-table-wrap">
    <table class="data-table">
      <thead><tr>
        <th data-bind="text: t('atd.targets.col.name')"></th>
        <th data-bind="text: t('atd.targets.col.kind')"></th>
        <th data-bind="text: t('atd.targets.col.schema')"></th>
        <th data-bind="text: t('atd.jobs.col.enabled')"></th>
        <th style="width:140px;"></th>
      </tr></thead>
      <tbody data-bind="foreach: targets">
        <tr>
          <td class="mono" data-bind="text: $data.targetName"></td>
          <td><span class="badge badge--info" data-bind="text: $data.dbKind"></span></td>
          <td class="mono" data-bind="text: $data.schemaName || '—'"></td>
          <td><span class="badge" data-bind="text: $data.enabled, css: { 'badge--active': $data.enabled==='Y', 'badge--idle': $data.enabled!=='Y' }"></span></td>
          <td class="cell-actions" style="text-align:end;">
            <button class="btn btn-xs" data-bind="click: function(){ $vm.editTarget($data); }, text: $vm.t('atd.action.edit')"></button>
            <button class="btn btn-xs btn-danger" data-bind="click: function(){ $vm.del($data); }, text: $vm.t('atd.action.delete')"></button>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
  <!-- /ko -->
  <!-- /ko -->

  <edit-drawer params="open: showForm, vm: $vm,
                       title: formTitle, saveLabel: formSaveLabel,
                       cancelLabel: t('atd.action.cancel'), onSave: save, width: '560px'">
    <div class="form-grid">
      <!-- ko if: !editName() -->
      <div class="form-group"><label class="form-label" data-bind="text: t('atd.targets.col.name')"></label><input class="form-control mono" data-bind="textInput: fmName"></div>
      <!-- /ko -->
      <div class="form-group"><label class="form-label" data-bind="text: t('atd.field.dbKind')"></label>
        <select class="form-control" data-bind="value: fmKind, options: kinds"></select></div>
      <div class="form-group form-group--full"><label class="form-label" data-bind="text: t('atd.field.description')"></label><input class="form-control" data-bind="textInput: fmDesc"></div>
      <div class="form-group"><label class="form-label" data-bind="text: t('atd.field.schemaName')"></label><input class="form-control mono" data-bind="textInput: fmSchema"></div>
      <div class="form-group"><label class="form-label" data-bind="text: t('atd.field.tnsAlias')"></label><input class="form-control mono" data-bind="textInput: fmTns"></div>
      <!-- ko if: fmKind() === 'REMOTE' -->
      <div class="form-group form-group--full"><label class="form-label" data-bind="text: t('atd.field.dbLink')"></label><input class="form-control mono" data-bind="textInput: fmLink"></div>
      <!-- /ko -->
      <div class="form-group"><label class="form-label" data-bind="text: t('atd.field.enabled')"></label><div><input type="checkbox" data-bind="checked: fmEnabled"></div></div>
    </div>
  </edit-drawer>
</div>
