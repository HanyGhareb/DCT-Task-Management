<div class="page-wrap">
  <div class="page-header">
    <div class="page-header-row">
      <div>
        <div class="page-title">Document Expiry Tracker</div>
        <div class="page-subtitle" data-bind="text: filtered().length + ' document(s) shown · expiring within ' + filterDays() + ' days'"></div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">
        <select class="form-control" style="width:auto" data-bind="value: filterDays, event: { change: refresh }">
          <option value="30">30 days</option>
          <option value="60">60 days</option>
          <option value="90" selected>90 days</option>
        </select>
        <button class="btn btn-secondary" data-bind="click: refresh">&#8635; Refresh</button>
      </div>
    </div>
  </div>

  <!-- ko if: loading() -->
  <div class="empty-state"><div class="empty-state__icon">&#128196;</div><div class="empty-state__msg">Loading…</div></div>
  <!-- /ko -->

  <!-- ko ifnot: loading() -->

  <!-- Alert filter chips -->
  <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px">
    <button class="btn btn-secondary btn-sm" data-bind="css: { 'btn-primary': filterAlert() === '' }, click: function(){ filterAlert(''); }">All</button>
    <button class="btn btn-sm" style="background:#fff3f0;color:#b71c1c;border:1px solid #ffc5bc"
            data-bind="css: { 'btn-primary': filterAlert() === 'EXPIRED' }, click: function(){ setFilter('EXPIRED'); }">
      &#9940; Expired (<span data-bind="text: counts().expired"></span>)
    </button>
    <button class="btn btn-sm" style="background:#e3f2fd;color:#1565C0;border:1px solid #bbdefb"
            data-bind="css: { 'btn-primary': filterAlert() === 'CRITICAL' }, click: function(){ setFilter('CRITICAL'); }">
      &#9888; Critical ≤30d (<span data-bind="text: counts().critical"></span>)
    </button>
    <button class="btn btn-sm" style="background:#fff8e1;color:#F57F17;border:1px solid #ffecb3"
            data-bind="css: { 'btn-primary': filterAlert() === 'WARNING' }, click: function(){ setFilter('WARNING'); }">
      &#128312; Warning ≤60d (<span data-bind="text: counts().warning"></span>)
    </button>
    <button class="btn btn-sm" style="background:#e8f5e9;color:#2E7D32;border:1px solid #c8e6c9"
            data-bind="css: { 'btn-primary': filterAlert() === 'UPCOMING' }, click: function(){ setFilter('UPCOMING'); }">
      &#128310; Upcoming ≤90d (<span data-bind="text: counts().upcoming"></span>)
    </button>
    <input class="search-box" type="text" placeholder="Search name or type…" style="max-width:240px" data-bind="value: searchQ, valueUpdate: 'input'">
  </div>

  <!-- ko if: filtered().length === 0 -->
  <div class="empty-state"><div class="empty-state__icon">&#10004;</div><div class="empty-state__msg">No documents match</div><div class="empty-state__sub">All documents are current within the selected window.</div></div>
  <!-- /ko -->

  <!-- ko ifnot: filtered().length === 0 -->
  <div class="card">
    <div class="data-table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th>Employee</th>
            <th>Section</th>
            <th>Document Type</th>
            <th>Doc Number</th>
            <th>Expiry Date</th>
            <th>Days</th>
            <th>Alert</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody>
          <!-- ko foreach: filtered() -->
          <tr style="cursor:pointer" data-bind="click: $parent.openEmployee.bind($parent, $data)">
            <td><span class="link-text" data-bind="text: fullNameEn || full_name_en"></span></td>
            <td style="font-size:12px;color:#6e6e73" data-bind="text: orgNameEn || org_name_en || '—'"></td>
            <td data-bind="text: docType || doc_type || '—'"></td>
            <td style="font-family:monospace;font-size:12px" data-bind="text: docNumber || doc_number || '—'"></td>
            <td data-bind="text: expiryDate || expiry_date || '—'"></td>
            <td style="font-weight:700" data-bind="text: (daysUntilExpiry != null ? daysUntilExpiry : days_until_expiry != null ? days_until_expiry : '—')"></td>
            <td><span data-bind="class: $parent.alertClass(expiryAlert || expiry_alert), text: expiryAlert || expiry_alert || '—'"></span></td>
            <td style="font-size:12px;color:#6e6e73" data-bind="text: docStatus || doc_status || '—'"></td>
          </tr>
          <!-- /ko -->
        </tbody>
      </table>
    </div>
  </div>
  <!-- /ko -->

  <!-- /ko -->
</div>
