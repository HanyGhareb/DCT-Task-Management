<div class="page-wrap">
  <div class="page-header">
    <div class="page-header-row">
      <div>
        <div class="page-title">Employee Grades</div>
        <div class="page-subtitle" data-bind="text: filtered().length + ' grade(s)'"></div>
      </div>
      <!-- ko if: isAdmin || isMgr -->
      <button class="btn btn-primary" data-bind="click: openAdd">&#43; Add Grade</button>
      <!-- /ko -->
    </div>
  </div>

  <!-- ko if: error() -->
  <div class="alert-banner alert-banner--danger" data-bind="text: error"></div>
  <!-- /ko -->
  <!-- ko if: saved() -->
  <div class="alert-banner alert-banner--success" data-bind="text: saved"></div>
  <!-- /ko -->

  <div class="card">
    <div class="view-toolbar" style="margin-bottom:12px">
      <input class="search-box" type="text" placeholder="Search grade code or name…" data-bind="value: searchQ, valueUpdate: 'input'">
    </div>

    <!-- ko if: loading() -->
    <div class="empty-state"><div class="empty-state__icon">&#127942;</div><div class="empty-state__msg">Loading…</div></div>
    <!-- /ko -->
    <!-- ko ifnot: loading() -->
    <!-- ko if: filtered().length === 0 -->
    <div class="empty-state"><div class="empty-state__icon">&#127942;</div><div class="empty-state__msg">No grades found</div></div>
    <!-- /ko -->
    <!-- ko ifnot: filtered().length === 0 -->
    <div class="data-table-wrap">
      <table class="data-table">
        <thead>
          <tr>
            <th>Code</th><th>Name</th><th>Level</th><th>Category</th>
            <th style="text-align:right">Min Salary</th><th style="text-align:right">Max Salary</th>
            <th>Status</th><th></th>
          </tr>
        </thead>
        <tbody>
          <!-- ko foreach: filtered() -->
          <tr>
            <td><span class="badge badge--info" data-bind="text: gradeCode"></span></td>
            <td>
              <div style="font-weight:600;font-size:13px" data-bind="text: gradeNameEn"></div>
              <!-- ko if: gradeNameAr -->
              <div style="font-size:11px;color:#6e6e73;direction:rtl" data-bind="text: gradeNameAr"></div>
              <!-- /ko -->
            </td>
            <td style="text-align:center;font-weight:600" data-bind="text: gradeLevel"></td>
            <td style="font-size:12px;color:#6e6e73" data-bind="text: gradeCategory || '—'"></td>
            <td style="text-align:right;font-size:12px" data-bind="text: salaryBandMin ? Number(salaryBandMin).toLocaleString() : '—'"></td>
            <td style="text-align:right;font-size:12px" data-bind="text: salaryBandMax ? Number(salaryBandMax).toLocaleString() : '—'"></td>
            <td>
              <!-- ko if: isActive === 'Y' --><span class="badge badge--active">Active</span><!-- /ko -->
              <!-- ko ifnot: isActive === 'Y' --><span class="badge badge--inactive">Inactive</span><!-- /ko -->
            </td>
            <td>
              <!-- ko if: $parent.isAdmin || $parent.isMgr -->
              <button class="btn btn-sm btn-secondary" style="padding:2px 8px;font-size:11px"
                data-bind="click: function(d,e){ e.stopPropagation(); $parent.openEdit($data); }">Edit</button>
              <!-- /ko -->
            </td>
          </tr>
          <!-- /ko -->
        </tbody>
      </table>
    </div>
    <!-- /ko -->
    <!-- /ko -->
  </div>
</div>

<!-- Add / Edit Grade Modal -->
<!-- ko if: showModal() -->
<div class="modal-backdrop" data-bind="click: closeModal">
  <div class="modal-box" data-bind="click: function(d,e){ e.stopPropagation(); }">
    <div class="modal-header">
      <div class="modal-title" data-bind="text: editingCode() ? 'Edit Grade' : 'Add Grade'"></div>
      <button class="modal-close" data-bind="click: closeModal">&#10005;</button>
    </div>
    <div class="modal-body">
      <!-- ko if: formError() -->
      <div class="alert-banner alert-banner--danger" style="margin-bottom:12px" data-bind="text: formError"></div>
      <!-- /ko -->
      <div class="form-grid">
        <div class="form-group">
          <div class="form-label">Grade Code <span style="color:red">*</span></div>
          <input class="form-control" type="text" placeholder="e.g. G5" data-bind="value: form.grade_code, valueUpdate:'input', attr:{disabled:!!editingCode()}">
        </div>
        <div class="form-group">
          <div class="form-label">Grade Name (EN) <span style="color:red">*</span></div>
          <input class="form-control" type="text" placeholder="e.g. Senior Officer" data-bind="value: form.grade_name_en, valueUpdate:'input'">
        </div>
        <div class="form-group">
          <div class="form-label">Grade Name (AR)</div>
          <input class="form-control" type="text" dir="rtl" data-bind="value: form.grade_name_ar, valueUpdate:'input'">
        </div>
        <div class="form-group">
          <div class="form-label">Grade Level <span style="color:red">*</span></div>
          <input class="form-control" type="number" min="1" placeholder="1" data-bind="value: form.grade_level, valueUpdate:'input'">
        </div>
        <div class="form-group">
          <div class="form-label">Category</div>
          <select class="form-control" data-bind="value: form.grade_category">
            <option value="GENERAL">General</option>
            <option value="TECHNICAL">Technical</option>
            <option value="MANAGERIAL">Managerial</option>
            <option value="EXECUTIVE">Executive</option>
          </select>
        </div>
        <div class="form-group">
          <div class="form-label">Status</div>
          <select class="form-control" data-bind="value: form.is_active">
            <option value="Y">Active</option>
            <option value="N">Inactive</option>
          </select>
        </div>
        <div class="form-group">
          <div class="form-label">Min Salary (AED)</div>
          <input class="form-control" type="number" min="0" data-bind="value: form.salary_band_min, valueUpdate:'input'">
        </div>
        <div class="form-group">
          <div class="form-label">Max Salary (AED)</div>
          <input class="form-control" type="number" min="0" data-bind="value: form.salary_band_max, valueUpdate:'input'">
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-secondary" data-bind="click: closeModal">Cancel</button>
      <button class="btn btn-primary" data-bind="click: saveGrade, disable: saving()">
        <!-- ko if: saving() -->Saving…<!-- /ko --><!-- ko ifnot: saving() -->Save Grade<!-- /ko -->
      </button>
    </div>
  </div>
</div>
<!-- /ko -->
