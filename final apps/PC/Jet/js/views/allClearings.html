<div class="page-wrap">
  <div class="page-header-row page-header">
    <div>
      <div class="page-title">&#128205; All Clearings</div>
      <div class="page-subtitle">Organisation-wide clearing requests</div>
    </div>
  </div>

  <div class="view-toolbar">
    <input class="search-box" type="text" placeholder="Search by CLR number, PC number, or employee&hellip;"
           data-bind="value: search, valueUpdate: 'input'">
    <select class="form-control" style="max-width:200px" data-bind="value: filterStatus">
      <!-- ko foreach: STATUS_OPTIONS -->
      <option data-bind="value: $data.value, text: $data.label"></option>
      <!-- /ko -->
    </select>
    <span style="font-size:12px;color:var(--text-secondary)" data-bind="text: filtered().length + ' record(s)'"></span>
  </div>

  <!-- ko if: loading() -->
  <div class="empty-state"><div class="empty-state__msg">Loading&hellip;</div></div>
  <!-- /ko -->
  <!-- ko ifnot: loading() -->
  <div class="data-table-wrap">
    <table class="data-table">
      <thead>
        <tr><th>CLR Number</th><th>PC Number</th><th>Employee</th><th>Type</th><th>Advance (AED)</th><th>Spent (AED)</th><th>Refunded (AED)</th><th>Coding</th><th>Status</th><th>Submitted</th><th></th></tr>
      </thead>
      <tbody>
        <!-- ko foreach: filtered() -->
        <tr style="cursor:pointer" data-bind="click: $parent.viewDetail.bind($parent,$data)">
          <td><strong class="link-text" data-bind="text: clearingNumber"></strong></td>
          <td data-bind="text: pcNumber"></td>
          <td>
            <div data-bind="text: employeeName"></div>
            <div style="font-size:11px;color:var(--text-secondary)" data-bind="text: employeeNumber"></div>
          </td>
          <td><span data-bind="css: pcType === 'PERMANENT' ? 'badge badge--idle' : 'badge badge--info', text: pcType"></span></td>
          <td data-bind="text: $parent.fmtAmount(advanceAmount)"></td>
          <td><strong data-bind="text: $parent.fmtAmount(amountSpent)"></strong></td>
          <td data-bind="text: $parent.fmtAmount(amountRefunded)"></td>
          <td><span class="badge badge--admin" data-bind="text: codingType"></span></td>
          <td><span data-bind="css: $parent.statusClass(status), text: status.replace('_',' ')"></span></td>
          <td data-bind="text: $parent.fmtDate(submittedAt)"></td>
          <td><button class="btn btn-secondary btn-sm" data-bind="click: function(){ $parent.viewDetail($data); }, clickBubble:false">View</button></td>
        </tr>
        <!-- /ko -->
      </tbody>
    </table>
  </div>
  <!-- /ko -->
</div>
