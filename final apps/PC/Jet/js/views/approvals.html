<div class="page-wrap">
  <div class="page-header-row page-header">
    <div>
      <div class="page-title">&#9989; Pending Approvals</div>
      <div class="page-subtitle">Review and action petty cash requests awaiting your approval</div>
    </div>
    <span class="badge badge--warning" style="font-size:14px" data-bind="text: filtered().length + ' pending'"></span>
  </div>

  <div class="view-toolbar">
    <input class="search-box" type="text" placeholder="Search by reference or employee&hellip;"
           data-bind="value: search, valueUpdate: 'input'">
  </div>

  <!-- ko if: loading() -->
  <div class="empty-state"><div class="empty-state__icon">&#128336;</div><div class="empty-state__msg">Loading&hellip;</div></div>
  <!-- /ko -->
  <!-- ko ifnot: loading() -->
  <!-- ko if: filtered().length === 0 -->
  <div class="empty-state">
    <div class="empty-state__icon">&#9989;</div>
    <div class="empty-state__msg">No pending approvals</div>
    <div class="empty-state__sub">All requests have been processed</div>
  </div>
  <!-- /ko -->
  <!-- ko ifnot: filtered().length === 0 -->
  <div class="data-table-wrap">
    <table class="data-table">
      <thead>
        <tr>
          <th>Reference</th><th>Type</th><th>Submitted By</th><th>Amount (AED)</th>
          <th>Current Step</th><th>Submitted</th><th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <!-- ko foreach: filtered() -->
        <tr>
          <td><strong data-bind="text: requestRef"></strong></td>
          <td><span data-bind="css: $parent.typeClass(requestType), text: $parent.typeLabel(requestType)"></span></td>
          <td data-bind="text: submittedBy"></td>
          <td><strong data-bind="text: amount != null ? $parent.fmtAmount(amount) : '—'"></strong></td>
          <td style="font-size:12px" data-bind="text: currentStep"></td>
          <td data-bind="text: $parent.fmtDate(submittedAt)"></td>
          <td>
            <div class="table-actions">
              <button class="btn btn-primary btn-sm" data-bind="click: $parent.openModal.bind($parent, $data)">&#128221; Action</button>
              <button class="btn btn-secondary btn-sm" data-bind="click: $parent.viewSource.bind($parent, $data)">View</button>
            </div>
          </td>
        </tr>
        <!-- /ko -->
      </tbody>
    </table>
  </div>
  <!-- /ko -->
  <!-- /ko -->

  <!-- Approval Modal -->
  <!-- ko if: modalOpen() -->
  <div class="modal-overlay" data-bind="click: closeModal">
    <div class="modal-box" data-bind="clickBubble: false" style="max-width:480px">
      <div class="modal-header">
        <span style="font-size:16px;font-weight:700">&#128221; Approval Action</span>
        <div class="region-actions">
          <button class="btn btn-secondary btn-sm" data-bind="click: closeModal">Cancel</button>
          <button class="btn btn-primary btn-sm" data-bind="click: submitAction, enable: !modalSaving()">
            <!-- ko if: modalSaving() -->Processing&hellip;<!-- /ko -->
            <!-- ko ifnot: modalSaving() -->Confirm<!-- /ko -->
          </button>
        </div>
      </div>
      <div class="modal-body">
        <!-- ko if: modalItem() -->
        <div style="background:#f9f9f9;border-radius:8px;padding:12px;margin-bottom:16px;font-size:13px">
          <div><strong data-bind="text: modalItem().requestRef"></strong></div>
          <div style="color:var(--text-secondary)">Submitted by <span data-bind="text: modalItem().submittedBy"></span></div>
          <div style="margin-top:4px">Current Step: <strong data-bind="text: modalItem().currentStep"></strong></div>
        </div>
        <!-- /ko -->

        <!-- ko if: modalError() -->
        <div class="alert-banner alert-banner--danger" style="margin-bottom:12px"><span>&#9888;</span> <span data-bind="text: modalError()"></span></div>
        <!-- /ko -->

        <div class="form-group" style="margin-bottom:14px">
          <label class="form-label">Decision <span class="required">*</span></label>
          <div style="display:flex;gap:12px;margin-top:8px">
            <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer">
              <input type="radio" value="APPROVED" data-bind="checked: modalAction"> <span style="color:#2E7D32;font-weight:600">&#10003; Approve</span>
            </label>
            <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer">
              <input type="radio" value="REJECTED" data-bind="checked: modalAction"> <span style="color:#C74634;font-weight:600">&#10007; Reject</span>
            </label>
            <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer">
              <input type="radio" value="RETURNED" data-bind="checked: modalAction"> <span style="color:#E65100;font-weight:600">&#8617; Return</span>
            </label>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label">
            Comments
            <!-- ko if: commentRequired() --><span class="required">*</span><!-- /ko -->
            <!-- ko ifnot: commentRequired() --><span style="font-weight:400;color:var(--text-secondary)">(optional)</span><!-- /ko -->
          </label>
          <textarea class="form-control" rows="4" placeholder="Enter your comments&hellip;"
                    data-bind="value: modalComment, valueUpdate: 'input'"></textarea>
        </div>
      </div>
    </div>
  </div>
  <!-- /ko -->

</div>
