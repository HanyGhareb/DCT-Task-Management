<div class="page-wrap">
  <div class="page-header-row page-header">
    <div>
      <div class="page-title">&#128202; All Petty Cash</div>
      <div class="page-subtitle"><span class="mono" data-bind="text: total()"></span> organisation-wide petty cash advances</div>
    </div>
  </div>

  <div class="view-toolbar">
    <input class="search-box" type="text" placeholder="&#128269; Search by PC number, employee, or org&hellip;"
           data-bind="value: search, valueUpdate: 'input'">
    <select class="form-control" style="max-width:220px" data-bind="value: filterStatus">
      <!-- ko foreach: STATUS_OPTIONS -->
      <option data-bind="value: $data.value, text: $data.label"></option>
      <!-- /ko -->
    </select>
    <select class="form-control" style="max-width:150px" data-bind="value: filterType">
      <!-- ko foreach: TYPE_OPTIONS -->
      <option data-bind="value: $data.value, text: $data.label"></option>
      <!-- /ko -->
    </select>
  </div>

  <!-- Tri-state list: skeleton / data / empty / error (Phase 3) -->
  <div class="data-table-wrap">
    <!-- ko if: loading() -->
    <list-skeleton params="rows: 8"></list-skeleton>
    <!-- /ko -->

    <!-- ko ifnot: loading() -->
    <!-- ko if: loadError() -->
    <div class="empty-state">
      <div class="empty-state__icon">&#9888;</div>
      <div class="empty-state__msg" data-bind="text: t('empty.loadFailed')"></div>
      <div class="empty-state__sub" data-bind="text: t('empty.loadFailedSub')"></div>
      <button class="btn btn-primary" data-bind="click: reload, text: t('common.retry')"></button>
    </div>
    <!-- /ko -->

    <!-- ko ifnot: loadError() -->
    <table class="data-table">
      <thead>
        <tr>
          <th>PC Number</th><th>Employee</th><th>Org</th><th>Type</th>
          <th>Amount (AED)</th><th>Float (AED)</th><th>Status</th>
          <th>Fiscal Year</th><th>Disbursed</th><th>Actions</th>
        </tr>
      </thead>
      <tbody>
        <!-- ko foreach: filtered() -->
        <tr>
          <td><strong class="link-text" data-bind="click: $parent.viewDetail.bind($parent,$data), text: pcNumber"></strong></td>
          <td>
            <div data-bind="text: employeeName"></div>
            <div style="font-size:11px;color:var(--text-3)" class="mono" data-bind="text: employeeNumber"></div>
          </td>
          <td style="font-size:12px" data-bind="text: orgName"></td>
          <td><span data-bind="css: pcType === 'PERMANENT' ? 'badge badge--idle' : 'badge badge--info', text: pcType"></span></td>
          <td><strong class="mono" data-bind="text: $parent.fmtAmount(amount)"></strong></td>
          <td class="mono" data-bind="text: $parent.fmtAmount(currentFloatBalance)"></td>
          <td><span data-bind="css: $parent.statusClass(status), text: status.replace('_',' ')"></span></td>
          <td class="mono" data-bind="text: fiscalYear"></td>
          <td data-bind="text: $parent.fmtDate(disbursedDate)"></td>
          <td>
            <div class="table-actions">
              <button class="btn btn-secondary btn-sm" data-bind="click: $parent.viewDetail.bind($parent,$data)">View</button>
              <!-- ko if: $data.status === 'APPROVED' -->
              <button class="btn btn-primary btn-sm" data-bind="click: $parent.disburse.bind($parent,$data)">&#128176; Disburse</button>
              <!-- /ko -->
            </div>
          </td>
        </tr>
        <!-- /ko -->
        <!-- ko if: filtered().length === 0 -->
        <tr>
          <td colspan="10">
            <div class="empty-state">
              <div class="empty-state__icon">&#128202;</div>
              <div class="empty-state__msg" data-bind="text: t('empty.noMatch')"></div>
              <div class="empty-state__sub" data-bind="text: t('empty.noMatchSub')"></div>
            </div>
          </td>
        </tr>
        <!-- /ko -->
      </tbody>
    </table>

    <list-pager params="offset: offset, limit: limit, total: total, onChange: reload"></list-pager>
    <!-- /ko -->
    <!-- /ko -->
  </div>
</div>
