<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>General Ledger · i-Finance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Public+Sans:wght@400;500;600;700&family=Noto+Naskh+Arabic:wght@400;600&display=swap" rel="stylesheet">
<script>window.APP_VERSION='1.9.0';</script>
<link rel="stylesheet" id="app-css">
<script>document.getElementById('app-css').href='css/app.css?v='+window.APP_VERSION;</script>
</head>
<body>

<!-- ═══════════ APP SHELL ═══════════ -->
<div data-bind="visible: ready" style="display:none">

  <div class="pbar">
    <div class="wordmark home-link" data-bind="click:goHome, attr:{title:t('home')}">
      <span class="mark"><span class="diamond"></span><span data-bind="text:t('appName')"></span></span>
      <span class="sub" data-bind="text:t('appSub')"></span></div>
    <div class="grow"></div>
    <div class="switcher">
      <button class="lang-flip sw-btn" data-bind="click:toggleSwitcher, attr:{title:t('switchApp')}">▦ <span data-bind="text:t('apps')"></span></button>
      <!-- ko if: switcherOpen -->
      <div class="sw-back" data-bind="click:toggleSwitcher"></div>
      <div class="sw-menu">
        <div class="sw-title" data-bind="text:t('switchApp')"></div>
        <!-- ko foreach: modules -->
        <a class="sw-item" data-bind="attr:{href:url}">
          <span class="sw-code" data-bind="style:{background:color}, text:code"></span>
          <span data-bind="text:name"></span>
        </a>
        <!-- /ko -->
      </div>
      <!-- /ko -->
    </div>
    <button class="lang-flip" data-bind="click:toggleLang, text: lang()==='en'?'عربي':'English'"></button>
    <div class="who"><div class="av" data-bind="text:initials"></div>
      <div><div class="nm" data-bind="text:userName"></div><div class="vn" data-bind="text:t('appSub')"></div></div></div>
    <button class="lang-flip" data-bind="click:signOut, text:t('signOut')"></button>
  </div>

  <nav class="pnav">
    <a data-bind="css:{on:view()==='overview'}, click:go.bind($data,'overview'), text:t('navOverview')"></a>
    <a data-bind="css:{on:view()==='actuals'}, click:go.bind($data,'actuals'), text:t('navActuals')"></a>
    <a data-bind="css:{on:view()==='dashboard'}, click:go.bind($data,'dashboard'), text:t('navDashboard')"></a>
    <a data-bind="css:{on:view()==='butil'}, click:go.bind($data,'butil'), text:t('navButil')"></a>
    <a data-bind="css:{on:view()==='classifications'}, click:go.bind($data,'classifications'), text:t('navClass')"></a>
    <a data-bind="css:{on:view()==='mapping'}, click:go.bind($data,'mapping'), text:t('navMapping')"></a>
    <a data-bind="css:{on:view()==='explorer'}, click:go.bind($data,'explorer'), text:t('navExplorer')"></a>
  </nav>

  <div class="wrap" data-bind="css:{wide: view()==='actuals'||view()==='dashboard'||view()==='butil'}">

    <!-- ── OVERVIEW ── -->
    <div data-bind="visible:view()==='overview'">
      <div class="page-head">
        <div><h1 class="greet" data-bind="text:t('ovTitle')"></h1>
          <div class="greet-sub" style="margin:0" data-bind="text:t('ovSub')"></div></div>
        <div class="page-actions">
          <span class="chip muted" data-bind="visible:lastRefreshed(), text:t('asOfRefresh')+' '+lastRefreshed()"></span>
          <button class="btn btn-sm" data-bind="click:rebuildViews, enable:!rebuilding() && !refreshing(), attr:{title:t('rebuildHint')}">
            <span class="spin" data-bind="visible:rebuilding()"></span>
            <span data-bind="text:rebuilding()?t('rebuilding'):t('rebuildViews')"></span>
          </button>
          <button class="btn btn-primary btn-sm" data-bind="click:refreshActuals, enable:!refreshing() && !rebuilding(), attr:{title:t('refreshHint')}">
            <span class="spin" data-bind="visible:refreshing()" style="border-top-color:#fff;border-color:rgba(255,255,255,.4)"></span>
            <span data-bind="text:refreshing()?t('refreshing'):t('refreshActuals')"></span>
          </button>
        </div>
      </div>
      <div class="hero">
        <div class="card stat"><div class="k" data-bind="text:t('combos')"></div>
          <div class="v mono" data-bind="text:fmt(combinationCount())"></div>
          <div class="d" data-bind="text:pctClassified()+'% '+t('haveSector')"></div>
          <div class="bar"><i data-bind="style:{width:pctClassified()+'%'}"></i></div></div>
        <!-- ko foreach: dimensions -->
        <div class="card stat">
          <div class="k" data-bind="text:$root.dimName($data)"></div>
          <div class="v mono" data-bind="text:valueCount"></div>
          <div class="d"><span data-bind="text:mappedSegments"></span> <span data-bind="text:$root.t('segmentsMapped')"></span></div>
          <div class="bar"><i data-bind="style:{width:'100%',opacity:.5}"></i></div>
        </div>
        <!-- /ko -->
      </div>
      <h2 class="sec"><span data-bind="text:t('howItWorks')"></span><span class="rule"></span></h2>
      <div class="card"><div class="greet-sub" style="margin:0" data-bind="html:t('ovExplain')"></div></div>
    </div>

    <!-- ── CLASSIFICATIONS ── -->
    <div data-bind="visible:view()==='classifications'">
      <div class="page-head">
        <div><h1 class="greet" data-bind="text:t('clsTitle')"></h1>
          <div class="greet-sub" data-bind="text:t('clsSub')"></div></div>
        <div class="page-actions">
          <select class="inp" data-bind="options:dimensions, optionsText:function(d){return $root.dimName(d)}, optionsValue:'code', value:clsType"></select>
          <button class="btn btn-primary btn-sm" data-bind="click:addValue"><span>+</span> <span data-bind="text:t('addValue')"></span></button>
        </div>
      </div>
      <div class="tbl-wrap">
        <table class="tbl">
          <thead><tr>
            <th data-bind="text:t('code')"></th><th data-bind="text:t('name')"></th>
            <th data-bind="text:t('altNames')"></th><th data-bind="text:t('tag')"></th>
            <th style="text-align:center" data-bind="text:t('assignments')"></th>
            <th data-bind="text:t('active')"></th><th></th>
          </tr></thead>
          <tbody>
            <!-- ko foreach: values -->
            <tr data-bind="css:{child: !!$data.parentValueId}">
              <td class="mono" data-bind="text:valueCode"></td>
              <td><b data-bind="text:nameEn"></b><span data-bind="visible:$data.nameAr, text:' · '+($data.nameAr||'')" style="color:var(--muted)"></span></td>
              <td style="color:var(--muted);font-size:12px" data-bind="text:[$data.altName1,$data.altName2,$data.altName3].filter(Boolean).join(' · ')||'—'"></td>
              <td><span class="chip gold" data-bind="visible:$data.tag, text:$data.tag||''"></span></td>
              <td style="text-align:center" class="mono" data-bind="text:mapCount"></td>
              <td><span class="chip" data-bind="css:isActive==='Y'?'ok':'muted', text:isActive==='Y'?$root.t('yes'):$root.t('no')"></span></td>
              <td><div class="row-act">
                <button class="btn btn-sm btn-ghost" data-bind="click:function(){$root.editValue($data)}, text:$root.t('edit')"></button>
                <button class="btn btn-sm btn-ghost btn-danger" data-bind="click:function(){$root.deleteValue($data)}, text:$root.t('del')"></button>
              </div></td>
            </tr>
            <!-- /ko -->
          </tbody>
        </table>
        <div class="empty pad" data-bind="visible:!loading() && values().length===0, text:t('noValues')"></div>
        <div class="empty pad" data-bind="visible:loading()"><span class="spin"></span></div>
      </div>
    </div>

    <!-- ── MAPPING ── -->
    <div data-bind="visible:view()==='mapping'">
      <div class="page-head">
        <div><h1 class="greet" data-bind="text:t('mapTitle')"></h1>
          <div class="greet-sub sub-underline" data-bind="text:t('mapSub')"></div></div>
        <div class="page-actions">
          <button class="btn btn-primary btn-sm" data-bind="click:addMapping, enable:mapSegment()"><span>+</span> <span data-bind="text:t('addAssign')"></span></button>
        </div>
      </div>
      <div class="toolbar">
        <select class="inp" data-bind="options:dimensions, optionsText:function(d){return $root.dimName(d)}, optionsValue:'code', value:mapType"></select>
        <input class="inp search" type="text" data-bind="textInput:segSearch, attr:{placeholder:t('searchSegment')}">
        <select class="inp" style="min-width:280px" data-bind="options:segOptions, optionsText:'label', optionsValue:'segmentValue', value:mapSegment, optionsCaption:t('pickSegment')"></select>
      </div>
      <!-- ko if: mapSegment -->
      <h2 class="sec"><span data-bind="text:t('effectiveHistory')"></span><span class="rule"></span></h2>
      <div class="card timeline">
        <!-- ko foreach: mappings -->
        <div class="t-row" data-bind="css:{current:isCurrent==='Y'}">
          <span class="t-node"></span>
          <span class="t-what"><b data-bind="text:valueName"></b>
            <span class="mono" data-bind="text:valueCode + ($data.notes? ' · '+$data.notes : '')"></span></span>
          <span class="chip" data-bind="css:isCurrent==='Y'?'tag-current':'tag-past', text:isCurrent==='Y'?$root.t('current'):$root.t('past')"></span>
          <span class="t-dates" data-bind="text:startDate+' → '+($data.endDate||$root.t('open'))"></span>
          <div class="row-act">
            <button class="btn btn-sm btn-ghost" data-bind="click:function(){$root.editMapping($data)}, text:$root.t('edit')"></button>
            <button class="btn btn-sm btn-ghost btn-danger" data-bind="click:function(){$root.deleteMapping($data)}, text:$root.t('del')"></button>
          </div>
        </div>
        <!-- /ko -->
        <div class="empty pad" data-bind="visible:mappings().length===0, text:t('noAssign')"></div>
      </div>
      <!-- /ko -->
      <div class="empty pad" data-bind="visible:!mapSegment(), text:t('pickSegmentHint')"></div>
    </div>

    <!-- ── EXPLORER ── -->
    <div data-bind="visible:view()==='explorer'">
      <div class="page-head">
        <div><h1 class="greet" data-bind="text:t('expTitle')"></h1>
          <div class="greet-sub" data-bind="text:t('expSub')"></div></div>
        <div class="page-actions">
          <span class="chip muted" data-bind="visible:asOf(), text:t('asOf')+' '+asOf()"></span>
          <button class="btn btn-sm" data-bind="click:exportCsv, text:t('exportCsv')"></button>
        </div>
      </div>
      <div class="toolbar">
        <input class="inp search" type="text" data-bind="textInput:expSearch, attr:{placeholder:t('searchCombos')}">
        <select class="inp" data-bind="options:sectorOpts, optionsText:'nameEn', optionsValue:'valueCode', value:fSector, optionsCaption:t('allSectors')"></select>
        <select class="inp" data-bind="options:chapterOpts, optionsText:'nameEn', optionsValue:'valueCode', value:fChapter, optionsCaption:t('allChapters')"></select>
        <label class="lbl" style="align-self:center" data-bind="text:t('asOf')"></label>
        <input class="inp" type="date" style="min-width:150px" data-bind="value:asOf">
        <button class="btn btn-sm" data-bind="click:function(){asOf('');loadCombos(0)}, text:t('today')"></button>
      </div>
      <div class="tbl-wrap">
        <table class="tbl">
          <thead><tr>
            <th class="combo" data-bind="text:t('combination')"></th><th data-bind="text:t('costCenter')"></th>
            <th data-bind="text:t('account')"></th><th>Sector</th><th>Chapter</th>
            <th data-bind="text:t('program')"></th>
          </tr></thead>
          <tbody>
            <!-- ko foreach: combos -->
            <tr>
              <td class="mono combo" data-bind="text:ccString, event:{mouseover:$root.comboHover, mousemove:$root.comboMove, mouseout:$root.comboOut}"></td>
              <td><b class="mono" data-bind="text:costCenterCode"></b><div style="color:var(--muted);font-size:11.5px" data-bind="text:$data.costCenterDesc||''"></div></td>
              <td><span class="mono" data-bind="text:accountCode"></span><div style="color:var(--muted);font-size:11.5px" data-bind="text:$data.accountDesc||''"></div></td>
              <td><span class="chip" data-bind="visible:$data.sectorName, text:$data.sectorName||''"></span><span data-bind="visible:!$data.sectorName" style="color:var(--muted)">—</span></td>
              <td><span class="chip gold" data-bind="visible:$data.chapterName, text:$data.chapterName||''"></span><span data-bind="visible:!$data.chapterName" style="color:var(--muted)">—</span></td>
              <td data-bind="text:$data.programName||'—'"></td>
            </tr>
            <!-- /ko -->
          </tbody>
        </table>
        <div class="empty pad" data-bind="visible:loading()"><span class="spin"></span></div>
        <div class="empty pad" data-bind="visible:!loading() && combos().length===0, text:t('noCombos')"></div>
      </div>
      <div class="toolbar" style="justify-content:flex-end;margin-top:14px">
        <span class="t-dates" data-bind="text:comboRange()"></span>
        <button class="btn btn-sm" data-bind="click:function(){loadCombos(comboOffset()-comboLimit)}, enable:comboOffset()>0, text:t('prev')"></button>
        <button class="btn btn-sm" data-bind="click:function(){loadCombos(comboOffset()+comboLimit)}, enable:(comboOffset()+comboLimit)<comboTotal(), text:t('next')"></button>
      </div>
    </div>

    <!-- ── ACTUALS (Budget vs Actual) ── -->
    <div data-bind="visible:view()==='actuals'">
      <div class="page-head">
        <div><h1 class="greet" data-bind="text:t('acTitle')"></h1>
          <div class="greet-sub" data-bind="text:t('acSub')"></div></div>
        <div class="page-actions">
          <span class="chip muted" data-bind="visible:acTotal(), text:acRange()"></span>
          <button class="btn btn-sm" data-bind="click:acExportCsv, enable:acTotal()>0, text:t('exportCsv')"></button>
          <button class="btn btn-sm" data-bind="click:refreshActuals, enable:!refreshing(), attr:{title:t('refreshHint')}, text:refreshing()?t('refreshing'):t('refreshActuals')"></button>
        </div>
      </div>

      <!-- search criteria -->
      <div class="card filter-card">
        <div class="filter-grid">
          <div class="field"><label class="lbl" data-bind="text:t('fPeriod')+' *'"></label>
            <select class="inp" data-bind="options:periods, optionsText:'period', optionsValue:'period', value:acPeriod"></select></div>
          <div class="field"><label class="lbl" data-bind="text:t('fSectorL')"></label>
            <select class="inp" data-bind="options:acSectors, optionsText:'name', optionsValue:'code', value:acSector, optionsCaption:t('allSectors')"></select></div>
          <div class="field"><label class="lbl" data-bind="text:t('fChapterL')"></label>
            <select class="inp" data-bind="options:acChapters, optionsText:'name', optionsValue:'code', value:acChapter, optionsCaption:t('allChapters')"></select></div>
          <div class="field"><label class="lbl" data-bind="text:t('fProgramL')"></label>
            <select class="inp" data-bind="options:acPrograms, optionsText:'name', optionsValue:'code', value:acProgram, optionsCaption:t('allPrograms')"></select></div>
          <div class="field"><label class="lbl" data-bind="text:t('fApprL')"></label>
            <select class="inp" data-bind="options:acAppropriations, optionsText:function(a){return a.code+' · '+a.name}, optionsValue:'code', value:acAppr, optionsCaption:t('allApprops')"></select></div>
          <div class="field"><label class="lbl" data-bind="text:t('fAccountL')"></label>
            <select class="inp" data-bind="options:acAccounts, optionsText:function(a){return a.code+' · '+a.name}, optionsValue:'code', value:acAccount, optionsCaption:t('allAccounts')"></select></div>
          <div class="field"><label class="lbl" data-bind="text:t('fCostCenterL')"></label>
            <select class="inp" data-bind="options:acCostCenters, optionsText:function(a){return a.code+' · '+a.name}, optionsValue:'code', value:acCostCenter, optionsCaption:t('allCostCenters')"></select></div>
          <div class="field"><label class="lbl" data-bind="text:t('fSourceL')"></label>
            <select class="inp" data-bind="options:acSources, optionsText:'name', optionsValue:'code', value:acSource, optionsCaption:t('allSources')"></select></div>
          <div class="field"><label class="lbl" data-bind="text:t('fSearchL')"></label>
            <input class="inp" type="text" data-bind="textInput:acSearch, attr:{placeholder:t('searchActuals')}, event:{keydown:function(d,e){if(e.keyCode===13){runActuals(0);}return true;}}"></div>
          <div class="field filter-actions">
            <button class="btn btn-primary" data-bind="click:function(){runActuals(0)}, text:t('btnSearch')"></button>
            <button class="btn" data-bind="click:acReset, text:t('btnReset')"></button>
          </div>
        </div>
      </div>

      <!-- business-question answer cards -->
      <div class="kpi-strip">
        <div class="kstat budget"><div class="kk" data-bind="text:t('cBudget')"></div><div class="kv mono" data-bind="text:compact(tot('budget')), attr:{title:money(tot('budget'))}"></div></div>
        <div class="kstat commit"><div class="kk" data-bind="text:t('cTotalPr')"></div><div class="kv mono" data-bind="text:compact(tot('prTotal')), attr:{title:money(tot('prTotal'))}"></div></div>
        <div class="kstat ocommit"><div class="kk" data-bind="text:t('cOpenCommitment')"></div><div class="kv mono" data-bind="text:compact(tot('openCommitment')), attr:{title:money(tot('openCommitment'))}"></div></div>
        <div class="kstat cpipe"><div class="kk" data-bind="text:t('cCommitmentPipeline')"></div><div class="kv mono" data-bind="text:compact(tot('commitmentPipeline')), attr:{title:money(tot('commitmentPipeline'))}"></div></div>
        <div class="kstat oblig"><div class="kk" data-bind="text:t('cTotalPo')"></div><div class="kv mono" data-bind="text:compact(tot('totalPo')), attr:{title:money(tot('totalPo'))}"></div></div>
        <div class="kstat ooblig"><div class="kk" data-bind="text:t('cOpenObligation')"></div><div class="kv mono" data-bind="text:compact(tot('openObligation')), attr:{title:money(tot('openObligation'))}"></div></div>
        <div class="kstat ppipe"><div class="kk" data-bind="text:t('cPoPipeline')"></div><div class="kv mono" data-bind="text:compact(tot('poPipeline')), attr:{title:money(tot('poPipeline'))}"></div></div>
        <div class="kstat oenc"><div class="kk" data-bind="text:t('cOpenEncumbrance')"></div><div class="kv mono" data-bind="text:compact(tot('openEncumbrance')), attr:{title:money(tot('openEncumbrance'))}"></div></div>
        <div class="kstat actual"><div class="kk" data-bind="text:t('cActual')"></div><div class="kv mono" data-bind="text:compact(tot('glActual')), attr:{title:money(tot('glActual'))}"></div></div>
        <div class="kstat grn"><div class="kk" data-bind="text:t('cGrn')"></div><div class="kv mono" data-bind="text:compact(tot('grnActual')), attr:{title:money(tot('grnActual'))}"></div></div>
        <div class="kstat apd"><div class="kk" data-bind="text:t('cApDirect')"></div><div class="kv mono" data-bind="text:compact(tot('apDirect')), attr:{title:money(tot('apDirect'))}"></div></div>
        <div class="kstat sla"><div class="kk" data-bind="text:t('cSla')"></div><div class="kv mono" data-bind="text:compact(tot('slaActual')), attr:{title:money(tot('slaActual'))}"></div></div>
        <div class="kstat funds"><div class="kk" data-bind="text:t('cFundsGl')"></div><div class="kv mono" data-bind="text:compact(tot('fundsAvailable')), attr:{title:money(tot('fundsAvailable'))}"></div></div>
        <div class="kstat fundscalc"><div class="kk" data-bind="text:t('cFundsCalc')"></div><div class="kv mono" data-bind="text:compact(tot('fundsAvailableCalc')), attr:{title:money(tot('fundsAvailableCalc'))}"></div></div>
      </div>

      <!-- results table -->
      <div class="tbl-wrap">
        <table class="tbl actuals-tbl">
          <thead><tr>
            <th class="combo" data-bind="text:t('thCombo'), attr:{title:t('hCombo')}"></th>
            <th data-bind="text:t('costCenter')"></th>
            <th data-bind="text:t('account')"></th>
            <th data-bind="text:t('fSectorL')"></th>
            <th data-bind="text:t('program')"></th>
            <th data-bind="text:t('thAppr')"></th>
            <th class="num" data-bind="text:t('cBudget'), attr:{title:t('hBudget')}"></th>
            <th class="num grp-h"><span data-bind="text:t('cCommitment')"></span><i class="hint-i" data-bind="attr:{title:t('hCommitmentGrp')}">ⓘ</i></th>
            <th class="num grp-h"><span data-bind="text:t('cObligation')"></span><i class="hint-i" data-bind="attr:{title:t('hObligationGrp')}">ⓘ</i></th>
            <th class="num"><span data-bind="text:t('cOpenEncumbrance')"></span><i class="hint-i" data-bind="attr:{title:t('hOpenEncumbrance')}">ⓘ</i></th>
            <th class="num" data-bind="text:t('cActual'), attr:{title:t('hActual')}"></th>
            <th class="num" data-bind="text:t('cGrn'), attr:{title:t('hGrn')}"></th>
            <th class="num" data-bind="text:t('cApDirect'), attr:{title:t('hApDirect')}"></th>
            <th class="num"><span data-bind="text:t('cSla')"></span><i class="hint-i" data-bind="attr:{title:t('hSla')}">ⓘ</i></th>
            <th class="num grp-h"><span data-bind="text:t('cFunds')"></span><i class="hint-i" data-bind="attr:{title:t('hFundsGrp')}">ⓘ</i></th>
          </tr></thead>
          <tbody>
            <!-- ko foreach: acItems -->
            <tr>
              <td class="mono combo" data-bind="text:ccString, event:{mouseover:$root.comboHover, mousemove:$root.comboMove, mouseout:$root.comboOut}"></td>
              <td><b class="mono" data-bind="text:costCenterCode"></b><div class="sub-d" data-bind="text:$data.costCenterDesc||''"></div></td>
              <td><span class="mono" data-bind="text:accountCode"></span><div class="sub-d" data-bind="text:$data.accountDesc||''"></div></td>
              <td><span class="chip" data-bind="visible:$data.sectorName, text:$data.sectorName||''"></span><span data-bind="visible:!$data.sectorName" class="dash">—</span></td>
              <td data-bind="text:$data.programName||'—'"></td>
              <td><span class="mono" data-bind="text:$data.appropriationCode||'—'"></span></td>
              <td class="num mono money-cell" data-bind="text:$root.compact($data.budget), attr:{title:$root.money($data.budget)}, click:function(d){$root.openDrill(d,'budget')}"></td>
              <td class="num mono grp-cell">
                <div class="grp-row" data-bind="click:function(d){$root.openDrill(d,'commitment')}"><span class="grp-l" data-bind="text:$root.t('lblTotal')"></span><span data-bind="text:$root.compact($data.prTotal), attr:{title:$root.money($data.prTotal)}"></span><span class="grp-cnt" data-bind="text:'· '+($data.prCount||0)"></span></div>
                <div class="grp-row" data-bind="click:function(d){$root.openDrill(d,'opencommitment')}"><span class="grp-l" data-bind="text:$root.t('lblOpen')"></span><span data-bind="text:$root.compact($data.openCommitment), attr:{title:$root.money($data.openCommitment)}"></span></div>

      </div>
    </div>

    <!-- ── BUDGET UTILIZATION (project budget vs actual, per task & expenditure type) ── -->

        <div class="kstat grn kstat-click" data-bind="click:function(){openBuAgg('grn')}, attr:{title:t('buCardHint')}"><div class="kk" data-bind="text:t('cActualGrn')"></div><div class="kv mono" data-bind="text:compact(buTot('actualGrn'))"></div></div>
        <div class="kstat ocommit kstat-click" data-bind="click:function(){openBuAgg('pr')}, attr:{title:t('buCardHint')}"><div class="kk" data-bind="text:t('cCommitPr')"></div><div class="kv mono" data-bind="text:compact(buTot('commitmentPr'))"></div></div>
        <div class="kstat ooblig kstat-click" data-bind="click:function(){openBuAgg('po')}, attr:{title:t('buCardHint')}"><div class="kk" data-bind="text:t('cObligPo')"></div><div class="kv mono" data-bind="text:compact(buTot('obligationPo'))"></div></div>
        <div class="kstat funds"><div class="kk" data-bind="text:t('cFundAvail')"></div><div class="kv mono" data-bind="text:compact(buTot('fundAvailable')), attr:{title:money(buTot('fundAvailable'))}"></div></div>
      </div>

      <!-- results table -->
      <div class="tbl-wrap">
        <table class="tbl actuals-tbl">
          <thead><tr>
            <th data-bind="text:t('cProjType')"></th>
            <th data-bind="text:t('fSectorL')"></th>
            <th data-bind="text:t('cDept')"></th>
            <th data-bind="text:t('costCenter')"></th>
            <th data-bind="text:t('cProject')"></th>
            <th data-bind="text:t('cTask')"></th>
            <th data-bind="text:t('cGlAccount')"></th>
            <th data-bind="text:t('thAppr')"></th>
            <th data-bind="text:t('cChapter')"></th>
            <th data-bind="text:t('program')"></th>

            <th class="num" data-bind="text:t('cBudget')"></th>

            <th class="num" data-bind="text:t('cActualGrn'), attr:{title:t('buDrillHint')}"></th>
            <th class="num" data-bind="text:t('cCommitPr'), attr:{title:t('buDrillHint')}"></th>
            <th class="num" data-bind="text:t('cObligPo'), attr:{title:t('buDrillHint')}"></th>
            <th class="num" data-bind="text:t('cFundAvail')"></th>

              <td data-bind="text:$data.projectType||'—'"></td>

    <!-- ── DASHBOARD (executive analytics) ── -->
    <div data-bind="visible:view()==='dashboard'">
      <div class="page-head">
        <div><h1 class="greet" data-bind="text:t('dashTitle')"></h1>
          <div class="greet-sub" data-bind="text:t('dashSub')"></div></div>
        <div class="page-actions">
          <label class="lbl" style="align-self:center" data-bind="text:t('fPeriod')"></label>

      <div class="empty pad" data-bind="visible:dashLoading()"><span class="spin"></span></div>

      <!-- ko if: !dashLoading() && dash() -->
      <div class="kpi-strip dash">
        <div class="kstat budget"><div class="kk" data-bind="text:t('cBudget')"></div><div class="kv mono" data-bind="text:compact(kpis().budget), attr:{title:money(kpis().budget)}"></div></div>

      </div>

      <div class="dash-row two">
        <div class="card gauge-card">
          <h2 class="sec dash-sec"><span data-bind="text:t('secUtil')"></span><span class="rule"></span></h2>
          <div class="gauge-wrap">
            <svg viewBox="0 0 160 160" class="gauge-svg">
              <circle cx="80" cy="80" r="60" class="g-track"></circle>
              <circle cx="80" cy="80" r="60" class="g-commit" data-bind="attr:{'stroke-dasharray':gauge().dashCommit}"></circle>
              <circle cx="80" cy="80" r="60" class="g-util" data-bind="attr:{'stroke-dasharray':gauge().dash}"></circle>
            </svg>
            <div class="gauge-center"><div class="gv mono" data-bind="text:(kpis().utilizationPct||0)+'%'"></div><div class="gl" data-bind="text:t('ofBudget')"></div></div>
          </div>
          <div class="gauge-legend">
            <span><i class="gdot util"></i><span data-bind="text:t('kUtil')+': '+(kpis().utilizationPct||0)+'%'"></span></span>
            <span><i class="gdot commit"></i><span data-bind="text:t('kCommit')+': '+(kpis().commitmentPct||0)+'%'"></span></span>
          </div>
        </div>
        <div class="card trend-card">
          <h2 class="sec dash-sec"><span data-bind="text:t('secTrend')"></span><span class="rule"></span></h2>
          <!-- ko if: trend() -->
          <svg class="trend-svg" data-bind="attr:{viewBox:'0 0 '+trend().W+' '+trend().H}">
            <path class="trend-area" data-bind="attr:{d:trend().area}"></path>
            <polyline class="trend-line" data-bind="attr:{points:trend().line}"></polyline>
            <!-- ko foreach: trend().pts -->
            <circle class="trend-dot" r="3.5" data-bind="attr:{cx:$data.x, cy:$data.y}"></circle>
            <text class="trend-v" data-bind="attr:{x:$data.x, y:$data.y-8}, text:$root.compact($data.actual)"></text>
            <text class="trend-x" data-bind="attr:{x:$data.x, y:$root.trend().baseY+16}, text:$data.period"></text>
            <!-- /ko -->
          </svg>
          <!-- /ko -->
        </div>
      </div>

      <div class="dash-row two">
        <div class="card">
          <h2 class="sec dash-sec"><span data-bind="text:t('secBySector')"></span><span class="rule"></span></h2>
          <div class="bars">
            <!-- ko foreach: sectorBars -->
            <div class="bar-row">
              <div class="bar-label" data-bind="text:name, attr:{title:name}"></div>
              <div class="bar-track"><i class="bar-fill" data-bind="style:{width:_pct+'%'}"></i></div>
              <div class="bar-val mono" data-bind="text:$root.compact(actual), attr:{title:$root.money(actual)}"></div>
            </div>
            <!-- /ko -->
            <div class="empty pad" data-bind="visible:sectorBars().length===0, text:t('dashNoData')"></div>
          </div>
        </div>
        <div class="card">
          <h2 class="sec dash-sec"><span data-bind="text:t('secByProgram')"></span><span class="rule"></span></h2>
          <div class="bars">
            <!-- ko foreach: programBars -->
            <div class="bar-row">
              <div class="bar-label" data-bind="text:name, attr:{title:name}"></div>
              <div class="bar-track"><i class="bar-fill" data-bind="style:{width:_pct+'%'}"></i></div>
              <div class="bar-val mono" data-bind="text:$root.compact(actual), attr:{title:$root.money(actual)}"></div>
            </div>
            <!-- /ko -->
            <div class="empty pad" data-bind="visible:programBars().length===0, text:t('dashNoData')"></div>
          </div>
        </div>
      </div>

      <div class="card">
        <h2 class="sec dash-sec"><span data-bind="text:t('secByAppr')"></span><span class="rule"></span></h2>
        <div class="bars">
          <!-- ko foreach: apprBars -->
          <div class="bar-row appr">
            <div class="bar-label" data-bind="text:name, attr:{title:name}"></div>
            <div class="bar-track gold"><i class="bar-fill gold" data-bind="style:{width:_pct+'%'}"></i></div>
            <div class="bar-val mono" data-bind="text:$root.compact(poTotal), attr:{title:$root.money(poTotal)}"></div>
            <div class="bar-cnt mono" data-bind="text:$root.fmt(poCount)+' '+$root.t('lblPoCount')"></div>
          </div>
          <!-- /ko -->
          <div class="empty pad" data-bind="visible:apprBars().length===0, text:t('dashNoData')"></div>
        </div>
      </div>

      <div class="card insights">
        <h2 class="sec dash-sec"><span data-bind="text:t('secInsights')"></span><span class="rule"></span></h2>
        <ul class="ins-list" data-bind="foreach:insights">
          <li><span class="ins-dot"></span><span data-bind="text:$data"></span></li>
        </ul>
      </div>
      <!-- /ko -->
    </div>

  </div>

  <div class="pfoot"><span class="diamond"></span><span data-bind="text:t('footOrg')"></span><span class="grow"></span>
    <span data-bind="text:t('footNote')"></span></div>
</div>

      <!-- ko if: !drillLoading() -->
      <div class="tbl-wrap" data-bind="visible:drillRows().length>0">
        <table class="tbl drill-tbl">
          <thead><tr data-bind="foreach:drillCols">
            <th data-bind="text:label, css:{num:type==='money'||type==='num'}"></th>
          </tr></thead>
          <tbody>
            <!-- ko foreach: drillRows -->
            <tr>
              <!-- ko foreach: $root.drillCols -->
              <td data-bind="text:$root.cell($parent,$data), css:{'num mono':$data.type==='money'||$data.type==='num'}"></td>
              <!-- /ko -->
            </tr>
            <!-- /ko -->
          </tbody>
          <tfoot><tr><td class="drill-total" data-bind="attr:{colspan:drillCols().length}"><span data-bind="text:t('drillTotal')"></span> <b class="mono" data-bind="text:money(drillTotalV())"></b></td></tr></tfoot>
        </table>
      </div>
      <div class="empty pad" data-bind="visible:drillRows().length===0, text:t('noLines')"></div>
      <!-- /ko -->
    </div>
  </div>
</div>

<!-- ═══════════ DRILL-DOWN DRAWER (Budget Utilization figure → supporting lines) ═══════════ -->
<div class="dw-scrim" data-bind="css:{show:drillDrawer}, click:closeDrawer" style="display:none"></div>
<aside class="dw-drawer" data-bind="css:{show:drillDrawer}" role="dialog" aria-modal="true">
  <header class="dw-h">
    <div class="dw-h-txt">
      <div class="dw-eyebrow" data-bind="text:drillSub"></div>
      <div class="dw-title" data-bind="text:drillTitle"></div>
    </div>
    <button class="btn btn-sm" data-bind="click:closeDrawer, text:t('cancel')"></button>
  </header>
  <div class="dw-b">
    <div class="dw-ctx" data-bind="visible:drillCtx, text:drillCtx"></div>
    <div class="empty pad" data-bind="visible:drillLoading()"><span class="spin"></span></div>
    <!-- ko if: !drillLoading() -->
    <div class="dw-cap" data-bind="visible:drillCapNote(), text:drillCapNote"></div>
    <div class="tbl-wrap" data-bind="visible:drillRows().length>0">
      <table class="tbl drill-tbl">
        <thead><tr data-bind="foreach:drillCols">
          <th data-bind="text:label, css:{num:type==='money'||type==='num'}"></th>
        </tr></thead>
        <tbody>
          <!-- ko foreach: drillRows -->
          <tr>
            <!-- ko foreach: $root.drillCols -->
            <td data-bind="text:$root.cell($parent,$data), css:{'num mono':$data.type==='money'||$data.type==='num'}"></td>
            <!-- /ko -->
          </tr>
          <!-- /ko -->
        </tbody>
        <tfoot><tr><td class="drill-total" data-bind="attr:{colspan:drillCols().length}"><span data-bind="text:t('drillTotal')"></span> <b class="mono" data-bind="text:money(drillTotalV())"></b></td></tr></tfoot>
      </table>
    </div>
    <div class="empty pad" data-bind="visible:drillRows().length===0, text:t('noLines')"></div>
    <!-- /ko -->
  </div>
</aside>

<!-- combination segment popover -->
<div class="combo-tip" data-bind="visible:tipShow, style:{left:tipX()+'px', top:tipY()+'px'}" style="display:none">
  <div class="ctip-h" data-bind="text:t('segments')"></div>
  <table><tbody data-bind="foreach:tipRows">
    <tr>
      <td class="ctip-l" data-bind="text:label"></td>
      <td class="ctip-c mono" data-bind="text:$data.code||''"></td>
      <td class="ctip-d" data-bind="text:$data.desc||''"></td>
    </tr>
  </tbody></table>
</div>

<!-- toast -->
<div class="toast" data-bind="visible:toast, text:toast, css:{bad:toastBad}" style="display:none"></div>

<script src="https://static.oracle.com/cdn/jet/17.0.0/3rdparty/knockout/knockout-3.5.1.js"></script>
<script>var s=document.createElement('script');s.src='js/app.js?v='+window.APP_VERSION;document.body.appendChild(s);</script>
</body>
</html>
