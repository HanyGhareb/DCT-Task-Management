<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>General Ledger · i-Finance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Public+Sans:wght@400;500;600;700&family=Noto+Naskh+Arabic:wght@400;600&display=swap" rel="stylesheet">
<script>window.APP_VERSION='1.24.0';</script>
<link rel="stylesheet" id="app-css">
<script>document.getElementById('app-css').href='css/app.css?v='+window.APP_VERSION;</script>
</head>
<body>

<!-- ═══════════ APP SHELL ═══════════ -->
<div data-bind="visible: ready" style="display:none">

  <div class="pbar">
    <div class="wordmark home-link" data-bind="click:goHome, attr:{title:t('home')}">
      <span class="mark"><span class="diamond"></span><span data-bind="text:t('appName')"></span></span>
      <span class="sub" data-bind="text:t('appSub')"></span></div>
    <div class="grow"></div>
    <div class="switcher">
      <button class="lang-flip sw-btn" data-bind="click:toggleSwitcher, attr:{title:t('switchApp')}">▦ <span data-bind="text:t('apps')"></span></button>
      <!-- ko if: switcherOpen -->
      <div class="sw-back" data-bind="click:toggleSwitcher"></div>
      <div class="sw-menu">
        <div class="sw-title" data-bind="text:t('switchApp')"></div>
        <!-- ko foreach: modules -->
        <a class="sw-item" data-bind="attr:{href:url}">
          <span class="sw-code" data-bind="style:{background:color}, text:code"></span>
          <span data-bind="text:name"></span>
        </a>
        <!-- /ko -->
      </div>
      <!-- /ko -->
    </div>
    <button class="lang-flip" data-bind="click:toggleLang, text: lang()==='en'?'عربي':'English'"></button>
    <div class="who"><div class="av" data-bind="text:initials"></div>
      <div><div class="nm" data-bind="text:userName"></div><div class="vn" data-bind="text:t('appSub')"></div></div></div>
    <button class="lang-flip" data-bind="click:signOut, text:t('signOut')"></button>
  </div>

  <nav class="pnav">
    <a data-bind="css:{on:view()==='overview'}, click:go.bind($data,'overview'), text:t('navOverview')"></a>
    <a data-bind="css:{on:view()==='actuals'}, click:go.bind($data,'actuals'), text:t('navActuals')"></a>
    <a data-bind="css:{on:view()==='dashboard'}, click:go.bind($data,'dashboard'), text:t('navDashboard')"></a>
    <a data-bind="css:{on:view()==='butil'}, click:go.bind($data,'butil'), text:t('navButil')"></a>
    <a data-bind="css:{on:view()==='classifications'}, click:go.bind($data,'classifications'), text:t('navClass')"></a>
    <a data-bind="css:{on:view()==='mapping'}, click:go.bind($data,'mapping'), text:t('navMapping')"></a>
    <a data-bind="css:{on:view()==='explorer'}, click:go.bind($data,'explorer'), text:t('navExplorer')"></a>
  </nav>

  <div class="wrap" data-bind="css:{wide: view()==='actuals'||view()==='dashboard'||view()==='butil'}">

    <!-- ── OVERVIEW ── -->
    <div data-bind="visible:view()==='overview'">
      <div class="page-head">
        <div><h1 class="greet" data-bind="text:t('ovTitle')"></h1>
          <div class="greet-sub" style="margin:0" data-bind="text:t('ovSub')"></div></div>
        <div class="page-actions">
          <span class="chip muted" data-bind="visible:lastRefreshed(), text:t('asOfRefresh')+' '+lastRefreshed()"></span>
          <button class="btn btn-sm" data-bind="click:rebuildViews, enable:!rebuilding() && !refreshing(), attr:{title:t('rebuildHint')}">
            <span class="spin" data-bind="visible:rebuilding()"></span>
            <span data-bind="text:rebuilding()?t('rebuilding'):t('rebuildViews')"></span>
          </button>
          <button class="btn btn-primary btn-sm" data-bind="click:refreshActuals, enable:!refreshing() && !rebuilding(), attr:{title:t('refreshHint')}">
            <span class="spin" data-bind="visible:refreshing()" style="border-top-color:#fff;border-color:rgba(255,255,255,.4)"></span>
            <span data-bind="text:refreshing()?t('refreshing'):t('refreshActuals')"></span>
          </button>
        </div>
      </div>
      <div class="hero">
        <div class="card stat"><div class="k" data-bind="text:t('combos')"></div>
          <div class="v mono" data-bind="text:fmt(combinationCount())"></div>
          <div class="d" data-bind="text:pctClassified()+'% '+t('haveSector')"></div>
          <div class="bar"><i data-bind="style:{width:pctClassified()+'%'}"></i></div></div>
        <!-- ko foreach: dimensions -->
        <div class="card stat">
          <div class="k" data-bind="text:$root.dimName($data)"></div>
          <div class="v mono" data-bind="text:valueCount"></div>
          <div class="d"><span data-bind="text:mappedSegments"></span> <span data-bind="text:$root.t('segmentsMapped')"></span></div>
          <div class="bar"><i data-bind="style:{width:'100%',opacity:.5}"></i></div>
        </div>
        <!-- /ko -->
      </div>
      <h2 class="sec"><span data-bind="text:t('howItWorks')"></span><span class="rule"></span></h2>
      <div class="card"><div class="greet-sub" style="margin:0" data-bind="html:t('ovExplain')"></div></div>
    </div>

    <!-- ── CLASSIFICATIONS ── -->
    <div data-bind="visible:view()==='classifications'">
      <div class="page-head">
        <div><h1 class="greet" data-bind="text:t('clsTitle')"></h1>
          <div class="greet-sub" data-bind="text:t('clsSub')"></div></div>
        <div class="page-actions">
          <select class="inp" data-bind="options:dimensions, optionsText:function(d){return $root.dimName(d)}, optionsValue:'code', value:clsType"></select>
          <button class="btn btn-primary btn-sm" data-bind="click:addValue"><span>+</span> <span data-bind="text:t('addValue')"></span></button>
        </div>
      </div>
      <div class="tbl-wrap">
        <table class="tbl">
          <thead><tr>
            <th data-bind="text:t('code')"></th><th data-bind="text:t('name')"></th>
            <th data-bind="text:t('altNames')"></th><th data-bind="text:t('tag')"></th>
            <th style="text-align:center" data-bind="text:t('assignments')"></th>
            <th data-bind="text:t('active')"></th><th></th>
          </tr></thead>
          <tbody>
            <!-- ko foreach: values -->
            <tr data-bind="css:{child: !!$data.parentValueId}, click:function(){$root.openClsDrill($data)}, attr:{title:$root.t('clsRowHint')}" style="cursor:pointer">
              <td class="mono" data-bind="text:valueCode"></td>
              <td><b data-bind="text:nameEn"></b><span data-bind="visible:$data.nameAr, text:' · '+($data.nameAr||'')" style="color:var(--muted)"></span></td>
              <td style="color:var(--muted);font-size:12px" data-bind="text:[$data.altName1,$data.altName2,$data.altName3].filter(Boolean).join(' · ')||'—'"></td>
              <td><span class="chip gold" data-bind="visible:$data.tag, text:$data.tag||''"></span></td>
              <td style="text-align:center" class="mono" data-bind="text:mapCount"></td>
              <td><span class="chip" data-bind="css:isActive==='Y'?'ok':'muted', text:isActive==='Y'?$root.t('yes'):$root.t('no')"></span></td>
              <td><div class="row-act">
                <button class="btn btn-sm btn-ghost" data-bind="click:function(){$root.editValue($data)}, clickBubble:false, text:$root.t('edit')"></button>
                <button class="btn btn-sm btn-ghost btn-danger" data-bind="click:function(){$root.deleteValue($data)}, clickBubble:false, text:$root.t('del')"></button>
              </div></td>
            </tr>
            <!-- /ko -->
          </tbody>
        </table>
        <div class="empty pad" data-bind="visible:!loading() && values().length===0, text:t('noValues')"></div>
        <div class="ldr" data-bind="visible:loading()">
          <div class="ldr-mark"><i class="ldr-ring"></i><i class="ldr-ring2"></i><i class="ldr-gem"></i></div>
          <div class="ldr-t"><span data-bind="text:t('loadingData')"></span><span class="d">.</span><span class="d">.</span><span class="d">.</span></div>
        </div>
      </div>
    </div>

    <!-- ── MAPPING ── -->
    <div data-bind="visible:view()==='mapping'">
      <div class="page-head">
        <div><h1 class="greet" data-bind="text:t('mapTitle')"></h1>
          <div class="greet-sub sub-underline" data-bind="text:t('mapSub')"></div></div>
        <div class="page-actions">
          <button class="btn btn-primary btn-sm" data-bind="click:addMapping, enable:mapSegment()"><span>+</span> <span data-bind="text:t('addAssign')"></span></button>
        </div>
      </div>
      <div class="toolbar">
        <select class="inp" data-bind="options:dimensions, optionsText:function(d){return $root.dimName(d)}, optionsValue:'code', value:mapType"></select>
        <input class="inp search" type="text" data-bind="textInput:segSearch, attr:{placeholder:t('searchSegment')}">
        <select class="inp" style="min-width:280px" data-bind="options:segOptions, optionsText:'label', optionsValue:'segmentValue', value:mapSegment, optionsCaption:t('pickSegment')"></select>
      </div>
      <!-- ko if: mapSegment -->
      <h2 class="sec"><span data-bind="text:t('effectiveHistory')"></span><span class="rule"></span></h2>
      <div class="card timeline">
        <!-- ko foreach: mappings -->
        <div class="t-row" data-bind="css:{current:isCurrent==='Y'}">
          <span class="t-node"></span>
          <span class="t-what"><b data-bind="text:valueName"></b>
            <span class="mono" data-bind="text:valueCode + ($data.notes? ' · '+$data.notes : '')"></span></span>
          <span class="chip" data-bind="css:isCurrent==='Y'?'tag-current':'tag-past', text:isCurrent==='Y'?$root.t('current'):$root.t('past')"></span>
          <span class="t-dates" data-bind="text:startDate+' → '+($data.endDate||$root.t('open'))"></span>
          <div class="row-act">
            <button class="btn btn-sm btn-ghost" data-bind="click:function(){$root.editMapping($data)}, text:$root.t('edit')"></button>
            <button class="btn btn-sm btn-ghost btn-danger" data-bind="click:function(){$root.deleteMapping($data)}, text:$root.t('del')"></button>
          </div>
        </div>
        <!-- /ko -->
        <div class="empty pad" data-bind="visible:mappings().length===0, text:t('noAssign')"></div>
      </div>
      <!-- /ko -->
      <div class="empty pad" data-bind="visible:!mapSegment(), text:t('pickSegmentHint')"></div>
    </div>

    <!-- ── EXPLORER ── -->
    <div data-bind="visible:view()==='explorer'">
      <div class="page-head">
        <div><h1 class="greet" data-bind="text:t('expTitle')"></h1>
          <div class="greet-sub" data-bind="text:t('expSub')"></div></div>
        <div class="page-actions">
          <span class="chip muted" data-bind="visible:asOf(), text:t('asOf')+' '+asOf()"></span>
          <button class="btn btn-sm" data-bind="click:exportCsv, text:t('exportCsv')"></button>
        </div>
      </div>
      <div class="toolbar">
        <input class="inp search" type="text" data-bind="textInput:expSearch, attr:{placeholder:t('searchCombos')}">
        <select class="inp" data-bind="options:sectorOpts, optionsText:'nameEn', optionsValue:'valueCode', value:fSector, optionsCaption:t('allSectors')"></select>
        <select class="inp" data-bind="options:chapterOpts, optionsText:'nameEn', optionsValue:'valueCode', value:fChapter, optionsCaption:t('allChapters')"></select>
        <label class="lbl" style="align-self:center" data-bind="text:t('asOf')"></label>
        <input class="inp" type="date" style="min-width:150px" data-bind="value:asOf">
        <button class="btn btn-sm" data-bind="click:function(){asOf('');loadCombos(0)}, text:t('today')"></button>
      </div>
      <div class="tbl-wrap">
        <table class="tbl">
          <thead><tr>
            <th class="combo" data-bind="text:t('combination')"></th><th data-bind="text:t('costCenter')"></th>
            <th data-bind="text:t('account')"></th><th>Sector</th><th>Chapter</th>
            <th data-bind="text:t('program')"></th>
          </tr></thead>
          <tbody>
            <!-- ko foreach: combos -->
            <tr>
              <td class="mono combo" data-bind="text:ccString, event:{mouseover:$root.comboHover, mousemove:$root.comboMove, mouseout:$root.comboOut}"></td>
              <td><b class="mono" data-bind="text:costCenterCode"></b><div style="color:var(--muted);font-size:11.5px" data-bind="text:$data.costCenterDesc||''"></div></td>
              <td><span class="mono" data-bind="text:accountCode"></span><div style="color:var(--muted);font-size:11.5px" data-bind="text:$data.accountDesc||''"></div></td>
              <td><span class="chip" data-bind="visible:$data.sectorName, text:$data.sectorName||''"></span><span data-bind="visible:!$data.sectorName" style="color:var(--muted)">—</span></td>
              <td><span class="chip gold" data-bind="visible:$data.chapterName, text:$data.chapterName||''"></span><span data-bind="visible:!$data.chapterName" style="color:var(--muted)">—</span></td>
              <td data-bind="text:$data.programName||'—'"></td>
            </tr>
            <!-- /ko -->
          </tbody>
        </table>
        <div class="ldr" data-bind="visible:loading()">
          <div class="ldr-mark"><i class="ldr-ring"></i><i class="ldr-ring2"></i><i class="ldr-gem"></i></div>
          <div class="ldr-t"><span data-bind="text:t('loadingData')"></span><span class="d">.</span><span class="d">.</span><span class="d">.</span></div>
        </div>
        <div class="empty pad" data-bind="visible:!loading() && combos().length===0, text:t('noCombos')"></div>
      </div>
      <div class="toolbar" style="justify-content:flex-end;margin-top:14px">
        <span class="t-dates" data-bind="text:comboRange()"></span>
        <button class="btn btn-sm" data-bind="click:function(){loadCombos(comboOffset()-comboLimit)}, enable:comboOffset()>0, text:t('prev')"></button>
        <button class="btn btn-sm" data-bind="click:function(){loadCombos(comboOffset()+comboLimit)}, enable:(comboOffset()+comboLimit)<comboTotal(), text:t('next')"></button>
      </div>
    </div>

    <!-- ── ACTUALS (Budget vs Actual) ── -->
    <div data-bind="visible:view()==='actuals'">
      <div class="page-head">
        <div><h1 class="greet" data-bind="text:t('acTitle')"></h1>
          <div class="greet-sub" data-bind="text:t('acSub')"></div></div>
        <div class="page-actions">
          <span class="chip muted" data-bind="visible:acTotal(), text:acRange()"></span>
          <button class="btn btn-sm btn-primary" data-bind="click:openAcFilters">
            <span>⚙</span> <span data-bind="text:t('acFilters')"></span>
            <span class="fbadge" data-bind="visible:acActiveCount()>0, text:acActiveCount"></span>
          </button>
          <button class="btn btn-sm" data-bind="click:acExportCsv, enable:acTotal()>0, text:t('exportCsv')"></button>
          <button class="btn btn-sm" data-bind="click:refreshActuals, enable:!refreshing(), attr:{title:t('refreshHint')}, text:refreshing()?t('refreshing'):t('refreshActuals')"></button>
        </div>
      </div>

      <!-- applied-criteria summary bar (click anywhere to edit in the drawer) -->
      <div class="ac-chipbar" data-bind="click:openAcFilters, attr:{title:t('acEditFilters')}">
        <span class="ac-chip period"><b data-bind="text:t('fPeriod')"></b><span class="mono" data-bind="text:acPeriod"></span></span>
        <!-- ko foreach: acFilterChips -->
        <span class="ac-chip"><b data-bind="text:label"></b><span data-bind="text:value"></span></span>
        <!-- /ko -->
        <span class="ac-chip-hint" data-bind="text:acActiveCount()?t('acEditFilters'):t('acNoFilters')"></span>
      </div>

      <!-- business-question answer band — 6 grouped measure cards -->
      <div class="kgrid">
        <div class="kg kg-budget">
          <div class="kg-h">
            <span class="kg-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><ellipse cx="12" cy="5" rx="9" ry="3"/><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"/><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"/></svg></span>
            <span class="kg-k" data-bind="text:t('cBudget')"></span>
          </div>
          <div class="kg-v mono" data-bind="text:compact(tot('budget')), attr:{title:money(tot('budget'))}"></div>
          <div class="kg-sub" data-bind="text:acUtilTxt()"></div>
          <div class="kg-bar"><i data-bind="style:{width:acPctW('glActual')}"></i></div>
        </div>
        <div class="kg kg-pr">
          <div class="kg-h">
            <span class="kg-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></span>
            <span class="kg-k" data-bind="text:t('cCommitment')"></span>
          </div>
          <div class="kg-v mono" data-bind="text:compact(tot('prTotal')), attr:{title:money(tot('prTotal'))}"></div>
          <div class="kg-rows">
            <div class="kg-row"><span class="kg-rl" data-bind="text:t('lblOpen')"></span><span class="kg-rv mono" data-bind="text:compact(tot('openCommitment')), attr:{title:money(tot('openCommitment'))}"></span></div>
            <div class="kg-row"><span class="kg-rl" data-bind="text:t('lblPipe')"></span><span class="kg-rv mono" data-bind="text:compact(tot('commitmentPipeline')), attr:{title:money(tot('commitmentPipeline'))}"></span></div>
          </div>
        </div>
        <div class="kg kg-po">
          <div class="kg-h">
            <span class="kg-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg></span>
            <span class="kg-k" data-bind="text:t('cObligation')"></span>
          </div>
          <div class="kg-v mono" data-bind="text:compact(tot('totalPo')), attr:{title:money(tot('totalPo'))}"></div>
          <div class="kg-rows">
            <div class="kg-row"><span class="kg-rl" data-bind="text:t('lblOpen')"></span><span class="kg-rv mono" data-bind="text:compact(tot('openObligation')), attr:{title:money(tot('openObligation'))}"></span></div>
            <div class="kg-row"><span class="kg-rl" data-bind="text:t('lblPipe')"></span><span class="kg-rv mono" data-bind="text:compact(tot('poPipeline')), attr:{title:money(tot('poPipeline'))}"></span></div>
          </div>
        </div>
        <div class="kg kg-oenc">
          <div class="kg-h">
            <span class="kg-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg></span>
            <span class="kg-k" data-bind="text:t('cOpenEncumbrance')"></span>
          </div>
          <div class="kg-v mono" data-bind="text:compact(tot('openEncumbrance')), attr:{title:money(tot('openEncumbrance'))}"></div>
          <div class="kg-rows">
            <div class="kg-row"><span class="kg-rl" data-bind="text:t('lblOpenPr')"></span><span class="kg-rv mono" data-bind="text:compact(tot('openCommitment')), attr:{title:money(tot('openCommitment'))}"></span></div>
            <div class="kg-row"><span class="kg-rl" data-bind="text:t('lblOpenPo')"></span><span class="kg-rv mono" data-bind="text:compact(tot('openObligation')), attr:{title:money(tot('openObligation'))}"></span></div>
          </div>
        </div>
        <div class="kg kg-act">
          <div class="kg-h">
            <span class="kg-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></span>
            <span class="kg-k" data-bind="text:t('cActual')"></span>
          </div>
          <div class="kg-v mono" data-bind="text:compact(tot('glActual')), attr:{title:money(tot('glActual'))}"></div>
          <div class="kg-rows">
            <div class="kg-row"><span class="kg-rl" data-bind="text:t('cGrn')"></span><span class="kg-rv mono" data-bind="text:compact(tot('grnActual')), attr:{title:money(tot('grnActual'))}"></span></div>
            <div class="kg-row"><span class="kg-rl" data-bind="text:t('cApDirect')"></span><span class="kg-rv mono" data-bind="text:compact(tot('apDirect')), attr:{title:money(tot('apDirect'))}"></span></div>
            <div class="kg-row"><span class="kg-rl" data-bind="text:t('cSla')"></span><span class="kg-rv mono" data-bind="text:compact(tot('slaActual')), attr:{title:money(tot('slaActual'))}"></span></div>
          </div>
        </div>
        <div class="kg kg-funds" data-bind="css:{neg:(tot('fundsAvailable')||0)<0}">
          <div class="kg-h">
            <span class="kg-ico"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><polyline points="9 12 11 14 15 10"/></svg></span>
            <span class="kg-k" data-bind="text:t('cFunds')"></span>
          </div>
          <div class="kg-v mono" data-bind="text:compact(tot('fundsAvailable')), attr:{title:money(tot('fundsAvailable'))}"></div>
          <div class="kg-rows">
            <div class="kg-row"><span class="kg-rl" data-bind="text:t('lblCalc')"></span><span class="kg-rv mono" data-bind="text:compact(tot('fundsAvailableCalc')), attr:{title:money(tot('fundsAvailableCalc'))}, css:{neg:(tot('fundsAvailableCalc')||0)<0}"></span></div>
          </div>
          <div class="kg-sub" data-bind="text:acFundsTxt()"></div>
        </div>
      </div>

      <!-- results table -->
      <div class="tbl-wrap">
        <table class="tbl actuals-tbl">
          <thead><tr>
            <th class="combo" data-bind="text:t('thCombo'), attr:{title:t('hCombo')}"></th>
            <th data-bind="text:t('costCenter')"></th>
            <th data-bind="text:t('account')"></th>
            <th data-bind="text:t('fSectorL')"></th>
            <th data-bind="text:t('program')"></th>
            <th data-bind="text:t('thAppr')"></th>
            <th class="num" data-bind="text:t('cBudget'), attr:{title:t('hBudget')}"></th>
            <th class="num grp-h"><span data-bind="text:t('cCommitment')"></span><i class="hint-i" data-bind="attr:{title:t('hCommitmentGrp')}">ⓘ</i></th>
            <th class="num grp-h"><span data-bind="text:t('cObligation')"></span><i class="hint-i" data-bind="attr:{title:t('hObligationGrp')}">ⓘ</i></th>

    <div class="fd-grid">
      <div class="field fd-full"><label class="lbl" data-bind="text:t('fPeriod')+' *'"></label>
        <select class="inp inp-lg" data-bind="options:periods, optionsText:'period', optionsValue:'period', value:acPeriod"></select></div>
      <div class="field"><label class="lbl" data-bind="text:t('fSectorL')"></label>
        <select class="inp inp-lg" data-bind="options:acSectors, optionsText:'name', optionsValue:'code', value:acSector, optionsCaption:t('allSectors')"></select></div>
      <div class="field"><label class="lbl" data-bind="text:t('fChapterL')"></label>
        <select class="inp inp-lg" data-bind="options:acChapters, optionsText:'name', optionsValue:'code', value:acChapter, optionsCaption:t('allChapters')"></select></div>
      <div class="field"><label class="lbl" data-bind="text:t('fProgramL')"></label>
        <select class="inp inp-lg" data-bind="options:acPrograms, optionsText:'name', optionsValue:'code', value:acProgram, optionsCaption:t('allPrograms')"></select></div>
      <div class="field"><label class="lbl" data-bind="text:t('fApprL')"></label>
        <select class="inp inp-lg" data-bind="options:acAppropriations, optionsText:function(a){return a.code+' · '+a.name}, optionsValue:'code', value:acAppr, optionsCaption:t('allApprops')"></select></div>
      <div class="field"><label class="lbl" data-bind="text:t('fAccountL')"></label>
        <select class="inp inp-lg" data-bind="options:acAccounts, optionsText:function(a){return a.code+' · '+a.name}, optionsValue:'code', value:acAccount, optionsCaption:t('allAccounts')"></select></div>
      <div class="field"><label class="lbl" data-bind="text:t('fCostCenterL')"></label>
        <select class="inp inp-lg" data-bind="options:acCostCenters, optionsText:function(a){return a.code+' · '+a.name}, optionsValue:'code', value:acCostCenter, optionsCaption:t('allCostCenters')"></select></div>
      <div class="field"><label class="lbl" data-bind="text:t('fSourceL')"></label>
        <select class="inp inp-lg" data-bind="options:acSources, optionsText:'name', optionsValue:'code', value:acSource, optionsCaption:t('allSources')"></select></div>
      <div class="field fd-full"><label class="lbl" data-bind="text:t('fSearchL')"></label>
        <input class="inp inp-lg" type="text" data-bind="textInput:acSearch, attr:{placeholder:t('searchActuals')}, event:{keydown:function(d,e){if(e.keyCode===13){applyAcFilters();}return true;}}"></div>
    </div>
    <div class="fd-foot">
      <button class="btn btn-primary" data-bind="click:applyAcFilters, text:t('btnApply')"></button>
      <button class="btn" data-bind="click:acDrawerReset, text:t('btnReset')"></button>
    </div>
  </div>
</aside>

<!-- combination segment popover -->
<div class="combo-tip" data-bind="visible:tipShow, style:{left:tipX()+'px', top:tipY()+'px'}" style="display:none">
  <div class="ctip-h" data-bind="text:t('segments')"></div>
  <table><tbody data-bind="foreach:tipRows">
    <tr>
      <td class="ctip-l" data-bind="text:label"></td>
      <td class="ctip-c mono" data-bind="text:$data.code||''"></td>
      <td class="ctip-d" data-bind="text:$data.desc||''"></td>
    </tr>
  </tbody></table>
</div>

<!-- toast -->
<div class="toast" data-bind="visible:toast, text:toast, css:{bad:toastBad}" style="display:none"></div>

<script src="https://static.oracle.com/cdn/jet/17.0.0/3rdparty/knockout/knockout-3.5.1.js"></script>
<script>
// shared Fusion deep-link builders (UMD -> window.FusionLinks), then the app;
// boot the app even if the shared file fails to load (links just stay plain text)
(function () {
  function bootApp() { var s = document.createElement('script'); s.src = 'js/app.js?v=' + window.APP_VERSION; document.body.appendChild(s); }
  var f = document.createElement('script');
  f.src = '/shared/js/fusionLinks.js?v=' + window.APP_VERSION;
  f.onload = bootApp; f.onerror = bootApp;
  document.body.appendChild(f);
})();
</script>
</body>
</html>
