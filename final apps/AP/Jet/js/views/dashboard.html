<div class="page-wrap page-wrap--full">

  <!-- ── Header: title + level selector + actions (top-right) ─────────── -->
  <div class="page-header-row">
    <div class="page-header">
      <div class="page-title" data-bind="text: $vm.t('dash.title')"></div>
      <div class="page-subtitle" data-bind="text: $vm.t('dash.subtitle')"></div>
    </div>
    <div class="page-actions">
      <button class="btn btn-secondary" data-bind="click: resetFilters, text: $root.t('dash.reset')"></button>
      <button class="btn btn-secondary" data-bind="click: refresh, text: $root.t('dash.refresh')"></button>
      <button class="btn btn-primary" data-bind="click: printReport">
        &#128424; <span data-bind="text: $root.t('dash.print')"></span>
      </button>
    </div>
  </div>

  <!-- ── Level selector (radio) + applied filter chips ────────────────── -->
  <div class="ap-chips">
    <span style="font-size:12px;font-weight:600;color:var(--text-2)" data-bind="text: $root.t('dash.level') + ':'"></span>
    <div class="ap-seg" role="radiogroup">
      <button class="ap-seg-btn" role="radio" data-bind="click: function(){ $vm.setLevel('header'); },
              css: { on: level() === 'header' }, attr: { 'aria-checked': level() === 'header' }">
        <span class="dot"></span><span data-bind="text: $root.t('dash.levelHeader')"></span>
      </button>
      <button class="ap-seg-btn" role="radio" data-bind="click: function(){ $vm.setLevel('line'); },
              css: { on: level() === 'line' }, attr: { 'aria-checked': level() === 'line' }">
        <span class="dot"></span><span data-bind="text: $root.t('dash.levelLine')"></span>
      </button>
      <button class="ap-seg-btn" role="radio" data-bind="click: function(){ $vm.setLevel('dist'); },
              css: { on: level() === 'dist' }, attr: { 'aria-checked': level() === 'dist' }">
        <span class="dot"></span><span data-bind="text: $root.t('dash.levelDist')"></span>
      </button>
    </div>
    <span style="flex:1 1 auto"></span>
    <!-- ko foreach: chips -->
    <span class="ap-chip">
      <span data-bind="text: label"></span><b data-bind="text: value"></b>
      <button class="ap-chip-x" data-bind="click: clear">&#10005;</button>
    </span>
    <!-- /ko -->
    <!-- ko if: chips().length > 0 -->
    <button class="btn btn-sm btn-secondary ap-chip-clear" data-bind="click: resetFilters, text: $root.t('f.clear')"></button>
    <!-- /ko -->
  </div>

  <div class="ap-body">

    <!-- ── Facet rail (APEX faceted-search style) ──────────────────────── -->
    <aside class="card ap-facets">
      <div class="fct-title" data-bind="text: $root.t('f.filters')"></div>

      <input class="form-control fct-text" type="search"
             data-bind="value: search, valueUpdate: 'input', attr: { placeholder: $root.t('f.search') }">

      <div class="fct-text">
        <label class="form-label" data-bind="text: $root.t('f.dates')"></label>
        <div class="fct-dates">
          <input class="form-control" type="date" data-bind="value: datefrom, attr: { title: $root.t('f.datefrom') }">
          <input class="form-control" type="date" data-bind="value: dateto, attr: { title: $root.t('f.dateto') }">
        </div>
      </div>

      <div class="fct-text">
        <label class="form-label" data-bind="text: $root.t('f.gldates')"></label>
        <div class="fct-dates">
          <input class="form-control" type="date" data-bind="value: gldatefrom, attr: { title: $root.t('f.glfrom') }">
          <input class="form-control" type="date" data-bind="value: gldateto, attr: { title: $root.t('f.glto') }">
        </div>
      </div>

      <!-- include-cancelled toggle (div + pointer-events:none input — never wrap in <label>) -->
      <div class="fct-text">
        <div class="fct-item" data-bind="click: toggleInclCxl, css: { on: inclCancelled() }">
          <input type="checkbox" tabindex="-1" data-bind="checked: inclCancelled">
          <span class="fct-lbl" data-bind="text: $root.t('f.inclCxl'), attr: { title: $root.t('f.inclCxlHint') }"></span>
        </div>
      </div>

      <div class="fct-text">
        <label class="form-label" data-bind="text: $root.t('f.refs')"></label>
        <div style="display:grid;gap:6px">
          <input class="form-control" data-bind="value: po, valueUpdate: 'change', attr: { placeholder: $root.t('f.po') }">
          <input class="form-control" data-bind="value: pr, valueUpdate: 'change', attr: { placeholder: $root.t('f.pr') }">
          <input class="form-control" data-bind="value: task, valueUpdate: 'change', attr: { placeholder: $root.t('f.task') }">
        </div>
      </div>

      <!-- ko if: loadingFilters() --><list-skeleton params="rows: 6"></list-skeleton><!-- /ko -->
      <!-- ko foreach: groups -->
      <div class="fct-group" data-bind="css: { open: open() }">
        <button class="fct-head" data-bind="click: function(){ $vm.toggleGroup($data); }">
          <span data-bind="text: $vm.t(labelKey)"></span>
          <!-- ko if: selCount() > 0 --><span class="fct-sel" data-bind="text: selCount()"></span><!-- /ko -->
          <span class="fct-chev">&#9660;</span>
        </button>
        <!-- ko if: open -->
        <div class="fct-body">
          <!-- ko if: searchable -->
          <input class="form-control fct-mini" data-bind="value: filter, valueUpdate: 'input',
                 attr: { placeholder: $vm.t('f.find') }">
          <!-- /ko -->
          <div class="fct-list">
            <!-- ko foreach: visible -->
            <div class="fct-item" data-bind="click: function(){ $vm.toggleItem($parent, $data); },
                 css: { on: checked() }">
              <input type="checkbox" tabindex="-1" data-bind="checked: checked">
              <span class="fct-lbl" data-bind="text: label, attr: { title: label }"></span>
              <!-- ko if: $data.count !== null --><span class="fct-count" data-bind="text: $vm.fmtInt($data.count)"></span><!-- /ko -->
            </div>
            <!-- /ko -->
            <!-- ko if: visible().length === 0 -->
            <div class="fct-none" data-bind="text: $vm.t('f.noMatch')"></div>
            <!-- /ko -->
          </div>
        </div>
        <!-- /ko -->
      </div>
      <!-- /ko -->
    </aside>

    <!-- ── Work area: two collapsible / maximizable / exportable regions ─ -->
    <div class="ap-main">

      <!-- Region 1 — Analytics -->
      <div class="card ap-region" data-bind="css: { 'ap-region--max': chartsMax() }">
        <div class="section-heading-row">
          <div class="section-heading ap-rh"><span data-bind="text: $root.t('rg.analytics')"></span><i class="ap-hint" data-bind="event: { mouseover: function (d, e) { return $vm.hintOver('analytics', e); }, mousemove: function (d, e) { return $vm.hintMove('analytics', e); }, mouseout: $vm.hintOut }" aria-label="region hint">i</i></div>
          <div class="region-actions">
            <button class="btn btn-sm btn-secondary" data-bind="click: exportSummaryCsv,
                    text: $root.t('rg.exportData'), attr: { title: $root.t('rg.exportData') }"></button>
            <button class="btn btn-sm btn-secondary" data-bind="click: exportChartsPng,
                    text: $root.t('rg.exportPng'), attr: { title: $root.t('rg.exportPng') }"></button>
            <button class="btn btn-sm btn-secondary" data-bind="click: toggleChartsMax,
                    attr: { title: chartsMax() ? $root.t('rg.restore') : $root.t('rg.maximize') }">&#10530;</button>
            <button class="btn btn-sm btn-secondary" data-bind="click: toggleCharts,
                    attr: { title: chartsCollapsed() ? $root.t('rg.expand') : $root.t('rg.collapse') },
                    text: chartsCollapsed() ? '▸' : '▾'"></button>
          </div>
        </div>

        <!-- ko ifnot: chartsCollapsed() -->
        <!-- ko if: loadingSummary() --><list-skeleton params="rows: 4"></list-skeleton><!-- /ko -->
        <!-- ko ifnot: loadingSummary() -->
        <!-- ko if: kpis() -->
        <div class="kpi-row">
          <div class="kpi"><div class="kpi-n" data-bind="text: fmtInt(kpis().invoices)"></div>
            <div class="kpi-l" data-bind="text: $root.t('kpi.invoices')"></div></div>
          <div class="kpi"><div class="kpi-n" data-bind="text: fmtInt(kpis().suppliers)"></div>
            <div class="kpi-l" data-bind="text: $vm.t('kpi.suppliers')"></div></div>
          <div class="kpi"><div class="kpi-n" data-bind="text: fmtCompact(kpis().totalAed), attr: { title: fmtAmt(kpis().totalAed) }"></div>
            <div class="kpi-l" data-bind="text: $root.t('kpi.totalAed')"></div></div>
          <div class="kpi"><div class="kpi-n kpi-ok" data-bind="text: fmtCompact(kpis().paidAed), attr: { title: fmtAmt(kpis().paidAed) }"></div>
            <div class="kpi-l" data-bind="text: $root.t('kpi.paidAed')"></div></div>
          <div class="kpi"><div class="kpi-n kpi-warn" data-bind="text: fmtCompact(kpis().outstandingAed), attr: { title: fmtAmt(kpis().outstandingAed) }"></div>
            <div class="kpi-l" data-bind="text: $root.t('kpi.outstandingAed')"></div></div>
          <div class="kpi"><div class="kpi-n kpi-bad" data-bind="text: fmtCompact(kpis().overdueAed), attr: { title: fmtAmt(kpis().overdueAed) }"></div>
            <div class="kpi-l" data-bind="text: $root.t('kpi.overdueAed')"></div></div>
          <div class="kpi"><div class="kpi-n kpi-bad" data-bind="text: fmtInt(kpis().cancelled)"></div>
            <div class="kpi-l" data-bind="text: $root.t('kpi.cancelled')"></div></div>
        </div>
        <!-- /ko -->

        <div class="ap-charts">
          <div class="ap-chart-card c-8">
            <div class="ap-chart-title"><span data-bind="text: $root.t('ch.aging')"></span><i class="ap-hint" data-bind="event: { mouseover: function (d, e) { return $vm.hintOver('aging', e); }, mousemove: function (d, e) { return $vm.hintMove('aging', e); }, mouseout: $vm.hintOut }" aria-label="chart hint">i</i></div>
            <div class="ap-chart-body"><canvas id="apChartAging"></canvas></div>
          </div>
          <div class="ap-chart-card c-4">
            <div class="ap-chart-title"><span data-bind="text: $root.t('ch.payment')"></span><i class="ap-hint" data-bind="event: { mouseover: function (d, e) { return $vm.hintOver('payment', e); }, mousemove: function (d, e) { return $vm.hintMove('payment', e); }, mouseout: $vm.hintOut }" aria-label="chart hint">i</i></div>
            <div class="ap-chart-body"><canvas id="apChartPay"></canvas></div>
          </div>
          <div class="ap-chart-card c-12">
            <div class="ap-chart-title"><span data-bind="text: $root.t('ch.trend')"></span><i class="ap-hint" data-bind="event: { mouseover: function (d, e) { return $vm.hintOver('trend', e); }, mousemove: function (d, e) { return $vm.hintMove('trend', e); }, mouseout: $vm.hintOut }" aria-label="chart hint">i</i></div>
            <div class="ap-chart-body"><canvas id="apChartTrend"></canvas></div>
          </div>
          <div class="ap-chart-card c-6">
            <div class="ap-chart-title"><span data-bind="text: $vm.t('ch.topSuppliers')"></span><i class="ap-hint" data-bind="event: { mouseover: function (d, e) { return $vm.hintOver('suppliers', e); }, mousemove: function (d, e) { return $vm.hintMove('suppliers', e); }, mouseout: $vm.hintOut }" aria-label="chart hint">i</i></div>
            <div class="ap-chart-body"><canvas id="apChartSup"></canvas></div>
          </div>
          <div class="ap-chart-card c-6">
            <div class="ap-chart-title"><span data-bind="text: $root.t('ch.bySector')"></span><i class="ap-hint" data-bind="event: { mouseover: function (d, e) { return $vm.hintOver('sector', e); }, mousemove: function (d, e) { return $vm.hintMove('sector', e); }, mouseout: $vm.hintOut }" aria-label="chart hint">i</i></div>
            <div class="ap-chart-body"><canvas id="apChartSector"></canvas></div>
          </div>
          <div class="ap-chart-card c-4">
            <div class="ap-chart-title"><span data-bind="text: $root.t('ch.validation')"></span><i class="ap-hint" data-bind="event: { mouseover: function (d, e) { return $vm.hintOver('validation', e); }, mousemove: function (d, e) { return $vm.hintMove('validation', e); }, mouseout: $vm.hintOut }" aria-label="chart hint">i</i></div>
            <div class="ap-chart-body"><canvas id="apChartVal"></canvas></div>
          </div>
          <div class="ap-chart-card c-4">
            <div class="ap-chart-title"><span data-bind="text: $root.t('ch.accounting')"></span><i class="ap-hint" data-bind="event: { mouseover: function (d, e) { return $vm.hintOver('accounting', e); }, mousemove: function (d, e) { return $vm.hintMove('accounting', e); }, mouseout: $vm.hintOut }" aria-label="chart hint">i</i></div>
            <div class="ap-chart-body"><canvas id="apChartAcc"></canvas></div>
          </div>
          <div class="ap-chart-card c-4">
            <div class="ap-chart-title"><span data-bind="text: $root.t('ch.byPayGroup')"></span><i class="ap-hint" data-bind="event: { mouseover: function (d, e) { return $vm.hintOver('paygroup', e); }, mousemove: function (d, e) { return $vm.hintMove('paygroup', e); }, mouseout: $vm.hintOut }" aria-label="chart hint">i</i></div>
            <div class="ap-chart-body"><canvas id="apChartPg"></canvas></div>
          </div>
        </div>
        <!-- /ko -->
        <!-- /ko -->
      </div>

      <!-- Region 2 — AP Register -->
      <div class="card ap-region" data-bind="css: { 'ap-region--max': tableMax() }">
        <div class="section-heading-row">
          <div class="section-heading ap-rh">
            <span data-bind="text: $vm.t('rg.register')"></span>
            <span style="font-weight:400;font-size:12px;color:var(--text-2)"
                  data-bind="text: ' · ' + fmtInt(total()) + ' ' + $root.t('tbl.rows')"></span>
            <i class="ap-hint" data-bind="event: { mouseover: function (d, e) { return $vm.hintOver('register', e); }, mousemove: function (d, e) { return $vm.hintMove('register', e); }, mouseout: $vm.hintOut }" aria-label="region hint">i</i>
          </div>
          <div class="region-actions">
            <button class="btn btn-sm btn-secondary" data-bind="click: toggleViewMode,
                    text: viewMode() === 'standard' ? $root.t('rg.irView') : $root.t('rg.stdView')"></button>
            <!-- ko if: viewMode() === 'standard' -->
            <button class="btn btn-sm btn-secondary" data-bind="click: toggleColsPanel, text: $root.t('cols.button')"></button>
            <!-- /ko -->
            <button class="btn btn-sm btn-secondary" data-bind="click: exportCsv, text: $root.t('rg.exportCsv')"></button>
            <button class="btn btn-sm btn-secondary" data-bind="click: exportXlsx, text: $root.t('rg.exportXlsx')"></button>
            <button class="btn btn-sm btn-secondary" data-bind="click: toggleTableMax,
                    attr: { title: tableMax() ? $root.t('rg.restore') : $root.t('rg.maximize') }">&#10530;</button>
            <button class="btn btn-sm btn-secondary" data-bind="click: toggleTable,
                    attr: { title: tableCollapsed() ? $root.t('rg.expand') : $root.t('rg.collapse') },
                    text: tableCollapsed() ? '▸' : '▾'"></button>
          </div>
        </div>

        <!-- ko if: colsOpen() -->
        <div class="card ap-cols-panel">
          <div class="fct-title" data-bind="text: $root.t('cols.title')"></div>
          <div class="fct-list" style="max-height:320px">
            <!-- ko foreach: levelCols -->
            <div class="fct-item" data-bind="click: function () { $vm.toggleCol($data); }, css: { on: $vm.isColOn($data) }">
              <input type="checkbox" tabindex="-1" data-bind="checked: $vm.isColOn($data)">
              <span class="fct-lbl" data-bind="text: $vm.t($data.labelKey)"></span>
            </div>
            <!-- /ko -->
          </div>
          <div style="display:flex;gap:6px;margin-top:8px;justify-content:flex-end">
            <button class="btn btn-sm btn-secondary" data-bind="click: showAllCols, text: $root.t('cols.showAll')"></button>
            <button class="btn btn-sm btn-secondary" data-bind="click: resetCols, text: $root.t('cols.reset')"></button>
            <button class="btn btn-sm btn-primary" data-bind="click: toggleColsPanel, text: $root.t('dr.close')"></button>
          </div>
        </div>
        <!-- /ko -->

        <!-- ko ifnot: tableCollapsed() -->
        <!-- ko if: loadingRows() --><list-skeleton params="rows: 10"></list-skeleton><!-- /ko -->
        <!-- ko ifnot: loadingRows() -->

        <!-- interactive-report mode: shared APEX-IR-like grid (rename columns,
             calculated columns, aggregates, control breaks, highlights, layouts) -->
        <!-- ko if: viewMode() === 'ir' -->
        <!-- ko if: irData() -->
        <interactive-report params="reportCode: $vm.irCode, section: level,
                                    data: irData, isAdmin: false,
                                    layoutsApi: null"></interactive-report>
        <!-- /ko -->
        <!-- /ko -->

        <!-- ko ifnot: viewMode() === 'ir' -->
        <!-- ko if: rows().length === 0 -->
        <div class="empty-state" data-bind="text: $root.t('tbl.none')"></div>
        <!-- /ko -->
        <!-- ko if: rows().length > 0 -->

        <!-- one metadata-driven register table for all three levels -->
        <div class="data-table-wrap"><table class="data-table">
          <thead><tr>
            <!-- ko foreach: visibleCols -->
            <th data-bind="css: { 'ap-amount': !!$data.amt, 'ap-th-sort': !!$data.sort },
                           click: function () { if ($data.sort) $vm.sortBy($data.sort); return true; }">
              <span data-bind="text: $vm.t($data.labelKey)"></span>
              <!-- ko if: $data.sort --><span class="arr" data-bind="text: $vm.sortArrow($data.sort)"></span><!-- /ko -->
            </th>
            <!-- /ko -->
          </tr></thead>
          <tbody><!-- ko foreach: rows -->
            <tr class="ap-row-click" data-bind="click: function () { $vm.openDrill($data); }">
              <!-- ko foreach: $vm.visibleCols -->
              <td data-bind="css: { 'ap-amount': !!$data.amt, 'ap-clip': !!$data.clip },
                             attr: { title: $vm.cellTitle($parent, $data) }">
                <!-- ko with: $vm.cellLink($parent, $data) -->
                <a class="ap-inv-link" target="_blank" rel="noopener noreferrer"
                   data-bind="attr: { href: href, title: $vm.t('dr.fusionOpen') }, text: text,
                              click: function () { return true; }, clickBubble: false"></a>
                <!-- /ko -->
                <!-- ko ifnot: $vm.cellLink($parent, $data) -->
                <!-- ko if: $data.badge -->
                <span data-bind="text: $parent[$data.key] || '', attr: { class: $vm.badgeCls($data.badge, $parent[$data.key]) }"></span>
                <!-- /ko -->
                <!-- ko ifnot: $data.badge -->
                <span data-bind="text: $vm.cellVal($parent, $data)"></span>
                <!-- /ko -->
                <!-- /ko -->
              </td>
              <!-- /ko -->
            </tr>
          <!-- /ko --></tbody>
        </table></div>
        <!-- ko if: rowTotals() -->
        <div class="ap-table-note">
          <b data-bind="text: $root.t('tbl.totalAmount') + ': ' + fmtAmt(rowTotals().amountAed)"></b>
          <!-- ko if: level() === 'header' -->
          <span data-bind="text: ' \u00b7 ' + $root.t('tbl.totalBalance') + ': ' + fmtAmt(rowTotals().balanceAed)"></span>
          <!-- /ko -->
        </div>
        <!-- /ko -->

        <list-pager params="offset: offset, limit: limit, total: total, onChange: reloadRows"></list-pager>
        <!-- /ko -->
        <!-- /ko -->
        <!-- /ko -->
        <!-- /ko -->
      </div>

    </div><!-- /.ap-main -->
  </div><!-- /.ap-body -->

  <!-- ── Invoice drill window: master header region + top-right Summary card
       (amounts + statuses) + detail region with Lines / Distributions tabs;
       ⤢ maximizes the window to full screen (Esc restores, then closes) ── -->
  <!-- ko if: showDrill() && drill() -->
  <div class="modal-overlay" data-bind="click: closeDrill">
    <div class="modal-box inv-box" data-bind="css: { 'inv-max': invMax() }, click: function(){ return false; }, clickBubble: false">
      <div class="modal-header">
        <div>
          <div class="modal-title">
            <span data-bind="text: $root.t('dr.title')"></span>
            <span style="font-weight:400" data-bind="text: ' \u00b7 ' + drill().header.invoiceNumber"></span>
          </div>
          <div style="font-size:12px;color:var(--text-2)" data-bind="text: drill().header.supplier"></div>
        </div>
        <div class="region-actions">
          <button class="btn btn-sm btn-secondary" data-bind="click: toggleInvMax,
                  attr: { title: invMax() ? $root.t('rg.restore') : $root.t('rg.maximize') },
                  text: invMax() ? '\u2921' : '\u2922'"></button>
          <button class="btn btn-sm btn-secondary" data-bind="click: closeDrill, text: $root.t('dr.close')"></button>
        </div>
      </div>
      <div class="modal-body inv-body">

        <!-- master region: invoice identity + grouped header fields, summary card top-right -->
        <div class="inv-master" data-bind="with: drill().header">
          <div class="inv-id">
            <div class="inv-eyebrow" data-bind="text: $vm.t('dr.invHeader')"></div>
            <div class="inv-number"><a target="_blank" rel="noopener noreferrer"
                 data-bind="attr: { href: $vm.fusionUrl($data.id), title: $vm.t('dr.fusionOpen') },
                            text: $data.invoiceNumber"></a></div>
            <div class="inv-supplier">
              <span data-bind="text: $data.supplier"></span>
              <!-- ko if: $data.isBeneficiary === 'Y' -->
              <span class="badge badge--info" data-bind="text: $vm.t('dr.beneficiary')"></span>
              <!-- /ko -->
              <span class="badge badge--idle" data-bind="text: $data.invoiceType || ''"></span>
            </div>
            <div class="inv-desc" data-bind="text: $data.description || ''"></div>

            <div class="inv-sec" data-bind="text: $vm.t('dr.secSupplier')"></div>
            <div class="inv-grid">
              <div><span class="kv-l" data-bind="text: $vm.t('dr.supplierNo')"></span><span data-bind="text: $data.supplierNumber || ''"></span></div>
              <div><span class="kv-l" data-bind="text: $vm.t('dr.site')"></span><span data-bind="text: $data.supplierSite || ''"></span></div>
              <div><span class="kv-l" data-bind="text: $vm.t('dr.cityCountry')"></span>
                <span data-bind="text: [$data.city, $data.country].filter(function (x) { return x; }).join(', ')"></span></div>
              <div><span class="kv-l" data-bind="text: $vm.t('dr.email')"></span><span data-bind="text: $data.supplierEmail || ''"></span></div>
              <div><span class="kv-l" data-bind="text: $vm.t('dr.beneficiary')"></span><span data-bind="text: $data.beneficiary || ''"></span></div>
              <div><span class="kv-l" data-bind="text: $vm.t('tbl.po')"></span>
                <!-- ko if: ($data.poRefs || []).length -->
                <span class="inv-reflist" data-bind="foreach: $data.poRefs">
                  <!-- ko if: $data.id -->
                  <a class="ap-inv-link" target="_blank" rel="noopener noreferrer"
                     data-bind="attr: { href: $vm.fusionPoUrl($data.id), title: $vm.t('dr.fusionOpen') }, text: $data.num"></a>
                  <!-- /ko -->
                  <!-- ko ifnot: $data.id --><span data-bind="text: $data.num"></span><!-- /ko -->
                </span>
                <!-- /ko -->
                <!-- ko ifnot: ($data.poRefs || []).length -->
                <span data-bind="text: $data.poNumbers || ''"></span>
                <!-- /ko -->
              </div>
              <div><span class="kv-l" data-bind="text: $vm.t('tbl.pr')"></span>
                <!-- ko if: ($data.prRefs || []).length -->
                <span class="inv-reflist" data-bind="foreach: $data.prRefs">
                  <!-- ko if: $data.id -->
                  <a class="ap-inv-link" target="_blank" rel="noopener noreferrer"
                     data-bind="attr: { href: $vm.fusionPrUrl($data.id), title: $vm.t('dr.fusionOpen') }, text: $data.num"></a>
                  <!-- /ko -->
                  <!-- ko ifnot: $data.id --><span data-bind="text: $data.num"></span><!-- /ko -->
                </span>
                <!-- /ko -->
                <!-- ko ifnot: ($data.prRefs || []).length -->
                <span data-bind="text: $data.prNumbers || ''"></span>
                <!-- /ko -->
              </div>
              <div><span class="kv-l" data-bind="text: $vm.t('tbl.voucher')"></span><span data-bind="text: $data.voucherNum || ''"></span></div>
              <div><span class="kv-l" data-bind="text: $vm.t('dr.source')"></span><span data-bind="text: $data.source || ''"></span></div>
              <div><span class="kv-l" data-bind="text: $vm.t('dr.batch')"></span><span data-bind="text: $data.batchName || ''"></span></div>
            </div>

            <div class="inv-sec" data-bind="text: $vm.t('dr.secPayment')"></div>
            <div class="inv-grid">
              <div><span class="kv-l" data-bind="text: $vm.t('dr.payTerms')"></span><span data-bind="text: $data.paymentTerms || ''"></span></div>
              <div><span class="kv-l" data-bind="text: $vm.t('tbl.terms')"></span><span data-bind="text: $data.termsDate || ''"></span></div>
              <div><span class="kv-l" data-bind="text: $vm.t('tbl.method')"></span><span data-bind="text: $data.paymentMethod || ''"></span></div>
              <div><span class="kv-l" data-bind="text: $vm.t('tbl.payGroup')"></span><span data-bind="text: $data.payGroup || ''"></span></div>
              <div><span class="kv-l" data-bind="text: $vm.t('dr.payCurr')"></span><span data-bind="text: $data.paymentCurrency || ''"></span></div>
            </div>

            <div class="inv-sec" data-bind="text: $vm.t('dr.secDates')"></div>
            <div class="inv-grid">
              <div><span class="kv-l" data-bind="text: $vm.t('tbl.date')"></span><span data-bind="text: $data.invoiceDate || ''"></span></div>
              <div><span class="kv-l" data-bind="text: $vm.t('dr.glDate')"></span><span data-bind="text: $data.glDate || ''"></span></div>
              <div><span class="kv-l" data-bind="text: $vm.t('dr.received')"></span><span data-bind="text: $data.receivedDate || ''"></span></div>
            </div>

            <!-- Audit info — collapsible, collapsed by default -->
            <button class="inv-aud-h" data-bind="click: function () { $vm.toggleInvAudit(); }, css: { open: $vm.invAuditOpen() }">
              <span data-bind="text: $vm.t('dr.auditInfo')"></span>
              <span class="chev">&#9660;</span>
            </button>
            <!-- ko if: $vm.invAuditOpen -->
            <div class="inv-grid">
              <div><span class="kv-l" data-bind="text: $vm.t('dr.createdBy')"></span><span data-bind="text: $data.createdBy || ''"></span></div>
              <div><span class="kv-l" data-bind="text: $vm.t('dr.created')"></span><span data-bind="text: $data.createdDate || ''"></span></div>
              <div><span class="kv-l" data-bind="text: $vm.t('dr.updatedBy')"></span><span data-bind="text: $data.lastUpdatedBy || ''"></span></div>
              <div><span class="kv-l" data-bind="text: $vm.t('dr.updated')"></span><span data-bind="text: $data.lastUpdatedDate || ''"></span></div>
              <!-- ko if: $data.cancelledDate -->
              <div><span class="kv-l" data-bind="text: $vm.t('dr.cancelledBy')"></span><span data-bind="text: $data.cancelledBy || ''"></span></div>
              <div><span class="kv-l" data-bind="text: $vm.t('dr.cancelledOn')"></span><span data-bind="text: $data.cancelledDate || ''"></span></div>
              <!-- /ko -->
            </div>
            <!-- /ko -->
          </div>

          <!-- summary card: hero amount + money rows + status stack -->
          <aside class="inv-sum">
            <div class="inv-eyebrow" data-bind="text: $vm.t('dr.summary')"></div>
            <div class="inv-amount" data-bind="text: $vm.fmtAmt($data.amountAed)"></div>
            <div class="inv-amount-l" data-bind="text: $vm.t('tbl.amountAed')"></div>
            <!-- ko if: $data.currency && $data.currency !== 'AED' -->
            <div class="inv-fx" data-bind="text: $vm.fmtAmt($data.amount) + ' ' + $data.currency
                 + ($data.conversionRate ? ' \u00d7 ' + $data.conversionRate : '')"></div>
            <!-- /ko -->
            <div class="inv-rows">
              <div><span data-bind="text: $vm.t('tbl.paidAmt')"></span><b data-bind="text: $vm.fmtAmt($data.amountPaid)"></b></div>
              <div><span data-bind="text: $vm.t('tbl.balance')"></span><b data-bind="text: $vm.fmtAmt($data.balanceDue)"></b></div>
              <div><span data-bind="text: $vm.t('dr.tax')"></span><b data-bind="text: $vm.fmtAmt($data.taxCharged)"></b></div>
            </div>
            <div class="inv-badges">
              <div><span class="kv-l" data-bind="text: $vm.t('tbl.status')"></span>
                <span data-bind="text: $data.invoiceStatus || '', attr: { class: $vm.valBadge($data.invoiceStatus) }"></span></div>
              <div><span class="kv-l" data-bind="text: $vm.t('dr.approval')"></span>
                <span data-bind="text: $data.approvalStatus || '', attr: { class: $vm.apprBadge($data.approvalStatus) }"></span></div>
              <div><span class="kv-l" data-bind="text: $vm.t('tbl.validation')"></span>
                <span data-bind="text: $data.validationStatus || '', attr: { class: $vm.valBadge($data.validationStatus) }"></span></div>
              <div><span class="kv-l" data-bind="text: $vm.t('tbl.accounting')"></span>
                <span data-bind="text: $data.accountingStatus || '', attr: { class: $vm.accBadge($data.accountingStatus) }"></span></div>
              <div><span class="kv-l" data-bind="text: $vm.t('tbl.payStatus')"></span>
                <span data-bind="text: $data.paymentStatus || '', attr: { class: $vm.payBadge($data.paymentStatus) }"></span></div>
              <div><span class="kv-l" data-bind="text: $vm.t('tbl.funds')"></span>
                <span class="badge badge--idle" data-bind="text: $data.fundsStatus || ''"></span></div>
            </div>
            <!-- ko if: $data.cancelledDate -->
            <div class="inv-cxl" data-bind="text: $vm.t('dr.cancelledNote') + ' ' + $data.cancelledDate"></div>
            <!-- /ko -->
          </aside>
        </div>

        <!-- detail region: Lines / Distributions -->
        <div class="inv-detail">
          <div class="ap-tabs">
            <button class="ap-tab" data-bind="click: function(){ $vm.setDrillTab('lines'); }, css: { on: drillTab() === 'lines' }">
              <span data-bind="text: $root.t('dr.lines') + ' (' + drill().lines.length + ')'"></span></button>
            <button class="ap-tab" data-bind="click: function(){ $vm.setDrillTab('dists'); }, css: { on: drillTab() === 'dists' }">
              <span data-bind="text: $root.t('dr.dists') + ' (' + drill().distributions.length + ')'"></span></button>
          </div>
          <!-- ko if: drillTab() === 'lines' -->
        <div class="data-table-wrap"><table class="data-table">
          <thead><tr>
            <th data-bind="text: $root.t('tbl.line')"></th>
            <th data-bind="text: $root.t('tbl.lineType')"></th>
            <th data-bind="text: $root.t('tbl.description')"></th>
            <th class="ap-amount" data-bind="text: $root.t('tbl.amountAed')"></th>
            <th data-bind="text: $root.t('tbl.po')"></th>
            <th data-bind="text: $root.t('tbl.receipt')"></th>
            <th data-bind="text: $root.t('tbl.project')"></th>
            <th data-bind="text: $root.t('tbl.task')"></th>
            <th data-bind="text: $root.t('tbl.etype')"></th>
            <th data-bind="text: $root.t('tbl.dept')"></th>
            <th data-bind="text: $root.t('tbl.holds')"></th>
          </tr></thead>
          <tbody><!-- ko foreach: drill().lines -->
            <tr>
              <td data-bind="text: $data.lineNumber"></td>
              <td data-bind="text: $data.lineType || ''"></td>
              <td style="max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"
                  data-bind="text: $data.description || '', attr: { title: $data.description || '' }"></td>
              <td class="ap-amount" data-bind="text: $vm.fmtAmt($data.amountAed)"></td>
              <td>
                <!-- ko if: $data.poHeaderId -->
                <a class="ap-inv-link" target="_blank" rel="noopener noreferrer"
                   data-bind="attr: { href: $vm.fusionPoUrl($data.poHeaderId), title: $vm.t('dr.fusionOpen') }, text: $data.poNumber"></a>
                <!-- /ko -->
                <!-- ko ifnot: $data.poHeaderId --><span data-bind="text: $data.poNumber || ''"></span><!-- /ko -->
              </td>
              <td data-bind="text: $data.receiptNumber || ''"></td>
              <td data-bind="text: $data.projectNumber || '', attr: { title: $data.projectName || '' }"></td>
              <td data-bind="text: $data.taskNumber || '', attr: { title: $data.taskName || '' }"></td>
              <td data-bind="text: $data.expType || ''"></td>
              <td data-bind="text: $data.expOrg || ''"></td>
              <td data-bind="text: $data.activeHolds || 0"></td>
            </tr>
          <!-- /ko --></tbody>
        </table></div>
        <!-- /ko -->

        <!-- ko if: drillTab() === 'dists' -->
        <div class="data-table-wrap"><table class="data-table">
          <thead><tr>
            <th data-bind="text: $root.t('tbl.line')"></th>
            <th data-bind="text: $root.t('tbl.dist')"></th>
            <th data-bind="text: $root.t('tbl.distType')"></th>
            <th class="ap-amount" data-bind="text: $root.t('tbl.amountAed')"></th>
            <th data-bind="text: $root.t('tbl.glComb'), attr: { title: $root.t('dr.ccHint') }"></th>
            <th data-bind="text: $root.t('tbl.account')"></th>
            <th data-bind="text: $root.t('tbl.cc')"></th>
            <th data-bind="text: $root.t('tbl.approp')"></th>
            <th data-bind="text: $root.t('tbl.sector')"></th>
            <th data-bind="text: $root.t('tbl.project')"></th>
            <th data-bind="text: $root.t('tbl.task')"></th>
            <th data-bind="text: $root.t('tbl.po')"></th>
            <th data-bind="text: $root.t('tbl.pr')"></th>
            <th data-bind="text: $root.t('tbl.acctDate')"></th>
          </tr></thead>
          <tbody><!-- ko foreach: drill().distributions -->
            <tr>
              <td data-bind="text: $data.lineNumber"></td>
              <td data-bind="text: $data.distNumber"></td>
              <td data-bind="text: $data.distType || ''"></td>
              <td class="ap-amount" data-bind="text: $vm.fmtAmt($data.amountAed)"></td>
              <td class="inv-cc" data-bind="text: $data.chargeAccount || '',
                  event: { mouseover: $vm.ccHover, mousemove: $vm.ccMove, mouseout: $vm.ccOut }"></td>
              <td data-bind="text: $data.accountCode || '', attr: { title: $data.accountDesc || '' }"></td>
              <td data-bind="text: $data.costCenterCode || '', attr: { title: $data.costCenterDesc || '' }"></td>
              <td data-bind="text: $data.appropriationCode || '', attr: { title: $data.appropriationDesc || '' }"></td>
              <td data-bind="text: $data.sector || ''"></td>
              <td data-bind="text: $data.projectNumber || ''"></td>
              <td data-bind="text: $data.taskNumber || ''"></td>
              <td>
                <!-- ko if: $data.poHeaderId -->
                <a class="ap-inv-link" target="_blank" rel="noopener noreferrer"
                   data-bind="attr: { href: $vm.fusionPoUrl($data.poHeaderId), title: $vm.t('dr.fusionOpen') }, text: $data.poNumber"></a>
                <!-- /ko -->
                <!-- ko ifnot: $data.poHeaderId --><span data-bind="text: $data.poNumber || ''"></span><!-- /ko -->
              </td>
              <td>
                <!-- ko if: $data.prHeaderId -->
                <a class="ap-inv-link" target="_blank" rel="noopener noreferrer"
                   data-bind="attr: { href: $vm.fusionPrUrl($data.prHeaderId), title: $vm.t('dr.fusionOpen') }, text: $data.prNumber"></a>
                <!-- /ko -->
                <!-- ko ifnot: $data.prHeaderId --><span data-bind="text: $data.prNumber || ''"></span><!-- /ko -->
              </td>
              <td data-bind="text: $data.accountingDate || ''"></td>
            </tr>
          <!-- /ko --></tbody>
        </table></div>
        <!-- /ko -->
        </div><!-- /.inv-detail -->

      </div>
    </div>
  </div>
  <!-- /ko -->

  <!-- ── Rich hint popover (chart / region ⓘ hover): title + description +
       live figures for the current filter selection ─────────────────────── -->
  <div class="ap-tip" data-bind="visible: hintShow, style: { left: hintX() + 'px', top: hintY() + 'px' }" style="display:none">
    <div class="ap-tip-h" data-bind="text: hintTitle"></div>
    <div class="ap-tip-d" data-bind="text: hintDesc"></div>
    <!-- ko if: hintRows().length > 0 -->
    <div class="ap-tip-rows" data-bind="foreach: hintRows">
      <div class="ap-tip-row"><span data-bind="text: l"></span><b data-bind="text: v"></b></div>
    </div>
    <!-- /ko -->
  </div>

  <!-- ── COA segment popover (Distributions tab GL-combination hover) ──── -->
  <div class="combo-tip" data-bind="visible: tipShow, style: { left: tipX() + 'px', top: tipY() + 'px' }" style="display:none">
    <div class="ctip-h" data-bind="text: $root.t('dr.segments')"></div>
    <table><tbody data-bind="foreach: tipRows">
      <tr>
        <td class="ctip-l" data-bind="text: label"></td>
        <td class="ctip-c" data-bind="text: $data.code || ''"></td>
        <td class="ctip-d" data-bind="text: $data.desc || ''"></td>
      </tr>
    </tbody></table>
  </div>

  <!-- ── Chart drill-down drawer (right-edge slide-in — GL butil pattern):
       chart segment → related invoices; ⤢ full-screen, Esc restores/closes,
       CSV export, reconciling AED total; row click opens the invoice modal -->
  <div class="dw-scrim" data-bind="css: { show: dwOpen }, click: closeDw"></div>
  <aside class="dw-drawer" data-bind="css: { show: dwOpen, 'dw-full': dwMax }" role="dialog" aria-modal="true">
    <header class="dw-h">
      <div>
        <div class="dw-eyebrow" data-bind="text: dwEyebrow"></div>
        <div class="dw-title" data-bind="text: dwTitle"></div>
      </div>
      <div class="dw-acts">
        <button class="btn btn-sm" data-bind="click: toggleDwMax,
                attr: { title: dwMax() ? $root.t('rg.restore') : $root.t('rg.maximize') },
                text: dwMax() ? '⤡' : '⤢'"></button>
        <button class="btn btn-sm" data-bind="click: dwExportCsv, text: $root.t('rg.exportCsv'),
                visible: !dwLoading() && dwRows().length > 0"></button>
        <button class="btn btn-sm" data-bind="click: closeDw, text: $root.t('dr.close')"></button>
      </div>
    </header>
    <div class="dw-b">
      <div class="dw-ctx" data-bind="visible: dwCtx(), text: dwCtx"></div>
      <!-- ko if: dwLoading() --><list-skeleton params="rows: 8"></list-skeleton><!-- /ko -->
      <!-- ko ifnot: dwLoading() -->
      <div class="dw-cap" data-bind="visible: dwCapNote(), text: dwCapNote"></div>
      <!-- ko if: dwRows().length === 0 -->
      <div class="empty-state" data-bind="text: $root.t('tbl.none')"></div>
      <!-- /ko -->
      <!-- ko if: dwRows().length > 0 -->
      <div class="data-table-wrap"><table class="data-table">
        <thead><tr>
          <!-- ko foreach: dwCols -->
          <th data-bind="css: { 'ap-amount': !!$data.amt }">
            <span data-bind="text: $vm.t($data.labelKey)"></span>
          </th>
          <!-- /ko -->
        </tr></thead>
        <tbody><!-- ko foreach: dwRows -->
          <tr class="ap-row-click" data-bind="click: function () { $vm.openDrill($data); }">
            <!-- ko foreach: $vm.dwCols -->
            <td data-bind="css: { 'ap-amount': !!$data.amt, 'ap-clip': !!$data.clip },
                           attr: { title: $vm.cellTitle($parent, $data) }">
              <!-- ko with: $vm.cellLink($parent, $data) -->
              <a class="ap-inv-link" target="_blank" rel="noopener noreferrer"
                 data-bind="attr: { href: href, title: $vm.t('dr.fusionOpen') }, text: text,
                            click: function () { return true; }, clickBubble: false"></a>
              <!-- /ko -->
              <!-- ko ifnot: $vm.cellLink($parent, $data) -->
              <!-- ko if: $data.badge -->
              <span data-bind="text: $parent[$data.key] || '', attr: { class: $vm.badgeCls($data.badge, $parent[$data.key]) }"></span>
              <!-- /ko -->
              <!-- ko ifnot: $data.badge -->
              <span data-bind="text: $vm.cellVal($parent, $data)"></span>
              <!-- /ko -->
              <!-- /ko -->
            </td>
            <!-- /ko -->
          </tr>
        <!-- /ko --></tbody>
        <tfoot><tr><td class="dw-total" data-bind="attr: { colspan: dwCols.length }">
          <span data-bind="text: $root.t('dw.total')"></span>
          <b data-bind="text: fmtAmt(dwAmount())"></b>
        </td></tr></tfoot>
      </table></div>
      <!-- /ko -->
      <!-- /ko -->
    </div>
  </aside>

</div>
