<div class="page-wrap">
  <div class="page-header">
    <div class="page-title">Disbursement Queue</div>
    <div class="page-subtitle">Approved travel requests awaiting advance payment</div>
  </div>

  <!-- ko if: actionMsg() -->
  <div class="alert-banner alert-banner--success" data-bind="text: actionMsg"></div>
  <!-- /ko -->
  <!-- ko if: error() -->
  <div class="alert-banner alert-banner--danger" data-bind="text: error"></div>
  <!-- /ko -->

  <!-- ko if: loading() -->
  <div class="empty-state"><div class="empty-state__icon">&#128181;</div><div class="empty-state__msg">Loading…</div></div>
  <!-- /ko -->
  <!-- ko ifnot: loading() -->
  <!-- ko if: items().length === 0 -->
  <div class="empty-state"><div class="empty-state__icon">&#9989;</div><div class="empty-state__msg">No pending disbursements</div><div class="empty-state__sub">All advance payments are up to date.</div></div>
  <!-- /ko -->
  <!-- ko ifnot: items().length === 0 -->
  <div class="data-table-wrap">
    <table class="data-table">
      <thead>
        <tr><th>Request #</th><th>Employee</th><th>Organisation</th><th>Departure</th><th>Return</th><th>Advance (AED)</th><th>Approved At</th><th>Actions</th></tr>
      </thead>
      <tbody>
        <!-- ko foreach: items() -->
        <tr>
          <td><span class="link-text" data-bind="text: reqNumber, click: $parent.viewDetail.bind($parent, $data)"></span></td>
          <td data-bind="text: employeeName"></td>
          <td data-bind="text: orgName"></td>
          <td data-bind="text: departureDate"></td>
          <td data-bind="text: returnDate"></td>
          <td style="font-weight:700" data-bind="text: $parent.fmt(advanceAmount)"></td>
          <td data-bind="text: approvedAt ? new Date(approvedAt).toLocaleDateString() : '—'"></td>
          <td class="table-actions">
            <button class="btn btn-primary btn-sm" data-bind="click: $parent.payAdvance.bind($parent, $data)">&#128181; Mark Paid</button>
            <button class="btn btn-secondary btn-sm" data-bind="click: $parent.viewDetail.bind($parent, $data)">View</button>
          </td>
        </tr>
        <!-- /ko -->
      </tbody>
      <tfoot>
        <tr>
          <td colspan="5" style="text-align:right;font-weight:600">Total Pending Advance</td>
          <td style="font-weight:700" data-bind="text: fmt(items().reduce(function(s,r){return s+(r.advanceAmount||0);},0))"></td>
          <td colspan="2"></td>
        </tr>
      </tfoot>
    </table>
  </div>
  <!-- /ko -->
  <!-- /ko -->
</div>
