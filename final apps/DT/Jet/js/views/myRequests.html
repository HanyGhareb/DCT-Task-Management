<div class="page-wrap">
  <div class="page-header">
    <div class="page-header-row">
      <div>
        <div class="page-title">My Travel Requests</div>
        <div class="page-subtitle">All your travel requests</div>
      </div>
      <button class="btn btn-primary" data-bind="click: newRequest">&#10133; New Request</button>
    </div>
  </div>

  <div class="view-toolbar">
    <input class="search-box" type="text" placeholder="Search requests…" data-bind="value: searchText, valueUpdate: 'input'">
    <select class="form-control" style="width:180px" data-bind="value: statusFilter">
      <option value="">All Statuses</option>
      <option value="DRAFT">Draft</option>
      <option value="SUBMITTED">Submitted</option>
      <option value="APPROVED">Approved</option>
      <option value="ADVANCE_PAID">Advance Paid</option>
      <option value="TRAVELLED">Travelled</option>
      <option value="SETTLED">Settled</option>
      <option value="CLOSED">Closed</option>
      <option value="REJECTED">Rejected</option>
    </select>
  </div>

  <!-- ko if: loading() -->
  <div class="empty-state"><div class="empty-state__icon">&#9992;</div><div class="empty-state__msg">Loading…</div></div>
  <!-- /ko -->
  <!-- ko ifnot: loading() -->
  <!-- ko if: filtered().length === 0 -->
  <div class="empty-state"><div class="empty-state__icon">&#9992;</div><div class="empty-state__msg">No requests found</div><div class="empty-state__sub">Submit your first travel request.</div></div>
  <!-- /ko -->
  <!-- ko ifnot: filtered().length === 0 -->
  <div class="data-table-wrap">
    <table class="data-table">
      <thead>
        <tr>
          <th>Request #</th>
          <th>Purpose</th>
          <th>Departure</th>
          <th>Return</th>
          <th>Days</th>
          <th>Advance (AED)</th>
          <th>Status</th>
          <th></th>
        </tr>
      </thead>
      <tbody>
        <!-- ko foreach: filtered() -->
        <tr>
          <td><span class="link-text" data-bind="text: reqNumber, click: $parent.openDetail.bind($parent, $data)"></span></td>
          <td style="max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" data-bind="text: travelPurpose"></td>
          <td data-bind="text: departureDate"></td>
          <td data-bind="text: returnDate"></td>
          <td data-bind="text: estimatedDays"></td>
          <td data-bind="text: advanceAmount ? advanceAmount.toLocaleString('en-AE',{minimumFractionDigits:2}) : '—'"></td>
          <td><span data-bind="class: statusClass, text: statusLabel"></span></td>
          <td class="table-actions">
            <button class="btn btn-secondary btn-sm" data-bind="click: $parent.openDetail.bind($parent, $data)">View</button>
          </td>
        </tr>
        <!-- /ko -->
      </tbody>
    </table>
  </div>
  <!-- /ko -->
  <!-- /ko -->
</div>
