<div class="login-page">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-cube">DT</div>
      <div class="login-title">Duty Travel</div>
      <div class="login-subtitle">DCT i-Finance — Oracle JET</div>
    </div>

    <div class="alert-banner alert-banner--warning" style="margin-bottom:16px;font-size:12px">
      &#9888; Dev mode only. In production, login is handled by the Admin portal (App 200).
    </div>

    <!-- ko if: error() -->
    <div class="login-error" data-bind="text: error"></div>
    <!-- /ko -->

    <div class="form-group" style="margin-bottom:12px">
      <label class="form-label">Username</label>
      <input class="form-control" type="text" data-bind="value: username, valueUpdate: 'input'" placeholder="Enter username">
    </div>
    <div class="form-group" style="margin-bottom:16px">
      <label class="form-label">Password</label>
      <input class="form-control" type="password" data-bind="value: password, valueUpdate: 'input'" placeholder="Enter password">
    </div>

    <div style="margin-bottom:12px">
      <button class="btn btn-primary" style="width:100%" data-bind="click: login, disable: loading">
        <!-- ko if: loading() -->Signing in…<!-- /ko -->
        <!-- ko ifnot: loading() -->Sign In<!-- /ko -->
      </button>
    </div>

    <div class="login-quick">
      <div class="login-quick-label">Quick Login (Dev)</div>
      <div class="quick-btns">
        <!-- ko foreach: quickLogins -->
        <div class="quick-btn" data-bind="click: $parent.quickLogin.bind($parent, $data)">
          <b data-bind="text: label"></b>
          <span data-bind="text: role"></span>
        </div>
        <!-- /ko -->
      </div>
    </div>
  </div>
</div>
