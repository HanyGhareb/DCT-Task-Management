<div class="page-wrap">
  <div class="page-header">
    <div class="page-title">Document Requirements</div>
    <div class="page-subtitle">Required documents for travel requests and settlements</div>
  </div>

  <!-- ko if: error() -->
  <div class="alert-banner alert-banner--danger" data-bind="text: error"></div>
  <!-- /ko -->
  <!-- ko if: successMsg() -->
  <div class="alert-banner alert-banner--success" data-bind="text: successMsg"></div>
  <!-- /ko -->

  <div class="view-toolbar">
    <select class="form-control" style="width:220px" data-bind="value: typeFilter">
      <option value="">All Types</option>
      <option value="REQUEST">Travel Request</option>
      <option value="SETTLEMENT">Settlement</option>
    </select>
  </div>

  <!-- ko if: loading() -->
  <div class="empty-state"><div class="empty-state__icon">&#128196;</div><div class="empty-state__msg">Loading…</div></div>
  <!-- /ko -->
  <!-- ko ifnot: loading() -->

  <!-- ko if: editRow() -->
  <div class="card" style="margin-bottom:16px">
    <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px">
      <div>
        <div style="font-weight:700;font-size:14px;margin-bottom:4px">Edit — <span data-bind="text: editRow().docName"></span></div>
        <div style="color:#6e6e73;font-size:12px" data-bind="text: editRow().docCode"></div>
      </div>
      <div class="region-actions">
        <button class="btn btn-secondary btn-sm" data-bind="click: cancelEdit">Cancel</button>
        <button class="btn btn-primary btn-sm" data-bind="click: saveEdit, disable: saving()">Save</button>
      </div>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Mandatory</label>
        <select class="form-control" data-bind="value: editRow().isMandatory">
          <option value="Y">Yes — mandatory</option>
          <option value="N">No — optional</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Applies To</label>
        <select class="form-control" data-bind="value: editRow().appliesToSource">
          <option value="REQUEST">Travel Request only</option>
          <option value="SETTLEMENT">Settlement only</option>
          <option value="BOTH">Both</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Display Order</label>
        <input class="form-control" type="number" min="1" data-bind="value: editRow().displaySeq, valueUpdate: 'input'">
      </div>
      <div class="form-group">
        <label class="form-label">Active</label>
        <select class="form-control" data-bind="value: editRow().isActive">
          <option value="Y">Yes</option>
          <option value="N">No</option>
        </select>
      </div>
    </div>
  </div>
  <!-- /ko -->

  <div class="data-table-wrap">
    <table class="data-table">
      <thead>
        <tr><th>Document</th><th>Mission / Trip</th><th>Applies To</th><th>Mandatory</th><th>Active</th><th></th></tr>
      </thead>
      <tbody>
        <!-- ko foreach: filtered() -->
        <tr>
          <td>
            <!-- ko if: docCode -->
            <span class="badge badge--blue" style="margin-right:6px" data-bind="text: docCode"></span>
            <!-- /ko -->
            <span data-bind="text: docName"></span>
          </td>
          <td style="font-size:12px;color:#6e6e73" data-bind="text: missionTypeLabel + ' / ' + tripTypeLabel"></td>
          <td><span class="badge badge--info" data-bind="text: appliesToSourceLabel"></span></td>
          <td><span data-bind="class: isMandatory==='Y'?'badge badge--danger':'badge badge--idle', text: isMandatory==='Y'?'Mandatory':'Optional'"></span></td>
          <td><span data-bind="class: isActive==='Y'?'badge badge--approved':'badge badge--inactive', text: isActive==='Y'?'Active':'Inactive'"></span></td>
          <td class="table-actions">
            <button class="btn btn-secondary btn-sm" data-bind="click: $parent.startEdit.bind($parent, $data)">Edit</button>
          </td>
        </tr>
        <!-- /ko -->
        <!-- ko if: filtered().length === 0 -->
        <tr><td colspan="6" style="color:#6e6e73;font-size:13px;text-align:center;padding:20px">No requirements match your filter.</td></tr>
        <!-- /ko -->
      </tbody>
    </table>
  </div>
  <!-- /ko -->
</div>
