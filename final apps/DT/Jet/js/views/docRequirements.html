<div class="page-wrap">
  <div class="page-header">
    <div class="page-title">Document Requirements</div>
    <div class="page-subtitle">Required documents for travel requests and settlements</div>
  </div>

  <!-- ko if: successMsg() -->
  <div class="alert-banner alert-banner--success" data-bind="text: successMsg"></div>
  <!-- /ko -->

  <div class="view-toolbar">
    <select class="form-control" style="width:220px" data-bind="value: typeFilter">
      <option value="">All Types</option>
      <option value="TRAVEL_REQUEST">Travel Request</option>
      <option value="SETTLEMENT">Settlement</option>
    </select>
  </div>

  <!-- ko if: editRow() -->
  <div class="card" style="margin-bottom:16px">
    <div style="font-weight:700;font-size:14px;margin-bottom:12px">Edit Document Requirement — <span data-bind="text: editRow().docCode"></span></div>
    <div class="form-grid">
      <div class="form-group form-group--full">
        <label class="form-label">Document Name</label>
        <input class="form-control" type="text" data-bind="value: editRow().docName, valueUpdate: 'input'">
      </div>
      <div class="form-group">
        <label class="form-label">Required</label>
        <select class="form-control" data-bind="value: editRow().isRequired"><option value="Y">Yes</option><option value="N">No (Optional)</option></select>
      </div>
      <div class="form-group">
        <label class="form-label">Active</label>
        <select class="form-control" data-bind="value: editRow().isActive"><option value="Y">Yes</option><option value="N">No</option></select>
      </div>
    </div>
    <div class="form-actions" style="margin-top:12px;padding-top:12px">
      <button class="btn btn-primary btn-sm" data-bind="click: saveEdit">Save</button>
      <button class="btn btn-secondary btn-sm" data-bind="click: cancelEdit">Cancel</button>
    </div>
  </div>
  <!-- /ko -->

  <div class="data-table-wrap">
    <table class="data-table">
      <thead>
        <tr><th>Code</th><th>Document Name</th><th>Applies To</th><th>Required</th><th>Active</th><th></th></tr>
      </thead>
      <tbody>
        <!-- ko foreach: filtered() -->
        <tr>
          <td><span class="badge badge--blue" data-bind="text: docCode"></span></td>
          <td data-bind="text: docName"></td>
          <td data-bind="text: requestType === 'TRAVEL_REQUEST' ? 'Travel Request' : 'Settlement'"></td>
          <td><span data-bind="class: isRequired==='Y'?'badge badge--approved':'badge badge--idle', text: isRequired==='Y'?'Required':'Optional'"></span></td>
          <td><span data-bind="class: isActive==='Y'?'badge badge--approved':'badge badge--inactive', text: isActive==='Y'?'Active':'Inactive'"></span></td>
          <td class="table-actions">
            <button class="btn btn-secondary btn-sm" data-bind="click: $parent.startEdit.bind($parent, $data)">Edit</button>
          </td>
        </tr>
        <!-- /ko -->
      </tbody>
    </table>
  </div>
</div>
