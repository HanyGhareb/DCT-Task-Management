<div class="page-wrap">
  <div class="page-header">
    <div class="page-title">Per Diem Rates</div>
    <div class="page-subtitle">Daily allowance rates by country/region and employee grade</div>
  </div>

  <!-- ko if: error() -->
  <div class="alert-banner alert-banner--danger" data-bind="text: error"></div>
  <!-- /ko -->
  <!-- ko if: successMsg() -->
  <div class="alert-banner alert-banner--success" data-bind="text: successMsg"></div>
  <!-- /ko -->

  <div class="view-toolbar">
    <input class="search-box" type="text" placeholder="Search by country or code…" data-bind="value: searchText, valueUpdate: 'input'">
    <select class="form-control" style="width:140px" data-bind="value: gradeFilter, options: ['','E1','E2','E3','E4','E5'], optionsCaption: 'All Grades'"></select>
  </div>

  <!-- ko if: loading() -->
  <div class="empty-state"><div class="empty-state__icon">&#128176;</div><div class="empty-state__msg">Loading…</div></div>
  <!-- /ko -->
  <!-- ko ifnot: loading() -->

  <!-- ko if: editRow() -->
  <div class="card" style="margin-bottom:16px">
    <div style="font-weight:700;font-size:14px;margin-bottom:12px">Edit Rate — <span data-bind="text: editRow().rateKeyName + ' (' + editRow().rateKey + ') / Grade ' + editRow().gradeCode"></span></div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Daily Rate (AED)</label>
        <input class="form-control" type="number" data-bind="value: editRow().dailyRateAed, valueUpdate: 'input'" min="0">
      </div>
      <div class="form-group">
        <label class="form-label">Effective From</label>
        <input class="form-control" type="date" data-bind="value: editRow().effectiveFrom">
      </div>
      <div class="form-group">
        <label class="form-label">Effective To</label>
        <input class="form-control" type="date" data-bind="value: editRow().effectiveTo">
      </div>
      <div class="form-group">
        <label class="form-label">Active</label>
        <select class="form-control" data-bind="value: editRow().isActive"><option value="Y">Yes</option><option value="N">No</option></select>
      </div>
      <div class="form-group form-group--full">
        <label class="form-label">Notes</label>
        <input class="form-control" type="text" data-bind="value: editRow().notes, valueUpdate: 'input'" placeholder="Optional notes">
      </div>
    </div>
    <div class="form-actions" style="margin-top:12px;padding-top:12px">
      <button class="btn btn-primary btn-sm" data-bind="click: saveEdit, disable: saving()">Save</button>
      <button class="btn btn-secondary btn-sm" data-bind="click: cancelEdit">Cancel</button>
    </div>
  </div>
  <!-- /ko -->

  <div class="data-table-wrap">
    <table class="data-table">
      <thead>
        <tr><th>Country / Region</th><th>Grade</th><th>Daily Rate (AED)</th><th>Effective From</th><th>Effective To</th><th>Status</th><th></th></tr>
      </thead>
      <tbody>
        <!-- ko foreach: filtered() -->
        <tr>
          <td data-bind="text: rateKeyName + ' (' + rateKey + ')'"></td>
          <td><span class="badge badge--info" data-bind="text: gradeLabel || gradeCode"></span></td>
          <td data-bind="text: $parent.fmt(dailyRateAed)"></td>
          <td data-bind="text: effectiveFrom"></td>
          <td data-bind="text: effectiveTo || '—'"></td>
          <td>
            <span data-bind="css: isActive==='Y' ? 'badge badge--approved' : 'badge badge--inactive',
                             text: rateStatus || (isActive==='Y' ? 'Active' : 'Inactive')"></span>
          </td>
          <td class="table-actions">
            <button class="btn btn-secondary btn-sm" data-bind="click: $parent.startEdit.bind($parent, $data)">Edit</button>
          </td>
        </tr>
        <!-- /ko -->
        <!-- ko if: filtered().length === 0 -->
        <tr><td colspan="7" style="color:#6e6e73;font-size:13px;text-align:center;padding:20px">No rates match your filter.</td></tr>
        <!-- /ko -->
      </tbody>
    </table>
  </div>
  <!-- /ko -->
</div>
