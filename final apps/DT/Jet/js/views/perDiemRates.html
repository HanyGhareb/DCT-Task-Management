<div class="page-wrap">
  <div class="page-header">
    <div class="page-title">Per Diem Rates</div>
    <div class="page-subtitle">Daily allowance rates by country and employee grade</div>
  </div>

  <!-- ko if: successMsg() -->
  <div class="alert-banner alert-banner--success" data-bind="text: successMsg"></div>
  <!-- /ko -->

  <div class="view-toolbar">
    <input class="search-box" type="text" placeholder="Search by country…" data-bind="value: searchText, valueUpdate: 'input'">
    <select class="form-control" style="width:140px" data-bind="value: gradeFilter, options: ['','E1','E2','E3','E4','E5'], optionsCaption: 'All Grades'"></select>
  </div>

  <!-- ko if: loading() -->
  <div class="empty-state"><div class="empty-state__icon">&#128176;</div><div class="empty-state__msg">Loading…</div></div>
  <!-- /ko -->
  <!-- ko ifnot: loading() -->

  <!-- ko if: editRow() -->
  <div class="card" style="margin-bottom:16px">
    <div style="font-weight:700;font-size:14px;margin-bottom:12px">Edit Rate — <span data-bind="text: editRow().countryCode + ' / Grade ' + editRow().gradeCode"></span></div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Daily Rate (AED)</label>
        <input class="form-control" type="number" data-bind="value: editRow().dailyRateAed, valueUpdate: 'input'" min="0">
      </div>
      <div class="form-group">
        <label class="form-label">Meal Allowance (AED)</label>
        <input class="form-control" type="number" data-bind="value: editRow().mealAed, valueUpdate: 'input'" min="0">
      </div>
      <div class="form-group">
        <label class="form-label">Incidentals (AED)</label>
        <input class="form-control" type="number" data-bind="value: editRow().incidentalsAed, valueUpdate: 'input'" min="0">
      </div>
      <div class="form-group">
        <label class="form-label">Effective From</label>
        <input class="form-control" type="date" data-bind="value: editRow().effectiveFrom">
      </div>
      <div class="form-group">
        <label class="form-label">Active</label>
        <select class="form-control" data-bind="value: editRow().isActive"><option value="Y">Yes</option><option value="N">No</option></select>
      </div>
    </div>
    <div class="form-actions" style="margin-top:12px;padding-top:12px">
      <button class="btn btn-primary btn-sm" data-bind="click: saveEdit, disable: saving()">Save</button>
      <button class="btn btn-secondary btn-sm" data-bind="click: cancelEdit">Cancel</button>
    </div>
  </div>
  <!-- /ko -->

  <div class="data-table-wrap">
    <table class="data-table">
      <thead>
        <tr><th>Country</th><th>Grade</th><th>Daily Rate (AED)</th><th>Meal (AED)</th><th>Incidentals (AED)</th><th>Effective From</th><th>Active</th><th></th></tr>
      </thead>
      <tbody>
        <!-- ko foreach: filtered() -->
        <tr>
          <td data-bind="text: $parent.countryName(countryCode) + ' (' + countryCode + ')'"></td>
          <td><span class="badge badge--info" data-bind="text: gradeCode"></span></td>
          <td data-bind="text: $parent.fmt(dailyRateAed)"></td>
          <td data-bind="text: $parent.fmt(mealAed)"></td>
          <td data-bind="text: $parent.fmt(incidentalsAed)"></td>
          <td data-bind="text: effectiveFrom"></td>
          <td><span data-bind="class: isActive==='Y'?'badge badge--approved':'badge badge--inactive', text: isActive==='Y'?'Active':'Inactive'"></span></td>
          <td class="table-actions">
            <button class="btn btn-secondary btn-sm" data-bind="click: $parent.startEdit.bind($parent, $data)">Edit</button>
          </td>
        </tr>
        <!-- /ko -->
      </tbody>
    </table>
  </div>
  <!-- /ko -->
</div>
