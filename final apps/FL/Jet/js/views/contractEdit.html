<div class="page-wrap">
  <div class="page-header-row">
    <div class="page-header">
      <div class="page-title">
        <span data-bind="text: isNew ? 'New Contract' : contractNumber()"></span>
        <!-- ko ifnot: isNew --><span class="badge" style="vertical-align:3px;margin-inline-start:8px"
          data-bind="text: status(), css: { 'badge--draft': status()==='DRAFT', 'badge--submitted': status()==='SUBMITTED', 'badge--approved': status()==='ACTIVE' }"></span><!-- /ko -->
      </div>
      <div class="page-subtitle">FL Manager approval; FL Admin joins above AED 50,000</div>
    </div>
    <div class="page-actions">
      <button class="btn btn-secondary" data-bind="click: back">&#8592; Back</button>
      <!-- ko if: editable() -->
      <button class="btn btn-secondary" data-bind="click: saveDraft, enable: !saving()">Save Draft</button>
      <button class="btn btn-primary" data-bind="click: submit, enable: !saving()">&#10003; Submit for Approval</button>
      <!-- /ko -->
    </div>
  </div>

  <!-- ko if: successMsg() -->
  <div class="alert-banner alert-banner--info" style="margin-bottom:14px">&#10003; <span data-bind="text: successMsg()"></span></div>
  <!-- /ko -->
  <!-- ko if: errorMsg() -->
  <div class="alert-banner alert-banner--danger" style="margin-bottom:14px">&#9888; <span data-bind="text: errorMsg()"></span></div>
  <!-- /ko -->

  <!-- ko if: loading() --><list-skeleton params="rows: 6"></list-skeleton><!-- /ko -->

  <!-- ko ifnot: loading() -->
  <!-- Form Layout scaffold (shared .fl-* / platform.css): .fl-review flips the
       whole card to clean read-only value rows when the contract is not editable
       (submitted/active) instead of greyed-out disabled inputs. -->
  <div class="card fl-section" data-bind="css: { 'fl-review': !editable() }">
    <div class="section-heading">Contract</div>
    <!-- ko if: editable() --><p class="fl-legend">Fields marked <b>*</b> are required.</p><!-- /ko -->
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Freelancer <span class="required">*</span></label>
        <select class="form-control" data-bind="options: freelancerOptions, optionsText: 'label', optionsValue: 'id',
                 optionsCaption: '— Select —', value: freelancerId, enable: editable()"></select>
        <span class="fl-readonly" data-bind="text: freelancerDisp"></span>
      </div>
      <div class="form-group">
        <label class="form-label">Title <span class="required">*</span></label>
        <input class="form-control" type="text" data-bind="value: title, valueUpdate: 'input', enable: editable()">
        <span class="fl-readonly" data-bind="text: title() || '—'"></span>
      </div>
      <div class="form-group">
        <label class="form-label">Start Date <span class="required">*</span></label>
        <input class="form-control" type="date" data-bind="value: startDate, enable: editable()">
        <span class="fl-readonly" data-bind="text: startDate() || '—'"></span>
      </div>
      <div class="form-group">
        <label class="form-label">End Date <span class="opt">optional</span></label>
        <input class="form-control" type="date" data-bind="value: endDate, enable: editable()">
        <span class="form-hint">Open-ended contracts schedule 12 months ahead</span>
        <span class="fl-readonly" data-bind="text: endDateDisp"></span>
      </div>
      <div class="form-group">
        <label class="form-label">Total Amount (AED) <span class="required">*</span></label>
        <input class="form-control mono" type="number" data-bind="value: totalAmount, enable: editable()">
        <span class="fl-readonly" data-bind="text: totalAmountDisp"></span>
      </div>
      <div class="form-group">
        <label class="form-label">Organisation <span class="required">*</span></label>
        <select class="form-control" data-bind="options: orgOptions, optionsText: 'name', optionsValue: 'orgId',
                 optionsCaption: '— Select —', value: orgId, enable: editable()"></select>
        <span class="fl-readonly" data-bind="text: orgDisp"></span>
      </div>
      <div class="form-group">
        <label class="form-label">Billing Method <span class="required">*</span></label>
        <select class="form-control" data-bind="value: billingMethod, enable: editable()">
          <option value="MONTHLY">MONTHLY</option>
          <option value="WEEKLY">WEEKLY</option>
          <option value="PER_COUNT">PER_COUNT (deliverable based)</option>
        </select>
        <span class="fl-readonly" data-bind="text: billingMethod() || '—'"></span>
      </div>
      <div class="form-group">
        <label class="form-label">Billing Unit / Amount per Period <span class="opt">optional</span></label>
        <div style="display:flex;gap:8px">
          <select class="form-control" style="flex:1" data-bind="options: billingUnits, optionsText: 'name', optionsValue: 'valueId',
                   optionsCaption: '—', value: billingUnitId, enable: editable()"></select>
          <input class="form-control mono" type="number" placeholder="auto" style="flex:1"
                 data-bind="value: billingUnitAmount, enable: editable()">
        </div>
        <span class="form-hint">Leave amount empty to divide the total over the period count</span>
        <span class="fl-readonly" data-bind="text: billingComboDisp"></span>
      </div>
    </div>

    <div class="section-heading">Budget Coding</div>
    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">Coding Type</label>
        <select class="form-control" data-bind="value: codingType, enable: editable()">
          <option value="GL">GL</option>
          <option value="PROJECT">PROJECT</option>
        </select>
        <span class="fl-readonly" data-bind="text: codingType() || '—'"></span>
      </div>
      <!-- ko if: codingType() === 'GL' -->
      <div class="form-group">
        <label class="form-label">GL Code Combination <span class="required">*</span></label>
        <select class="form-control" data-bind="options: glOptions, optionsText: 'ccCode', optionsValue: 'ccId',
                 optionsCaption: '— Select —', value: ccIdGl, enable: editable()"></select>
        <span class="fl-readonly" data-bind="text: glDisp"></span>
      </div>
      <!-- /ko -->
      <!-- ko if: codingType() === 'PROJECT' -->
      <div class="form-group">
        <label class="form-label">Project Number <span class="required">*</span></label>
        <input class="form-control mono" type="text" data-bind="value: projectNumber, valueUpdate: 'input', enable: editable()">
        <span class="fl-readonly" data-bind="text: projectNumber() || '—'"></span>
      </div>
      <div class="form-group">
        <label class="form-label">Task Number <span class="opt">optional</span></label>
        <input class="form-control mono" type="text" data-bind="value: taskNumber, valueUpdate: 'input', enable: editable()">
        <span class="fl-readonly" data-bind="text: taskNumber() || '—'"></span>
      </div>
      <div class="form-group">
        <label class="form-label">Expenditure Type <span class="opt">optional</span></label>
        <input class="form-control" type="text" data-bind="value: expenditureType, valueUpdate: 'input', enable: editable()">
        <span class="fl-readonly" data-bind="text: expenditureType() || '—'"></span>
      </div>
      <!-- /ko -->
      <div class="form-group form-group--full">
        <label class="form-label">Notes <span class="opt">optional</span></label>
        <input class="form-control" type="text" data-bind="value: notes, valueUpdate: 'input', enable: editable()">
        <span class="fl-readonly" data-bind="text: notes() || '—'"></span>
      </div>
    </div>

    <audit-info params="data: audit"></audit-info>

  </div>
  <!-- /ko -->
</div>
