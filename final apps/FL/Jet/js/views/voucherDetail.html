<div class="page-wrap">
  <div class="page-header-row">
    <div class="page-header">
      <div class="page-title">
        <span class="mono" data-bind="text: data().voucherNumber || ''"></span>
        <span class="badge" style="vertical-align:3px;margin-inline-start:8px"
              data-bind="text: data().status || '', css: statusBadge(data().status)"></span>
        <span class="badge" style="vertical-align:3px;margin-inline-start:4px"
              data-bind="text: data().paymentStatus || '', css: payBadge(data().paymentStatus)"></span>
      </div>
      <div class="page-subtitle">
        <span class="mono" style="cursor:pointer;color:var(--brand-dark)"
              data-bind="text: data().contractNumber || '', click: openContract"></span>
        · <span data-bind="text: data().freelancerName || ''"></span>
        · <span data-bind="text: data().periodLabel || ''"></span>
      </div>
    </div>
    <button class="btn btn-secondary" data-bind="click: back">&#8592; Back</button>
  </div>

  <!-- ko if: successMsg() -->
  <div class="alert-banner alert-banner--info" style="margin-bottom:14px">&#10003; <span data-bind="text: successMsg()"></span></div>
  <!-- /ko -->
  <!-- ko if: errorMsg() -->
  <div class="alert-banner alert-banner--danger" style="margin-bottom:14px">&#9888; <span data-bind="text: errorMsg()"></span></div>
  <!-- /ko -->

  <!-- ko if: loading() --><list-skeleton params="rows: 5"></list-skeleton><!-- /ko -->

  <!-- ko ifnot: loading() -->
  <div class="card">
    <div class="form-grid">
      <div class="form-group"><label class="form-label">Amount (AED)</label>
        <div class="mono" style="font-size:20px;font-weight:800" data-bind="text: (data().amount || 0).toLocaleString()"></div></div>
      <div class="form-group"><label class="form-label">Due Date</label>
        <div class="mono" data-bind="text: data().dueDate || '—'"></div></div>
      <div class="form-group">
        <label class="form-label">Invoice Number *</label>
        <input class="form-control" type="text" data-bind="value: invoiceNumber, valueUpdate: 'input', enable: editable()">
        <span class="form-hint">Required before submission (module setting)</span>
      </div>
      <div class="form-group">
        <label class="form-label">Invoice Date *</label>
        <input class="form-control" type="date" data-bind="value: invoiceDate, enable: editable()">
      </div>
      <div class="form-group">
        <label class="form-label">Payment Method</label>
        <select class="form-control" data-bind="value: paymentMethod, enable: editable()">
          <option value="BANK_TRANSFER">BANK_TRANSFER</option>
          <option value="CHEQUE">CHEQUE</option>
          <option value="CASH">CASH</option>
        </select>
      </div>
      <div class="form-group"><label class="form-label">Pay Group</label>
        <div data-bind="text: data().payGroup || ''"></div></div>
      <div class="form-group form-group--full"><label class="form-label">Description</label>
        <div data-bind="text: data().description || ''"></div></div>
      <div class="form-group"><label class="form-label">Coding</label>
        <div class="mono" style="font-size:12px"
             data-bind="text: data().codingType === 'GL' ? ('GL · cc ' + (data().ccIdGl || '')) : ('PROJECT · ' + (data().projectNumber || ''))"></div></div>
      <div class="form-group">
        <label class="form-label">Notes</label>
        <input class="form-control" type="text" data-bind="value: notes, valueUpdate: 'input', enable: editable()">
      </div>
      <!-- ko if: data().paymentStatus === 'PAID' -->
      <div class="form-group"><label class="form-label">Paid On</label>
        <div class="mono" data-bind="text: data().paymentDate || ''"></div></div>
      <div class="form-group"><label class="form-label">Payment Reference</label>
        <div class="mono" data-bind="text: data().paymentReference || ''"></div></div>
      <!-- /ko -->
    </div>

    <audit-info params="data: data"></audit-info>

    <div class="form-actions">
      <!-- ko if: editable() -->
      <button class="btn btn-primary" data-bind="click: submit, enable: !saving()">&#10003; Submit for Approval</button>
      <button class="btn btn-secondary" data-bind="click: saveDraft, enable: !saving()">Save Draft</button>
      <!-- /ko -->
      <!-- ko if: isAdmin && data().status === 'APPROVED' && data().paymentStatus === 'PENDING' -->
      <button class="btn btn-primary" data-bind="click: markPaid">&#128181; Confirm Payment</button>
      <!-- /ko -->
    </div>
  </div>
  <!-- /ko -->
</div>
