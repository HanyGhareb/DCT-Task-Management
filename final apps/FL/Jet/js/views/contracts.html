<div class="page-wrap">
  <div class="page-header-row">
    <div class="page-header">
      <div class="page-title" data-bind="text: $root.t('con.title')"></div>
      <div class="page-subtitle" data-bind="text: $root.t('con.subtitle')"></div>
    </div>
    <button class="btn btn-primary" data-bind="click: openNew">+ <span data-bind="text: $root.t('con.new')"></span></button>
  </div>

  <div class="view-toolbar">
    <input class="search-box" type="text" placeholder="&#128269; Search number / title / freelancer&hellip;"
           data-bind="value: searchBy, valueUpdate: 'input'">
    <select class="form-control" style="width:170px;padding:8px 10px" data-bind="value: statusFilter">
      <option value="">All statuses</option>
      <option value="DRAFT">Draft</option>
      <option value="SUBMITTED">Submitted</option>
      <option value="ACTIVE">Active</option>
      <option value="COMPLETED">Completed</option>
      <option value="CANCELLED">Cancelled</option>
    </select>
  </div>

  <!-- ko if: loading() --><list-skeleton params="rows: 8"></list-skeleton><!-- /ko -->
  <!-- ko if: loadError() -->
  <div class="empty-state"><div class="empty-state__icon">&#9888;</div>
    <div class="empty-state__msg">Could not load contracts</div>
    <button class="btn btn-secondary" data-bind="click: reload">&#8635; Retry</button></div>
  <!-- /ko -->
  <!-- ko if: !loading() && !loadError() && items().length === 0 -->
  <div class="empty-state"><div class="empty-state__icon">&#128196;</div>
    <div class="empty-state__msg">No contracts found</div></div>
  <!-- /ko -->

  <!-- ko if: !loading() && !loadError() && items().length > 0 -->
  <div class="data-table-wrap">
    <table class="data-table">
      <thead><tr>
        <th>Number</th><th>Freelancer</th><th>Title</th><th>Period</th><th>Amount</th><th>Billing</th><th>Status</th><th>Paid</th>
      </tr></thead>
      <tbody>
        <!-- ko foreach: items -->
        <tr style="cursor:pointer" data-bind="click: $vm.openItem.bind($vm, $data)">
          <td class="mono" style="font-size:12px" data-bind="text: contractNumber"></td>
          <td style="font-weight:600" data-bind="text: $data.freelancerName || ''"></td>
          <td data-bind="text: $data.title || ''"></td>
          <td class="mono" style="font-size:11px" data-bind="text: ($data.startDate || '') + ' → ' + ($data.endDate || 'open')"></td>
          <td class="mono" data-bind="text: ($data.totalAmount || 0).toLocaleString()"></td>
          <td data-bind="text: $data.billingMethod || ''"></td>
          <td><span class="badge" data-bind="text: status, css: $vm.badgeFor(status)"></span></td>
          <td>
            <div class="bill-bar"><i data-bind="style: { width: $vm.billPct($data) + '%' }"></i></div>
            <span style="font-size:10.5px;color:var(--text-3)" data-bind="text: $vm.billPct($data) + '%'"></span>
          </td>
        </tr>
        <!-- /ko -->
      </tbody>
    </table>
  </div>
  <list-pager params="offset: offset, limit: limit, total: total, onChange: reload"></list-pager>
  <!-- /ko -->
</div>
