<div class="page-wrap">
  <div class="page-header-row">
    <div class="page-header">
      <div class="page-title">
        <span data-bind="text: isNew ? 'New Registration' : registrationNumber()"></span>
        <!-- ko ifnot: isNew --><span class="badge" style="vertical-align:3px;margin-inline-start:8px"
          data-bind="text: status(), css: { 'badge--draft': status()==='DRAFT', 'badge--submitted': status()==='SUBMITTED',
                     'badge--approved': status()==='APPROVED', 'badge--rejected': status()==='REJECTED', 'badge--returned': status()==='RETURNED' }"></span><!-- /ko -->
      </div>
      <div class="page-subtitle">Submitting routes to FL Manager &rarr; FL Admin approval</div>
    </div>
    <button class="btn btn-secondary" data-bind="click: back">&#8592; Back</button>
  </div>

  <!-- ko if: successMsg() -->
  <div class="alert-banner alert-banner--info" style="margin-bottom:14px">&#10003; <span data-bind="text: successMsg()"></span></div>
  <!-- /ko -->
  <!-- ko if: errorMsg() -->
  <div class="alert-banner alert-banner--danger" style="margin-bottom:14px">&#9888; <span data-bind="text: errorMsg()"></span></div>
  <!-- /ko -->

  <!-- ko if: loading() --><list-skeleton params="rows: 6"></list-skeleton><!-- /ko -->

  <!-- ko ifnot: loading() -->
  <div class="card">
    <div style="display:flex;gap:18px;align-items:center;margin-bottom:18px">
      <!-- ko if: photoSrc() -->
      <img class="photo-preview" data-bind="attr: { src: photoSrc() }" alt="photo"
           onerror="this.style.display='none'">
      <!-- /ko -->
      <input id="fl-reg-photo-input" type="file" accept="image/*" style="display:none"
             data-bind="event: { change: photoSelected }">
      <button class="btn btn-secondary btn-sm" data-bind="click: pickPhoto, enable: editable() || isNew">&#128247; Photo *</button>
      <span style="font-size:11.5px;color:var(--text-3)">Required before submission (module setting)</span>
    </div>

    <div class="form-grid">
      <div class="form-group">
        <label class="form-label">First Name (English) *</label>
        <input class="form-control" type="text" data-bind="value: firstNameEn, valueUpdate: 'input', enable: editable() || isNew">
      </div>
      <div class="form-group">
        <label class="form-label">Last Name (English) *</label>
        <input class="form-control" type="text" data-bind="value: lastNameEn, valueUpdate: 'input', enable: editable() || isNew">
      </div>
      <div class="form-group">
        <label class="form-label">First Name (Arabic)</label>
        <input class="form-control" type="text" dir="rtl" data-bind="value: firstNameAr, valueUpdate: 'input', enable: editable() || isNew">
      </div>
      <div class="form-group">
        <label class="form-label">Last Name (Arabic)</label>
        <input class="form-control" type="text" dir="rtl" data-bind="value: lastNameAr, valueUpdate: 'input', enable: editable() || isNew">
      </div>
      <div class="form-group">
        <label class="form-label">Date of Birth *</label>
        <input class="form-control" type="date" data-bind="value: dateOfBirth, enable: editable() || isNew">
      </div>
      <div class="form-group">
        <label class="form-label">Nationality *</label>
        <select class="form-control" data-bind="options: nationalities, optionsText: 'name', optionsValue: 'code',
                 optionsCaption: '— Select —', value: nationalityCode, enable: editable() || isNew"></select>
      </div>
      <div class="form-group">
        <label class="form-label">Emirates ID <span data-bind="visible: needsEmiratesId()">*</span></label>
        <input class="form-control" type="text" placeholder="784-XXXX-XXXXXXX-X"
               data-bind="value: nationalId, valueUpdate: 'input', enable: (editable() || isNew)">
        <span class="form-hint" data-bind="visible: needsEmiratesId()">Required for UAE nationals</span>
      </div>
      <div class="form-group">
        <label class="form-label">Passport Number</label>
        <input class="form-control" type="text" data-bind="value: passportNumber, valueUpdate: 'input', enable: editable() || isNew">
      </div>
      <div class="form-group">
        <label class="form-label">Email *</label>
        <input class="form-control" type="email" data-bind="value: email, valueUpdate: 'input', enable: editable() || isNew">
        <span class="form-hint">Becomes the portal username on approval</span>
      </div>
      <div class="form-group">
        <label class="form-label">Mobile</label>
        <input class="form-control" type="text" data-bind="value: mobile, valueUpdate: 'input', enable: editable() || isNew">
      </div>
      <div class="form-group">
        <label class="form-label">Specialization</label>
        <input class="form-control" type="text" data-bind="value: specialization, valueUpdate: 'input', enable: editable() || isNew">
      </div>
      <div class="form-group">
        <label class="form-label">Notes</label>
        <input class="form-control" type="text" data-bind="value: notes, valueUpdate: 'input', enable: editable() || isNew">
      </div>
    </div>

    <audit-info params="data: audit"></audit-info>

    <div class="form-actions">
      <!-- ko if: editable() || isNew -->
      <button class="btn btn-primary" data-bind="click: submit, enable: !saving()">&#10003; Submit for Approval</button>
      <button class="btn btn-secondary" data-bind="click: saveDraft, enable: !saving()">Save Draft</button>
      <!-- /ko -->
    </div>
  </div>
  <!-- /ko -->
</div>
