<div class="page-wrap">
  <div class="page-header">
    <div class="page-title" data-bind="text: $root.t('vch.title')"></div>
    <div class="page-subtitle" data-bind="text: $root.t('vch.subtitle')"></div>
  </div>

  <div class="view-toolbar">
    <select class="form-control" style="width:170px;padding:8px 10px" data-bind="value: statusFilter">
      <option value="">All statuses</option>
      <option value="DRAFT">Draft</option>
      <option value="SUBMITTED">Submitted</option>
      <option value="APPROVED">Approved</option>
      <option value="REJECTED">Rejected</option>
    </select>
    <select class="form-control" style="width:170px;padding:8px 10px" data-bind="value: payFilter">
      <option value="">All payments</option>
      <option value="PENDING">Payment Pending</option>
      <option value="PAID">Paid</option>
    </select>
  </div>

  <!-- ko if: loading() --><list-skeleton params="rows: 8"></list-skeleton><!-- /ko -->
  <!-- ko if: loadError() -->
  <div class="empty-state"><div class="empty-state__icon">&#9888;</div>
    <div class="empty-state__msg">Could not load vouchers</div>
    <button class="btn btn-secondary" data-bind="click: reload">&#8635; Retry</button></div>
  <!-- /ko -->
  <!-- ko if: !loading() && !loadError() && items().length === 0 -->
  <div class="empty-state"><div class="empty-state__icon">&#128181;</div>
    <div class="empty-state__msg">No vouchers — generate them from a contract's payment schedule</div></div>
  <!-- /ko -->

  <!-- ko if: !loading() && !loadError() && items().length > 0 -->
  <div class="data-table-wrap">
    <table class="data-table">
      <thead><tr>
        <th>Number</th><th>Contract</th><th>Freelancer</th><th>Period</th><th>Due</th><th>AED</th><th>Status</th><th>Payment</th>
      </tr></thead>
      <tbody>
        <!-- ko foreach: items -->
        <tr style="cursor:pointer" data-bind="click: $vm.openItem.bind($vm, $data)">
          <td class="mono" style="font-size:12px" data-bind="text: voucherNumber"></td>
          <td class="mono" style="font-size:12px" data-bind="text: $data.contractNumber || ''"></td>
          <td data-bind="text: $data.freelancerName || ''"></td>
          <td data-bind="text: $data.periodLabel || '—'"></td>
          <td class="mono" data-bind="text: $data.dueDate || ''"></td>
          <td class="mono" data-bind="text: ($data.amount || 0).toLocaleString()"></td>
          <td><span class="badge" data-bind="text: status, css: $vm.badgeFor(status)"></span></td>
          <td><span class="badge" data-bind="text: paymentStatus, css: $vm.payBadge(paymentStatus)"></span></td>
        </tr>
        <!-- /ko -->
      </tbody>
    </table>
  </div>
  <list-pager params="offset: offset, limit: limit, total: total, onChange: reload"></list-pager>
  <!-- /ko -->
</div>
