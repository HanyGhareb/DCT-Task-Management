<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Freelancer Portal · i-Finance</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Public+Sans:wght@300;400;500;600;700&family=Noto+Naskh+Arabic:wght@400;600&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;0,6..72,600;1,6..72,400;1,6..72,500&family=Libre+Franklin:wght@400;500;600;700&display=swap" rel="stylesheet">
<script>window.APP_VERSION = '1.10.0';</script>
<link rel="stylesheet" id="portal-css">
<script>
  document.getElementById('portal-css').href = 'css/portal.css?v=' + window.APP_VERSION;
</script>
</head>
<body>

<!-- ════════════════ DCT LANDING (login / set-password) ════════════════ -->
<section class="dlp" data-bind="visible: view() === 'login' || view() === 'setpwd'" style="display:none">

  <!-- full-bleed photo slider + maroon wash + gold pattern -->
  <div class="dlp-bg">
    <!-- ko foreach: slides -->
    <div class="dlp-slide" data-bind="style: { background: bg }, css: { on: $index() === $root.slideIdx() }"></div>
    <!-- /ko -->
    <div class="dlp-wash"></div>
    <div class="dlp-pattern"></div>
    <div class="dlp-vignette"></div>
  </div>

  <!-- top bar -->
  <header class="dlp-top">
    <div class="dlp-brand">
      <span class="dlp-diamond"></span>
      <div>
        <div class="dlp-brand-t">DCT · Abu Dhabi</div>
        <div class="dlp-brand-s" data-bind="text: t('portalName')"></div>
      </div>
    </div>
    <div class="dlp-topacts">
      <button class="dlp-pill" data-bind="click: toggleLang, text: lang() === 'en' ? 'عربي' : 'English'"></button>
      <button class="dlp-pill dlp-pill--solid" data-bind="click: openLogin, text: t('signIn')"></button>
    </div>
  </header>

  <!-- main: hero + AI registration card -->
  <div class="dlp-body">
    <div class="dlp-hero">
      <div class="dlp-eyebrow" data-bind="text: t('dlpEyebrow')"></div>
      <h1 class="dlp-h1" data-bind="html: t('dlpHeadline')"></h1>
      <p class="dlp-lede" data-bind="text: t('dlpLede')"></p>
      <div class="dlp-trust">
        <span class="dlp-trust-i"><i class="dlp-live"></i><span data-bind="text: t('dlpTrust1')"></span></span>
        <span class="dlp-trust-sep"></span>
        <span class="dlp-trust-i"><b class="dlp-uaepass">UAE&nbsp;PASS</b><span data-bind="text: t('dlpTrust2')"></span></span>
      </div>
    </div>

    <aside class="dlp-card">
      <div class="dlp-chip"><i></i><span data-bind="text: t('dlpAiTag')"></span></div>
      <h2 class="dlp-cardh" data-bind="text: t('dlpCardTitle')"></h2>
      <p class="dlp-cardp" data-bind="text: t('dlpCardSub')"></p>
      <div class="dlp-steps">
        <div class="dlp-step"><span class="dlp-stepn">1</span><div><b data-bind="text: t('dlpStep1')"></b><i data-bind="text: t('dlpStep1s')"></i></div></div>
        <div class="dlp-step"><span class="dlp-stepn">2</span><div><b data-bind="text: t('dlpStep2')"></b><i data-bind="text: t('dlpStep2s')"></i></div></div>
        <div class="dlp-step"><span class="dlp-stepn">3</span><div><b data-bind="text: t('dlpStep3')"></b><i data-bind="text: t('dlpStep3s')"></i></div></div>
      </div>
      <button class="dlp-cta" data-bind="click: openRegister"><span data-bind="text: t('dlpRegister')"></span> &rarr;</button>
      <div class="dlp-cardalt"><span data-bind="text: t('dlpAlready')"></span> <a href="#" data-bind="click: openLogin, text: t('signIn')"></a></div>
    </aside>
  </div>

  <!-- footer strip: location + slider + benefits -->
  <footer class="dlp-foot">
    <div class="dlp-loc"><span class="dlp-locdot"></span><span data-bind="text: activeSlideName"></span></div>
    <div class="dlp-slider">
      <button class="dlp-nav" data-bind="click: slidePrev" aria-label="Previous">&lsaquo;</button>
      <div class="dlp-dots">
        <!-- ko foreach: slides -->
        <button class="dlp-dot" data-bind="css: { on: $index() === $root.slideIdx() }, click: function () { $root.slideGo($index()); }" aria-label="slide"></button>
        <!-- /ko -->
      </div>
      <button class="dlp-nav" data-bind="click: slideNext" aria-label="Next">&rsaquo;</button>
    </div>
    <div class="dlp-benefits">
      <span class="dlp-benefit" data-bind="text: t('dlpBenefit1')"></span>
      <span class="dlp-benefit" data-bind="text: t('dlpBenefit2')"></span>
      <span class="dlp-benefit" data-bind="text: t('dlpBenefit3')"></span>
    </div>
  </footer>

  <!-- ── auth overlay: sign in / set password ─────────────────────────── -->
  <div class="dlp-auth" data-bind="visible: loginOpen() || view() === 'setpwd'" style="display:none">
    <div class="dlp-authbox">
      <button class="dlp-authx" data-bind="click: closeLogin, visible: view() === 'login'">&times;</button>

      <!-- sign in -->
      <div data-bind="visible: view() === 'login'">
        <div class="dlp-authmark"><span class="dlp-diamond"></span><span data-bind="text: t('portalName')"></span></div>
        <h3 class="dlp-authh" data-bind="text: t('signIn')"></h3>
        <div class="dlp-authsub" data-bind="text: t('signInHint')"></div>
        <div class="dlp-autherr" data-bind="visible: loginError(), text: loginError()"></div>
        <label class="dlp-lbl" data-bind="text: t('email')"></label>
        <input class="dlp-inp" type="email" autocomplete="username" data-bind="value: email, event: { keyup: onLoginKey }">
        <label class="dlp-lbl" data-bind="text: t('password')"></label>
        <input class="dlp-inp" type="password" autocomplete="current-password" data-bind="value: password, event: { keyup: onLoginKey }">
        <button class="dlp-cta dlp-cta--full" data-bind="click: doLogin, disable: busy"><span data-bind="text: busy() ? '…' : t('continue')"></span></button>
        <div class="dlp-authalt"><span data-bind="text: t('firstTime')"></span> <a href="#" data-bind="click: openRegister, text: t('registerLink')"></a></div>
      </div>

      <!-- set password (invite link) -->
      <div data-bind="visible: view() === 'setpwd'">
        <div class="dlp-authmark"><span class="dlp-diamond"></span><span data-bind="text: t('portalName')"></span></div>
        <h3 class="dlp-authh" data-bind="text: t('setPwdTitle')"></h3>
        <div class="dlp-authsub" data-bind="text: t('setPwdHint')"></div>
        <div class="dlp-autherr" data-bind="visible: loginError(), text: loginError()"></div>
        <label class="dlp-lbl" data-bind="text: t('newPassword')"></label>
        <input class="dlp-inp" type="password" autocomplete="new-password" data-bind="value: password">
        <label class="dlp-lbl" data-bind="text: t('confirmPassword')"></label>
        <input class="dlp-inp" type="password" autocomplete="new-password" data-bind="value: password2">
        <button class="dlp-cta dlp-cta--full" data-bind="click: doSetPassword, disable: busy"><span data-bind="text: busy() ? '…' : t('setPwdBtn')"></span></button>
      </div>
    </div>
  </div>
</section>

<!-- ════════════════ SELF-REGISTRATION WIZARD (maroon/gold) ════════════════ -->
<section class="dlp dlp--wiz" data-bind="visible: view() === 'register'" style="display:none">

  <!-- shared full-bleed slider + maroon wash + gold pattern -->
  <div class="dlp-bg">
    <!-- ko foreach: slides -->
    <div class="dlp-slide" data-bind="style: { background: bg }, css: { on: $index() === $root.slideIdx() }"></div>
    <!-- /ko -->
    <div class="dlp-wash"></div>
    <div class="dlp-pattern"></div>
    <div class="dlp-vignette"></div>
  </div>

  <!-- top bar -->
  <header class="dlp-top">
    <div class="dlp-brand">
      <span class="dlp-diamond"></span>
      <div>
        <div class="dlp-brand-t">DCT · Abu Dhabi</div>
        <div class="dlp-brand-s" data-bind="text: t('portalName')"></div>
      </div>
    </div>
    <div class="dlp-topacts">
      <button class="dlp-pill" data-bind="click: toggleLang, text: lang() === 'en' ? 'عربي' : 'English'"></button>
      <button class="dlp-pill dlp-pill--solid" data-bind="click: regBackToLogin, text: t('signIn')"></button>
    </div>
  </header>

  <!-- centered wizard card -->
  <div class="dlp-wizwrap">
    <div class="dlp-wizbox">
      <div class="dlp-chip"><i></i><span data-bind="text: t('dlpAiTag')"></span></div>
      <h2 class="dlp-wizh" data-bind="text: t('regTitle')"></h2>
      <p class="dlp-wizsub" data-bind="text: t('loginHeroSub')"></p>

      <!-- step rail -->
      <div class="dlp-rail" data-bind="visible: regStep() !== 'done'">
        <div class="dlp-rail-i" data-bind="css: { on: regStep() === 'email', done: regStepIdx() > 0 }"><span>1</span><b data-bind="text: t('regStepEmail')"></b></div>
        <div class="dlp-rail-i" data-bind="css: { on: regStep() === 'otp',   done: regStepIdx() > 1 }"><span>2</span><b data-bind="text: t('regStepVerify')"></b></div>
        <div class="dlp-rail-i" data-bind="css: { on: regStep() === 'docs',  done: regStepIdx() > 2 }"><span>3</span><b data-bind="text: t('regStepDocs')"></b></div>
        <div class="dlp-rail-i" data-bind="css: { on: regStep() === 'details', done: regStepIdx() > 3 }"><span>4</span><b data-bind="text: t('regStepDetails')"></b></div>
        <div class="dlp-rail-i" data-bind="css: { on: regStep() === 'review', done: regStepIdx() > 4 }"><span>5</span><b data-bind="text: t('regStepReview')"></b></div>
      </div>

      <div class="dlp-autherr" data-bind="visible: regError(), text: regError()"></div>

      <!-- step: email -->
      <div data-bind="visible: regStep() === 'email'">
        <div class="dlp-wizhint" data-bind="text: t('regEmailHint')"></div>
        <label class="dlp-lbl" data-bind="text: t('email')"></label>
        <input class="dlp-inp" type="email" data-bind="value: rgEmail">
        <button class="dlp-cta dlp-cta--full" data-bind="click: regStart, disable: regBusy"><span data-bind="text: regBusy() ? '…' : t('sendCode')"></span></button>
        <div class="dlp-authalt"><a href="#" data-bind="click: regBackToLogin, text: t('backToLogin')"></a></div>
      </div>

      <!-- step: otp -->
      <div data-bind="visible: regStep() === 'otp'">
        <div class="dlp-wizhint" data-bind="text: t('regCodeHint')"></div>
        <div class="dlp-devcode" data-bind="visible: regDevCode()">
          DEV mode — your code: <strong data-bind="text: regDevCode"></strong></div>
        <label class="dlp-lbl" data-bind="text: t('code')"></label>
        <input class="dlp-inp dlp-inp--otp" type="text" inputmode="numeric" maxlength="6" data-bind="value: rgCode">
        <button class="dlp-cta dlp-cta--full" data-bind="click: regVerify, disable: regBusy"><span data-bind="text: regBusy() ? '…' : t('verifyCode')"></span></button>
        <div class="dlp-authalt"><a href="#" data-bind="click: function(){ return $root.regGoto('email'); }, text: t('back')"></a></div>
      </div>

      <!-- step: docs (first after OTP) -->
      <div data-bind="visible: regStep() === 'docs'">
        <div class="dlp-wizhint" data-bind="text: regAiEnabled() ? t('regDocsHintAi') : t('regDocsHintManual')"></div>
        <!-- ko foreach: rgDocs -->
        <div class="dlp-doc">
          <label class="dlp-doc-lbl">
            <span data-bind="text: label"></span>
            <!-- ko if: mandatory --><span class="dlp-tag dlp-tag--req" data-bind="text: $root.t('reqTag')"></span><!-- /ko -->
            <!-- ko ifnot: mandatory --><span class="dlp-tag dlp-tag--opt" data-bind="text: $root.t('optTag')"></span><!-- /ko -->
          </label>
          <input class="dlp-file" type="file" accept="image/*,application/pdf" data-bind="event: { change: function(d,e){ return $root.regPickDoc($data, e); } }">
          <div class="dlp-doc-file" data-bind="visible: fileName(), text: fileName"></div>
          <div class="dlp-saved" data-bind="visible: fileName(), text: $root.t('savedTag')"></div>
          <button class="dlp-ghost" data-bind="visible: $root.regAiEnabled(), click: function(){ return $root.regExtract($data); }, disable: $root.regBusy() || !docId(), text: $root.t('aiExtract')"></button>
          <div class="dlp-doc-msg" data-bind="visible: aiMsg(), text: aiMsg, css: { bad: aiOk() === false }"></div>
          <!-- ko if: extracted().length -->
          <div class="dlp-extract">
            <div class="dlp-extract-h" data-bind="text: $root.t('extractedTitle')"></div>
            <!-- ko foreach: extracted -->
            <div class="dlp-extract-row"><span data-bind="text: label"></span><b data-bind="text: value"></b></div>
            <!-- /ko -->
          </div>
          <!-- /ko -->
        </div>
        <!-- /ko -->

        <!-- personal photo (US-09) -->
        <div class="dlp-doc">
          <label class="dlp-doc-lbl">
            <span data-bind="text: t('regPhotoLbl')"></span>
            <!-- ko if: regPhotoRequired --><span class="dlp-tag dlp-tag--req" data-bind="text: t('reqTag')"></span><!-- /ko -->
            <!-- ko ifnot: regPhotoRequired --><span class="dlp-tag dlp-tag--opt" data-bind="text: t('optTag')"></span><!-- /ko -->
          </label>
          <div class="dlp-wizhint" data-bind="text: t('regPhotoHint')"></div>
          <div class="dlp-photo-row">
            <!-- ko if: regPhotoPreview -->
            <img class="dlp-photo-prev" data-bind="attr: { src: regPhotoPreview }" alt="photo">
            <!-- /ko -->
            <input class="dlp-file" type="file" accept="image/*" data-bind="event: { change: function(d,e){ return regPickPhoto($data, e); } }">
          </div>
          <div class="dlp-saved" data-bind="visible: regHasPhoto"><span data-bind="text: t('savedTag')"></span> <span data-bind="text: regPhotoName"></span></div>
        </div>

        <button class="dlp-cta dlp-cta--full" data-bind="click: regDocsContinue, disable: regBusy"><span data-bind="text: regBusy() ? '…' : t('next')"></span></button>
        <div class="dlp-authalt"><a href="#" data-bind="click: function(){ return $root.regGoto('otp'); }, text: t('back')"></a></div>
      </div>

      <!-- step: details -->
      <div data-bind="visible: regStep() === 'details'">
        <div class="dlp-grid2">
          <div><label class="dlp-lbl" data-bind="text: t('firstNameEn')"></label><input class="dlp-inp" type="text" data-bind="value: rgFirstName"></div>
          <div><label class="dlp-lbl" data-bind="text: t('lastNameEn')"></label><input class="dlp-inp" type="text" data-bind="value: rgLastName"></div>
          <div><label class="dlp-lbl" data-bind="text: t('dob')"></label><input class="dlp-inp" type="date" data-bind="value: rgDob"></div>
          <div><label class="dlp-lbl" data-bind="text: t('nationality')"></label>
            <select class="dlp-inp" data-bind="options: rgNats, optionsText: 'name', optionsValue: 'code', optionsCaption: '—', value: rgNat"></select></div>
          <div class="dlp-grid2-full"><label class="dlp-lbl" data-bind="text: t('mobileLbl')"></label><input class="dlp-inp" type="text" data-bind="value: rgMobile"></div>
        </div>
        <button class="dlp-cta dlp-cta--full" data-bind="click: regSaveDetails, disable: regBusy"><span data-bind="text: regBusy() ? '…' : t('saveContinue')"></span></button>
        <div class="dlp-authalt"><a href="#" data-bind="click: function(){ return $root.regGoto('docs'); }, text: t('back')"></a></div>
      </div>

      <!-- step: review -->
      <div data-bind="visible: regStep() === 'review'">
        <div class="dlp-grid2">
          <div><label class="dlp-lbl" data-bind="text: t('emiratesId')"></label><input class="dlp-inp" type="text" data-bind="value: rgNationalId"></div>
          <div><label class="dlp-lbl" data-bind="text: t('passportNo')"></label><input class="dlp-inp" type="text" data-bind="value: rgPassport"></div>
          <div><label class="dlp-lbl" data-bind="text: t('bankNameLbl')"></label><input class="dlp-inp" type="text" data-bind="value: rgBankName"></div>
          <div><label class="dlp-lbl" data-bind="text: t('ibanLbl')"></label><input class="dlp-inp" type="text" data-bind="value: rgBankIban"></div>
          <div><label class="dlp-lbl" data-bind="text: t('lineMgrEmail')"></label><input class="dlp-inp" type="email" data-bind="value: rgLineMgrEmail"></div>
          <div><label class="dlp-lbl" data-bind="text: t('lineMgrName')"></label><input class="dlp-inp" type="text" data-bind="value: rgLineMgrName"></div>
        </div>
        <div class="dlp-revdocs">
          <div class="dlp-revdocs-h" data-bind="text: t('uploadedDocsTitle')"></div>
          <!-- ko foreach: rgDocs -->
          <!-- ko if: fileName() -->
          <div class="dlp-revdoc"><span data-bind="text: label"></span><b class="dlp-saved" data-bind="text: $root.t('savedTag')"></b></div>
          <!-- /ko -->
          <!-- /ko -->
          <!-- ko if: regHasPhoto -->
          <div class="dlp-revdoc"><span data-bind="text: t('regPhotoLbl')"></span><b class="dlp-saved" data-bind="text: t('savedTag')"></b></div>
          <!-- /ko -->
        </div>
        <button class="dlp-cta dlp-cta--full" data-bind="click: regSubmit, disable: regBusy"><span data-bind="text: regBusy() ? '…' : t('submitReg')"></span></button>
        <div class="dlp-authalt"><a href="#" data-bind="click: function(){ return $root.regGoto('docs'); }, text: t('back')"></a></div>
      </div>

      <!-- step: done -->
      <div data-bind="visible: regStep() === 'done'" class="dlp-done">
        <div class="dlp-done-mark">&#10003;</div>
        <h3 class="dlp-wizh" data-bind="text: t('regDoneTitle')"></h3>
        <p class="dlp-wizsub" data-bind="text: t('regDoneMsg')"></p>
        <button class="dlp-cta dlp-cta--full" data-bind="click: regBackToLogin, text: t('backToLogin')"></button>
      </div>
    </div>
  </div>
</section>

<!-- ════════════════ APP SHELL ════════════════ -->
<div data-bind="visible: isApp()" style="display:none">
  <div class="pbar">
    <div class="wordmark"><span class="mark">i-Finance</span><span class="sub" data-bind="text: t('portalName')"></span></div>
    <div class="grow"></div>
    <button class="lang-flip" data-bind="click: toggleLang, text: lang() === 'en' ? 'عربي' : 'English'"></button>
    <div class="who">
      <div class="av" data-bind="text: initials()"></div>
      <div>
        <div class="nm" data-bind="text: me().displayName || session().displayName"></div>
        <div class="vn" data-bind="text: me().vendorNumber || ''"></div>
      </div>
    </div>
    <button class="lang-flip" data-bind="click: doLogout, text: t('signOut')"></button>
  </div>
  <nav class="pnav">
    <a data-bind="css: { on: view() === 'overview' }, click: go.bind($data, 'overview'), text: t('navOverview')"></a>
    <a data-bind="css: { on: view() === 'contracts' }, click: go.bind($data, 'contracts'), text: t('navContracts')"></a>
    <a data-bind="css: { on: view() === 'payments' }, click: go.bind($data, 'payments'), text: t('navPayments')"></a>
  </nav>

  <div class="wrap">

    <!-- ── OVERVIEW ── -->
    <div data-bind="visible: view() === 'overview'">
      <h1 class="greet"><span data-bind="text: t('greeting')"></span> <em data-bind="text: firstName() + '.'"></em></h1>
      <div class="greet-sub" data-bind="text: t('greetingSub')"></div>

      <div class="hero">
        <div class="card pay-hero" data-bind="with: me().nextPayment">
          <div class="eyebrow"><span class="dot"></span>
            <span data-bind="text: $root.t('nextPayment') + ' · ' + ($data.dueDate || '')"></span></div>
          <div class="amount"><span data-bind="text: ($data.amount || 0).toLocaleString()"></span><small>AED</small></div>
          <div class="pay-meta">
            <div><b data-bind="text: $data.periodLabel || ''"></b><span data-bind="text: $root.t('period')"></span></div>
            <div><b class="mono" data-bind="text: $data.contractNumber || ''"></b><span data-bind="text: $root.t('contract')"></span></div>
            <div><b><span class="chip brand" data-bind="text: $root.payState($data)"></span></b><span data-bind="text: $root.t('status')"></span></div>
          </div>
        </div>
        <div class="card pay-hero pay-hero--empty" data-bind="visible: !me().nextPayment">
          <div class="eyebrow" data-bind="text: t('nextPayment')"></div>
          <div class="empty-note" data-bind="text: t('noUpcoming')"></div>
        </div>
        <div class="card con-card">
          <div class="ttl" data-bind="text: t('accountTitle')"></div>
          <div class="num" data-bind="text: (me().vendorNumber || '') + ' · ' + (me().email || '')"></div>
          <div class="row2">
            <div><b data-bind="text: me().activeContracts || 0"></b><span data-bind="text: t('activeContracts')"></span></div>
            <div><b data-bind="text: me().contracts || 0"></b><span data-bind="text: t('totalContracts')"></span></div>
            <div data-bind="visible: me().bankName">
              <b data-bind="text: (me().bankName || '') + ' ··' + (me().ibanTail || '')"></b>
              <span data-bind="text: t('payoutAccount')"></span>
            </div>
          </div>
        </div>
      </div>

      <h2 class="sec"><span data-bind="text: t('paymentTimeline')"></span><span class="rule"></span></h2>
      <div class="card timeline">
        <!-- ko foreach: timelineRows -->
        <div class="t-row" data-bind="css: $root.rowCss($data)">
          <span class="t-node"></span>
          <span class="t-what"><b data-bind="text: periodLabel"></b>
            <span data-bind="text: contractNumber + ' · ' + dueDate"></span></span>
          <span class="chip" data-bind="text: $root.payState($data), css: $root.chipCss($data)"></span>
          <span class="t-amt" data-bind="text: (amount || 0).toLocaleString()"></span>
        </div>
        <!-- /ko -->
        <div class="empty-note pad" data-bind="visible: timelineRows().length === 0, text: t('nothingHere')"></div>
      </div>
    </div>

    <!-- ── CONTRACTS ── -->
    <div data-bind="visible: view() === 'contracts'">
      <h1 class="greet"><span data-bind="html: t('myContracts')"></span></h1>
      <div class="greet-sub" data-bind="text: t('contractsSub')"></div>
      <div class="con-grid">
        <!-- ko foreach: contracts -->
        <div class="card con-card">
          <div class="ttl" data-bind="text: title"></div>
          <div class="num"><span class="mono" data-bind="text: contractNumber"></span>
            · <span data-bind="text: status"></span>
            · <span data-bind="text: (startDate || '') + ' → ' + (endDate || $root.t('openEnded'))"></span></div>
          <div class="meter">
            <div class="lbl"><span data-bind="text: $root.t('paidToDate')"></span>
              <span><b data-bind="text: (paidTotal || 0).toLocaleString()"></b> / <span data-bind="text: (totalAmount || 0).toLocaleString()"></span> AED</span></div>
            <div class="bar"><div class="fill" data-bind="style: { width: $root.pct($data) + '%' }"></div></div>
          </div>
        </div>
        <!-- /ko -->
      </div>
      <div class="empty-note pad" data-bind="visible: contracts().length === 0, text: t('nothingHere')"></div>
    </div>

    <!-- ── PAYMENTS ── -->
    <div data-bind="visible: view() === 'payments'">
      <h1 class="greet"><span data-bind="html: t('myPayments')"></span></h1>
      <div class="greet-sub" data-bind="text: t('paymentsSub')"></div>

      <h2 class="sec"><span data-bind="text: t('schedule')"></span><span class="rule"></span></h2>
      <div class="card timeline">
        <!-- ko foreach: schedule -->
        <div class="t-row" data-bind="css: $root.rowCss($data)">
          <span class="t-node"></span>
          <span class="t-what"><b data-bind="text: periodLabel"></b>
            <span data-bind="text: contractNumber + ' · ' + dueDate"></span></span>
          <span class="chip" data-bind="text: $root.payState($data), css: $root.chipCss($data)"></span>
          <span class="t-amt" data-bind="text: (amount || 0).toLocaleString()"></span>
        </div>
        <!-- /ko -->
        <div class="empty-note pad" data-bind="visible: schedule().length === 0, text: t('nothingHere')"></div>
      </div>

      <h2 class="sec"><span data-bind="text: t('vouchers')"></span><span class="rule"></span></h2>
      <div class="card timeline">
        <!-- ko foreach: vouchers -->
        <div class="t-row" data-bind="css: { paid: paymentStatus === 'PAID' }">
          <span class="t-node"></span>
          <span class="t-what"><b class="mono" data-bind="text: voucherNumber"></b>
            <span data-bind="text: (periodLabel || '') + ' · ' + contractNumber"></span></span>
          <span class="chip" data-bind="text: paymentStatus === 'PAID' ? $root.t('statePaid') : status,
                                        css: paymentStatus === 'PAID' ? 'ok' : 'brand'"></span>
          <span class="t-amt" data-bind="text: (amount || 0).toLocaleString()"></span>
        </div>
        <!-- /ko -->
        <div class="empty-note pad" data-bind="visible: vouchers().length === 0, text: t('nothingHere')"></div>
      </div>
    </div>

  </div>

  <div class="pfoot">
    <span data-bind="text: t('footOrg')"></span><span class="grow"></span>
    <span data-bind="text: t('footNote')"></span>
  </div>
</div>

<script src="https://static.oracle.com/cdn/jet/17.0.0/3rdparty/knockout/knockout-3.5.1.js"></script>
<script>
  var s = document.createElement('script');
  s.src = 'js/portal.js?v=' + window.APP_VERSION;
  document.body.appendChild(s);
</script>
</body>
</html>
