<div class="page-wrap">
  <div class="page-header-row">
    <div class="page-header">
      <div class="page-title" data-bind="text: $root.t('repl.title')"></div>
      <div class="page-subtitle" data-bind="text: $root.t('repl.subtitle')"></div>
    </div>
    <button class="btn btn-primary" data-bind="click: openNew, text: $root.t('repl.new')"></button>
  </div>

  <div class="view-toolbar" style="display:flex;gap:10px;align-items:center">
    <!-- ko if: isAdmin -->
    <div class="lang-pill" style="background:var(--surface-2)">
      <button data-bind="click: function(){ setScope('mine'); }, css: { on: scope() === 'mine' }">Mine</button>
      <button data-bind="click: function(){ setScope('all'); },  css: { on: scope() === 'all' }">All</button>
    </div>
    <!-- /ko -->
    <select class="form-control" style="width:170px;padding:8px 10px" data-bind="value: statusFilter">
      <option value="">All statuses</option>
      <option value="DRAFT">Draft</option>
      <option value="SUBMITTED">Submitted</option>
      <option value="UNDER_REVIEW">Under Review</option>
      <option value="RETURNED">Returned</option>
      <option value="APPROVED">Approved</option>
      <option value="REJECTED">Rejected</option>
    </select>
  </div>

  <!-- ko if: loading() --><list-skeleton params="rows: 8"></list-skeleton><!-- /ko -->
  <!-- ko if: loadError() -->
  <div class="empty-state"><div class="empty-state__icon">&#9888;</div>
    <div class="empty-state__msg">Could not load replenishments</div>
    <button class="btn btn-secondary" data-bind="click: function(){ reload(); }">&#8635; Retry</button></div>
  <!-- /ko -->
  <!-- ko if: !loading() && !loadError() && items().length === 0 -->
  <div class="empty-state"><div class="empty-state__icon">&#129534;</div>
    <div class="empty-state__msg">No replenishments in this view</div></div>
  <!-- /ko -->

  <!-- ko if: !loading() && !loadError() && items().length > 0 -->
  <div class="data-table-wrap">
    <table class="data-table">
      <thead><tr>
        <th>Number</th><th>Card</th><th>Period</th><th>Lines</th><th>Total (AED)</th><th>Status</th><th>Owner</th><th>Submitted</th>
      </tr></thead>
      <tbody>
        <!-- ko foreach: items -->
        <tr style="cursor:pointer" data-bind="click: $vm.openDetail.bind($vm, $data)">
          <td class="mono" style="font-weight:600" data-bind="text: $data.reimbNumber"></td>
          <td class="mono" data-bind="text: $data.ccNumber"></td>
          <td data-bind="text: $data.periodLabel"></td>
          <td class="mono" data-bind="text: $data.lineCount"></td>
          <td class="mono" data-bind="text: ($data.totalAmount || 0).toLocaleString()"></td>
          <td><span data-bind="text: $data.status, css: $vm.statusBadge($data.status)"></span></td>
          <td data-bind="text: $data.onBehalfOfName"></td>
          <td class="mono" data-bind="text: $data.submittedAt || '—'"></td>
        </tr>
        <!-- /ko -->
      </tbody>
    </table>
  </div>
  <list-pager params="offset: offset, limit: limit, total: total, onChange: reload"></list-pager>
  <!-- /ko -->

  <!-- new replenishment modal -->
  <!-- ko if: showNewModal() -->
  <div class="modal-backdrop">
    <div class="modal-box" style="max-width:460px">
      <div class="modal-head"><span class="modal-title" data-bind="text: $root.t('repl.new')"></span>
        <button class="modal-close" data-bind="click: function(){ showNewModal(false); }">&#10005;</button></div>
      <div class="modal-body">
        <!-- ko if: newError() -->
        <div class="alert-banner alert-banner--danger" style="margin-bottom:12px">&#9888; <span data-bind="text: newError()"></span></div>
        <!-- /ko -->
        <!-- ko if: myCards().length === 0 -->
        <div style="font-size:13px;color:var(--text-3)">You have no active card to report expenses for.</div>
        <!-- /ko -->
        <!-- ko if: myCards().length > 0 -->
        <div class="form-group" style="margin-bottom:12px">
          <label class="form-label">Card *</label>
          <select class="form-control" data-bind="value: newCcId,
                   options: myCards, optionsValue: 'ccId',
                   optionsText: function(c){ return c.ccNumber; },
                   optionsCaption: 'Select…'"></select>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div class="form-group">
            <label class="form-label">Month *</label>
            <select class="form-control" data-bind="options: months, value: newMonth"></select>
          </div>
          <div class="form-group">
            <label class="form-label">Year *</label>
            <input class="form-control" type="number" data-bind="value: newYear">
          </div>
        </div>
        <!-- /ko -->
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" data-bind="click: function(){ showNewModal(false); }">Cancel</button>
        <button class="btn btn-primary" data-bind="click: createNew, enable: myCards().length > 0 && !creating()">
          <!-- ko if: creating() -->Creating&hellip;<!-- /ko -->
          <!-- ko ifnot: creating() -->Create Draft<!-- /ko -->
        </button>
      </div>
    </div>
  </div>
  <!-- /ko -->
</div>
