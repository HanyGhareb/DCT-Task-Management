<div class="page-wrap">
  <div class="page-header-row">
    <div class="page-header">
      <div class="page-title" data-bind="text: $root.t('req.title')"></div>
      <div class="page-subtitle" data-bind="text: $root.t('req.subtitle')"></div>
    </div>
    <button class="btn btn-primary" data-bind="click: newRequest, text: $root.t('req.new')"></button>
  </div>

  <div class="view-toolbar" style="display:flex;gap:10px;align-items:center">
    <!-- ko if: isAdmin -->
    <div class="lang-pill" style="background:var(--surface-2)">
      <button data-bind="click: function(){ setScope('mine'); }, css: { on: scope() === 'mine' }">Mine</button>
      <button data-bind="click: function(){ setScope('all'); },  css: { on: scope() === 'all' }">All</button>
    </div>
    <!-- /ko -->
    <select class="form-control" style="width:170px;padding:8px 10px" data-bind="value: statusFilter">
      <option value="">All statuses</option>
      <option value="DRAFT">Draft</option>
      <option value="SUBMITTED">Submitted</option>
      <option value="UNDER_REVIEW">Under Review</option>
      <option value="RETURNED">Returned</option>
      <option value="APPROVED">Approved</option>
      <option value="REJECTED">Rejected</option>
      <option value="WITHDRAWN">Withdrawn</option>
    </select>
    <select class="form-control" style="width:180px;padding:8px 10px" data-bind="value: typeFilter">
      <option value="">All types</option>
      <option value="NEW_CARD">New Card</option>
      <option value="INCREASE_LIMIT">Increase Limit</option>
      <option value="DECREASE_LIMIT">Decrease Limit</option>
      <option value="REPLACEMENT">Replacement</option>
      <option value="CLOSE_CARD">Close Card</option>
    </select>
  </div>

  <!-- ko if: loading() --><list-skeleton params="rows: 8"></list-skeleton><!-- /ko -->
  <!-- ko if: loadError() -->
  <div class="empty-state"><div class="empty-state__icon">&#9888;</div>
    <div class="empty-state__msg">Could not load requests</div>
    <button class="btn btn-secondary" data-bind="click: function(){ reload(); }">&#8635; Retry</button></div>
  <!-- /ko -->
  <!-- ko if: !loading() && !loadError() && items().length === 0 -->
  <div class="empty-state"><div class="empty-state__icon">&#128221;</div>
    <div class="empty-state__msg">No requests in this view</div></div>
  <!-- /ko -->

  <!-- ko if: !loading() && !loadError() && items().length > 0 -->
  <div class="data-table-wrap">
    <table class="data-table">
      <thead><tr>
        <th>Number</th><th>Type</th><th>Card</th><th>Holder</th><th>Limit (AED)</th><th>Status</th><th>Created</th>
      </tr></thead>
      <tbody>
        <!-- ko foreach: items -->
        <tr style="cursor:pointer" data-bind="click: $vm.openDetail.bind($vm, $data)">
          <td class="mono" style="font-weight:600" data-bind="text: $data.requestNumber"></td>
          <td data-bind="text: $vm.typeLabel($data.requestType)"></td>
          <td class="mono" data-bind="text: $data.ccNumber || '—'"></td>
          <td data-bind="text: $data.holderName || $data.createdByName || '-'"></td>
          <td class="mono" data-bind="text: $data.requestedLimit ? $data.requestedLimit.toLocaleString() : '—'"></td>
          <td><span data-bind="text: $data.status, css: $vm.statusBadge($data.status)"></span></td>
          <td class="mono" data-bind="text: $data.createdAt || ''"></td>
        </tr>
        <!-- /ko -->
      </tbody>
    </table>
  </div>
  <list-pager params="offset: offset, limit: limit, total: total, onChange: reload"></list-pager>
  <!-- /ko -->
</div>
