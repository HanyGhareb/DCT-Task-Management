<div class="page-wrap" style="max-width:900px">
  <div class="page-header">
    <div class="page-title" data-bind="text: t('nav.moduleSettings')"></div>
    <div class="page-subtitle">AI behavior, review gate, alternative file naming, and appearance</div>
  </div>

  <!-- ko if: loading() --><list-skeleton params="rows: 8"></list-skeleton><!-- /ko -->
  <!-- ko ifnot: loading() -->
  <div class="form-card">
    <!-- ko foreach: settings() -->
    <div style="display:grid; grid-template-columns: 1fr 280px 90px; gap:14px; align-items:center;
                padding:12px 0; border-bottom:1px solid #eef1f6">
      <div>
        <div style="font-weight:600; font-size:13px" data-bind="text: label"></div>
        <div style="font-size:11.5px; color:#8a94a6" data-bind="text: description"></div>
      </div>
      <div>
        <!-- ko if: type === 'BOOLEAN' -->
        <select class="form-control" data-bind="value: _value">
          <option value="Y">Yes</option>
          <option value="N">No</option>
        </select>
        <!-- /ko -->
        <!-- ko if: type === 'SELECT' -->
        <select class="form-control" data-bind="options: (allowed || '').split('|'), value: _value"></select>
        <!-- /ko -->
        <!-- ko if: type === 'NUMBER' -->
        <input class="form-control mono" type="number" data-bind="value: _value">
        <!-- /ko -->
        <!-- ko if: type !== 'BOOLEAN' && type !== 'SELECT' && type !== 'NUMBER' -->
        <input class="form-control" data-bind="value: _value,
               attr: { type: key.indexOf('API_KEY') >= 0 ? 'password' : 'text',
                       placeholder: key.indexOf('API_KEY') >= 0 ? 'enter new key to replace' : '' }">
        <!-- /ko -->
      </div>
      <button class="btn btn-primary btn-sm" data-bind="click: $parent.save.bind($parent, $data),
              disable: _saving(), text: _saving() ? '…' : $parent.t('common.save')"></button>
    </div>
    <!-- /ko -->
  </div>
  <!-- /ko -->
</div>
