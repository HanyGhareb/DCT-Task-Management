<div class="page-wrap" style="max-width:420px;margin:8vh auto">
  <div class="card">
    <div style="text-align:center;margin-bottom:18px">
      <div class="brand-cube" style="margin:0 auto 10px;width:48px;height:48px;border-radius:12px;
           display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;
           background:var(--brand);color:#fff">BI</div>
      <div style="font-size:18px;font-weight:700" data-bind="text: $root.t('mod.bi')"></div>
      <div style="font-size:12px;color:var(--text-2)">i-Finance &middot; APP 211</div>
    </div>

    <!-- ko if: error() -->
    <div class="alert-banner alert-banner--danger" style="margin-bottom:12px" data-bind="text: error"></div>
    <!-- /ko -->

    <div class="form-group">
      <label class="form-label">Username</label>
      <input class="form-control" type="text" placeholder="Enter username"
             data-bind="value: username, valueUpdate: 'input',
                        event: { keypress: function(d,e){ if(e.keyCode===13) doLogin(); } }">
    </div>
    <div class="form-group" style="margin-bottom:18px">
      <label class="form-label">Password</label>
      <input class="form-control" type="password" placeholder="Enter password"
             data-bind="value: password, valueUpdate: 'input',
                        event: { keypress: function(d,e){ if(e.keyCode===13) doLogin(); } }">
    </div>

    <button class="btn btn-primary" style="width:100%" data-bind="click: doLogin, disable: loading()">
      <!-- ko if: loading() -->Signing in&hellip;<!-- /ko -->
      <!-- ko ifnot: loading() -->Sign In<!-- /ko -->
    </button>

    <div style="margin-top:14px;text-align:center">
      <!-- ko foreach: quickLogins -->
      <button class="btn btn-secondary btn-sm" data-bind="click: $parent.quickLogin.bind($parent, $data), text: label"></button>
      <!-- /ko -->
    </div>
  </div>
</div>
